<?xml version="1.0"?>

<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;width:0;height:0" aria-hidden="true">
<defs>
  <filter id="pe-glow" x="-90%" y="-90%" width="280%" height="280%">
    <feGaussianBlur stdDeviation="1.4" result="b"></feGaussianBlur>
    <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
  </filter>
  <filter id="pe-soft" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.2"></feGaussianBlur>
  </filter>

  
  <symbol id="fx-spark" viewBox="0 0 24 24">
    <path d="M12 0 L13.6 9 L24 12 L13.6 15 L12 24 L10.4 15 L0 12 L10.4 9 Z" fill="#ffb84d" filter="url(#pe-glow)"></path>
  </symbol>
  <symbol id="fx-smoke" viewBox="0 0 48 48">
    <g fill="#8a8c99" filter="url(#pe-soft)">
      <circle cx="18" cy="30" r="12" opacity=".5"></circle><circle cx="31" cy="27" r="11" opacity=".42"></circle>
      <circle cx="25" cy="18" r="10" opacity=".46"></circle><circle cx="34" cy="34" r="8" opacity=".36"></circle>
    </g>
  </symbol>
  <symbol id="fx-dust" viewBox="0 0 16 16">
    <circle cx="8" cy="8" r="3.4" fill="#e8e0cf" opacity=".8"></circle>
  </symbol>
  <symbol id="fx-droplet" viewBox="0 0 20 20">
    <path d="M10 1c2.2 3 6 6.4 6 10a6 6 0 1 1-12 0c0-3.6 3.8-7 6-10z" fill="#4ecdc4"></path>
    <circle cx="7.5" cy="12" r="1.6" fill="#fff" opacity=".5"></circle>
  </symbol>
  <symbol id="fx-board-dot" viewBox="0 0 20 20">
    <circle cx="10" cy="5.5" r="3.2" fill="#ef798a"></circle>
    <path d="M4 18a6 6 0 0 1 12 0z" fill="#ef798a"></path>
  </symbol>

  
  
  <symbol id="fx-crash" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#e0584f" stroke-width="2.5" stroke-dasharray="5 7" opacity=".7"></circle>
    <g stroke="#ffb84d" stroke-width="4" stroke-linecap="round" filter="url(#pe-glow)">
      <path d="M40 40 L40 8M40 40 L40 72M40 40 L8 40M40 40 L72 40M40 40 L18 18M40 40 L62 62M40 40 L62 18M40 40 L18 62"></path>
    </g>
    <circle cx="40" cy="40" r="13" fill="#f4cf5e"></circle>
    <circle cx="40" cy="40" r="7" fill="#e0584f"></circle>
  </symbol>

  
  <symbol id="fx-touchdown" viewBox="0 0 72 44">
    <rect x="14" y="30" width="44" height="4" rx="2" fill="#e8e0cf" opacity=".35"></rect>
    <g fill="#8a8c99" filter="url(#pe-soft)">
      <circle cx="22" cy="26" r="10" opacity=".5"></circle><circle cx="40" cy="24" r="12" opacity=".42"></circle><circle cx="54" cy="27" r="9" opacity=".4"></circle>
    </g>
    <circle cx="30" cy="18" r="2.4" fill="#e8e0cf" opacity=".7"></circle>
  </symbol>

  
  <symbol id="fx-takeoff" viewBox="0 0 56 64">
    <g stroke="#f4eede" stroke-width="3" stroke-linecap="round">
      <path d="M20 50 L20 22" opacity=".8"></path><path d="M28 56 L28 16" opacity=".95"></path><path d="M36 50 L36 24" opacity=".8"></path>
    </g>
    <g fill="#8a8c99" filter="url(#pe-soft)" opacity=".5">
      <circle cx="22" cy="56" r="7"></circle><circle cx="34" cy="57" r="6"></circle>
    </g>
  </symbol>

  
  <symbol id="fx-weld" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="6" fill="#ffd089" filter="url(#pe-glow)"></circle>
    <g stroke="#f2a93b" stroke-width="2.4" stroke-linecap="round" filter="url(#pe-glow)">
      <path d="M30 30 L44 16M30 30 L48 34M30 30 L40 46M30 30 L16 18M30 30 L14 36M30 30 L24 48"></path>
    </g>
    <circle cx="44" cy="16" r="2" fill="#f4cf5e"></circle><circle cx="16" cy="18" r="2" fill="#f4cf5e"></circle><circle cx="40" cy="46" r="1.8" fill="#f4cf5e"></circle>
  </symbol>

  
  <symbol id="fx-fuel" viewBox="0 0 60 60">
    <g fill="#4ecdc4">
      <path d="M30 6c1.5 2 4 4.3 4 6.7a4 4 0 1 1-8 0C26 10.3 28.5 8 30 6z"></path>
      <path d="M30 24c1.3 1.7 3.4 3.7 3.4 5.7a3.4 3.4 0 1 1-6.8 0c0-2 2.1-4 3.4-5.7z" opacity=".85"></path>
      <path d="M30 40c1.1 1.4 2.8 3 2.8 4.7a2.8 2.8 0 1 1-5.6 0c0-1.7 1.7-3.3 2.8-4.7z" opacity=".7"></path>
    </g>
    <ellipse cx="30" cy="55" rx="14" ry="3.5" fill="#4ecdc4" opacity=".3"></ellipse>
  </symbol>

  
  <symbol id="fx-boarding" viewBox="0 0 72 44">
    <rect x="58" y="8" width="10" height="28" rx="3" fill="#ef798a" opacity=".3"></rect>
    <g fill="#ef798a">
      <g><circle cx="14" cy="16" r="4"></circle><path d="M7 38a7 7 0 0 1 14 0z"></path></g>
      <g opacity=".8"><circle cx="32" cy="16" r="4"></circle><path d="M25 38a7 7 0 0 1 14 0z"></path></g>
      <g opacity=".6"><circle cx="48" cy="16" r="3.4"></circle><path d="M42 38a6 6 0 0 1 12 0z"></path></g>
    </g>
    <path d="M50 22 L60 22 M56 18 L60 22 L56 26" stroke="#ef798a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
  </symbol>

  
  <symbol id="fx-success" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="32" fill="none" stroke="#5dca7a" stroke-width="4" opacity=".9" filter="url(#pe-glow)"></circle>
    <path d="M27 41 L36 50 L54 30" fill="none" stroke="#5dca7a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#pe-glow)"></path>
  </symbol>
  <symbol id="fx-error" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="32" fill="none" stroke="#e0584f" stroke-width="4" opacity=".9" filter="url(#pe-glow)"></circle>
    <path d="M30 30 L50 50 M50 30 L30 50" fill="none" stroke="#e0584f" stroke-width="5" stroke-linecap="round" filter="url(#pe-glow)"></path>
  </symbol>
  <symbol id="fx-ripple" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="14" fill="none" stroke="#ffb84d" stroke-width="3" opacity=".9"></circle>
    <circle cx="40" cy="40" r="24" fill="none" stroke="#ffb84d" stroke-width="2.4" opacity=".55"></circle>
    <circle cx="40" cy="40" r="34" fill="none" stroke="#ffb84d" stroke-width="1.8" opacity=".28"></circle>
  </symbol>
</defs>
</svg>