<!-- @dsCard group="Cartoon Skin" viewport="1280x720" name="Cartoon Skin — Dispatcher Board" subtitle="The locked layout (ref-04/ref-01) rendered in the bright cartoon skin — lush field, glossy stalls, chunky planes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: var(--font-ui); color: var(--cartoon-text-strong); overflow: hidden; background: #2a2117; }

  .stage { position: fixed; inset: 0; overflow: hidden; background: #2a2117; }
  #board { width: 1280px; height: 720px; position: absolute; left: 0; top: 0; overflow: hidden; transform-origin: 0 0;
    background: linear-gradient(180deg, var(--cartoon-sky) 0%, var(--cartoon-sky-2) 100%); }

  /* ---- water + shore along the far (right) edge — planes wait over the sea ---- */
  .sea { position: absolute; right: 0; top: 88px; bottom: 0; width: 150px; overflow: hidden;
    background: linear-gradient(180deg, var(--cartoon-water) 0%, #4bb9de 100%); }
  .sea::before, .sea::after { content: ""; position: absolute; left: -10%; width: 120%; height: 14px; border-radius: 999px;
    background: var(--cartoon-water-wave); opacity: 0.55; animation: shimmer var(--cartoon-wave) ease-in-out infinite; }
  .sea::before { top: 30%; }
  .sea::after { top: 64%; background: var(--cartoon-water-wave-2); opacity: 0.45; animation-delay: -2.4s; }
  @keyframes shimmer { 0%,100% { transform: translateX(0); } 50% { transform: translateX(18px); } }
  .shore { position: absolute; right: 150px; top: 88px; bottom: 0; width: 26px;
    background: linear-gradient(90deg, transparent, var(--cartoon-sand)); border-right: 4px solid var(--cartoon-sand); }

  /* ---- central field — lush mowed grass (the sacred drawing canvas) ---- */
  .field { position: absolute; left: 168px; right: 398px; top: 196px; bottom: 116px;
    border-radius: var(--cartoon-r-panel); overflow: hidden;
    background:
      repeating-linear-gradient(90deg, var(--cartoon-grass) 0 46px, var(--cartoon-grass-dim) 46px 92px);
    border: var(--cartoon-stroke) solid var(--cartoon-grass-edge);
    box-shadow: inset 0 6px 0 rgba(255,255,255,0.18), inset 0 -10px 22px rgba(58,42,23,0.16); }
  .field::after { content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 50% at 42% 44%, rgba(143,217,106,0.5), transparent 70%); }
  .field .drop { position: absolute; left: 30%; top: 30%; width: 40%; height: 36%; border-radius: 22px;
    border: 3px dashed rgba(255,255,255,0.4); }

  /* ---- top HUD — bright cream bar ---- */
  .hud { position: absolute; top: 14px; left: 16px; right: 16px; height: 72px; display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, var(--cartoon-cream-hi), var(--cartoon-cream-2));
    border: var(--cartoon-stroke) solid var(--cartoon-outline); border-radius: var(--cartoon-r-panel);
    padding: 0 18px; box-shadow: var(--cartoon-shadow-drop), var(--cartoon-gloss); }
  .hearts { display: flex; gap: 7px; align-items: center; color: var(--cartoon-life); }
  .hearts i, .hearts svg { width: 32px; height: 32px; fill: currentColor; stroke: var(--cartoon-outline); stroke-width: 2; }
  .hearts .empty { color: var(--cartoon-life-empty); }
  .coin { width: 40px; height: 40px; border-radius: 50%; flex: 0 0 auto; display: grid; place-items: center;
    background: radial-gradient(circle at 38% 32%, #ffe79a, var(--cartoon-coin) 55%, var(--cartoon-coin-deep));
    border: 3px solid var(--cartoon-outline); color: var(--cartoon-outline); font-family: system-ui, "Segoe UI Symbol", "Noto Sans Symbols", sans-serif; font-weight: 800; font-size: 19px;
    box-shadow: var(--cartoon-glow-coin); }
  .money { font-family: var(--font-display); font-weight: 700; font-size: 32px; color: var(--cartoon-text-strong); line-height: 1; white-space: nowrap; }
  .spacer { flex: 1; }
  .goalwrap { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 230px; }
  .goalwrap .kick { font-size: 11px; letter-spacing: var(--ls-kicker); text-transform: uppercase; color: var(--cartoon-text-muted); font-weight: 800; }
  .goalrow { display: flex; align-items: center; gap: 12px; }
  .goalbar { width: 200px; height: 16px; border-radius: 999px; background: #e4cfa3; overflow: hidden; border: 3px solid var(--cartoon-outline); }
  .goalbar i { display: block; height: 100%; width: 57%; border-radius: 999px;
    background: linear-gradient(180deg, #ff8cbe, var(--cartoon-board)); }
  .goalnum { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--cartoon-text-strong); }
  .timer { font-family: var(--font-display); font-weight: 700; font-size: 32px; color: var(--cartoon-text-strong); letter-spacing: 0.02em; }
  .pause { width: 52px; height: 52px; border-radius: 16px; flex: 0 0 auto; display: grid; place-items: center; cursor: pointer;
    background: linear-gradient(180deg, #ff8cbe, var(--cartoon-board)); border: var(--cartoon-stroke) solid var(--cartoon-outline);
    box-shadow: var(--cartoon-shadow-soft); transition: transform var(--dur-fast) var(--cartoon-ease-bounce); }
  .pause:hover { transform: translateY(-2px) scale(1.04); }
  .pause:active { transform: translateY(2px); box-shadow: var(--cartoon-shadow-press); }
  .pause i { width: 26px; height: 26px; color: #fff; }

  /* ---- bay rails ---- */
  .rail { position: absolute; display: flex; align-items: stretch; }
  .rail-top { top: 100px; left: 16px; right: 398px; gap: 14px; height: 84px; }
  .rail-bottom { bottom: 16px; left: 16px; right: 398px; gap: 14px; height: 84px; }
  .rail-left { top: 196px; left: 16px; bottom: 116px; width: 136px; flex-direction: column; justify-content: space-between; gap: 14px; }
  .rail-top .bay, .rail-bottom .bay { flex: 1; }

  /* glossy cream stall — single warm-dark outline, soft gloss + chunky bottom edge */
  .bay { position: relative; border-radius: var(--cartoon-r-bay); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px; padding: 8px;
    background: linear-gradient(180deg, var(--cartoon-cream-hi) 0%, var(--cartoon-cream) 60%, var(--cartoon-cream-2) 100%);
    border: var(--cartoon-stroke) solid var(--cartoon-outline);
    box-shadow: var(--cartoon-shadow-soft), var(--cartoon-gloss); }
  .rail-left .bay { flex: 1; }
  /* the service icon chip (rounded square, accent-tinted, thick outline) */
  .ico { width: 46px; height: 46px; border-radius: var(--cartoon-r-chip); display: grid; place-items: center;
    border: var(--cartoon-stroke-sm) solid var(--cartoon-outline); box-shadow: inset 0 2px 0 rgba(255,255,255,0.5); }
  .ico i { width: 28px; height: 28px; color: #fff; stroke-width: 2.6; }
  .bay.repair .ico { background: linear-gradient(180deg, #ffae5e, var(--cartoon-repair)); }
  .bay.fuel   .ico { background: linear-gradient(180deg, #5fd2ef, var(--cartoon-fuel)); }
  .bay.board  .ico { background: linear-gradient(180deg, #ff8cbe, var(--cartoon-board)); }
  .bay.deice  .ico { background: linear-gradient(180deg, #9adcf3, var(--cartoon-deice)); }
  .bay .lbl { font-size: 11px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; line-height: 1; color: var(--cartoon-text-body); }

  /* locked stall */
  .bay.locked { background: linear-gradient(180deg, #f0dcb6, var(--cartoon-roof)); }
  .bay.locked .pad { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 12px; }
  .bay.locked .pad i, .bay.locked .pad svg { width: 34px; height: 34px; color: var(--cartoon-board); stroke-width: 2.6; }
  .costchip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 11px 3px 6px; border-radius: 999px; white-space: nowrap;
    background: var(--cartoon-outline); border: 2px solid var(--cartoon-outline); }
  .costchip .c { width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 38% 32%, #ffe79a, var(--cartoon-coin) 60%, var(--cartoon-coin-deep)); flex: 0 0 auto; }
  .costchip span { font-size: 12px; font-weight: 800; color: var(--cartoon-cream-hi); font-family: var(--font-display); }

  /* ---- runways (top-down gray strips) ---- */
  .runways { position: absolute; right: 176px; width: 240px; top: 196px; bottom: 116px;
    display: flex; flex-direction: column; justify-content: space-between; }
  .runway { position: relative; height: 84px; border-radius: 16px; overflow: visible; display: flex; align-items: center;
    background: linear-gradient(180deg, var(--cartoon-runway) 0%, var(--cartoon-runway-2) 100%);
    border: var(--cartoon-stroke) solid var(--cartoon-outline); box-shadow: var(--cartoon-shadow-soft); }
  .runway .center { position: absolute; left: 14px; right: 40px; top: 50%; height: 0; border-top: 5px dashed var(--cartoon-runway-mark); opacity: 0.9; }
  .runway .thresh { position: absolute; left: 12px; top: 12px; bottom: 12px; width: 6px; border-radius: 3px;
    background: repeating-linear-gradient(180deg, var(--cartoon-runway-mark) 0 6px, transparent 6px 12px); }

  /* incoming-plane marker at the runway mouth (right edge / over the sea) */
  .approach { position: absolute; right: -150px; top: 50%; transform: translateY(-50%); display: grid; place-items: center; }
  .ring { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 70px; height: 70px; border-radius: 50%;
    border: 5px solid rgba(255,255,255,0.85); }
  .ring.patience { border-color: var(--cartoon-depart); border-right-color: rgba(255,255,255,0.35); border-bottom-color: rgba(255,255,255,0.35); transform: translate(-50%,-50%) rotate(-45deg); }
  .ring.low { border-color: var(--cartoon-life); }

  /* chunky toy plane (clip-path silhouette: dark outline layer + livery body + window), nose-left */
  .plane { position: relative; width: 62px; height: 62px; transform: rotate(-90deg); }
  .plane.idle { animation: bob var(--cartoon-bob) var(--cartoon-ease) infinite; }
  @keyframes bob { 0%,100% { transform: rotate(-90deg) translateY(0); } 50% { transform: rotate(-90deg) translateY(-4px); } }
  .pshape { position: absolute; inset: 0;
    clip-path: polygon(50% 0%, 58% 20%, 58% 38%, 100% 58%, 100% 70%, 58% 60%, 58% 80%, 73% 94%, 73% 100%, 50% 91%, 27% 100%, 27% 94%, 42% 80%, 42% 60%, 0% 70%, 0% 58%, 42% 38%, 42% 20%); }
  .plane .outline { transform: scale(1.16); background: var(--cartoon-outline); }
  .plane .body { background: linear-gradient(135deg, #ffffff, #e7eef5); }
  .plane.vip .body { background: linear-gradient(135deg, #ffe79a, var(--cartoon-plane-vip)); }
  .plane.emergency .body { background: linear-gradient(135deg, #ff8a93, var(--cartoon-plane-emergency)); }
  .plane.medevac .body { background: linear-gradient(135deg, #74e89a, var(--cartoon-plane-medevac)); }
  .plane .win { position: absolute; left: 50%; top: 16%; transform: translateX(-50%); width: 13px; height: 16px; border-radius: 6px 6px 4px 4px;
    background: var(--cartoon-plane-window); border: 2px solid rgba(58,42,23,0.5); }

  /* ---- route — chunky green dotted line with soft white nodes + finger cursor ---- */
  .route { position: absolute; inset: 0; pointer-events: none; }
  .cursor { position: absolute; width: 26px; height: 34px; pointer-events: none; }
  .cursor .fingertip { position: absolute; left: 0; top: 0; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 3px solid var(--cartoon-route); box-shadow: 0 0 0 6px rgba(54,211,107,0.25); }
  .cursor .hand { position: absolute; left: 4px; top: 14px; width: 22px; height: 30px; border-radius: 50% 50% 46% 46%;
    background: #f4c89c; border: 2.5px solid var(--cartoon-outline); transform: rotate(12deg); }

  /* ---- decorative foliage (the 'living airport') ---- */
  .tree { position: absolute; width: 40px; height: 40px; }
  .tree .trunk { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 8px; height: 14px; border-radius: 3px;
    background: #7a5230; border: 2.5px solid var(--cartoon-outline); }
  .tree .canopy { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 36px; height: 32px; border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, var(--cartoon-tree-hi), var(--cartoon-tree)); border: 3px solid var(--cartoon-outline);
    transform-origin: 50% 100%; animation: sway var(--cartoon-sway) ease-in-out infinite; }
  @keyframes sway { 0%,100% { transform: translateX(-50%) rotate(-3deg); } 50% { transform: translateX(-50%) rotate(3deg); } }

  /* drifting clouds */
  .cloud { position: absolute; height: 26px; border-radius: 999px; background: rgba(255,255,255,0.92);
    border: 3px solid rgba(58,42,23,0.12); animation: drift 26s linear infinite; }
  .cloud::before, .cloud::after { content: ""; position: absolute; border-radius: 50%; background: inherit; border: inherit; }
  @keyframes drift { from { transform: translateX(-40px); } to { transform: translateX(70px); } }
</style>
</head>
<body>
<div class="stage">
<div class="board-stage" id="board">
  <div class="sea"></div>
  <div class="shore"></div>

  <!-- ambient clouds -->
  <div class="cloud" style="left:210px;top:40px;width:74px;"></div>
  <div class="cloud" style="left:520px;top:128px;width:54px;animation-delay:-9s;opacity:0.85"></div>

  <header class="hud">
    <div class="hearts"><i data-lucide="heart"></i><i data-lucide="heart"></i><i data-lucide="heart" class="empty"></i></div>
    <div class="coin">₿</div>
    <div class="money">20 000</div>
    <div class="spacer"></div>
    <div class="goalwrap">
      <div class="kick">Level 12 · Goal</div>
      <div class="goalrow"><div class="goalbar"><i></i></div><div class="goalnum">8/14</div></div>
    </div>
    <div class="spacer"></div>
    <div class="timer">14:56</div>
    <div class="pause" id="pause"><i data-lucide="pause"></i></div>
  </header>

  <div class="rail rail-top" id="railTop"></div>
  <div class="rail rail-left" id="railLeft"></div>
  <div class="rail rail-bottom" id="railBottom"></div>

  <div class="field">
    <div class="drop"></div>
  </div>

  <div class="runways" id="runways"></div>

  <svg class="route" id="route" viewBox="0 0 1280 720" preserveAspectRatio="none"></svg>
  <div class="cursor" id="cursor"><div class="hand"></div><div class="fingertip"></div></div>
</div>
</div>

<script>
  const SVC  = { repair:'wrench', fuel:'droplet', board:'users', deice:'snowflake' };
  const LBL  = { repair:'Repair', fuel:'Fuel', board:'Board', deice:'De-ice' };

  function bay(b){
    const el = document.createElement('div');
    el.className = 'bay ' + (b.locked ? 'locked' : b.type);
    el.innerHTML = b.locked
      ? `<div class="pad"><i data-lucide="lock"></i></div><div class="costchip"><span class="c"></span><span>${b.cost}</span></div>`
      : `<div class="ico"><i data-lucide="${SVC[b.type]}"></i></div><div class="lbl">${LBL[b.type]}</div>`;
    return el;
  }
  function fillRail(id, bays){ const r = document.getElementById(id); bays.forEach(b => r.append(bay(b))); }

  fillRail('railTop',    [ {type:'repair'},{type:'fuel'},{locked:true,cost:'1 200'},{type:'board'} ]);
  fillRail('railLeft',   [ {type:'fuel'},{locked:true,cost:'900'},{type:'repair'} ]);
  fillRail('railBottom', [ {type:'board'},{type:'repair'},{type:'fuel'},{locked:true,cost:'2 500'} ]);

  // runways with incoming planes / patience rings
  const RW = [
    { plane:'',         ring:'' },
    { plane:'',         ring:'' },
    { plane:'vip',      ring:'patience', idle:true },
    { plane:'emergency',ring:'low',      idle:true },
  ];
  const rwEl = document.getElementById('runways');
  RW.forEach(r => {
    const d = document.createElement('div'); d.className = 'runway';
    let app = '';
    if (r.plane !== undefined) {
      const ring = r.ring ? `<div class="ring ${r.ring}"></div>` : '';
      const cls  = r.plane ? r.plane : '';
      app = `<div class="approach">${ring}
        <div class="plane ${cls} ${r.idle?'idle':''}"><div class="pshape outline"></div><div class="pshape body"></div><div class="win"></div></div></div>`;
    }
    d.innerHTML = `<div class="thresh"></div><div class="center"></div>${app}`;
    rwEl.append(d);
  });

  // decorative trees along the field edges (logical board coords)
  const TREES = [ [184,210],[806,210],[184,548],[806,548],[440,548] ];
  TREES.forEach(([x,y],i)=>{ const t=document.createElement('div'); t.className='tree';
    t.style.left=x+'px'; t.style.top=y+'px'; t.style.animationDelay=(-i*0.7)+'s';
    t.innerHTML=`<div class="canopy" style="animation-delay:${-i*0.6}s"></div><div class="trunk"></div>`;
    document.getElementById('board').append(t); });

  // glowing green route from a tap point in the field to runway 3's mouth
  (function route(){
    const start = { x: 470, y: 470 }, end = { x: 880, y: 392 };
    const d = `M ${start.x} ${start.y} C ${start.x+170} ${start.y-30}, ${end.x-150} ${end.y+30}, ${end.x} ${end.y}`;
    document.getElementById('route').innerHTML =
      `<path d="${d}" fill="none" stroke="#1f7a3f" stroke-width="16" stroke-linecap="round"></path>
       <path d="${d}" fill="none" stroke="var(--cartoon-route)" stroke-width="10" stroke-linecap="round"
             stroke-dasharray="2 22"></path>
       <path d="${d}" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"
             stroke-dasharray="2 22"></path>`;
    const cur = document.getElementById('cursor'); cur.style.left=(start.x-9)+'px'; cur.style.top=(start.y-9)+'px';
  })();

  if (window.lucide) lucide.createIcons();
  document.getElementById('pause').onclick = e => e.currentTarget.animate(
    [{transform:'translateY(2px)'},{transform:'translateY(0)'}], {duration:180});

  // fit the 1280x720 board into the viewport (scale + letterbox)
  function fit(){ const s = Math.min(innerWidth/1280, innerHeight/720);
    document.getElementById('board').style.transform =
      `translate(${(innerWidth-1280*s)/2}px, ${(innerHeight-720*s)/2}px) scale(${s})`; }
  fit(); addEventListener('resize', fit);
</script>
</body>
</html>
