<!-- @dsCard group="Sprites" viewport="760x640" name="Aircraft & Services (Batch 1)" subtitle="Top-down planes, selected / low-patience states, 4 service icons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PlaneFlow — Aircraft & Services</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: radial-gradient(120% 80% at 30% 0%, rgba(58,51,84,0.45), rgba(20,17,30,0)), var(--bg-page);
    color: var(--text-body); font-family: var(--font-ui); padding: 26px 26px 34px;
  }
  h2 {
    font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: 0.02em;
    color: var(--cream-100); margin: 26px 0 12px; display: flex; align-items: center; gap: 10px;
  }
  h2:first-of-type { margin-top: 4px; }
  h2::after { content: ""; flex: 1; height: 1px; background: var(--border-soft); }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .cell {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: var(--surface-card); border: 1.5px solid var(--border-soft);
    border-radius: var(--r-card); padding: 12px 12px 9px; box-shadow: var(--shadow-raised);
  }
  .stagebox {
    display: flex; align-items: center; justify-content: center; border-radius: 10px;
    background:
      repeating-linear-gradient(0deg, transparent 0 31px, rgba(181,140,240,0.07) 31px 32px),
      repeating-linear-gradient(90deg, transparent 0 31px, rgba(181,140,240,0.07) 31px 32px),
      var(--navy-800);
    position: relative;
  }
  .stagebox svg { position: absolute; }
  .id { font-size: 11px; color: var(--text-muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; text-align: center; }
  .lead { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; max-width: 64ch; margin: 0 0 6px; }
  code { color: var(--cream-200); font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; }
</style>
</head>
<body>
  <p class="lead">Top-down aircraft + reusable state rings. Stack a <code>ring-*</code> over any plane at the same center: <code>&lt;use href="#plane"&gt;&lt;use href="#ring-selected"&gt;</code>. Service icons float above a plane to show its next task.</p>
  <div id="sprite" hidden></div>
  <div id="gallery"></div>

<script>
  const ITEMS = [
    { g: "Aircraft (top-down)", items: [
      { layers: ["plane"],           label: "plane", s: 100 },
      { layers: ["plane-vip"],       label: "plane-vip", s: 100 },
      { layers: ["plane-emergency"], label: "plane-emergency", s: 100 },
      { layers: ["plane-medevac"],   label: "plane-medevac", s: 100 },
    ]},
    { g: "States (rings compose over a plane)", items: [
      { layers: ["plane", "ring-selected"],           label: "plane + ring-selected", s: 100 },
      { layers: ["plane", "ring-patience"],           label: "plane + ring-patience", s: 100 },
      { layers: ["plane-emergency", "ring-patience-low"], label: "emergency + ring-patience-low", s: 100 },
      { layers: ["ring-selected"],   label: "ring-selected", s: 100 },
      { layers: ["ring-patience"],   label: "ring-patience", s: 100 },
      { layers: ["ring-patience-low"], label: "ring-patience-low", s: 100 },
    ]},
    { g: "Service icons", items: [
      { layers: ["svc-repair"], label: "svc-repair · amber", w: 64, h: 64, s: 66 },
      { layers: ["svc-fuel"],   label: "svc-fuel · teal",   w: 64, h: 64, s: 66 },
      { layers: ["svc-board"],  label: "svc-board · rose",  w: 64, h: 64, s: 66 },
      { layers: ["svc-depart"], label: "svc-depart · gold", w: 64, h: 64, s: 66 },
    ]},
  ];

  fetch("planeflow-aircraft.svg")
    .then((r) => r.text())
    .then((txt) => {
      document.getElementById("sprite").innerHTML = txt;
      const root = document.getElementById("gallery");
      for (const sec of ITEMS) {
        const h = document.createElement("h2");
        h.textContent = sec.g;
        root.appendChild(h);
        const grid = document.createElement("div");
        grid.className = "grid";
        for (const it of sec.items) {
          const w = it.w || 100, h2 = it.h || 100, s = it.s;
          const cell = document.createElement("div");
          cell.className = "cell";
          const box = document.createElement("div");
          box.className = "stagebox";
          box.style.width = (s + 14) + "px";
          box.style.height = (s + 14) + "px";
          box.innerHTML = it.layers.map((id) =>
            '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + w + ' ' + h2 + '"><use href="#' + id + '"></use></svg>'
          ).join("");
          const cap = document.createElement("span");
          cap.className = "id";
          cap.textContent = it.label;
          cell.appendChild(box); cell.appendChild(cap);
          grid.appendChild(cell);
        }
        root.appendChild(grid);
      }
    });
</script>
</body>
</html>
