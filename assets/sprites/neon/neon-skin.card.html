<!-- @dsCard group="Neon Skin" viewport="1280x720" name="Neon Skin — Dispatcher Board" subtitle="The locked layout from ref-01, rendered in the calm muted-neon skin with baked sprites" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: var(--font-ui); color: var(--neon-text-strong); overflow: hidden; background: #04070f; }

  .stage { position: fixed; inset: 0; overflow: hidden; background: #04070f; }
  .board { width: 1280px; height: 720px; position: absolute; left: 0; top: 0; overflow: hidden; transform-origin: 0 0;
    background:
      radial-gradient(130% 100% at 50% 46%, var(--neon-field-core) 0%, var(--neon-tarmac-2) 34%, var(--neon-tarmac) 62%, var(--neon-ink) 100%); }

  /* ---- engine-drawn field ---- */
  .field { position: absolute; left: 300px; right: 312px; top: 96px; bottom: 16px; pointer-events: none; }
  .field .grid { position: absolute; inset: 0; opacity: 0.55;
    background-image: linear-gradient(rgba(111,198,221,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(111,198,221,0.045) 1px, transparent 1px);
    background-size: 52px 52px, 52px 52px; }
  .field .rings i { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    border: 1px solid rgba(111,198,221,0.10); border-radius: 50%; }
  .field .cross b { position: absolute; left: 50%; top: 50%; background: rgba(111,198,221,0.10); }
  .field .sweep { position: absolute; left: 50%; top: 50%; width: 50%; height: 50%; transform-origin: 0 0;
    animation: sweep var(--neon-sweep) linear infinite;
    background: conic-gradient(from 0deg, rgba(111,198,221,0.14), rgba(111,198,221,0) 38%); border-radius: 0 0 0 100%; }
  @keyframes sweep { to { transform: rotate(360deg); } }

  /* ---- top HUD ---- */
  .hud { position: absolute; top: 16px; left: 16px; right: 16px; height: 64px; display: flex; align-items: center; gap: 16px;
    background: var(--neon-surface-2); backdrop-filter: blur(8px); border: 1px solid var(--neon-border);
    border-radius: var(--neon-r-panel); padding: 0 18px; box-shadow: var(--neon-glow-soft); }
  .stat { display: flex; align-items: center; gap: 12px; padding: 7px 18px; white-space: nowrap;
    border: 1px solid rgba(111,198,221,0.18); border-radius: 12px; background: rgba(9,17,38,0.4); }
  .stat img { height: 34px; width: 34px; object-fit: contain; }
  .stat .val { font-family: var(--font-display); font-weight: 700; font-size: 28px; line-height: 1; text-shadow: var(--neon-text-glow); }
  .stat .kick { font-size: 9px; letter-spacing: var(--ls-kicker); text-transform: uppercase; color: var(--neon-text-muted); font-weight: 700; margin-top: 4px; }
  .stat .stack { display: flex; flex-direction: column; }
  .gold .val { color: var(--neon-gold); text-shadow: var(--neon-glow-gold); }
  .gold .kick { color: var(--neon-gold); opacity: 0.7; }
  .hearts { display: flex; gap: 5px; align-items: center; }
  .hearts img { height: 28px; width: 28px; }
  .spacer { flex: 1; }
  .target { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--neon-cyan); box-shadow: var(--neon-glow-cyan); position: relative; }
  .target::before, .target::after { content:""; position:absolute; background: var(--neon-cyan); }
  .target::before { left: 50%; top: 4px; bottom: 4px; width: 2px; transform: translateX(-50%); }
  .target::after { top: 50%; left: 4px; right: 4px; height: 2px; transform: translateY(-50%); }
  .goalbar { width: 120px; height: 7px; border-radius: 999px; background: rgba(9,17,38,0.7); overflow: hidden; margin-top: 8px; border: 1px solid rgba(111,198,221,0.18); }
  .goalbar i { display: block; height: 100%; width: 75%; border-radius: 999px; background: linear-gradient(90deg, var(--neon-cyan), #9fe3f4); box-shadow: 0 0 10px rgba(111,198,221,0.6); }
  .pausewrap { padding: 0; border: none; background: none; }
  .pausewrap img { height: 52px; width: 52px; cursor: pointer; transition: transform var(--dur-fast); }
  .pausewrap img:hover { transform: scale(1.06); }

  /* ---- bay rails ---- */
  .rail { position: absolute; display: flex; align-items: center; }
  .rail-top { top: 92px; left: 16px; right: 312px; gap: 12px; }
  .rail-bottom { bottom: 16px; left: 16px; right: 312px; gap: 12px; }
  .rail-left { top: 168px; left: 16px; bottom: 116px; flex-direction: column; justify-content: space-between; gap: 12px; width: 132px; }
  .rail-top .bay, .rail-bottom .bay { flex: 1; }
  .chev { color: rgba(111,198,221,0.34); font-size: 18px; font-weight: 700; flex: 0 0 auto; }

  .bay { position: relative; height: 94px; min-width: 0; background-size: 100% 100%; background-repeat: no-repeat;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 6px 7px; }
  .rail-left .bay { width: 132px; height: 98px; }
  .bay .ico { height: 34px; width: 34px; object-fit: contain; }
  .bay .lbl { font-size: 11px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; line-height: 1; }
  .bay .cost { font-size: 13px; font-weight: 700; color: var(--neon-text-strong); line-height: 1; }
  .bay.repair .lbl { color: var(--neon-amber); }
  .bay.fuel   .lbl { color: var(--neon-teal); }
  .bay.board  .lbl { color: var(--neon-rose); }
  .bay.deice  .lbl { color: var(--neon-ice); }
  .bay .lock { height: 36px; width: 36px; object-fit: contain; }
  .costchip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px 3px 5px; border-radius: 999px;
    background: rgba(9,17,38,0.66); border: 1px solid rgba(230,197,98,0.4); }
  .costchip img { height: 17px; width: 17px; }
  .costchip span { font-size: 12px; font-weight: 800; color: var(--neon-gold); }

  /* ---- runways ---- */
  .runways { position: absolute; right: 16px; top: 168px; bottom: 116px; width: 288px; display: flex; flex-direction: column; justify-content: space-between; }
  .runway { position: relative; height: 78px; border-radius: var(--neon-r-panel); overflow: hidden; display: flex; align-items: center;
    background: linear-gradient(180deg, rgba(20,32,60,0.85), rgba(8,15,34,0.92)); border: 1px solid rgba(111,198,221,0.10); }
  .runway .num { font-family: var(--font-display); font-weight: 700; font-size: 26px; writing-mode: vertical-rl; transform: rotate(180deg); margin-left: 12px; }
  .runway .center { position: absolute; left: 52px; right: 18px; top: 50%; height: 0; border-top: 3px dashed rgba(220,244,255,0.4); }
  .runway .lights { position: absolute; left: 44px; right: 12px; height: 4px; background-image: radial-gradient(circle, currentColor 1.6px, transparent 2px); background-size: 22px 100%; background-repeat: repeat-x; }
  .runway .lights.top { top: 9px; } .runway .lights.bot { bottom: 9px; }
  .runway .end { position: absolute; right: 12px; top: 14px; bottom: 14px; width: 5px; border-radius: 3px; background: currentColor; opacity: 0.85; box-shadow: 0 0 10px currentColor; }
  .plane { position: absolute; height: 60px; width: 60px; object-fit: contain; right: 8px; top: 50%; margin-top: -30px; transform: rotate(-90deg); }
  .plane.idle { animation: hover 5s var(--neon-ease) infinite; }
  @keyframes hover { 0%,100%{ transform: rotate(-90deg) translateY(0); } 50%{ transform: rotate(-90deg) translateY(3px); } }

  /* ---- route + tap cursor ---- */
  .route { position: absolute; inset: 0; pointer-events: none; }
  .cursor { position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #eaf6ff; box-shadow: 0 0 16px 4px rgba(111,198,221,0.85); }
  .cursor::after { content:""; position: absolute; inset: -14px; border-radius: 50%; border: 2px solid rgba(111,198,221,0.6); animation: tap var(--neon-breath) ease-out infinite; }
  @keyframes tap { 0%{ transform: scale(0.6); opacity: 0.9; } 70%,100%{ transform: scale(1.6); opacity: 0; } }
</style>
</head>
<body>
<div class="stage">
<div class="board" id="board">
  <div class="field">
    <div class="grid"></div>
    <div class="rings"><i style="width:180px;height:180px"></i><i style="width:340px;height:340px"></i><i style="width:520px;height:520px"></i></div>
    <div class="cross"><b style="margin-left:-1px;margin-top:-260px;width:2px;height:520px"></b><b style="margin-top:-1px;margin-left:-260px;height:2px;width:520px"></b></div>
    <div class="sweep"></div>
  </div>

  <header class="hud">
    <div class="stat"><div class="hearts"><img src="heart.png"><img src="heart.png"><img src="heart-crack.png"></div><div class="stack"><div class="val">3</div><div class="kick">Lives</div></div></div>
    <div class="stat"><img src="clock.png"><div class="stack"><div class="val">02:35</div><div class="kick">Time</div></div></div>
    <div class="stat gold"><img src="coin.png"><div class="stack"><div class="val">28,450</div><div class="kick">Credits</div></div></div>
    <div class="stat"><div class="target"></div><div class="stack"><div class="val">12<span style="opacity:.5">/16</span></div><div class="goalbar"><i></i></div></div></div>
    <div class="spacer"></div>
    <div class="stat pausewrap"><img src="pause-btn.png" alt="pause"></div>
  </header>

  <div class="rail rail-top" id="railTop"></div>
  <div class="rail rail-left" id="railLeft"></div>
  <div class="rail rail-bottom" id="railBottom"></div>
  <div class="runways" id="runways"></div>

  <svg class="route" id="route" viewBox="0 0 1280 720" preserveAspectRatio="none"></svg>
  <div class="cursor" id="cursor"></div>
</div>
</div>

<script>
  const SVC = { repair:'svc-repair', fuel:'svc-fuel', board:'svc-board', deice:'svc-deice' };
  const LBL = { repair:'Repair', fuel:'Fuel', board:'Boarding', deice:'De-ice' };

  function bay(b){
    const el = document.createElement('div');
    el.className = 'bay ' + (b.locked ? 'locked' : b.type);
    el.style.backgroundImage = `url(${b.locked ? 'bay-locked' : 'bay-'+b.type}.png)`;
    el.innerHTML = b.locked
      ? `<img class="lock" src="lock.png"><div class="costchip"><img src="coin.png"><span>${b.cost}</span></div>`
      : `<img class="ico" src="${SVC[b.type]}.png"><div class="lbl">${LBL[b.type]}</div><div class="cost">${b.cost}</div>`;
    return el;
  }
  function fillRail(id, bays){
    const r = document.getElementById(id);
    bays.forEach((b,i)=>{ if(i && id!=='railLeft'){ const c=document.createElement('span'); c.className='chev'; c.textContent='›'; r.append(c);} r.append(bay(b)); });
  }
  fillRail('railTop', [ {type:'repair',cost:'5,000'},{type:'fuel',cost:'5,000'},{locked:true,cost:'12,000'},{type:'board',cost:'6,000'},{type:'deice',cost:'7,000'},{locked:true,cost:'16,000'} ]);
  fillRail('railLeft', [ {type:'board',cost:'6,000'},{locked:true,cost:'10,000'},{type:'fuel',cost:'5,000'} ]);
  fillRail('railBottom', [ {type:'deice',cost:'7,000'},{locked:true,cost:'14,000'},{type:'repair',cost:'5,000'},{type:'board',cost:'6,000'},{locked:true,cost:'12,000'},{type:'fuel',cost:'5,000'} ]);

  const RW = [ {num:'27',accent:'#6fc6dd',plane:'plane'},{num:'18',accent:'#e07aa6',plane:'plane-emergency'},{num:'09',accent:'#6cc88f',plane:'plane-medevac'},{num:'36',accent:'#a98fd6',plane:'plane-vip'} ];
  const rwEl = document.getElementById('runways');
  RW.forEach(r=>{
    const d=document.createElement('div'); d.className='runway'; d.style.color=r.accent;
    d.innerHTML = `<div class="lights top"></div><div class="lights bot"></div>
      <div class="num" style="color:${r.accent};text-shadow:0 0 12px ${r.accent}">${r.num}</div>
      <div class="center"></div><div class="end"></div>
      <img class="plane idle" src="${r.plane}.png">`;
    rwEl.append(d);
  });

  // glowing route from the center tap point up to runway 27's mouth (logical 1280x720 coords)
  (function route(){
    const start = { x: 590, y: 430 }, end = { x: 992, y: 207 };
    const d = `M ${start.x} ${start.y} C ${start.x+150} ${start.y-40}, ${end.x-180} ${end.y+12}, ${end.x} ${end.y}`;
    document.getElementById('route').innerHTML =
      `<path d="${d}" fill="none" stroke="rgba(111,198,221,0.28)" stroke-width="16" stroke-linecap="round"></path>
       <path d="${d}" fill="none" stroke="#9fe3f4" stroke-width="5" stroke-linecap="round"></path>`;
    const cur = document.getElementById('cursor'); cur.style.left=(start.x-9)+'px'; cur.style.top=(start.y-9)+'px';
  })();

  // fit the 1280x720 board into the viewport (scale + letterbox)
  function fit(){ const s = Math.min(innerWidth/1280, innerHeight/720);
    const tx = (innerWidth - 1280*s)/2, ty = (innerHeight - 720*s)/2;
    document.getElementById('board').style.transform = `translate(${tx}px, ${ty}px) scale(${s})`; }
  fit(); addEventListener('resize', fit);
</script>
</body>
</html>
