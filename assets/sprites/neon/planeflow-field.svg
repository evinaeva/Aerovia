<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;width:0;height:0" aria-hidden="true">
<!-- Neon skin — bay panels. Full glossy neon panels (no baked icon/label/cost:
     the engine overlays those). Glow is faked with stacked strokes because the
     atlas strips SVG filters when blitting to canvas. Colors use var(--token,#hex)
     so the neon theme tokens recolor them. viewBox 100x72 ~ bay aspect. -->
<defs></defs>

<!-- repair (amber) -->
<symbol id="neon-bay-repair" viewBox="0 0 100 72">
  <rect x="6" y="6" width="88" height="60" rx="15" fill="#0a1633"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--amber,#ffb13b)" stroke-width="9" opacity="0.16"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--amber,#ffb13b)" stroke-width="3.4" opacity="0.95"></rect>
  <rect x="12" y="12" width="76" height="48" rx="10" fill="none" stroke="var(--amber,#ffb13b)" stroke-width="1" opacity="0.32"></rect>
  <rect x="16" y="11" width="68" height="13" rx="6.5" fill="#ffffff" opacity="0.06"></rect>
</symbol>

<!-- fuel (teal) -->
<symbol id="neon-bay-fuel" viewBox="0 0 100 72">
  <rect x="6" y="6" width="88" height="60" rx="15" fill="#0a1633"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--teal,#22e3c6)" stroke-width="9" opacity="0.16"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--teal,#22e3c6)" stroke-width="3.4" opacity="0.95"></rect>
  <rect x="12" y="12" width="76" height="48" rx="10" fill="none" stroke="var(--teal,#22e3c6)" stroke-width="1" opacity="0.32"></rect>
  <rect x="16" y="11" width="68" height="13" rx="6.5" fill="#ffffff" opacity="0.06"></rect>
</symbol>

<!-- board (rose) -->
<symbol id="neon-bay-board" viewBox="0 0 100 72">
  <rect x="6" y="6" width="88" height="60" rx="15" fill="#0a1633"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--rose,#ff4f9d)" stroke-width="9" opacity="0.16"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--rose,#ff4f9d)" stroke-width="3.4" opacity="0.95"></rect>
  <rect x="12" y="12" width="76" height="48" rx="10" fill="none" stroke="var(--rose,#ff4f9d)" stroke-width="1" opacity="0.32"></rect>
  <rect x="16" y="11" width="68" height="13" rx="6.5" fill="#ffffff" opacity="0.06"></rect>
</symbol>

<!-- de-ice (ice) -->
<symbol id="neon-bay-deice" viewBox="0 0 100 72">
  <rect x="6" y="6" width="88" height="60" rx="15" fill="#0a1633"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--ice,#5fd2ff)" stroke-width="9" opacity="0.16"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--ice,#5fd2ff)" stroke-width="3.4" opacity="0.95"></rect>
  <rect x="12" y="12" width="76" height="48" rx="10" fill="none" stroke="var(--ice,#5fd2ff)" stroke-width="1" opacity="0.32"></rect>
  <rect x="16" y="11" width="68" height="13" rx="6.5" fill="#ffffff" opacity="0.06"></rect>
</symbol>

<!-- locked (muted) -->
<symbol id="neon-bay-locked" viewBox="0 0 100 72">
  <rect x="6" y="6" width="88" height="60" rx="15" fill="#070f24"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--muted,#5f7bb0)" stroke-width="7" opacity="0.10"></rect>
  <rect x="6" y="6" width="88" height="60" rx="15" fill="none" stroke="var(--muted,#5f7bb0)" stroke-width="2.4" opacity="0.55" stroke-dasharray="7 6"></rect>
</symbol>

</svg>
