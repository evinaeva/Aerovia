<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;width:0;height:0" aria-hidden="true">
<!-- Neon skin — service icons + plane. Bright filled glyphs on the dark field;
     colors via var(--token,#hex) so the neon theme recolors them. Plane is
     authored NOSE-UP, centered in a 100x100 box (engine rotates by heading). -->
<defs></defs>

<!-- repair: gear (amber) -->
<symbol id="neon-svc-repair" viewBox="0 0 64 64">
  <g fill="var(--amber,#ffb13b)">
    <g transform="rotate(0 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(45 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(90 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(135 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(180 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(225 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(270 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <g transform="rotate(315 32 32)"><rect x="28.4" y="7" width="7.2" height="13" rx="2"></rect></g>
    <circle cx="32" cy="32" r="14"></circle>
  </g>
  <circle cx="32" cy="32" r="6" fill="#0a1633"></circle>
</symbol>

<!-- fuel: droplet (teal) -->
<symbol id="neon-svc-fuel" viewBox="0 0 64 64">
  <path d="M32 9 C 45 28 42 43 32 48 C 22 43 19 28 32 9 Z" fill="var(--teal,#22e3c6)"></path>
  <ellipse cx="27" cy="36" rx="3.2" ry="4.4" fill="#ffffff" opacity="0.5"></ellipse>
</symbol>

<!-- board: person (rose) -->
<symbol id="neon-svc-board" viewBox="0 0 64 64">
  <g fill="var(--rose,#ff4f9d)">
    <circle cx="32" cy="21" r="8.5"></circle>
    <path d="M16 52 C 16 36 48 36 48 52 Z"></path>
  </g>
</symbol>

<!-- de-ice: snowflake (ice) -->
<symbol id="neon-svc-deice" viewBox="0 0 64 64">
  <g stroke="var(--ice,#5fd2ff)" stroke-width="3.6" stroke-linecap="round">
    <line x1="32" y1="9" x2="32" y2="55"></line>
    <line x1="12" y1="20.5" x2="52" y2="43.5"></line>
    <line x1="52" y1="20.5" x2="12" y2="43.5"></line>
  </g>
</symbol>

<!-- depart: plane glyph (gold), nose-up -->
<symbol id="neon-svc-depart" viewBox="0 0 64 64">
  <path d="M32 7 L 38 30 L 56 41 L 56 46 L 38 40 L 36 53 L 44 59 L 44 62 L 32 58 L 20 62 L 20 59 L 28 53 L 26 40 L 8 46 L 8 41 L 26 30 Z" fill="var(--gold,#ffd23b)"></path>
</symbol>

<!-- plane: chunky neon airliner, NOSE-UP, centered at 50,50 -->
<symbol id="neon-plane" viewBox="0 0 100 100">
  <!-- wings -->
  <path d="M41 42 L 10 58 L 10 64 L 41 55 Z M59 42 L 90 58 L 90 64 L 59 55 Z"
        fill="#dff4ff" stroke="var(--phosphor,#3ad2ff)" stroke-width="2"></path>
  <!-- tailplane -->
  <path d="M44 70 L 31 80 L 31 84 L 46 78 Z M56 70 L 69 80 L 69 84 L 54 78 Z"
        fill="#dff4ff" stroke="var(--phosphor,#3ad2ff)" stroke-width="1.6"></path>
  <!-- fuselage -->
  <path d="M50 12 C 57 12 61 21 61 36 L 61 62 C 61 72 56 80 50 84 C 44 80 39 72 39 62 L 39 36 C 39 21 43 12 50 12 Z"
        fill="#eef9ff" stroke="var(--phosphor,#3ad2ff)" stroke-width="2.6"></path>
  <!-- colored nose -->
  <path d="M50 12 C 54 12 57 17 59 25 L 41 25 C 43 17 46 12 50 12 Z" fill="var(--rose,#ff4f9d)"></path>
  <!-- cockpit window -->
  <rect x="44.5" y="28" width="11" height="6.5" rx="3.2" fill="var(--phosphor,#3ad2ff)" opacity="0.85"></rect>
</symbol>

<!-- plane-vip: gold livery -->
<symbol id="neon-plane-vip" viewBox="0 0 100 100">
  <path d="M41 42 L 10 58 L 10 64 L 41 55 Z M59 42 L 90 58 L 90 64 L 59 55 Z"
        fill="#fff4c0" stroke="var(--gold,#ffd23b)" stroke-width="2"></path>
  <path d="M44 70 L 31 80 L 31 84 L 46 78 Z M56 70 L 69 80 L 69 84 L 54 78 Z"
        fill="#fff4c0" stroke="var(--gold,#ffd23b)" stroke-width="1.6"></path>
  <path d="M50 12 C 57 12 61 21 61 36 L 61 62 C 61 72 56 80 50 84 C 44 80 39 72 39 62 L 39 36 C 39 21 43 12 50 12 Z"
        fill="#fffae8" stroke="var(--gold,#ffd23b)" stroke-width="2.6"></path>
  <path d="M50 12 C 54 12 57 17 59 25 L 41 25 C 43 17 46 12 50 12 Z" fill="var(--gold,#ffd23b)"></path>
  <rect x="44.5" y="28" width="11" height="6.5" rx="3.2" fill="var(--gold,#ffd23b)" opacity="0.85"></rect>
</symbol>

<!-- plane-emergency: warm orange livery -->
<symbol id="neon-plane-emergency" viewBox="0 0 100 100">
  <path d="M41 42 L 10 58 L 10 64 L 41 55 Z M59 42 L 90 58 L 90 64 L 59 55 Z"
        fill="#ffeedd" stroke="var(--amber,#ffb13b)" stroke-width="2"></path>
  <path d="M44 70 L 31 80 L 31 84 L 46 78 Z M56 70 L 69 80 L 69 84 L 54 78 Z"
        fill="#ffeedd" stroke="var(--amber,#ffb13b)" stroke-width="1.6"></path>
  <path d="M50 12 C 57 12 61 21 61 36 L 61 62 C 61 72 56 80 50 84 C 44 80 39 72 39 62 L 39 36 C 39 21 43 12 50 12 Z"
        fill="#fff5ee" stroke="var(--amber,#ffb13b)" stroke-width="2.6"></path>
  <path d="M50 12 C 54 12 57 17 59 25 L 41 25 C 43 17 46 12 50 12 Z" fill="var(--amber,#ffb13b)"></path>
  <rect x="44.5" y="28" width="11" height="6.5" rx="3.2" fill="var(--amber,#ffb13b)" opacity="0.85"></rect>
</symbol>

<!-- plane-medevac: white + red cross -->
<symbol id="neon-plane-medevac" viewBox="0 0 100 100">
  <path d="M41 42 L 10 58 L 10 64 L 41 55 Z M59 42 L 90 58 L 90 64 L 59 55 Z"
        fill="#ffffff" stroke="#ffffff" stroke-width="2"></path>
  <path d="M44 70 L 31 80 L 31 84 L 46 78 Z M56 70 L 69 80 L 69 84 L 54 78 Z"
        fill="#ffffff" stroke="#ffffff" stroke-width="1.6"></path>
  <path d="M50 12 C 57 12 61 21 61 36 L 61 62 C 61 72 56 80 50 84 C 44 80 39 72 39 62 L 39 36 C 39 21 43 12 50 12 Z"
        fill="#ffffff" stroke="#ddffee" stroke-width="2.6"></path>
  <path d="M50 12 C 54 12 57 17 59 25 L 41 25 C 43 17 46 12 50 12 Z" fill="var(--rose,#ff4f9d)"></path>
  <rect x="44.5" y="28" width="11" height="6.5" rx="3.2" fill="#ffffff" opacity="0.9"></rect>
  <!-- red cross on fuselage -->
  <rect x="47" y="45" width="6" height="16" rx="1.5" fill="var(--rose,#ff4f9d)"></rect>
  <rect x="43" y="50" width="14" height="6" rx="1.5" fill="var(--rose,#ff4f9d)"></rect>
</symbol>

</svg>
