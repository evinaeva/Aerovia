<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 2560 1200" width="2560" height="1200" font-family="system-ui, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffd23f"/>
    </marker>
    <style>
      .lbl   { fill:#fff8e1; font-size:30px; font-weight:700; }
      .lblbg { fill:#16131f; opacity:.82; }
      .lead  { stroke:#ffd23f; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .lock  { stroke:#ffd23f; stroke-width:4; fill:rgba(255,210,63,.10); }
      .free  { stroke:#4ecdc4; stroke-width:3; stroke-dasharray:10 8; fill:none; }
      .note  { fill:#d9d2c4; font-size:24px; }
      .hdr   { fill:#fff8e1; font-size:36px; font-weight:800; }
    </style>
  </defs>

  <!-- ground truth: the real current cozy field (do not move anything that sits here) -->
  <image xlink:href="field-cozy.png" href="field-cozy.png" x="0" y="0" width="2560" height="1200"/>

  <!-- title banner -->
  <g>
    <rect class="lblbg" x="690" y="210" width="1180" height="140" rx="18"/>
    <text class="hdr"  x="1280" y="262" text-anchor="middle">🔒 COMPOSITION LOCK — рисуй ПОВЕРХ, ничего не двигай</text>
    <text class="note" x="1280" y="312" text-anchor="middle">Меняешь только ВИД и РАЗМЕР элементов. Их ПОЛОЖЕНИЕ задаёт логика (layout()) — не переноси.</text>
  </g>

  <!-- LOCKED: bays (perimeter). Outlines are schematic; the PNG underneath is the real position. -->
  <rect class="lock" x="55"  y="150" width="240" height="560" rx="16"/>
  <rect class="lock" x="350" y="55"  width="820" height="150" rx="16"/>
  <rect class="lock" x="470" y="1010" width="780" height="150" rx="16"/>
  <line class="lead" x1="700" y1="430" x2="200" y2="430"/>
  <rect class="lblbg" x="430" y="396" width="270" height="58" rx="10"/>
  <text class="lbl"  x="448" y="438">BAYS · боксы</text>

  <!-- LOCKED: runways (the two dashed bars on the right) -->
  <rect class="lock" x="1500" y="475" width="730" height="120" rx="14"/>
  <rect class="lock" x="1500" y="690" width="730" height="120" rx="14"/>
  <line class="lead" x1="1180" y1="600" x2="1490" y2="540"/>
  <rect class="lblbg" x="800" y="566" width="370" height="58" rx="10"/>
  <text class="lbl"  x="818" y="608">RUNWAYS · ВПП</text>

  <!-- LOCKED: plane entry — planes fly in from the field edges toward the runways (direction set by logic) -->
  <line class="lead" x1="380" y1="900" x2="120" y2="980"/>
  <rect class="lblbg" x="360" y="866" width="640" height="58" rx="10"/>
  <text class="lbl"  x="378" y="908">PLANE ENTRY · влёт с краёв</text>

  <!-- legend -->
  <g>
    <rect class="lblbg" x="690" y="980" width="1180" height="180" rx="18"/>
    <rect class="lock" x="720" y="1006" width="44" height="30" rx="6"/>
    <text class="note" x="780" y="1030">Жёлтое = ЗАФИКСИРОВАНО логикой: позиции боксов, ВПП и точки влёта. Перекрашивай/масштабируй, не двигай.</text>
    <rect class="free" x="720" y="1056" width="44" height="30" rx="6"/>
    <text class="note" x="780" y="1080">Бирюза-пунктир = ХРОМ (HUD/кнопки): форму и компоновку менять можно — в пределах safe-area, не поверх поля.</text>
    <text class="note" x="720" y="1130">Раскладка переменная: 1–3 бокса/сторону, 1–4 ВПП, ≥10 бортов + место для манёвра. Зона выреза камеры — только фон.</text>
  </g>

  <!-- FREE: HUD/chrome zones (illustrative) — top bar + side rail + bottom-right buttons -->
  <rect class="free" x="20"  y="15" width="2520" height="80" rx="14"/>
  <rect class="free" x="2360" y="430" width="180" height="340" rx="20"/>
</svg>
