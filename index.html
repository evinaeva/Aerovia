  let save = {unlocked:1, best:{}, stars:{}, lang:null, ach:[], stats:{}, sound:true, vibro:true, tutorialDone:false};
  // LEGACY_SAVE_KEY: до переименования в PlaneFlow сейв жил под старым ключом —
  // читаем его как фолбэк, чтобы прогресс игроков не сгорел (см. loadGame)
  const SAVE_KEY = 'planeflow_save_v1', LEGACY_SAVE_KEY = 'tower_save_v1', VERSION = '0.20';

  // ---- canvas sizing ----
  let W=0, H=0, dpr=1, ui=1;
  // отступы безопасной зоны (вырез/скругления телефона). Читаем реальные px с
  // невидимого пробника, у которого padding = env(safe-area-inset-*) — так HUD и
  // кнопка паузы не залезают под бортик экрана (viewport-fit=cover включён).
  let safe={t:0,r:0,b:0,l:0}, safeProbe=null;
  function readSafe(){
    if(!safeProbe){
      safeProbe=document.createElement('div');
      safeProbe.style.cssText='position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;pointer-events:none;'+
        'padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';
      document.body.appendChild(safeProbe);
    }
    const cs=getComputedStyle(safeProbe);
    safe={t:parseFloat(cs.paddingTop)||0, r:parseFloat(cs.paddingRight)||0,
          b:parseFloat(cs.paddingBottom)||0, l:parseFloat(cs.paddingLeft)||0};
  }
  const HUD_H = () => Math.round(44*ui);
  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ui = Math.max(0.7, Math.min(1.5, Math.min(W/1100, H/620)));
    readSafe();
    layout();
  }
  window.addEventListener('resize', resize);

  // ---- layout: bays, runways, hover slots ----
  let bays=[], runways=[], field={}, pauseBtn={};
  function layout(){
    const hud = HUD_H();
    const M = 12*ui;
    // field taxi area (left ~60%); runways on right
    const fx0 = M, fy0 = hud + M;
    const fx1 = W*0.58, fy1 = H - M;
    field = {x0:fx0, y0:fy0, x1:fx1, y1:fy1};

    const bw = Math.min(96*ui, (fx1-fx0)/2.4);
    const bh = bw*0.72;

    // build bays once (preserve open/level state across resize)
    if(!bays.length){
      bays = [];
      for(const side of ['top','left','bottom']){
        const cfg = LV.sides[side];
        for(let i=0;i<cfg.slots;i++){
          bays.push({side, type:cfg.type, slot:i,
                     open:i<cfg.open, lvl:0, occupied:null,
                     x:0,y:0,w:bw,h:bh});
        }
      }
      // отдельный бокс де-айсинга (инфраструктура: всегда открыт, без апгрейда) —
      // у правого края поля, ворота в поле; нужен только в снегопад (см. spawnPlane)
      if(LV.deice) bays.push({side:'deice', type:'deice', slot:0, deice:true,
                              open:true, lvl:0, occupied:null, x:0,y:0,w:bw,h:bh});
    }
    // position bays
    const bySide = s => bays.filter(b=>b.side===s);
    function spread(n, a, b){ // n centers within [a,b]
      const out=[]; const span=b-a; const step=span/(n+1);
      for(let i=0;i<n;i++) out.push(a+step*(i+1));
      return out;
    }
    const top=bySide('top'), left=bySide('left'), bot=bySide('bottom');
    spread(top.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      top[i].w=bw; top[i].h=bh; top[i].x=cx-bw/2; top[i].y=fy0;
    });
    spread(bot.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      bot[i].w=bw; bot[i].h=bh; bot[i].x=cx-bw/2; bot[i].y=fy1-bh;
    });
    spread(left.length, fy0+bh*0.7, fy1-bh*0.7).forEach((cy,i)=>{
      left[i].w=bw; left[i].h=bh; left[i].x=fx0; left[i].y=cy-bh/2;
    });
    // де-айс-бокс — у правого края поля, по центру по вертикали
    const de = bays.find(b=>b.side==='deice');
    if(de){ de.w=bw; de.h=bh; de.x=fx1-bw; de.y=(fy0+fy1)/2-bh/2; }

    // runways on right
    const rwL = W*0.60, rwR = W*0.85;
    const n = LV.runways;
    const top0 = hud + M, bot0 = H - M;
    const gap = 10*ui;
    const rh = ((bot0-top0) - gap*(n-1)) / n;
    if(!runways.length || runways.length!==n){
      runways = []; for(let i=0;i<n;i++) runways.push({occupied:null, closed:false});
    }
    for(let i=0;i<n;i++){
      const r=runways[i];
      r.x=rwL; r.y=top0 + i*(rh+gap); r.w=rwR-rwL; r.h=rh;
      r.cy = r.y + r.h/2;
      r.stopX = rwL + 26*ui;   // куда докатывается севший борт (полевой край)
      r.exitX = rwR + 10*ui;   // правый (водный) край
    }
    // hover x для прилетающих
    field.hoverX = W*0.93;
    field.rwL = rwL; field.rwR = rwR;

    // кнопка паузы отодвинута от правого края на запас + safe-area, чтобы не
    // оказаться под скруглением/вырезом телефона и нормально нажиматься
    pauseBtn = {x: W - safe.r - 16*ui - 36*ui, y: 6*ui, w: 36*ui, h: 30*ui};

    // сервисное здание биом-карт — сверху по центру апрона, между верхними боксами;
    // отсюда выезжают спец-бригады. У классических уровней его нет.
    if(LV.biome){
      const sw=Math.min(88*ui, (field.x1-field.x0)*0.32), sh=28*ui;
      field.service={ x:(field.x0+field.x1)/2 - sw/2, y:fy0+2*ui, w:sw, h:sh };
    } else field.service=null;
  }

  // ---- game state ----
  let planes=[], money=0, lives=0, served=0, gameTime=0;
  let running=false, paused=false, lastTs=0, spawnTimer=0;
  // статистика смены для экрана итога: пик одновременной нагрузки + временной ряд
  // (нагрузка/принято) для графика; lastShift — снимок последней смены для шеринга
  let statPeak=0, statSamples=[], statStep=1.5, statNextAt=0, lastShift=null;
  let inMenu=true;         // пока открыты меню/уровни/медали — на канвасе сцена-радар, не поле
  let nowT=0;              // время кадра (мс) для анимаций отрисовки
  let effects=[];          // анимации крушений
  let lossLog=[], toast=null;
  const debug={infiniteLives:false, richStart:false};
  const BIG_MONEY=999999;
  let floaters=[];         // плавающие награды «+N ₿» / «×N комбо» / «уфф!» над полем
  let alarmAt=0;           // антидребезг тревожного бипа терпения
  let slowmo=0;            // секунды лёгкого замедления времени (near-miss)
  let nearMissPairs={};    // key «idA-idB» → время, до которого пара «остыла»
  let planeSeq=0;          // id бортов для антидребезга near-miss
  let tut=null;            // состояние тихого туториала: {step:'land'|'service'|'takeoff', plane}
  // лесной биом: активные помехи на полосах + выехавшие бригады + таймер спавна
  let hazards=[], crews=[], hazardSeq=0, nextHazard=0;
  function addFloat(x,y,text,col){ floaters.push({x,y,text,col,t:0,life:1.15}); }

  // ---- звук и вибрация (идеи из копилки: раздел 1) ----
  // Весь звук — синтез Web Audio, без файлов: события игры рождают мягкие ноты
  // одной гаммы (пентатоника ля-минор), краш — шумовой удар. Контекст создаётся
  // по первому жесту (autoplay-политика). Звук необязателен: всё дублируется
  // визуалом, выключатели — в настройках паузы (save.sound / save.vibro).
  const SND = (() => {
    const SCALE=[220,261.63,293.66,329.63,392,440,523.25,587.33,659.25]; // A3..E5
    let ac=null, master=null, enabled=true;
    function ensure(){
      if(!enabled) return null;
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return null;
      if(!ac){ ac=new AC(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination); }
      if(ac.state==='suspended') ac.resume();
      return ac;
    }
    function tone(freq,dur,type,vol,delay){
      if(!ensure()) return;
      const t0=ac.currentTime+(delay||0);
      const o=ac.createOscillator(), g=ac.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(vol||0.3,t0+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+(dur||0.18));
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0+(dur||0.18)+0.05);
    }
    function thud(){ // шумовой удар (крушение)
      if(!ensure()) return;
      const t0=ac.currentTime, dur=0.35;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const src=ac.createBufferSource(); src.buffer=buf;
      const f=ac.createBiquadFilter(); f.type='lowpass';
      f.frequency.setValueAtTime(900,t0); f.frequency.exponentialRampToValueAtTime(120,t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.65,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(f); f.connect(g); g.connect(master); src.start(t0);
    }
    function whoosh(){ // мягкий «уфф» near-miss: полосовой шум, проносится и стихает
      if(!ensure()) return;
      const t0=ac.currentTime, dur=0.34;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*Math.sin(Math.PI*e); }
      const src=ac.createBufferSource(); src.buffer=buf;
      const f=ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=1.4;
      f.frequency.setValueAtTime(420,t0); f.frequency.exponentialRampToValueAtTime(1100,t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(0.16,t0+0.06); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(f); f.connect(g); g.connect(master); src.start(t0);
    }
    const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1)); // случайный индекс ноты гаммы
    return {
      setEnabled(v){ enabled=v; },
      pick(){ tone(SCALE[ri(5,6)],0.05,'triangle',0.10); },                     // выделение борта
      land(){ const i=ri(0,2); tone(SCALE[i],0.22,'sine',0.32); tone(SCALE[i]/2,0.30,'sine',0.18); },
      dock(){ tone(SCALE[ri(2,4)],0.10,'triangle',0.20); },                     // заехал в бокс
      served(){ const i=ri(3,5); tone(SCALE[i],0.14,'sine',0.26); tone(SCALE[i+2],0.18,'sine',0.20,0.07); },
      depart(express){ tone(SCALE[4],0.12,'triangle',0.30); tone(SCALE[6],0.12,'triangle',0.30,0.08);
        tone(SCALE[express?8:7],0.22,'triangle',0.34,0.16); },                  // арпеджио вверх
      build(){ tone(196,0.09,'square',0.16); tone(246.9,0.12,'square',0.16,0.07); }, // открыть/прокачать бокс
      penalty(){ tone(155.6,0.25,'sawtooth',0.18); },                           // наземный штраф
      crash(){ thud(); tone(98,0.4,'sawtooth',0.22); },
      medal(){ tone(1046.5,0.12,'sine',0.24); tone(1568,0.22,'sine',0.22,0.10); },
      alarm(){ tone(880,0.06,'square',0.10); },                                 // терпение на исходе
      nearmiss(){ whoosh(); },                                                  // «уфф» — борта едва разошлись
    };
  })();
  const HAP = { // вибрация: Android — да, iOS веб — молча игнорирует (в обёртке будет плагин)
    on:true,
    v(p){ if(this.on && navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } },
    tap(){ this.v(12); }, ok(){ this.v([18,40,24]); }, penalty(){ this.v(35); }, crash(){ this.v([60,40,90]); },
    near(){ this.v([10,30,10]); },
  };

  function reset(){
    planes=[]; money=debug.richStart?BIG_MONEY:(LV.startMoney||K.START_MONEY); lives=K.START_LIVES; served=0; gameTime=0;
    // раунд начинается с пустого неба: первый борт прилетает через 1–3 секунды
    spawnTimer=1 + Math.random()*2; running=true; paused=false; inMenu=false;
    lossLog=[]; toast=null;
    document.getElementById('pauseScreen').classList.add('hidden');
    document.getElementById('settingsPanel').classList.add('hidden');
    bays.forEach(b=>{ b.occupied=null;
      if(b.deice){ b.open=true; b.lvl=0; return; }   // де-айс — инфраструктура, всегда открыт
      const cfg=LV.sides[b.side]; b.open = b.slot < cfg.open; b.lvl=0; });
    runways.forEach(r=>{ r.occupied=null; r.closed=false; r.hazard=null; });
    effects=[]; floaters=[]; alarmAt=0; slowmo=0; nearMissPairs={}; selected=null; levelPassed=false; upgradesDone=0;
    statPeak=0; statSamples=[]; statStep=1.5; statNextAt=0;
    combo=0; runCrashes=0; runPenalties=0;
    rushUntil=0; windUntil=0; fogUntil=0;
    // атмосфера: «часы» суток идут всегда; погода — опциональный движок (флаг weather)
    dayPhase=0; nightAmount=0; weather='clear'; weatherUntil=0;
    nextWeather = (!zen && LV.weather) ? K.WEATHER_PERIOD : Infinity;
    hazards=[]; crews=[]; hazardSeq=0;
    const forest = LV.biome==='forest';
    if(LV.biome){
      // биом-карты сохраняют исходное поведение динамических событий; у леса — свои
      // помехи на полосах вместо «ветра/тумана»
      nextRush = zen?Infinity:K.RUSH_PERIOD;
      nextWind = (zen||forest)?Infinity:K.WIND_PERIOD;
      nextFog  = (zen||forest)?Infinity:K.FOG_PERIOD;
      nextHazard = (zen||!forest)?Infinity:FOR.SPAWN_FIRST;
    } else {
      // кампания: динамические события включаются только если разрешены уровнем
      const evs = levelEvents();
      nextRush = evs.rush ? K.RUSH_PERIOD : Infinity;
      nextWind = evs.wind ? K.WIND_PERIOD : Infinity;
      nextFog  = evs.fog  ? K.FOG_PERIOD  : Infinity;
      nextHazard = Infinity;
    }
    ACH.onLevelStart();
    // тихий туториал «покажи и дай сделать»: только при первом запуске и не в Zen —
    // первый борт ведём за руку (подсветка + подсказка), без стены текста
    tut = (!zen && !save.tutorialDone && !LV.biome) ? {step:'land', plane:null} : null;
    showGoals(false);          // крупное окно постановки целей в начале раунда (заодно ставит на паузу)
  }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function spawnPlane(){
    // спец-борты как мини-события (раздел 3 копилки): частный джет (вип),
    // «топливо на нуле» (срочный + бонус), медицинский (приоритет — высадка пациента).
    const evs = levelEvents();                                           // какие спецборты разрешены уровнем
    const vip = evs.vip && Math.random() < K.VIP_CHANCE;                 // частный джет
    const emergency = evs.emergency && !vip && Math.random() < K.EMERGENCY_CHANCE;        // «топливо на нуле»
    const medical = evs.medical && !vip && !emergency && Math.random() < K.MEDICAL_CHANCE; // медицинский
    const pool = shuffle(['repair','fuel','board']);
    // медицинский: высаживает пациента в пассажирском боксе, затем сразу вылет
    const nSvc = medical ? 1 : (Math.random() < 0.45 ? 2 : 1);
    const requests = medical ? ['board','depart'] : pool.slice(0, nSvc).concat(['depart']);
    // де-айсинг: в снегопад обычный борт обязан пройти антиобледенение перед вылетом
    // (медицинский — «вне очереди», пропускаем). Шаг ставится прямо перед 'depart'.
    if(LV.deice && weather==='snow' && !medical) requests.splice(requests.length-1, 0, 'deice');
    const waitMult = (vip||medical) ? 1 : 2;                             // джет и медицинский нетерпеливы
    // воздушное терпение: топливо-на-нуле — садить срочно; медицинский — тоже спешит
    const airMult = emergency ? 0.4 : (medical ? K.MEDICAL_AIR : 1);
    const airBase = K.AIR_BASE * airMult * waitMult;
    const bonus = (vip?2:1) * (emergency?K.EMERGENCY_BONUS:1) * (medical?K.MEDICAL_BONUS:1);
    const reward = Math.round(nSvc * K.MONEY_SVC * bonus);
    // вертикальная позиция зависания — у одной из полос/между ними
    const y = field.y0 + 30*ui + Math.random()*(field.y1 - field.y0 - 60*ui);
    planes.push({
      id: ++planeSeq,
      x: field.hoverX, y, ang: Math.PI, // нос влево
      vip, emergency, medical, requests, reqIndex:0,
      zone:'air',            // air | runway | field | bay
      path:[], moving:false, selected:false,
      landing:false, takeoff:false, exiting:false,
      runway:null, bay:null,
      airTime: airBase, airMax: airBase,
      groundTime:0, groundMax:0, waitMult,
      serveTime:0, serveMax:0, landedAt:0,
      halfPay:false, dead:false,
      reward,
      nSvc,
    });
    // в туториале первый прилетевший борт становится «учебным» — его и ведём
    if(tut && !tut.plane) tut.plane = planes[planes.length-1];
    // анонс мини-события (срочные борта «ломают рутину»); не на старте/в Zen/в туториале
    if(gameTime>0 && !zen && !tut){
      if(emergency) toast={text:t('toast.emergency'), t:0, good:false};
      else if(medical) toast={text:t('toast.medical'), t:0, good:false};
    }
  }

  // ---- лесной биом: помехи на ВПП и спец-бригады ----
  // Точка выезда бригад — низ сервисного здания (рисуется сверху поля).
  function serviceHome(){
    const s=field.service;
    if(s) return {x:s.x+s.w/2, y:s.y+s.h};
    return {x:(field.x0+field.x1)/2, y:field.y0};
  }
  // какая бригада нужна на помеху: пила на падающее дерево (срубить, пока не легло),
  // техслужба на лежащее дерево/оленя, орёл — разогнать птиц.
  function neededCrew(h){
    if(h.kind==='tree') return h.fallen ? 'truck' : 'chainsaw';
    if(h.kind==='deer') return 'truck';
    if(h.kind==='snow') return 'plow';
    return 'eagle';
  }
  // помеха под пальцем (для тапа): берём ближайшую ещё не обслуживаемую
  function hazardAt(p){
    let best=null, bd=46*ui;
    for(const h of hazards){ if(h.dispatched) continue; const d=dist(h.x,h.y,p.x,p.y); if(d<bd){bd=d;best=h;} }
    return best;
  }
  function spawnHazard(){
    // оставляем хотя бы одну полосу открытой; на полосу — не больше одной помехи
    if(hazards.length >= Math.max(1, runways.length-1)) return;
    const free = runways.filter(r=>!r.closed && r.hazard==null);
    if(!free.length) return;
    const r = free[Math.floor(Math.random()*free.length)];
    // снежный занос — только в снегопад (зимний геймплей поверх лесных помех)
    const pool = weather==='snow' ? ['tree','deer','birds','snow'] : ['tree','deer','birds'];
    const kind = pool[Math.floor(Math.random()*pool.length)];
    const h = { id:++hazardSeq, kind, runway:r, t:0, dispatched:false, done:false };
    if(kind==='snow'){
      h.x = r.x + r.w*0.5; h.y = r.cy;
      r.closed = true;                                  // занос на полосе — закрыта, пока не расчистит плуг
      toast = {text:t('forest.snow'), t:0, good:false};
    } else if(kind==='tree'){
      h.beaver = Math.random() < FOR.BEAVER_CHANCE;     // бобёр грызёт — падает медленнее
      h.fallTime = h.beaver ? FOR.TREE_FALL_BEAVER : FOR.TREE_FALL;
      h.fallen = false;
      h.x = r.x + 12*ui; h.y = r.cy;                    // у полевого торца полосы
      toast = {text:t('forest.tree'), t:0, good:false};
    } else if(kind==='deer'){
      h.x = r.x + r.w*0.42; h.y = r.cy;
      r.closed = true;                                  // зверь на полосе — сразу закрыта
      toast = {text:t('forest.deer'), t:0, good:false};
    } else {
      h.x = r.x + r.w*0.5; h.y = r.y + 8*ui;
      r.closed = true;                                  // птицы над полосой — закрыта
      toast = {text:t('forest.birds'), t:0, good:false};
    }
    r.hazard = h.id;
    hazards.push(h);
    SND.penalty();
  }
  // выслать бригаду из сервисного здания к помехе (по тапу игрока)
  function dispatchCrew(h){
    if(h.dispatched || h.done) return;
    h.dispatched = true;
    const home = serviceHome();
    crews.push({ kind:neededCrew(h), hazard:h, phase:'out',
                 x:home.x, y:home.y, hx:home.x, hy:home.y,
                 tx:h.x, ty:h.y, workT:0, done:false });
    addFloat(home.x, home.y-14*ui, t('forest.crew.'+neededCrew(h)), COL.teal);
    SND.build(); HAP.tap();
  }
  // помеха устранена: открыть полосу, убрать помеху, премия (если убрала бригада)
  function resolveHazard(h, rewarded){
    if(!h || h.done) return;
    h.done = true;
    if(h.runway.hazard===h.id) h.runway.hazard=null;
    h.runway.closed = false;
    hazards = hazards.filter(x=>x!==h);
    if(rewarded && !zen){
      money += FOR.REWARD;
      addFloat(h.x, h.y-18*ui, '+'+fmtMoney(FOR.REWARD), COL.coin);
      SND.served(); HAP.ok();
      toast = {text:t('forest.cleared'), t:0, good:true};
    }
  }
  function updateForest(dt){
    if(gameTime>=nextHazard){ spawnHazard(); nextHazard = gameTime + FOR.SPAWN_MIN + Math.random()*(FOR.SPAWN_MAX-FOR.SPAWN_MIN); }
    // помехи
    for(const h of hazards){
      if(h.done) continue;
      h.t += dt;
      if(h.kind==='tree'){
        if(!h.fallen && h.t>=h.fallTime){ h.fallen=true; h.runway.closed=true; } // легло поперёк полосы
      } else if(h.kind==='deer'){
        if(!h.dispatched && h.t>=FOR.DEER_LIFE) resolveHazard(h, false);          // олень сам ушёл
      } else if(h.kind==='birds'){
        if(!h.dispatched && h.t>=FOR.BIRD_LIFE) resolveHazard(h, false);          // птицы улетели
      }
      // снег (kind==='snow') сам не уходит — нужен плуг (создаёт «всегда есть дело»)
    }
    // спец-авто: едут к помехе → работают → возвращаются домой
    for(const c of crews){
      if(c.phase==='work'){
        c.workT -= dt;
        if(c.workT<=0){ resolveHazard(c.hazard, true); c.phase='home'; c.tx=c.hx; c.ty=c.hy; }
        continue;
      }
      const d = dist(c.x,c.y,c.tx,c.ty);
      if(d<=4){
        if(c.phase==='out'){ c.phase='work'; c.workT=FOR.WORK_TIME; }
        else c.done=true;
      } else {
        const step = Math.min(FOR.CREW_SPEED*dt, d);
        c.x += (c.tx-c.x)/d*step; c.y += (c.ty-c.y)/d*step;
      }
    }
    crews = crews.filter(c=>!c.done);
  }

  // ---- geometry ----
  const rectHit = (px,py,r) => px>r.x && px<r.x+r.w && py>r.y && py<r.y+r.h;
  const dist = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);

  // ---- input ----
  let selected=null, drag=null;
  function pt(e){
    const r=cv.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return {x:s.clientX-r.left, y:s.clientY-r.top};
  }
  function pickPlane(p){
    let best=null, bd=K.GRAB;
    for(const pl of planes){
      if(pl.zone==='bay') continue;
      const d=dist(pl.x,pl.y,p.x,p.y);
      if(d<bd){bd=d;best=pl;}
    }
    return best;
  }
  function pickBay(p){
    for(const b of bays) if(rectHit(p.x,p.y,b)) return b;
    return null;
  }
  function bayUpCost(b){ if(b.deice) return null; return b.open ? (K.BAY_UP_COST[b.lvl]||null) : K.BAY_OPEN_COST; }

  function down(e){
    if(!running) return;
    e.preventDefault();
    const p=pt(e);
    // pause button
    if(rectHit(p.x,p.y,pauseBtn)){ setPaused(!paused); return; }
    if(paused) return;

    // bay tap -> open / upgrade
    const b=pickBay(p);
    if(b){
      const cost=bayUpCost(b);
      if(cost!=null && money>=cost){
        money-=cost;
        if(!b.open){ b.open=true; ACH.onBayOpen(b); } else { b.lvl++; ACH.onBayUpgrade(b); }
        upgradesDone++;
        SND.build(); HAP.tap();
      }
      return;
    }
    // лесной биом: тап по помехе высылает нужную спец-бригаду из сервисного здания
    if(LV.biome){
      const h=hazardAt(p);
      if(h){ dispatchCrew(h); return; }
    }
    // plane
    const pl=pickPlane(p);
    if(pl){
      selected=pl; ACH.onPlaneTouched(pl);
      SND.pick(); HAP.tap();
      planes.forEach(x=>x.selected=false); pl.selected=true;
      drag={plane:pl, start:p, last:p, drew:false};
    } else {
      selected=null; planes.forEach(x=>x.selected=false);
    }
  }
  function move(e){
    if(!drag||paused) return;
    e.preventDefault();
    const p=pt(e);
    if(!drag.drew && dist(p.x,p.y,drag.start.x,drag.start.y)>10){
      drag.drew=true;
      drag.plane.path=[];            // начинаем новый маршрут
      drag.plane.moving=true;        // борт трогается сразу, как пошла линия
    }
    if(drag.drew && dist(p.x,p.y,drag.last.x,drag.last.y)>12){
      drag.plane.path.push({x:p.x,y:p.y});
      drag.last=p;
    }
  }
  function up(){
    if(!drag) return;
    const pl=drag.plane;
    if(drag.drew){
      pl.moving = pl.path.length>0;        // поехали по маршруту
      pl.exiting=false;
    } else {
      // тап: если есть маршрут — переключаем стоп/движение
      if(pl.path.length) pl.moving = !pl.moving;
    }
    drag=null;
  }
  // На тач-устройствах один тап порождает И pointer-, И touch-событие. Если
  // слушать оба, down() срабатывает дважды на одно касание: для паузы (тоггл
  // setPaused(!paused)) это значит «вкл, тут же выкл» — кнопка как будто мёртвая.
  // Поэтому используем Pointer Events там, где они есть (везде в совр. браузерах),
  // и только при их отсутствии откатываемся на Touch Events.
  if(window.PointerEvent){
    cv.addEventListener('pointerdown',down);
    cv.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
  } else {
    cv.addEventListener('touchstart',down,{passive:false});
    cv.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',up);
  }

  // ---- crashes ----
  function freeRes(pl){
    if(pl.runway){ if(pl.runway.occupied===pl) pl.runway.occupied=null; pl.runway=null; }
    if(pl.bay){ if(pl.bay.occupied===pl) pl.bay.occupied=null; pl.bay=null; }
  }
  // reason — ключ i18n (loss.*): в lossLog хранится ключ, перевод — при показе
  function logLoss(pl, reason, moneyPenalty){
    if(pl.dead) return;
    pl.dead=true; boom(pl.x,pl.y); freeRes(pl);
    SND.crash(); HAP.crash();
    combo=0; runCrashes++;          // крушение сбрасывает серию и портит «чистоту»
    ACH.onCrash(pl, reason);
    if(!debug.infiniteLives) lives--;
    if(moneyPenalty){ money-=pl.reward; addFloat(pl.x, pl.y-24*ui, '−'+fmtMoney(pl.reward), COL.life); }
    lossLog.push({t:gameTime, reason});
    if(lossLog.length>12) lossLog.shift();
    toast={text:(debug.infiniteLives?'✈ ':'−1 ✈ ')+t(reason), t:0, good:false};
    console.log('[PlaneFlow] '+(debug.infiniteLives?'(∞) ':'-1 ✈ ')+t(reason)+' | t='+fmtTime(gameTime)+' | lives='+lives);
  }
  function killAir(pl){ logLoss(pl, 'loss.airTimeout', false); }
  function killCrash(pl, reason){ logLoss(pl, reason||'loss.collision', true); }

  function curNeed(pl){ return pl.requests[pl.reqIndex]; }

  function land(pl, r){            // начать посадку на полосу r
    pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
    pl.landing=true; pl.moving=true; pl.path=[];
  }
  function startGround(pl){
    pl.landing=false; pl.moving=false; pl.zone='runway'; // стоит на полосе, ждёт руления
    const rem = pl.nSvc; // число услуг (без вылета)
    pl.groundMax = (K.GROUND_BASE + rem*K.GROUND_STEP) * pl.waitMult;
    pl.groundTime = pl.groundMax;
    pl.landedAt = gameTime;          // для экспресс-бонуса
    SND.land(); HAP.tap();
    ACH.onLand(pl);
  }
  // наземный таймаут: −50% оплаты (звук/вибро/всплывающий «−50%» — в одном месте)
  function groundPenalty(pl){
    pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl);
    SND.penalty(); HAP.penalty();
    addFloat(pl.x, pl.y-20*ui, '−50%', COL.amber);
  }
  function serveTimeFor(b){ return K.SERVE_BASE / (1 + b.lvl*K.UP_SPEED); }
  function comboMult(){ return 1 + Math.min(combo, K.COMBO_MAX)*K.COMBO_STEP; }

  function depart(pl){             // успешный вылет
    served++;
    let pay = pl.reward, express=false;
    if(pl.halfPay){                // наземный штраф рвёт серию и режет оплату вдвое
      combo=0; pay = Math.round(pay*0.5);
    } else {
      combo++;
      express = (gameTime - pl.landedAt) <= K.EXPRESS_TIME;
      pay = Math.round(pay * comboMult() * (express?K.EXPRESS_BONUS:1));
      if(express) toast={text:t('toast.express', {money:fmtMoney(pay)}), t:0, good:true};
    }
    money += pay;
    SND.depart(express); HAP.ok();
    // якорь всплывашек — у вылетающего борта; награды стопкой ползут вверх над бортом
    const fx = pl.runway ? pl.runway.x+pl.runway.w-34*ui : Math.min(pl.x, W-40*ui);
    const fy = pl.runway ? pl.runway.cy : pl.y;
    addFloat(fx, fy, '+'+fmtMoney(pay), pl.halfPay?COL.muted:COL.coin);
    // мгновенный дофамин: «×N комбо» за серию и «вовремя!» за экспресс — над «+N ₿»
    let stack = 17*ui;
    if(combo>=2){ addFloat(fx, fy-stack, t('float.combo',{x:combo}), COL.gold); stack+=17*ui; }
    if(express){ addFloat(fx, fy-stack, t('float.express'), COL.teal); }
    ACH.onDepart(pl, pay);
    if(tut && tut.plane===pl) completeTutorial();
    pl.dead=true; freeRes(pl);
  }
  function metricValue(){ return LV.objective.metric==='upgrades' ? upgradesDone : served; }
  // звёзды: 1★ цель выполнена, +1★ без наземных штрафов, +1★ без крушений
  function computeStars(){
    if(metricValue() < LV.objective.target) return 0;
    let s=1;
    if(runPenalties===0) s++;
    if(runCrashes===0) s++;
    return s;
  }
  function recordResult(){
    if(zen) return;                  // Zen не влияет на звёзды/прогресс
    const stars=computeStars();
    if(save.best[levelKey]==null || served>save.best[levelKey]) save.best[levelKey]=served;
    if(save.stars[levelKey]==null || stars>save.stars[levelKey]) save.stars[levelKey]=stars;
    // прогресс кампании двигают только её уровни (числовой ключ); биом-карты — нет
    if(typeof levelKey==='number' && stars>=1 && save.unlocked < levelIdx+2) save.unlocked = Math.min(LEVELS.length, levelIdx+2);
    saveGame();
  }

  // ---- update ----
  function steer(pl, tx, ty, spd, dt){
    const desired=Math.atan2(ty-pl.y, tx-pl.x);
    let diff=desired-pl.ang;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    const max=K.TURN*dt;
    pl.ang += Math.max(-max,Math.min(max,diff));
    pl.x += Math.cos(pl.ang)*spd*dt;
    pl.y += Math.sin(pl.ang)*spd*dt;
  }
  function followPath(pl, spd, dt){
    if(!pl.path.length){ return false; }
    const wp=pl.path[0];
    steer(pl, wp.x, wp.y, spd, dt);
    const turnR = spd/K.TURN;                       // радиус разворота
    const capture = Math.max(K.ARRIVE, turnR*0.6);  // порог «доехал»
    const d = dist(pl.x,pl.y,wp.x,wp.y);
    // точка «позади по курсу» (за носом борта)
    const toX=wp.x-pl.x, toY=wp.y-pl.y;
    const behind = (toX*Math.cos(pl.ang) + toY*Math.sin(pl.ang)) < 0;
    // Выкидываем точку только если ДОЕХАЛИ (близко) или орбитим её рядом
    // (близкая точка позади = проскочили мимо). ДАЛЁКУЮ точку позади НЕ трогаем —
    // к ней борт разворачивается, а не считает уже пройденной. Иначе борт,
    // которому нужно развернуться (типично — готовый к вылету борт у бокса, а
    // ВПП сзади), выкидывал весь нарисованный маршрут и «буксовал» на месте.
    if(d < capture || (behind && d < turnR*1.5)) pl.path.shift();
    return true;
  }

  function update(dt){
    // динамические события (в Zen отключены: next* = Infinity)
    if(gameTime>=nextRush){ rushUntil=gameTime+K.RUSH_DUR; nextRush=gameTime+K.RUSH_PERIOD; toast={text:t('toast.rush'), t:0, good:false}; }
    if(gameTime>=nextWind){
      const open=runways.filter(r=>!r.closed);
      if(open.length>1){ open[Math.floor(Math.random()*open.length)].closed=true; windUntil=gameTime+K.WIND_DUR; toast={text:t('toast.wind'), t:0, good:false}; }
      nextWind=gameTime+K.WIND_PERIOD;
    }
    if(windUntil>0 && gameTime>=windUntil){ runways.forEach(r=>r.closed=false); windUntil=0; }
    if(gameTime>=nextFog){ fogUntil=gameTime+K.FOG_DUR; nextFog=gameTime+K.FOG_PERIOD; toast={text:t('toast.fog'), t:0, good:false}; }
    // «часы» суток (логика; визуал берёт nightAmount). Не влияют на сложность.
    { const dc = dayCycle(gameTime); dayPhase = dc.phase; nightAmount = dc.night; }
    // погода: окна rain/snow по таймеру (движок выключен, если nextWeather=Infinity)
    if(gameTime>=nextWeather){
      weather = Math.random()<K.WEATHER_SNOW_CHANCE ? 'snow' : 'rain';
      weatherUntil = gameTime+K.WEATHER_DUR; nextWeather = gameTime+K.WEATHER_PERIOD;
      toast = {text:t('toast.weather.'+weather), t:0, good:false};
    }
    if(weather!=='clear' && gameTime>=weatherUntil) weather='clear';
    const rush = gameTime<rushUntil;
    const fog = gameTime<fogUntil;
    // руление замедляют и туман, и непогода — берём наименьший (самый «вязкий») множитель
    const taxiSpeed = K.SPEED_TAXI * Math.min(fog?K.FOG_TAXI:1, weatherTaxiMult(weather));
    // spawn
    spawnTimer-=dt;
    const interval = rush ? K.SPAWN_BASE*0.4 : Math.max(K.SPAWN_MIN, K.SPAWN_BASE - served*0.05);
    // в туториале держим в небе только один борт — спокойно ведём его за руку
    const cap = tut ? 1 : K.MAX_PLANES;
    if(spawnTimer<=0 && planes.length<cap){ spawnPlane(); spawnTimer=interval; }

    updateTutorial();
    ACH.onTick(dt);
    if(LV.biome==='forest' && !zen) updateForest(dt);

    for(const pl of planes){
      if(pl.dead) continue;

      // ---- AIR ----
      if(pl.zone==='air'){
        if(!zen){ pl.airTime-=dt; if(pl.airTime<=0){ killAir(pl); continue; } }
        if(pl.moving && pl.path.length){
          followPath(pl, K.SPEED_AIR, dt);
        }
        // заход на посадку: пересёк правый край полос -> захват ближайшей ОТКРЫТОЙ
        // (садимся даже на занятую — крушение только при физическом контакте)
        if(pl.x <= field.rwR){
          let best=null, bd=1e9;
          for(const r of runways){ if(r.closed) continue; const d=Math.abs(pl.y-r.cy); if(d<bd){bd=d;best=r;} }
          if(best) land(pl, best);
        }
        continue;
      }

      // ---- RUNWAY ----
      if(pl.zone==='runway'){
        if(pl.landing){
          // докатываемся до полевого края, выравниваясь по оси полосы
          const r=pl.runway;
          steer(pl, r.stopX, r.cy, K.SPEED_AIR*0.8, dt);
          if(pl.x <= r.stopX+2){ pl.x=r.stopX; pl.y=r.cy; startGround(pl); }
          continue;
        }
        if(pl.takeoff){
          if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl); }
          steer(pl, pl.runway.exitX+200, pl.runway.cy, K.SPEED_TAKEOFF, dt);
          if(pl.x > W+30){ depart(pl); }
          continue;
        }
        // стоит на полосе, ждёт руления к боксу
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl); }
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
          if(!rectHit(pl.x,pl.y,pl.runway)){          // съехал с полосы на поле
            if(pl.runway.occupied===pl) pl.runway.occupied=null;
            pl.runway=null; pl.zone='field';
          }
        }
        continue;
      }

      // ---- FIELD (руление) ----
      if(pl.zone==='field'){
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl); }
        const need=curNeed(pl);
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
        } else if(pl.exiting){
          pl.exiting=false; pl.moving=false;
        }
        // вылет: все услуги сделаны -> заезд на полосу
        if(need==='depart'){
          for(const r of runways){
            if(!r.closed && rectHit(pl.x,pl.y,r)){
              // выезд на ОТКРЫТУЮ полосу под взлёт (крушение — только при контакте на ВПП)
              pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
              pl.takeoff=true; pl.moving=true; pl.path=[];
              break;
            }
          }
        } else {
          // заезд в бокс
          for(const b of bays){
            if(!b.open) continue;
            if(rectHit(pl.x,pl.y,b)){
              if(b.type!==need){ /* не тот бокс — простаиваем рядом */ break; }
              if(b.occupied && b.occupied!==pl){ if(!zen){ killCrash(pl,'loss.collisionBay'); killCrash(b.occupied,'loss.collisionBay'); } }
              else {
                pl.zone='bay'; pl.bay=b; b.occupied=pl;
                pl.x=b.x+b.w/2; pl.y=b.y+b.h/2; pl.moving=false; pl.path=[];
                const o=dirOut(b); pl.ang=Math.atan2(-o.dy,-o.dx); // паркуем носом внутрь — борт виден в открытом боксе
                pl.serveMax=serveTimeFor(b); pl.serveTime=pl.serveMax;
                SND.dock();
              }
              break;
            }
          }
        }
        continue;
      }

      // ---- BAY (обслуживание) ----
      if(pl.zone==='bay'){
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl); }
        pl.serveTime-=dt;
        if(pl.serveTime<=0){
          const b=pl.bay; b.occupied=null; pl.bay=null;
          pl.reqIndex++; ACH.onService(pl); SND.served();
          // выезд из бокса на поле
          pl.zone='field';
          const ex = clampX(b.x+b.w/2 + dirOut(b).dx*(b.w*0.6+24*ui));
          const ey = clampY(b.y+b.h/2 + dirOut(b).dy*(b.h*0.6+24*ui));
          pl.x=ex; pl.y=ey; pl.moving=false; pl.path=[];
        }
        continue;
      }
    }

    // столкновения (в Zen отключены — поток без проигрыша)
    if(!zen){
      // на поле (оба свободно рулят)
      const ground = planes.filter(p=>!p.dead && p.zone==='field');
      for(let i=0;i<ground.length;i++)
        for(let j=i+1;j<ground.length;j++){
          if(dist(ground[i].x,ground[i].y,ground[j].x,ground[j].y)<K.CRASH_DIST){
            killCrash(ground[i],'loss.collisionField'); killCrash(ground[j],'loss.collisionField');
          }
        }
      // на ВПП: физический контакт (заходящий бьёт стоящего, либо садящийся
      // пересекается со взлетающим), а не сам факт захода на полосу
      const onrw = planes.filter(p=>!p.dead && p.zone==='runway');
      for(let i=0;i<onrw.length;i++)
        for(let j=i+1;j<onrw.length;j++){
          if(dist(onrw[i].x,onrw[i].y,onrw[j].x,onrw[j].y)<K.CRASH_DIST){
            killCrash(onrw[i],'loss.collisionRunway'); killCrash(onrw[j],'loss.collisionRunway');
          }
        }
    }

    // near-miss «уфф»: два борта едва разошлись (ближе NEAR_DIST, но не краш) и
    // именно СБЛИЖАЛИСЬ в этот миг — вспышка + лёгкое замедление + «уфф». Работает и
    // в Zen (это украшение, без штрафа). Антидребезг — по паре бортов (NEAR_COOL),
    // карта пар пересобирается каждый кадр (сама чистит ушедшие/севшие борта).
    {
      const air = planes.filter(p=>!p.dead && p.zone!=='bay');
      const next={};
      for(let i=0;i<air.length;i++)
        for(let j=i+1;j<air.length;j++){
          const a=air[i], b=air[j], d=dist(a.x,a.y,b.x,b.y);
          if(d >= K.NEAR_DIST*1.5) continue;                 // далеко — не отслеживаем
          const key = a.id<b.id ? a.id+'-'+b.id : b.id+'-'+a.id;
          const prev = nearMissPairs[key];
          let cool = prev ? prev.cool : 0;
          // нужен предыдущий кадр и реальное сближение — иначе спавн рядом или
          // два зависших борта дали бы ложное «уфф»
          const closing = prev && d < prev.last - 0.01;
          if(d>=K.CRASH_DIST && d<K.NEAR_DIST && closing && gameTime>=cool){
            nearMiss((a.x+b.x)/2, (a.y+b.y)/2);
            addFloat((a.x+b.x)/2, (a.y+b.y)/2 - 18*ui, t('float.nearMiss'), COL.phosphor);
            SND.nearmiss(); HAP.near();
            slowmo = Math.max(slowmo, K.SLOWMO_DUR);
            cool = gameTime + K.NEAR_COOL;
          }
          next[key] = {cool, last:d};
        }
      nearMissPairs = next;
    }

    // уборка
    for(let i=planes.length-1;i>=0;i--) if(planes[i].dead){ if(selected===planes[i]) selected=null; planes.splice(i,1); }

    // тревожный бип: у кого-то терпение на исходе (дублирует красное кольцо звуком;
    // чем меньше осталось — тем чаще бип)
    if(!zen && gameTime>=alarmAt){
      let mf=1;
      for(const pl of planes){
        if(pl.dead) continue;
        let fr=null;
        if(pl.zone==='air') fr=Math.max(0,pl.airTime)/pl.airMax;
        else if(pl.zone!=='bay') fr=Math.max(0,pl.groundTime)/Math.max(1,pl.groundMax);
        if(fr!=null && fr<mf) mf=fr;
      }
      if(mf<0.25){ SND.alarm(); alarmAt=gameTime+0.45+mf*2.4; }
    }

    if(!zen){
      if(lives<=0){ endLevel('end.lives'); return; }
      if(metricValue() >= LV.objective.target){ endLevel('end.goal'); return; }
    }
    // статистика смены: пик одновременной нагрузки + редкие отсчёты для графика
    if(planes.length>statPeak) statPeak=planes.length;
    if(gameTime>=statNextAt){
      statSamples.push({t:gameTime, load:planes.length, served});
      statNextAt = gameTime + statStep;
      // в Zen ряд может расти бесконечно — прорежаем и удваиваем шаг
      if(statSamples.length>180){ statSamples = statSamples.filter((_,i)=>i%2===0); statStep*=2; }
    }
    gameTime+=dt;
    if(!zen && LV.objective.time && gameTime>=LV.objective.time){ endLevel('end.time'); return; }
  }
  function dirOut(b){ // направление "наружу из бокса" в поле
    if(b.side==='top') return {dx:0,dy:1};
    if(b.side==='bottom') return {dx:0,dy:-1};
    if(b.side==='deice') return {dx:-1,dy:0}; // у правого края поля, ворота влево
    return {dx:1,dy:0}; // left
  }
  const clampX = x => Math.max(field.x0+10, Math.min(field.x1-10, x));
  const clampY = y => Math.max(field.y0+10, Math.min(field.y1-10, y));

  // ---- render ----
  function rr(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  // ---- облик «ночной радар»: помощники ----
  const MONO='ui-monospace,"SF Mono",Menlo,Consolas,monospace';
  function hexa(c,a){ if(!c || c[0]!=='#') return c;
    const n=parseInt(c.slice(1),16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

  function starfield(tm){ // мерцающие звёзды в верхней части неба
    for(let i=0;i<55;i++){
      const x=(i*97.13)%W, y=(i*53.7)%(H*0.6);
      const tw=0.3+0.7*Math.abs(Math.sin(tm*0.0008+i));
      ctx.fillStyle=hexa(COL.phosphor, 0.05+0.10*tw);
      ctx.fillRect(x,y,1.5,1.5);
    }
  }
  function vignette(){ // мягкое затемнение краёв
    const g=ctx.createRadialGradient(W/2,H*0.4,H*0.2,W/2,H/2,W*0.7);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.42)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  function heart(x,y,r,fill){ // жизни в HUD
    ctx.save(); ctx.translate(x,y); ctx.beginPath(); ctx.moveTo(0,r*0.7);
    ctx.bezierCurveTo(-r*1.3,-r*0.4,-r*0.5,-r*1.1,0,-r*0.35);
    ctx.bezierCurveTo(r*0.5,-r*1.1,r*1.3,-r*0.4,0,r*0.7); ctx.closePath();
    if(fill){ ctx.fillStyle=fill; ctx.shadowColor=hexa(fill,.6); ctx.shadowBlur=7; ctx.fill(); ctx.shadowBlur=0; }
    else { ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.muted,.45); ctx.stroke(); }
    ctx.restore();
  }

  // иконки услуг (центр в (cx,cy), размер r)
  function iconGear(cx,cy,r,col,hole){ ctx.save(); ctx.translate(cx,cy); ctx.fillStyle=col;
    const teeth=8, ro=r, ri=r*0.74, tw=0.2; ctx.beginPath();
    for(let i=0;i<teeth;i++){ const a=i/teeth*Math.PI*2, a0=a-tw,a1=a+tw,a2=a+Math.PI/teeth-tw,a3=a+Math.PI/teeth+tw;
      ctx.lineTo(Math.cos(a0)*ro,Math.sin(a0)*ro); ctx.lineTo(Math.cos(a1)*ro,Math.sin(a1)*ro);
      ctx.lineTo(Math.cos(a2)*ri,Math.sin(a2)*ri); ctx.lineTo(Math.cos(a3)*ri,Math.sin(a3)*ri); }
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,r*0.34,0,7); ctx.fillStyle=hole||COL.tarmac; ctx.fill(); ctx.restore(); }
  function iconDrop(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy-r*0.1); ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.bezierCurveTo(r*0.9,-r*0.1,r*0.85,r*0.9,0,r);
    ctx.bezierCurveTo(-r*0.85,r*0.9,-r*0.9,-r*0.1,0,-r); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(-r*0.22,r*0.28,r*0.22,0,7); ctx.fillStyle=hexa('#ffffff',.4); ctx.fill(); ctx.restore(); }
  function iconPerson(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy); ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,-r*0.5,r*0.34,0,7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-r*0.62,r*0.9); ctx.quadraticCurveTo(-r*0.6,-r*0.05,0,-r*0.05);
    ctx.quadraticCurveTo(r*0.6,-r*0.05,r*0.62,r*0.9); ctx.closePath(); ctx.fill(); ctx.restore(); }
  function iconDepart(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(-Math.PI/4);
    ctx.scale(r/26,r/26); planeShape(col); ctx.restore(); }
  function iconSnow(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy);   // снежинка: 6 лучей
    ctx.strokeStyle=col; ctx.lineWidth=Math.max(1,r*0.16); ctx.lineCap='round';
    for(let k=0;k<6;k++){ ctx.rotate(Math.PI/3);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.62); ctx.lineTo(r*0.26,-r*0.84); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.62); ctx.lineTo(-r*0.26,-r*0.84); ctx.stroke();
    }
    ctx.restore(); }
  function drawIcon(type,cx,cy,r,col,hole){
    if(type==='repair') iconGear(cx,cy,r,col,hole);
    else if(type==='fuel') iconDrop(cx,cy,r,col);
    else if(type==='board') iconPerson(cx,cy,r,col);
    else if(type==='deice') iconSnow(cx,cy,r,col);
    else iconDepart(cx,cy,r,col);
  }

  // силуэт авиалайнера (нос по курсу, +x; габарит ~48 единиц)
  function planeShape(col){ ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(26,0); ctx.quadraticCurveTo(14,-5,-6,-5); ctx.lineTo(-22,-3.5);
    ctx.lineTo(-22,3.5); ctx.lineTo(-6,5); ctx.quadraticCurveTo(14,5,26,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,-3); ctx.lineTo(-15,-22); ctx.lineTo(-20,-21); ctx.lineTo(-6,-3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,3); ctx.lineTo(-15,22); ctx.lineTo(-20,21); ctx.lineTo(-6,3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-16,-2.5); ctx.lineTo(-24,-10); ctx.lineTo(-27,-9.5); ctx.lineTo(-20,-2.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-16,2.5); ctx.lineTo(-24,10); ctx.lineTo(-27,9.5); ctx.lineTo(-20,2.5); ctx.closePath(); ctx.fill(); }
  // корпус с тенью/окнами/свечением; vip — золото, аварийный — тёплый светлый,
  // медицинский — белый с красным крестом на фюзеляже
  function drawPlaneBodyAt(x,y,ang,s,vip,emergency,medical){
    if(COZY){
      // sprite is authored nose-up; game heading has nose along +x → rotate ang+90°
      const _id = medical ? 'plane-medevac' : emergency ? 'plane-emergency' : vip ? 'plane-vip' : 'plane';
      if(SPRITES.blitC(_id, x, y, 62*s, 62*s, ang + Math.PI/2)) return;
    }
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.scale(s,s);
    ctx.save(); ctx.translate(5,7); ctx.globalAlpha=.28; planeShape('#000'); ctx.restore();
    if(vip){ ctx.shadowColor=hexa(COL.gold,.6); ctx.shadowBlur=16; }
    planeShape(vip?COL.gold:(emergency?'#e7d8cf':COL.paper));
    ctx.shadowBlur=0;
    ctx.fillStyle=hexa(COL.phosphor,.55); ctx.fillRect(-2,-1.2,18,2.4);
    ctx.fillStyle=hexa(COL.ink,.5); ctx.beginPath(); ctx.moveTo(26,0); ctx.lineTo(16,-3.2); ctx.lineTo(16,3.2); ctx.closePath(); ctx.fill();
    ctx.fillStyle=hexa(COL.ink,.55);
    ctx.beginPath(); ctx.arc(-8,-12,2.4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-8,12,2.4,0,7); ctx.fill();
    if(medical){ ctx.fillStyle=COL.rose; ctx.fillRect(-7,-2,14,4); ctx.fillRect(-2,-7,4,14); } // красный крест поверх
    ctx.restore();
  }

  function drawField(tm){
    // ночное небо + звёзды
    ctx.fillStyle=COL.ink; ctx.fillRect(0,0,W,H);
    starfield(tm);

    const ax=field.x0, ay=field.y0, aR=field.rwR, ab=field.y1;

    // вода справа за полосами (медленные волны)
    const wg=ctx.createLinearGradient(aR,0,W,0);
    wg.addColorStop(0,COL.water); wg.addColorStop(1,'#0b242c');
    ctx.fillStyle=wg; ctx.fillRect(aR,0,W-aR,H);
    for(let i=0;i<6;i++){
      const yy=H*(i+1)/7 + Math.sin(tm*0.0015+i)*3;
      ctx.fillStyle=hexa(COL.phosphor,.05); ctx.fillRect(aR,yy,W-aR,2);
    }

    // металлическая рама апрона с заклёпками
    const fx=ax-8*ui, fy=ay-8*ui, fw=(aR-ax)+16*ui, fh=(ab-ay)+16*ui;
    const mg=ctx.createLinearGradient(0,fy,0,fy+fh); mg.addColorStop(0,'#2c3a48'); mg.addColorStop(1,'#1a242f');
    rr(fx,fy,fw,fh,14*ui); ctx.fillStyle=mg; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.12); rr(fx,fy,fw,fh,14*ui); ctx.stroke();
    ctx.fillStyle=hexa(COL.muted,.5);
    [[fx+6*ui,fy+6*ui],[fx+fw-6*ui,fy+6*ui],[fx+6*ui,fy+fh-6*ui],[fx+fw-6*ui,fy+fh-6*ui]]
      .forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],2.5*ui,0,7); ctx.fill(); });

    // тармак: вертикальный градиент + диагональная штриховка + осевая направляющая
    const tg=ctx.createLinearGradient(0,ay,0,ab); tg.addColorStop(0,COL['tarmac-2']); tg.addColorStop(1,COL.tarmac);
    rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.fillStyle=tg; ctx.fill();
    ctx.save(); rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.clip();
    ctx.strokeStyle=hexa(COL.ink,.5); ctx.lineWidth=1;
    for(let xx=ax-(ab-ay); xx<aR; xx+=30*ui){ ctx.beginPath(); ctx.moveTo(xx,ay); ctx.lineTo(xx+(ab-ay),ab); ctx.stroke(); }
    ctx.strokeStyle=hexa(COL.gold,.2); ctx.lineWidth=2.5; ctx.setLineDash([12,10]);
    ctx.beginPath(); ctx.moveTo((ax+field.x1)/2, ay+24*ui); ctx.lineTo((ax+field.x1)/2, ab-24*ui); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();

    // терминал с подсвеченными окнами
    const ix=ax+(field.x1-ax)*0.28, iy=ay+(ab-ay)*0.34;
    const iw=(field.x1-ax)*0.42, ih=(ab-ay)*0.32;
    rr(ix,iy,iw,ih,8*ui); ctx.fillStyle='#26323e'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.phosphor,.15); rr(ix,iy,iw,ih,8*ui); ctx.stroke();
    const wcols=7, wrows=2, wx0=ix+iw*0.09, wy0=iy+ih*0.14, wxs=(iw*0.86)/wcols, wys=ih*0.30;
    for(let r2=0;r2<wrows;r2++) for(let c2=0;c2<wcols;c2++){
      const lit=0.25+0.6*Math.abs(Math.sin(tm*0.001+r2*2+c2));
      ctx.fillStyle=hexa(COL.phosphor,0.10+0.18*lit);
      ctx.fillRect(wx0+c2*wxs, wy0+r2*wys, wxs*0.62, wys*0.5);
    }
    ctx.fillStyle=hexa(COL.muted,.6); ctx.font=`${9*ui}px ${MONO}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t('canvas.terminal'), ix+iw/2, iy+ih-9*ui);

    if(LV.biome==='forest') drawForestDecor(tm, ax, ay, aR, ab);
  }

  function drawRunways(tm){
    runways.forEach((r,i)=>{
      rr(r.x,r.y,r.w,r.h,7*ui); ctx.fillStyle='#161f29'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.muted,.18); rr(r.x,r.y,r.w,r.h,7*ui); ctx.stroke();
      // осевая пунктирная
      ctx.strokeStyle=hexa(COL.paper, r.occupied?0.35:0.5);
      ctx.lineWidth=2.5; ctx.setLineDash([18,15]);
      ctx.beginPath(); ctx.moveTo(r.x+12*ui,r.cy); ctx.lineTo(r.x+r.w-12*ui,r.cy); ctx.stroke(); ctx.setLineDash([]);
      // пороговые отметки с обоих торцов
      ctx.fillStyle=hexa(COL.paper,.4);
      for(let k=0;k<3;k++){
        ctx.fillRect(r.x+7*ui, r.cy-14*ui+k*11*ui, 5*ui, 4*ui);
        ctx.fillRect(r.x+r.w-12*ui, r.cy-14*ui+k*11*ui, 5*ui, 4*ui);
      }
      // огни кромок: золотые / янтарные (занята) / красные (закрыта), мерцают
      const blink=0.4+0.6*Math.abs(Math.sin(tm*0.004+i));
      const lc = r.closed?COL.life:(r.occupied?COL.amber:COL.gold);
      for(let k=0;k<=8;k++){
        const lx=r.x+9*ui+k*(r.w-18*ui)/8;
        ctx.fillStyle=hexa(lc,blink);
        ctx.beginPath(); ctx.arc(lx,r.y+5*ui,2*ui,0,7); ctx.fill();
        ctx.beginPath(); ctx.arc(lx,r.y+r.h-5*ui,2*ui,0,7); ctx.fill();
      }
      if(r.closed){
        rr(r.x,r.y,r.w,r.h,7*ui); ctx.fillStyle=hexa(COL.life,.16); ctx.fill();
        const cx=r.x+r.w/2, s=Math.min(r.w,r.h)*0.16;
        ctx.strokeStyle=hexa(COL.life,.8); ctx.lineWidth=3.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(cx-s,r.cy-s); ctx.lineTo(cx+s,r.cy+s);
        ctx.moveTo(cx+s,r.cy-s); ctx.lineTo(cx-s,r.cy+s); ctx.stroke();
        ctx.fillStyle=hexa(COL.life,.85); ctx.font=`${10*ui}px ${MONO}`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(t('canvas.closed'), cx, r.y+r.h-12*ui);
      } else {
        ctx.fillStyle=hexa(COL.muted,.7); ctx.font=`${9*ui}px ${MONO}`;
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText(t('canvas.rwy',{n:'0'+(i+1)}), r.x+12*ui, r.y+12*ui);
      }
    });
  }

  // ---- лесной биом: отрисовка ----
  const FCOL = {edge:'#1d3a28', tree:'#2f7d4f', tree2:'#3fa15f', trunk:'#6b4f2a'};
  function pineTree(x,y,h,col){            // силуэт ёлки (вершина в y, основание ниже)
    const w=h*0.62;
    ctx.fillStyle=col;
    for(let k=0;k<3;k++){
      const ty=y+h*0.18*k, by=ty+h*0.42, ww=w*(0.6+0.2*k);
      ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x-ww/2,by); ctx.lineTo(x+ww/2,by); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle=FCOL.trunk; ctx.fillRect(x-h*0.05, y+h*0.78, h*0.1, h*0.18);
  }
  function emoji(g,x,y,size,glow){          // эмодзи-глиф по центру (x,y)
    ctx.save();
    ctx.font=`${size}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=COL.paper;                // фолбэк-цвет, если у системы нет цветных эмодзи
    if(glow){ ctx.shadowColor=glow; ctx.shadowBlur=9; }
    ctx.fillText(g,x,y); ctx.restore();
  }
  // зелёный лесной антураж поверх фона апрона (вода справа → лесная кромка)
  function drawForestDecor(tm, ax, ay, aR, ab){
    // лесная кромка вместо воды за полосами
    ctx.fillStyle=FCOL.edge; ctx.fillRect(aR,0,W-aR,H);
    const cols=Math.max(2,Math.round((W-aR)/(34*ui)));
    for(let r2=0;r2<6;r2++) for(let c2=0;c2<cols;c2++){
      const tx=aR+18*ui+c2*((W-aR-24*ui)/Math.max(1,cols-1));
      const ty=18*ui + r2*(H-36*ui)/6 + (c2%2)*9*ui + Math.sin(tm*0.0006+c2)*1.5;
      pineTree(tx,ty,26*ui, r2%2?FCOL.tree:FCOL.tree2);
    }
    // лёгкий зелёный налёт на тармак
    ctx.save(); rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.clip();
    ctx.fillStyle=hexa(FCOL.tree,.06); ctx.fillRect(ax,ay,aR-ax,ab-ay); ctx.restore();
  }
  // сервисное здание + помехи на полосах + спец-бригады
  function drawForest(tm){
    const sv=field.service;
    if(sv){
      // здание: корпус + крыша + гаражные ворота + эмблема
      rr(sv.x,sv.y,sv.w,sv.h,6*ui); ctx.fillStyle='#243b2d'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(FCOL.tree2,.6); rr(sv.x,sv.y,sv.w,sv.h,6*ui); ctx.stroke();
      ctx.fillStyle=hexa(FCOL.tree2,.5);
      ctx.beginPath(); ctx.moveTo(sv.x-2*ui,sv.y); ctx.lineTo(sv.x+sv.w/2,sv.y-7*ui); ctx.lineTo(sv.x+sv.w+2*ui,sv.y); ctx.closePath(); ctx.fill();
      // гаражные ворота (выезд бригад)
      const dw=sv.w*0.4, dh=sv.h*0.5;
      rr(sv.x+sv.w/2-dw/2, sv.y+sv.h-dh, dw, dh, 3*ui); ctx.fillStyle='#16241b'; ctx.fill();
      ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.amber,.5); rr(sv.x+sv.w/2-dw/2, sv.y+sv.h-dh, dw, dh, 3*ui); ctx.stroke();
      emoji('🔧', sv.x+sv.w/2, sv.y+sv.h*0.34, 13*ui);
      ctx.fillStyle=hexa(COL.amber,.8); ctx.font=`${7*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(t('canvas.service'), sv.x+sv.w/2, sv.y+sv.h+2*ui);
    }
    // помехи
    for(const h of hazards){
      if(h.kind==='tree'){
        const ang = (h.fallen?1:Math.min(1,h.t/h.fallTime)) * (Math.PI*0.46); // 0 → стоит, ~83° → лежит поперёк
        ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(ang);
        // ствол растёт «вверх» (−y) от основания у поля; при падении поворачивается на полосу
        ctx.fillStyle=FCOL.trunk; ctx.fillRect(-3*ui, -10*ui, 6*ui, 10*ui);
        pineTree(0, -40*ui, 34*ui, FCOL.tree2);
        ctx.restore();
        if(h.beaver) emoji('🦫', h.x+12*ui, h.y+8*ui, 13*ui, hexa(COL.amber,.5)); // бобёр грызёт у основания
      } else if(h.kind==='deer'){
        emoji('🦌', h.x, h.y, 22*ui, hexa(COL.amber,.4));
      } else if(h.kind==='snow'){
        emoji('❄️', h.x, h.y, 22*ui, hexa(COL.teal,.5));   // занос на полосе (плейсхолдер под арт)
      } else { // birds
        for(let k=0;k<3;k++) emoji('🐦', h.x+(k-1)*15*ui, h.y+Math.sin(tm*0.006+k)*4*ui, 13*ui, hexa(COL.phosphor,.4));
      }
      // подсказка «тапни — вышлю бригаду»: пульсирующее кольцо + иконка нужной бригады
      if(!h.dispatched){
        const pulse=0.5+0.5*Math.abs(Math.sin(tm*0.005));
        ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.3+0.4*pulse);
        ctx.beginPath(); ctx.arc(h.x, h.y, (24+4*pulse)*ui, 0, 7); ctx.stroke();
        const ic = {truck:'🚙', eagle:'🦅', chainsaw:'🪚', plow:'🚜'}[neededCrew(h)];
        emoji(ic, h.x, h.y-32*ui, 14*ui, hexa(COL.teal,.5));
      }
    }
    // спец-авто в пути / за работой
    for(const c of crews){
      const ic = {truck:'🚙', eagle:'🦅', chainsaw:'🪚', plow:'🚜'}[c.kind];
      emoji(ic, c.x, c.y, 16*ui, hexa(COL.amber,.4));
      if(c.phase==='work'){               // искорки работы
        const pulse=Math.abs(Math.sin(tm*0.02));
        ctx.fillStyle=hexa(COL.gold,.4+0.4*pulse);
        ctx.beginPath(); ctx.arc(c.x+8*ui, c.y-6*ui, 2*ui*(1+pulse), 0, 7); ctx.fill();
      }
    }
  }

  // контур трёх стен бокса: сторона к полю (out) — открытые ворота, борт внутри виден
  function bayWalls(b,out,r){
    const x0=b.x, y0=b.y, x1=b.x+b.w, y1=b.y+b.h;
    ctx.beginPath();
    if(out.dy===1){ ctx.moveTo(x0,y1); ctx.arcTo(x0,y0,x1,y0,r); ctx.arcTo(x1,y0,x1,y1,r); ctx.lineTo(x1,y1); }
    else if(out.dy===-1){ ctx.moveTo(x0,y0); ctx.arcTo(x0,y1,x1,y1,r); ctx.arcTo(x1,y1,x1,y0,r); ctx.lineTo(x1,y0); }
    else if(out.dx===-1){ ctx.moveTo(x0,y0); ctx.arcTo(x1,y0,x1,y1,r); ctx.arcTo(x1,y1,x0,y1,r); ctx.lineTo(x0,y1); } // ворота слева
    else { ctx.moveTo(x1,y0); ctx.arcTo(x0,y0,x0,y1,r); ctx.arcTo(x0,y1,x1,y1,r); ctx.lineTo(x1,y1); }
  }

  function drawBay(b){
    const col=SVC[b.type].color;
    const busy=!!b.occupied;
    ctx.save();
    if(!b.open){
      const enough = money>=K.BAY_OPEN_COST;
      rr(b.x,b.y,b.w,b.h,9*ui); ctx.fillStyle='#161d25'; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.muted,.25); rr(b.x,b.y,b.w,b.h,9*ui); ctx.stroke();
      // приглушённая иконка типа + замок
      ctx.globalAlpha=.35; drawIcon(b.type, b.x+b.w/2, b.y+b.h*0.28, 8*ui, COL.muted, '#161d25'); ctx.globalAlpha=1;
      const lx=b.x+b.w/2, ly=b.y+b.h*0.52;
      ctx.fillStyle=hexa(COL.muted,.8); rr(lx-7*ui,ly-4*ui,14*ui,11*ui,2.5*ui); ctx.fill();
      ctx.beginPath(); ctx.arc(lx,ly-4*ui,5*ui,Math.PI,0);
      ctx.lineWidth=2*ui; ctx.strokeStyle=hexa(COL.muted,.8); ctx.stroke();
      // ценник-чип
      const chW=Math.min(b.w-10*ui,56*ui);
      rr(b.x+b.w/2-chW/2, b.y+b.h-19*ui, chW, 14*ui, 7*ui);
      ctx.fillStyle=hexa(COL.gold, enough?.16:.07); ctx.fill();
      ctx.fillStyle=enough?COL.coin:COL.muted; ctx.font=`${9*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(fmtMoney(K.BAY_OPEN_COST), b.x+b.w/2, b.y+b.h-12*ui);
      ctx.restore(); return;
    }

    // открытый бокс-«стойло»: пол + стены с трёх сторон, ворота в сторону поля,
    // рамка цвета услуги (ярче и со свечением, когда занят) — борт внутри виден
    const out=dirOut(b);
    rr(b.x,b.y,b.w,b.h,9*ui); ctx.fillStyle='#202c38'; ctx.fill();
    ctx.lineWidth=2;
    if(busy){ ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=12; }
    ctx.strokeStyle=hexa(col, busy?0.9:0.45); bayWalls(b,out,9*ui); ctx.stroke(); ctx.shadowBlur=0;
    // проём ворот: пунктирный порог + габаритные огни по углам
    let gx0,gy0,gx1,gy1;
    if(out.dy===1){ gx0=b.x; gy0=b.y+b.h; gx1=b.x+b.w; gy1=gy0; }
    else if(out.dy===-1){ gx0=b.x; gy0=b.y; gx1=b.x+b.w; gy1=gy0; }
    else if(out.dx===-1){ gx0=b.x; gy0=b.y; gx1=gx0; gy1=b.y+b.h; }
    else { gx0=b.x+b.w; gy0=b.y; gx1=gx0; gy1=b.y+b.h; }
    ctx.setLineDash([4*ui,5*ui]); ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.22);
    ctx.beginPath(); ctx.moveTo(gx0,gy0); ctx.lineTo(gx1,gy1); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=hexa(col,.8);
    [[gx0,gy0],[gx1,gy1]].forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],2*ui,0,7); ctx.fill(); });
    if(busy){
      // центр отдан припаркованному борту (рисуется поверх) —
      // тип услуги мелкой пиктограммой у дальней от ворот стены
      const iy = out.dy===-1 ? b.y+b.h-13*ui : b.y+13*ui;
      drawIcon(b.type, b.x+13*ui, iy, 6*ui, col, '#202c38');
    } else {
      drawIcon(b.type, b.x+b.w/2, b.y+b.h*0.36, 12*ui, col, '#202c38');
      // подпись услуги
      ctx.fillStyle=hexa(col,.85); ctx.font=`${8*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(t('svc.'+b.type).toUpperCase(), b.x+b.w/2, b.y+b.h-18*ui);
    }
    // пипсы уровня
    const total=K.BAY_MAX_LVL, pip=5.2*ui, gap=4.5*ui;
    const startX=b.x+b.w/2-(total*(pip+gap)-gap)/2;
    for(let i=0;i<total;i++){
      ctx.fillStyle = i<b.lvl ? col : hexa(COL.muted,.18);
      ctx.beginPath(); ctx.arc(startX+i*(pip+gap)+pip/2, b.y+b.h-8*ui, pip/2, 0,7); ctx.fill();
    }
    // прогресс обслуживания — кружок в правом верхнем углу
    if(busy){
      const p=b.occupied, frac=1-Math.max(0,p.serveTime)/p.serveMax;
      const ccx=b.x+b.w-12*ui, ccy=b.y+12*ui;
      ctx.beginPath(); ctx.arc(ccx,ccy,7*ui,0,7); ctx.lineWidth=2.5*ui; ctx.strokeStyle=hexa(COL.ink,.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(ccx,ccy,7*ui,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
      ctx.lineWidth=2.5*ui; ctx.lineCap='round'; ctx.strokeStyle=col; ctx.stroke();
    }
    // подсказка цены апгрейда (жёлтым, если хватает)
    const up=bayUpCost(b);
    if(up!=null){
      const enough = money>=up;
      ctx.fillStyle = enough?COL.coin:COL.muted; ctx.font=`${9*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('↑ '+fmtMoney(up), b.x+b.w/2, b.y+b.h+4*ui);
    }
    ctx.restore();
  }

  function drawPlane(pl){
    const need=curNeed(pl);
    const ncol=SVC[need].color;

    // маршрут — фосфорная пунктирная с «бегущими» штрихами
    if((pl.zone==='air'||pl.zone==='field'||pl.zone==='runway') && pl.path.length && pl.moving){
      ctx.save();
      ctx.strokeStyle=hexa(COL.phosphor, pl.selected?0.85:0.45);
      ctx.lineWidth=2.5; ctx.setLineDash([9,11]); ctx.lineDashOffset=-nowT*0.05;
      if(pl.selected){ ctx.shadowColor=hexa(COL.phosphor,.7); ctx.shadowBlur=10; }
      ctx.beginPath(); ctx.moveTo(pl.x,pl.y);
      for(const w of pl.path) ctx.lineTo(w.x,w.y);
      ctx.stroke();
      // пульсирующая точка-цель на конце маршрута выбранного борта
      if(pl.selected){
        const tp=pl.path[pl.path.length-1];
        const p2=0.5+0.5*Math.sin(nowT*0.005);
        ctx.beginPath(); ctx.arc(tp.x,tp.y,(6+p2*4)*ui,0,7);
        ctx.setLineDash([]); ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.35+.4*p2); ctx.stroke();
      }
      ctx.restore();
    }

    // кольцо терпения: бирюза → янтарь → красный (аварийный всегда красный)
    let frac=null;
    if(pl.zone==='air') frac=Math.max(0,pl.airTime)/pl.airMax;
    else if(pl.zone!=='bay') frac=Math.max(0,pl.groundTime)/Math.max(1,pl.groundMax);
    if(frac!=null){
      const rcol = pl.emergency ? COL.life : (frac>0.5 ? COL.teal : frac>0.25 ? COL.amber : COL.life);
      ctx.save(); ctx.translate(pl.x,pl.y);
      ctx.beginPath(); ctx.arc(0,0,16*ui,0,7); ctx.lineWidth=3; ctx.strokeStyle=hexa(COL.ink,.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,16*ui,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
      ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle=rcol;
      ctx.shadowColor=rcol; ctx.shadowBlur=9; ctx.stroke();
      ctx.restore();
    }
    // пульсирующее кольцо срочного борта в воздухе (аварийный — красный, медицинский — розовый)
    if((pl.emergency||pl.medical) && pl.zone==='air'){
      const p=0.5+0.5*Math.sin(nowT*0.006), pc=pl.emergency?COL.life:COL.rose;
      ctx.beginPath(); ctx.arc(pl.x,pl.y,20*ui+p*3*ui,0,7);
      ctx.lineWidth=2; ctx.strokeStyle=hexa(pc,.4+.4*p); ctx.stroke();
    }
    // выделение — пунктирное кольцо
    if(pl.selected){
      ctx.save(); ctx.beginPath(); ctx.arc(pl.x,pl.y,K.GRAB*0.5,0,7);
      ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.6); ctx.setLineDash([4,5]); ctx.stroke(); ctx.restore();
    }

    drawPlaneBodyAt(pl.x, pl.y, pl.ang, ui*0.5, pl.vip, pl.emergency, pl.medical);

    // иконка текущей нужды над бортом (8.45 = прежние 6.5 +30%)
    if(pl.zone!=='bay') drawIcon(need, pl.x, pl.y-28*ui, 8.45*ui, ncol, COL.ink);
  }

  function drawHUD(){
    const hud=HUD_H();
    // плавающая панель
    rr(10*ui,6*ui,W-20*ui,hud-12*ui,9*ui);
    ctx.fillStyle='rgba(13,28,43,.85)'; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,.12); rr(10*ui,6*ui,W-20*ui,hud-12*ui,9*ui); ctx.stroke();
    const cy=hud/2;
    // жизни-сердечки
    for(let i=0;i<K.START_LIVES;i++) heart(28*ui+i*20*ui, cy, 6.5*ui, i<lives?COL.life:null);
    // таймер (обратный отсчёт для уровней на время)
    const tShown = LV.objective.time ? Math.max(0, LV.objective.time-gameTime) : gameTime;
    const urgent = LV.objective.time && tShown<=10;
    ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.fillStyle=hexa(COL.phosphor,.9); ctx.font=`${13*ui}px ${MONO}`;
    ctx.fillText('◷', 96*ui, cy);
    ctx.fillStyle=urgent?COL.life:COL.paper; ctx.font=`${14*ui}px ${MONO}`;
    ctx.fillText(fmtTime(tShown), 112*ui, cy);
    // деньги — по центру, с лёгким золотым свечением
    ctx.textAlign='center'; ctx.font=`600 ${15*ui}px ${MONO}`;
    ctx.fillStyle=money<0?COL.life:COL.coin;
    ctx.shadowColor=hexa(COL.gold,.45); ctx.shadowBlur=10*ui;
    ctx.fillText(fmtMoney(money), W*0.46, cy); ctx.shadowBlur=0;
    // прогресс цели: подпись + значение
    const mv = LV.objective.metric==='upgrades'?upgradesDone:served;
    ctx.textAlign='left';
    ctx.fillStyle=COL.muted; ctx.font=`${7.5*ui}px ${MONO}`;
    ctx.fillText(t('hud.served'), W*0.58, cy-7*ui);
    let prog = zen ? ('✈ '+fmtNum(served)) : (fmtNum(mv)+' / '+fmtNum(LV.objective.target));
    if(combo>1) prog += '   '+t('hud.combo', {x:fmtNum(comboMult(),1)});
    ctx.fillStyle=COL.phosphor; ctx.font=`${12.5*ui}px ${MONO}`;
    ctx.fillText(prog, W*0.58, cy+6*ui);
    // уровень/режим — справа перед паузой
    ctx.textAlign='right'; ctx.fillStyle=hexa(COL.muted,.7); ctx.font=`${9.5*ui}px ${MONO}`;
    ctx.fillText(currentLevelName(), pauseBtn.x-12*ui, cy);

    // кнопка паузы — скруглённая карточка
    rr(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,8*ui);
    ctx.fillStyle='rgba(127,155,176,.06)'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.phosphor,.4);
    rr(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,8*ui); ctx.stroke();
    ctx.fillStyle=COL.paper;
    const pcx=pauseBtn.x+pauseBtn.w/2, pcy=pauseBtn.y+pauseBtn.h/2;
    if(!paused){
      ctx.fillRect(pcx-6*ui,pcy-6*ui,4*ui,12*ui);
      ctx.fillRect(pcx+2*ui,pcy-6*ui,4*ui,12*ui);
    } else {
      ctx.beginPath(); ctx.moveTo(pcx-5*ui,pcy-6*ui); ctx.lineTo(pcx+7*ui,pcy); ctx.lineTo(pcx-5*ui,pcy+6*ui); ctx.closePath(); ctx.fill();
    }

    // цепочка операций выбранного борта — карточка под HUD
    if(selected && !selected.dead){
      const chain=selected.requests, n=chain.length;
      const bw2=30*ui, gap2=16*ui, x0=14*ui, y0=hud+10*ui;
      const pw=n*bw2+(n-1)*gap2+16*ui;
      rr(x0,y0,pw,44*ui,9*ui); ctx.fillStyle='rgba(13,28,43,.72)'; ctx.fill();
      ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,.12); rr(x0,y0,pw,44*ui,9*ui); ctx.stroke();
      const tag = selected.vip ? (t('hud.plane')+' · '+t('hud.vip'))
                : selected.emergency ? (t('hud.plane')+' '+t('hud.sos'))
                : selected.medical ? (t('hud.plane')+' · '+t('hud.med'))
                : t('hud.plane');
      ctx.fillStyle = selected.emergency?COL.life : selected.medical?COL.rose : hexa(COL.muted,.8);
      ctx.font=`${7.5*ui}px ${MONO}`; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(tag, x0+8*ui, y0+8*ui);
      for(let i=0;i<n;i++){
        const ty=chain[i], c=SVC[ty].color;   // ty, не t — не затенять t() из i18n
        const bx=x0+8*ui+i*(bw2+gap2), bcy=y0+26*ui;
        if(i>0){
          ctx.strokeStyle=hexa(COL.muted,.4); ctx.lineWidth=2; ctx.setLineDash([3,4]);
          ctx.beginPath(); ctx.moveTo(bx-gap2+3*ui,bcy); ctx.lineTo(bx-3*ui,bcy); ctx.stroke(); ctx.setLineDash([]);
        }
        const active = i===selected.reqIndex;
        ctx.globalAlpha = i<selected.reqIndex ? 0.3 : 1;
        rr(bx,y0+15*ui,bw2,22*ui,6*ui);
        ctx.fillStyle=active?hexa(c,.16):'rgba(127,155,176,.05)'; ctx.fill();
        ctx.lineWidth=1.5; ctx.strokeStyle=hexa(c,active?.9:.4);
        rr(bx,y0+15*ui,bw2,22*ui,6*ui); ctx.stroke();
        drawIcon(ty, bx+bw2/2, bcy, 8*ui, c, '#0f1d2b');
        ctx.globalAlpha=1;
      }
    }
  }

  function fmtTime(s){ const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(Math.floor(s%60)).padStart(2,'0'); return m+':'+ss; }
  function drawToast(){
    const a = toast.t<2.0 ? 1 : (2.4-toast.t)/0.4;
    const col = toast.good?COL.coin:COL.life;
    ctx.save(); ctx.globalAlpha=Math.max(0,a);
    ctx.font=`${12*ui}px ${MONO}`;
    const w=ctx.measureText(toast.text).width+44*ui, h=24*ui;
    const x=W/2-w/2, y=HUD_H()+12*ui;
    rr(x,y,w,h,12*ui); ctx.fillStyle='rgba(10,22,34,.92)'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.7);
    ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=10; rr(x,y,w,h,12*ui); ctx.stroke(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(x+13*ui,y+h/2,3.5*ui,0,7); ctx.fillStyle=col; ctx.fill();
    ctx.fillStyle=COL.paper; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(toast.text, x+26*ui, y+h/2);
    ctx.restore();
  }
  function boom(x,y){ effects.push({x,y,t:0,life:0.55,kind:'crash'}); }
  function nearMiss(x,y){ effects.push({x,y,t:0,life:0.5,kind:'near'}); }
  function drawEffects(dt){
    for(let i=effects.length-1;i>=0;i--){
      const e=effects[i]; e.t+=dt;
      const k=e.t/e.life;
      if(k>=1){ effects.splice(i,1); continue; }
      const a=1-k;
      ctx.save(); ctx.translate(e.x,e.y);
      if(e.kind==='near'){
        // near-miss «уфф»: мягкая двойная волна без искр и жести
        ctx.beginPath(); ctx.arc(0,0,(8+k*30)*ui,0,7);
        ctx.lineWidth=2.5*a+0.5; ctx.strokeStyle=hexa(COL.phosphor,.7*a); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,(4+k*18)*ui,0,7);
        ctx.lineWidth=2*a+0.5; ctx.strokeStyle=hexa(COL.amber,.55*a); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,7*(1-k)*ui,0,7); ctx.fillStyle=hexa('#ffffff',.5*a); ctx.fill();
        ctx.restore(); continue;
      }
      // ударная волна
      ctx.beginPath(); ctx.arc(0,0,(6+k*44)*ui,0,7);
      ctx.lineWidth=3*a+0.5; ctx.strokeStyle=hexa(COL.life,.6*a); ctx.stroke();
      // разлетающиеся искры
      for(let s2=0;s2<8;s2++){
        const ang=s2/8*Math.PI*2, d=(10+k*40)*ui;
        ctx.fillStyle=hexa(s2%2?COL.amber:COL.gold, a);
        ctx.beginPath(); ctx.arc(Math.cos(ang)*d,Math.sin(ang)*d,(2.5*a+1)*ui,0,7); ctx.fill();
      }
      // вспышка в центре
      ctx.beginPath(); ctx.arc(0,0,8*(1-k)*ui,0,7); ctx.fillStyle=hexa('#ffffff',.7*a); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }
  // плавающие награды: «+N ₿» при вылете, «−50%» при штрафе, «−N ₿» при краше
  function drawFloaters(dt){
    for(let i=floaters.length-1;i>=0;i--){
      const f=floaters[i]; f.t+=dt;
      const k=f.t/f.life;
      if(k>=1){ floaters.splice(i,1); continue; }
      ctx.globalAlpha=1-k*k;
      ctx.font=`600 ${13*ui}px ${MONO}`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=f.col; ctx.shadowColor=f.col; ctx.shadowBlur=8;
      ctx.fillText(f.text, f.x, f.y - k*26*ui);
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // ---- тихий туториал «покажи и дай сделать» ----
  // Ведём первый борт за руку: подсветка цели + подсказка одной строкой. Шаги
  // переключаются по факту действий игрока (сел → обслужил → на взлёт), без
  // модалок и стены текста. Прошёл один полный цикл — туториал больше не всплывает.
  function completeTutorial(){
    if(!tut) return;
    tut=null; save.tutorialDone=true; saveGame();
    toast={text:t('tut.done'), t:0, good:true};
  }
  function updateTutorial(){
    if(!tut || !tut.plane) return;
    const p=tut.plane;
    if(p.dead){ tut.plane=null; tut.step='land'; return; }   // разбился — учим на следующем
    if(tut.step==='land' && p.zone!=='air') tut.step='service';
    if(tut.step==='service' && curNeed(p)==='depart') tut.step='takeoff';
    // завершение — в depart(): полный цикл от посадки до вылета пройден
  }
  function tutTarget(){
    const p=tut.plane; if(!p) return null;
    if(tut.step==='service'){
      const need=curNeed(p);
      const bay=bays.find(b=>b.open && b.type===need);
      return bay ? {x:bay.x+bay.w/2, y:bay.y+bay.h/2} : null;
    }
    // land / takeoff — ближайшая открытая полоса
    let best=null, bd=1e9;
    for(const r of runways){ if(r.closed) continue; const d=Math.abs(p.y-r.cy); if(d<bd){bd=d;best=r;} }
    return best ? {x:best.x+best.w*0.5, y:best.cy} : null;
  }
  function drawTutorial(){
    if(!tut || !tut.plane || tut.plane.dead || paused) return;
    const p=tut.plane;
    if(p.zone==='bay') return;                 // обслуживается в боксе — просто ждём, без подсказок
    const target=tutTarget(); if(!target) return;
    const col=COL.phosphor;
    ctx.save();
    // путеводная пунктирная линия борт → цель
    ctx.setLineDash([8,9]); ctx.lineDashOffset=-nowT*0.04;
    ctx.lineWidth=2.5; ctx.strokeStyle=hexa(col,.5);
    ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(target.x,target.y); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur=0;
    // пульсирующее кольцо у цели
    const pr=0.5+0.5*Math.sin(nowT*0.005);
    ctx.beginPath(); ctx.arc(target.x,target.y,(14+pr*7)*ui,0,7);
    ctx.lineWidth=2.5; ctx.strokeStyle=hexa(col,.35+.45*pr); ctx.stroke();
    // «палец»: точка-касание едет от борта к цели по кругу — показывает жест
    const ph=(nowT*0.0006)%1, fx=p.x+(target.x-p.x)*ph, fy=p.y+(target.y-p.y)*ph;
    ctx.beginPath(); ctx.arc(fx,fy,7*ui,0,7); ctx.fillStyle=hexa(col,.85); ctx.fill();
    ctx.beginPath(); ctx.arc(fx,fy,11*ui,0,7); ctx.lineWidth=2; ctx.strokeStyle=hexa(col,.5); ctx.stroke();
    ctx.restore();
    // подсказка одной строкой — мягкая плашка внизу по центру
    let txt;
    if(tut.step==='service') txt=t('tut.service',{svc:t('svc.'+curNeed(p))});
    else if(tut.step==='takeoff') txt=t('tut.takeoff');
    else txt=t('tut.land');
    ctx.save();
    ctx.font=`${12.5*ui}px ${MONO}`;
    const w=ctx.measureText(txt).width+48*ui, h=30*ui;
    const x=W/2-w/2, y=H-h-(14*ui+safe.b);
    rr(x,y,w,h,12*ui); ctx.fillStyle='rgba(10,22,34,.92)'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.6);
    ctx.shadowColor=hexa(col,.4); ctx.shadowBlur=10; rr(x,y,w,h,12*ui); ctx.stroke(); ctx.shadowBlur=0;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=col; ctx.fillText('☞', x+14*ui, y+h/2);
    ctx.fillStyle=COL.paper; ctx.fillText(txt, x+36*ui, y+h/2);
    ctx.restore();
  }

  // сцена главного меню: радар с разверткой, дрейфующий борт, свечение горизонта
  function drawMenuScene(tm){
    ctx.fillStyle=COL.ink; ctx.fillRect(0,0,W,H);
    starfield(tm);
    const rx=W*0.74, ry=H*0.52, R=Math.min(W,H)*0.42;
    ctx.save(); ctx.translate(rx,ry);
    for(let i=1;i<=4;i++){ ctx.beginPath(); ctx.arc(0,0,R*i/4,0,7);
      ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,.08+i*0.01); ctx.stroke(); }
    ctx.strokeStyle=hexa(COL.phosphor,.07); ctx.lineWidth=1;
    for(let i=0;i<8;i++){ const a=i*Math.PI/4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R); ctx.stroke(); }
    ctx.save(); ctx.rotate(tm*0.0013);
    const grad=ctx.createLinearGradient(0,0,R,0);
    grad.addColorStop(0,hexa(COL.phosphor,.28)); grad.addColorStop(1,hexa(COL.phosphor,0));
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,-0.5,0); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill(); ctx.restore();
    [[0.55,1.1],[0.8,3.0],[0.35,4.6],[0.62,5.6]].forEach((b2,i)=>{
      const x=Math.cos(b2[1])*R*b2[0], y=Math.sin(b2[1])*R*b2[0];
      const f=0.4+0.6*Math.abs(Math.sin(tm*0.002+i));
      ctx.fillStyle=hexa(COL.phosphor,f); ctx.beginPath(); ctx.arc(x,y,2.5,0,7); ctx.fill();
    });
    ctx.restore();
    // дрейфующий борт по небу
    const px=((tm*0.025)%(W+240))-120, py=H*0.24+Math.sin(tm*0.0008)*14;
    drawPlaneBodyAt(px,py,Math.sin(tm*0.0008)*0.06,ui*0.6,false,false);
    // бирюзовое свечение горизонта
    const hg=ctx.createLinearGradient(0,H-120*ui,0,H);
    hg.addColorStop(0,'rgba(16,48,58,0)'); hg.addColorStop(1,hexa(COL.teal,.10));
    ctx.fillStyle=hg; ctx.fillRect(0,H-120*ui,W,120*ui);
    vignette();
  }

  function frame(ts){
    if(!lastTs)lastTs=ts;
    let dt=(ts-lastTs)/1000; lastTs=ts;
    if(dt>0.05)dt=0.05;
    nowT=ts;
    // лёгкое замедление времени на миг near-miss (таймер идёт в реальном
    // времени, замедляется только симуляция — вспышки/всплывашки тикают как обычно)
    let udt = dt;
    if(slowmo>0){ slowmo=Math.max(0, slowmo-dt); udt = dt*K.SLOWMO_SCALE; }
    if(running && !paused) update(udt);

    if(inMenu){
      drawMenuScene(ts);
    } else {
      drawField(ts);
      drawRunways(ts);
      if(LV.biome) drawForest(ts);
      bays.forEach(drawBay);
      planes.forEach(p=>{ if(!p.dead) drawPlane(p); });
      drawEffects(dt);
      vignette();
      drawFloaters(dt);
      drawHUD();
      if(tut) drawTutorial();
      if(toast){ toast.t+=dt; if(toast.t>2.4) toast=null; else drawToast(); }
    }
    requestAnimationFrame(frame);
  }

  function endLevel(reasonKey){          // reasonKey — ключ i18n (end.*)

    lastShift = {
      passed, stars, metric:LV.objective.metric, v, target:LV.objective.target,
      money, peak:statPeak, time:gameTime,

    };
    // карточка статистики смены

     [t('stats.peak'), '✈ '+fmtNum(statPeak), 'v-teal'],

    ].forEach(s2=>{

    document.getElementById('nextBtn').classList.toggle('hidden', !hasNext);
