    // график рисуем после показа экрана — нужен реальный размер канваса
    requestAnimationFrame(()=>renderStatGraph(document.getElementById('statGraph'), lastShift));
  }

  // ---- статистика смены: график во времени + карточка для шеринга ----
  // Рисуем в произвольный 2D-контекст (экранный канвас или офскрин для картинки):
  // область «нагрузка» (бирюза) + линия «принято» (золото) на общей оси времени.
  function drawTimeline(g, x, y, w, h, shift){
    const pad=10, gx=x+pad+18, gy=y+pad, gw=w-pad*2-18, gh=h-pad*2-14;
    g.fillStyle=hexa(COL.phosphor,.04); g.fillRect(x,y,w,h);
    // сетка
    g.strokeStyle=hexa(COL.phosphor,.10); g.lineWidth=1;
    for(let i=0;i<=3;i++){ const yy=gy+gh*i/3; g.beginPath(); g.moveTo(gx,yy); g.lineTo(gx+gw,yy); g.stroke(); }
    const s=shift.samples||[];
    if(s.length<2){
      g.fillStyle=hexa(COL.muted,.7); g.font=`11px ${MONO}`; g.textAlign='center'; g.textBaseline='middle';
      g.fillText('—', x+w/2, y+h/2); return;
    }
    const tMax=Math.max(shift.time, s[s.length-1].t, 1);
    const loadMax=Math.max(2, ...s.map(p=>p.load));
    const servMax=Math.max(1, ...s.map(p=>p.served));
    const X=t=>gx + gw*Math.min(1,t/tMax);
    const Yl=v=>gy+gh - gh*(v/loadMax);
    const Ys=v=>gy+gh - gh*(v/servMax);
    // нагрузка — заливка + линия
    g.beginPath(); g.moveTo(X(s[0].t), gy+gh);
    s.forEach(p=>g.lineTo(X(p.t), Yl(p.load))); g.lineTo(X(s[s.length-1].t), gy+gh); g.closePath();
    g.fillStyle=hexa(COL.teal,.16); g.fill();
    g.beginPath(); s.forEach((p,i)=>{ const fx=X(p.t),fy=Yl(p.load); i?g.lineTo(fx,fy):g.moveTo(fx,fy); });
    g.strokeStyle=COL.teal; g.lineWidth=2; g.lineJoin='round'; g.stroke();
    // принято — золотая линия (накопительно)
    g.beginPath(); s.forEach((p,i)=>{ const fx=X(p.t),fy=Ys(p.served); i?g.lineTo(fx,fy):g.moveTo(fx,fy); });
    g.strokeStyle=COL.gold; g.lineWidth=2; g.stroke();
    // подписи осей: пик нагрузки слева сверху, время справа снизу
    g.textBaseline='middle'; g.fillStyle=hexa(COL.teal,.9); g.font=`9px ${MONO}`; g.textAlign='right';
    g.fillText(String(loadMax), gx-4, gy+2);
    g.fillStyle=hexa(COL.muted,.8); g.textAlign='left'; g.textBaseline='alphabetic';
    g.fillText('0:00', gx, y+h-3); g.textAlign='right'; g.fillText(fmtTime(tMax), gx+gw, y+h-3);
    // легенда
    g.textAlign='left'; g.textBaseline='middle'; g.font=`9px ${MONO}`;
    g.fillStyle=COL.teal; g.fillRect(gx+2,gy+5,8,3); g.fillStyle=hexa(COL.muted,.9); g.fillText(t('graph.load'), gx+14, gy+6);
    const lx=gx+14+g.measureText(t('graph.load')).width+12;
    g.fillStyle=COL.gold; g.fillRect(lx,gy+5,8,3); g.fillStyle=hexa(COL.muted,.9); g.fillText(t('graph.served'), lx+12, gy+6);
  }
  function renderStatGraph(cv2, shift){
    if(!cv2 || !shift) return;
    const dpr=Math.min(window.devicePixelRatio||1, 2);
    const cssW=cv2.clientWidth||360, cssH=cv2.clientHeight||132;
    cv2.width=cssW*dpr; cv2.height=cssH*dpr;
    const g=cv2.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0);
    g.clearRect(0,0,cssW,cssH);
    drawTimeline(g, 0,0, cssW,cssH, shift);
  }
  // локальный скруглённый прямоугольник для офскрин-контекста (rr() завязан на ctx)
  function rrp(g,x,y,w,h,r){ r=Math.min(r,w/2,h/2);
    g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  // квадратная карточка для «поделиться картинкой»
  function drawShareCard(canvas, shift){
    const S=1080, g=canvas.getContext('2d');
    const grad=g.createLinearGradient(0,0,0,S);
    grad.addColorStop(0,'#0e2230'); grad.addColorStop(1,COL.ink);
    g.fillStyle=grad; g.fillRect(0,0,S,S);
    g.fillStyle=hexa(COL.phosphor,.06); for(let i=0;i<70;i++){ const rx=(i*173)%S, ry=(i*97)%S; g.fillRect(rx,ry,2,2); }
    // шапка
    g.textAlign='center';
    g.fillStyle=COL.phosphor; g.font=`700 64px ${MONO}`; g.fillText(t('app.name'), S/2, 130);
    g.fillStyle=hexa(COL.muted,.9); g.font=`24px ${MONO}`;
    g.fillText((shift.passed?t('over.passed'):t('over.failed'))+' · '+shift.levelName, S/2, 178);
    // звёзды
    g.fillStyle=COL.gold; g.font=`80px ${MONO}`; g.shadowColor=hexa(COL.gold,.5); g.shadowBlur=24;
    g.fillText('★'.repeat(shift.stars)+'☆'.repeat(3-shift.stars), S/2, 290); g.shadowBlur=0;
    // плитки статистики 2×2
    const tiles=[
      [shift.metric==='upgrades'?t('stats.upgrades'):t('stats.served'), fmtNum(shift.v)+' / '+fmtNum(shift.target), COL.phosphor],
      [t('stats.money'), fmtMoney(shift.money), COL.gold],
      [t('stats.peak'), '✈ '+fmtNum(shift.peak), COL.teal],
      [t('stats.time'), fmtTime(shift.time), COL.phosphor],
    ];
    const tw=440, th=120, gap=40, ox=(S-tw*2-gap)/2, oy=340;
    tiles.forEach((tl,i)=>{ const cx=ox+(i%2)*(tw+gap), cy=oy+Math.floor(i/2)*(th+gap);
      rrp(g,cx,cy,tw,th,18); g.fillStyle=hexa(COL.phosphor,.05); g.fill();
      g.lineWidth=2; g.strokeStyle=hexa(COL.phosphor,.15); rrp(g,cx,cy,tw,th,18); g.stroke();
      g.textAlign='left'; g.textBaseline='alphabetic';
      g.fillStyle=hexa(COL.muted,.85); g.font=`20px ${MONO}`; g.fillText(tl[0].toUpperCase(), cx+26, cy+44);
      g.fillStyle=tl[2]; g.font=`600 46px ${MONO}`; g.fillText(tl[1], cx+26, cy+98);
    });
    // график во времени
    g.textAlign='left'; g.textBaseline='alphabetic';
    g.fillStyle=hexa(COL.muted,.85); g.font=`20px ${MONO}`; g.fillText(t('graph.title').toUpperCase(), ox, 700);
    // drawTimeline использует пиксельные шрифты ~9-11px → масштабируем контекст
    g.save(); g.translate(ox, 720); g.scale(2.4,2.4);
    drawTimeline(g, 0,0, (tw*2+gap)/2.4, 230/2.4, shift); g.restore();
    g.textAlign='center'; g.fillStyle=hexa(COL.phosphor,.5); g.font=`22px ${MONO}`;
    g.fillText('#PlaneFlow', S/2, S-46);
  }
  async function shareShift(){
    if(!lastShift) return;
    const card=document.createElement('canvas'); card.width=1080; card.height=1080;
    drawShareCard(card, lastShift);
    card.toBlob(async blob=>{
      if(!blob) return;
      const file=new File([blob], 'planeflow-shift.png', {type:'image/png'});
      try{
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:t('app.name')}); return;
        }
      }catch(e){ /* отмена/нет поддержки — падаем в скачивание */ }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='planeflow-shift.png'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }, 'image/png');
  }

  // ---- меню / уровни / сохранение ----
  function loadGame(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)) || JSON.parse(localStorage.getItem(LEGACY_SAVE_KEY)); if(s&&typeof s==='object'){ save.unlocked=s.unlocked||1; save.best=s.best||{}; save.stars=s.stars||{}; save.lang=(s.lang&&I18N[s.lang])?s.lang:null; save.ach=Array.isArray(s.ach)?s.ach:[]; save.stats=(s.stats&&typeof s.stats==='object')?s.stats:{}; save.sound=s.sound!==false; save.vibro=s.vibro!==false; save.tutorialDone=!!s.tutorialDone; } }catch(e){} }
  function saveGame(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }
  // язык, медали (ach/stats) и звук/вибро — не прогресс уровней, сохраняем при сбросе
  // сброс прогресса заодно возвращает туториал — новый игрок снова увидит обучение
  function resetProgress(){ save={unlocked:1,best:{},stars:{},lang:save.lang,ach:save.ach||[],stats:save.stats||{},sound:save.sound!==false,vibro:save.vibro!==false,tutorialDone:false}; saveGame(); renderLevels(); }
  function buildLevel(idx){ curBiome=null; levelIdx=idx; levelKey=idx; LV=LEVELS[idx]; bays=[]; runways=[]; layout(); }
  function buildBiome(b){ curBiome=b; levelIdx=-1; levelKey='b_'+b.id; LV=b.level; bays=[]; runways=[]; layout(); }
  function hideAllScreens(){ ['startScreen','levelScreen','biomeScreen','overScreen','pauseScreen','settingsPanel','settingsScreen','medalScreen','goalsScreen'].forEach(s=>document.getElementById(s).classList.add('hidden')); }
  function showLevels(){ inMenu=true; renderLevels(); hideAllScreens(); document.getElementById('levelScreen').classList.remove('hidden'); }
  function startLevel(idx){ zen=false; buildLevel(idx); hideAllScreens(); reset(); }
  function startZen(){ zen=true; buildLevel(0); hideAllScreens(); reset(); }
  // карты биомов: отдельный экран выбора (доступен из главного меню)
  function showBiomes(){ inMenu=true; renderBiomes(); hideAllScreens(); document.getElementById('biomeScreen').classList.remove('hidden'); }

        `<div class="lvkick">${t('biome.'+b.id+'.name')}</div>`+
        `<div class="biotag">${t('biome.'+b.id+'.tag')}</div>`+
        `<div class="lvstars">${foot}</div>`;

  function renderLevels(){
    const list=document.getElementById('levelList'); list.innerHTML='';
    LEVELS.forEach((lv,i)=>{
      const unlocked = i < save.unlocked, stars=save.stars[i]||0;
      const b=document.createElement('button');
      b.className='levelcard'+(unlocked?'':' locked');
      const starsHtml = unlocked
        ? ('★'.repeat(stars)+'☆'.repeat(3-stars))
        : ('🔒 '+t('levels.locked'));
      b.innerHTML=`<div class="lvkick">${t('levels.shift')}</div>`+
        `<div class="lvnum">${String(i+1).padStart(2,'0')}</div>`+
        (unlocked ? `<div class="lvname">${levelName(i)}</div>` : '')+
        `<div class="lvstars">${starsHtml}</div>`;
      if(unlocked) b.onclick=()=>startLevel(i);
      list.appendChild(b);
    });
  }

  // ---- полноэкранный режим (для телефона: убирает прокрутку и адресную строку) ----
  function lockLandscape(){
    try{ if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){}
  }
  function inFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFullscreen(){
    const el = document.documentElement;
    if(!inFullscreen()){
      const req = el.requestFullscreen || el.webkitRequestFullscreen;   // iOS Safari не поддерживает fullscreen для div — там помогает «Добавить на экран»
      if(req){ try{ const r = req.call(el); if(r && r.then) r.then(lockLandscape).catch(()=>{}); else lockLandscape(); }catch(e){} }
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if(exit){ try{ exit.call(document); }catch(e){} }
    }
  }
  ['fsBtn','fsBtn2'].forEach(id=>{ const b=document.getElementById(id); if(b) b.onclick=toggleFullscreen; });
  ['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev, ()=>{ if(inFullscreen()) lockLandscape(); resize(); }));

  document.getElementById('startBtn').onclick=showLevels;
  document.getElementById('zenBtn').onclick=startZen;
  document.getElementById('backBtn').onclick=()=>{ hideAllScreens(); document.getElementById('startScreen').classList.remove('hidden'); };
  document.getElementById('resetProgBtn').onclick=resetProgress;
  document.getElementById('againBtn').onclick=()=>{ document.getElementById('overScreen').classList.add('hidden'); reset(); };
  function backToSelect(){ if(curBiome) showBiomes(); else showLevels(); }
  document.getElementById('toLevelsBtn').onclick=backToSelect;
  document.getElementById('biomesBtn').onclick=showBiomes;
  document.getElementById('biomesBackBtn').onclick=()=>{ hideAllScreens(); document.getElementById('startScreen').classList.remove('hidden'); };
  document.getElementById('nextBtn').onclick=()=>{ if(levelIdx+1<LEVELS.length) startLevel(levelIdx+1); };
  document.getElementById('shareBtn').onclick=shareShift;

  function setPaused(p){
    paused=p;
    if(p) ACH.onPause();
    document.getElementById('pauseScreen').classList.toggle('hidden', !p);
    if(!p) document.getElementById('settingsPanel').classList.add('hidden');
    else refreshLog();
  }
  function refreshLog(){
    const box=document.getElementById('logBox');
    if(!lossLog.length){ box.innerHTML=`<div class="logrow muted">${t('log.empty')}</div>`; return; }
    box.innerHTML=lossLog.slice().reverse().map(l=>`<div class="logrow">${fmtTime(l.t)} — ${t(l.reason)}</div>`).join('');
  }
  document.getElementById('resumeBtn').onclick=()=>setPaused(false);
  document.getElementById('restartBtn').onclick=()=>reset();
  document.getElementById('settingsBtn').onclick=()=>{
    document.getElementById('settingsPanel').classList.toggle('hidden'); refreshLog();
  };
  document.getElementById('menuBtn').onclick=()=>{
    recordResult(); running=false; paused=false; ACH.flushToasts(); backToSelect();
  };
  document.getElementById('optLives').onchange=e=>{ debug.infiniteLives=e.target.checked; };
  document.getElementById('optMoney').onchange=e=>{ debug.richStart=e.target.checked; if(debug.richStart) money=BIG_MONEY; };
  // звук/вибро живут и в паузе, и в настройках стартового меню — держим обе копии чекбоксов в синхроне
  function syncSettingsUI(){
    ['optSound','optSound2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.checked=save.sound!==false; });
    ['optVibro','optVibro2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.checked=save.vibro!==false; });
  }
  function setSound(on){ save.sound=on; saveGame(); SND.setEnabled(on); syncSettingsUI(); }
  function setVibro(on){ save.vibro=on; saveGame(); HAP.on=on; syncSettingsUI(); }
  ['optSound','optSound2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.onchange=ev=>setSound(ev.target.checked); });
  ['optVibro','optVibro2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.onchange=ev=>setVibro(ev.target.checked); });

  // настройки из стартового меню (звук / язык / сброс прогресса)
  function openSettings(){ inMenu=true; syncSettingsUI(); renderLangBtns(); hideAllScreens();
    document.getElementById('settingsScreen').classList.remove('hidden'); }
  document.getElementById('settingsMenuBtn').onclick=openSettings;
  document.getElementById('settingsBackBtn').onclick=()=>{ hideAllScreens(); document.getElementById('startScreen').classList.remove('hidden'); };
  document.getElementById('resetProgBtn2').onclick=resetProgress;

  // ---- окно постановки целей смены ----
  // Показывается в начале каждого раунда (на паузе), а также по кнопке «Цели» в
  // паузе. Закрыть: «Понятно» или тап мимо карточки. Звёзды: 1★ цель, 2★ без
  // наземных штрафов, 3★ без крушений (см. computeStars). В Zen — текст без звёзд.
  let goalsFromPause=false;
  function buildGoalsContent(){
    document.getElementById('goalsKicker').textContent = t('goals.kicker');
    document.getElementById('goalsTitle').textContent = currentLevelName();
    const body=document.getElementById('goalsBody');
    if(zen){ body.innerHTML = `<p class="goalzen">${t('goals.zen')}</p>`; return; }
    const rows=[['★', objectiveDesc()], ['★★', t('goals.star2')], ['★★★', t('goals.star3')]];
    if(LV.biome) rows.push(['🌲', t('biome.'+LV.biome+'.hint')]);
    body.innerHTML = rows.map(r=>`<div class="goalrow"><div class="gs">${r[0]}</div><div class="gt">${r[1]}</div></div>`).join('');
  }
  function showGoals(fromPause){
    goalsFromPause=!!fromPause;
    paused=true;                       // заморозить симуляцию, пока окно открыто
    buildGoalsContent();
    if(fromPause) document.getElementById('pauseScreen').classList.add('hidden');
    document.getElementById('goalsScreen').classList.remove('hidden');
  }
  function closeGoals(){
    document.getElementById('goalsScreen').classList.add('hidden');
    if(goalsFromPause) document.getElementById('pauseScreen').classList.remove('hidden'); // вернуться в паузу
    else paused=false;                 // продолжить игру
    goalsFromPause=false;
  }
  document.getElementById('goalsOk').onclick=closeGoals;
  document.getElementById('goalsScreen').addEventListener('pointerdown', e=>{ if(e.target.id==='goalsScreen') closeGoals(); }); // тап мимо карточки
  document.getElementById('goalsBtn').onclick=()=>showGoals(true);

  // ================= ДОСТИЖЕНИЯ / МЕДАЛИ =================
  // Самодостаточный модуль: ловит игровые события через ACH.onX(...), копит
  // прогресс в save.ach (список открытых) и save.stats (накопительные счётчики).
  // Шум ограничен: максимум 2 медали за раунд, всплывашки не чаще раза в минуту
  // (см. RUN_CAP/TOAST_GAP_MS); во всплывашке — название и за что дана.
  // ⏳ pending:true — медали под фичи, которых пока нет (бесконечный режим, Daily) —
  // крючки есть, но в текущих уровнях не срабатывают и не нужны для «Легенды».
  const ACH = (() => {
    // анти-шум: не больше RUN_CAP медалей за раунд (остальные придут в следующих
    // сменах — условия перепроверяются), уведомления не чаще TOAST_GAP_MS
    const RUN_CAP=2, TOAST_GAP_MS=60000, TOAST_SHOW_MS=4000;
    const S = { ach:[], stats:{landed:0,services:0,departed:0,earned:0,vip:0,noCrashStreak:0,perfect:0} };
    let unlocked = new Set();
    let run = null;
    function newRun(){ run = {landed:0,services:0,departed:0,opens:0,upgrades:0,peakAir:0,
      landTimes:[], types:new Set(), debug:false, time:0, given:0}; }
    newRun();

    const defs = [
      // --- Тир 1: лайтовые ---
      {id:'land1',   tier:1, ic:'🛬'},
      {id:'svc1',    tier:1, ic:'🧰'},
      {id:'takeoff1',tier:1, ic:'🛫'},
      {id:'money1',  tier:1, ic:'🪙'},
      {id:'bayopen1',tier:1, ic:'🏗️'},
      {id:'upg1',    tier:1, ic:'⬆️'},
      {id:'pause',   tier:1, ic:'⏸️'},
      {id:'level1',  tier:1, ic:'✅'},
      {id:'vip1',    tier:1, ic:'💛'},
      {id:'land10',  tier:1, ic:'🎓', prog:S=>[S.landed,10]},
      // --- Тир 2: обычные ---
      {id:'land100', tier:2, ic:'🌊', prog:S=>[S.landed,100]},
      {id:'svc100',  tier:2, ic:'🔧', prog:S=>[S.services,100]},
      {id:'earn1000',tier:2, ic:'💵', prog:S=>[S.earned,1000]},
      {id:'fullchain',tier:2,ic:'🎯'},
      {id:'nopenalty',tier:2,ic:'🧊'},
      {id:'nolife',  tier:2, ic:'❤️'},
      {id:'air5',    tier:2, ic:'🛫'},
      {id:'star3',   tier:2, ic:'🌟'},
      {id:'vip25',   tier:2, ic:'💼', prog:S=>[S.vip,25]},
      {id:'baymax',  tier:2, ic:'🛠️'},
      // --- Тир 3: сложные ---
      {id:'nocrash', tier:3, ic:'☁️'},
      {id:'perfect', tier:3, ic:'💎'},
      {id:'air8',    tier:3, ic:'🤹'},
      {id:'speed20', tier:3, ic:'⚡'},
      {id:'minimalist',tier:3,ic:'🪨'},
      {id:'millionaire',tier:3,ic:'💰', prog:S=>[S.earned,1000000]},
      {id:'combo10', tier:3, ic:'🔥'},
      {id:'marathon',tier:3, ic:'🏃', pending:true},
      // --- Тир 4: задротские ---
      {id:'streak1000',tier:4,ic:'🧠', prog:S=>[S.noCrashStreak,1000]},
      {id:'land10000',tier:4,ic:'🎖️', prog:S=>[S.landed,10000]},
      {id:'all3star',tier:4, ic:'⭐'},
      {id:'ascetic', tier:4, ic:'🧘'},
      {id:'perfectionist',tier:4,ic:'🥇', prog:S=>[S.perfect,10]},
      {id:'daily7',  tier:4, ic:'📅', pending:true},
      {id:'sleepless',tier:4,ic:'🌙', pending:true},
      {id:'zen500',  tier:4, ic:'🧘', pending:true},
      {id:'combo50', tier:4, ic:'🔥', pending:true},
      {id:'legend',  tier:4, ic:'🛐'},
      // --- Тир 5: секретные / фановые (скрыты до получения) ---
      {id:'crash10s',tier:5, ic:'💥', hidden:true},
      {id:'asleep',  tier:5, ic:'😴', hidden:true},
      {id:'crashbay',tier:5, ic:'🅿️', hidden:true},
      {id:'crashrw', tier:5, ic:'💢', hidden:true},
      {id:'groundto',tier:5, ic:'⌛', hidden:true},
      {id:'moneyneg',tier:5, ic:'🤑', hidden:true},
      {id:'longshift',tier:5,ic:'🕰️', hidden:true, pending:true},
      {id:'zoo',     tier:5, ic:'🦁', hidden:true},
    ];

    function persist(){ save.ach=[...unlocked]; save.stats=S.stats; saveGame(); }
    // Третья и далее медаль за раунд СГОРАЕТ: отложенной выдачи нет, в новом раунде
    // «за прошлое» ничего не приходит. Одноразовые (за 1 действие) можно получить,
    // только совершив действие заново; накопительные прогресса не теряют
    // (save.stats растёт) и придут при следующем срабатывании счётчика.
    function give(id){
      if(unlocked.has(id)) return;
      if(run.given>=RUN_CAP) return;
      const d=defs.find(x=>x.id===id); if(!d) return;
      run.given++;
      unlocked.add(id); persist(); toastAch(d);
      checkLegend();
    }
    function checkLegend(){
      if(unlocked.has('legend')) return;
      const need=defs.filter(x=>x.id!=='legend' && !x.pending);
      if(need.every(x=>unlocked.has(x.id))) give('legend');
    }

    // всплывашка: очередь, по одной, не чаще раза в минуту; на границе раундов
    // остаток очереди показывается сразу (flushToasts) — в новый раунд не утекает
    let q=[], showing=false, lastShown=-1e9, gapTimer=null;
    function toastAch(d){ q.push(d); if(!showing) pump(); }
    function pump(){
      const el=document.getElementById('achToast');
      if(!q.length){ showing=false; return; }
      showing=true;
      const wait = lastShown + TOAST_GAP_MS - performance.now();
      if(wait>0){ gapTimer=setTimeout(()=>{ gapTimer=null; pump(); }, wait); return; }
      lastShown = performance.now();
      const d=q.shift();
      document.getElementById('achIc').textContent=d.ic;
      document.getElementById('achTtl').textContent=t('ach.'+d.id+'.t');
      document.getElementById('achDsc').textContent=t('ach.'+d.id+'.d');
      SND.medal();
      el.classList.add('show');
      setTimeout(()=>{ el.classList.remove('show'); setTimeout(pump, 360); }, TOAST_SHOW_MS);
    }
    function flushToasts(){
      lastShown=-1e9;
      if(gapTimer){ clearTimeout(gapTimer); gapTimer=null; pump(); }
    }

    return {
      defs,
      init(){ S.ach=Array.isArray(save.ach)?save.ach:[]; Object.assign(S.stats, save.stats||{}); unlocked=new Set(S.ach); },
      onLevelStart(){ flushToasts(); newRun(); },   // рестарт посреди раунда: недопоказанное — сразу, хвостов нет
      onPlaneTouched(pl){ if(pl) pl.everTouched=true; },
      onPause(){ give('pause'); },
      onLand(){
        S.stats.landed++; run.landed++; S.stats.noCrashStreak++;
        run.landTimes.push(gameTime);
        give('land1');
        if(S.stats.landed>=10) give('land10');
        if(S.stats.landed>=100) give('land100');
        if(S.stats.landed>=10000) give('land10000');
        if(S.stats.noCrashStreak>=1000) give('streak1000');
        if(run.landed>=500) give('zen500');
        const cut=gameTime-60; while(run.landTimes.length && run.landTimes[0]<cut) run.landTimes.shift();
        if(run.landTimes.length>=20) give('speed20');
      },
      onService(){ S.stats.services++; run.services++; give('svc1'); if(S.stats.services>=100) give('svc100'); },
      onDepart(pl, pay){
        S.stats.departed++; run.departed++; S.stats.earned+=Math.max(0,pay);
        run.types.add(pl.emergency?'emg':(pl.vip?'vip':'std'));
        give('takeoff1'); if(S.stats.earned>=1) give('money1');
        if(S.stats.earned>=1000) give('earn1000');
        if(S.stats.earned>=1000000) give('millionaire');
        if(pl.vip){ S.stats.vip++; give('vip1'); if(S.stats.vip>=25) give('vip25'); }
        if(pl.nSvc>=2) give('fullchain');
        if(combo>=10) give('combo10');
        if(combo>=50) give('combo50');
        if(run.types.has('std')&&run.types.has('vip')&&run.types.has('emg')) give('zoo');
        persist();
      },
      onBayOpen(){ run.opens++; give('bayopen1'); },
      onBayUpgrade(b){ run.upgrades++; give('upg1'); if(b.lvl>=K.BAY_MAX_LVL) give('baymax'); },
      onGroundTimeout(){ give('groundto'); },
      onCrash(pl, reason){
        S.stats.noCrashStreak=0; persist();
        if(gameTime<10) give('crash10s');
        if(reason==='loss.collisionBay') give('crashbay');
        if(reason==='loss.collisionRunway') give('crashrw');
        if(reason==='loss.airTimeout' && !pl.everTouched) give('asleep');
      },
      onTick(dt){
        if(debug.infiniteLives||debug.richStart) run.debug=true;
        run.time+=dt;
        let air=0; for(const p of planes) if(!p.dead && p.zone==='air') air++;
        if(air>run.peakAir) run.peakAir=air;
        if(run.peakAir>=5) give('air5');
        if(run.peakAir>=8) give('air8');
        if(money<0) give('moneyneg');
        if(run.time>=900) give('marathon');
        if(run.time>=1800) give('longshift');
        if(run.time>=3600) give('sleepless');
      },
      onLevelEnd(passed, stars, livesFull){
        const clean=!run.debug;
        if(passed){
          give('level1');
          if(clean && livesFull) give('nolife');
          if(clean && runPenalties===0) give('nopenalty');
          if(clean && runCrashes===0) give('nocrash');
          if(clean && run.opens===0) give('minimalist');
        }
        if(stars>=3){
          give('star3');
          if(clean && livesFull) give('perfect');
          if(clean && run.opens===0 && run.upgrades===0) give('ascetic');
          S.stats.perfect++; if(S.stats.perfect>=10) give('perfectionist');
          let all=LEVELS.length>0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)<3) all=false;
          if(all) give('all3star');
        } else {
          S.stats.perfect=0;
        }
        persist();
        checkLegend();    // «Легенда» (вся коллекция) — на итогах раунда, не посреди игры
        flushToasts();    // остаток уведомлений — на экран итогов, в новый раунд не утекает
      },
      flushToasts,
      list(){
        const out=[];
        for(const d of defs){
          let prog=null;
          if(d.prog) prog=d.prog(S.stats);
          else if(d.id==='all3star'){ let c=0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)>=3)c++; prog=[c,LEVELS.length]; }
          else if(d.id==='legend'){ const tot=defs.filter(x=>x.id!=='legend'&&!x.pending); prog=[tot.filter(x=>unlocked.has(x.id)).length, tot.length]; }
          out.push({id:d.id,tier:d.tier,ic:d.ic,title:t('ach.'+d.id+'.t'),desc:t('ach.'+d.id+'.d'),hidden:!!d.hidden,pending:!!d.pending,got:unlocked.has(d.id),prog});
        }
        return out;
      },
    };
  })();

  // ---- экран медалей ----
  let medalFrom='start';
  function renderMedals(){
    const list=ACH.list();
    document.getElementById('medalCount').textContent =
      t('medals.count', {got:list.filter(m=>m.got).length, total:list.length});
    const grid=document.getElementById('medalGrid'); grid.innerHTML='';
    for(const tier of [1,2,3,4,5]){
      const head=document.createElement('div'); head.className='tierhead';
      head.textContent=t('medals.tier'+tier); grid.appendChild(head);
      for(const m of list.filter(x=>x.tier===tier)){
        const masked = m.hidden && !m.got;             // секретная и ещё не открыта
        const el=document.createElement('div');
        el.className='medal'+(m.got?' got':' locked');
        const ic = masked ? '❔' : m.ic;
        const title = masked ? t('medals.secretTitle') : m.title;
        let desc = masked ? t('medals.secretDesc') : m.desc;
        if(m.pending && !m.got && !masked) desc += t('medals.pendingNote');
        let prog='';
        if(m.prog && !m.got && !masked){
          const c=Math.min(m.prog[0],m.prog[1]);
          prog=`<div class="mp">${fmtNum(c)} / ${fmtNum(m.prog[1])}</div>`;
        }
        el.innerHTML=`<div class="ic">${ic}</div><div><div class="mt">${title}</div><div class="md">${desc}</div>${prog}</div>`;
        grid.appendChild(el);
      }
    }
  }
  function openMedals(from){ medalFrom=from||'start'; renderMedals(); hideAllScreens();
    document.getElementById('medalScreen').classList.remove('hidden'); }
  document.getElementById('medalsBtn').onclick=()=>openMedals('start');
  document.getElementById('medalsBtn2').onclick=()=>openMedals('levels');
  document.getElementById('medalsBackBtn').onclick=()=>{
    hideAllScreens();
    if(medalFrom==='levels') showLevels();
    else document.getElementById('startScreen').classList.remove('hidden');
  };

  loadGame();
  saveGame();                         // миграция: сейв сразу переезжает под новый ключ
  ACH.init();
  lang = save.lang || detectLang();   // сохранённый выбор > автоопределение > en
  applyI18n();
  // мягкая самопроверка конфига при загрузке: в dev сразу видно в консоли, если
  // новая механика/уровень нарушили правила (жёстко это же проверяют тесты)
  try{ const _pr = validateGame(); if(_pr.length) console.error('[PlaneFlow] проблемы конфига:\n  '+_pr.join('\n  ')); }catch(e){ console.error(e); }
  SND.setEnabled(save.sound!==false); HAP.on = save.vibro!==false;
  syncSettingsUI();
  document.getElementById('ver').textContent=VERSION;
  resize();
  requestAnimationFrame(frame);

  // ---- тест-API (только при ?test=1) ----
  // Даёт тестам дотянуться до чистой логики и до путей завершения уровня без
  // рефактора всей игры и без хрупкой имитации перетаскивания. В обычном запуске
  // (без ?test=1) ничего не выставляется — прод-поведение не меняется.
  if(typeof location!=='undefined' && /[?&]test=1(?:&|$)/.test(location.search)){
    window.__GAME = {
      VERSION, LEVELS, BIOMES, K, I18N, SVC, DEFAULT_LANG, EVENT_KEYS, SVC_TYPES, WEATHER_KINDS,
      t, levelEvents, levelName, objectiveDesc, computeStars, metricValue,
      dayCycle, weatherTaxiMult, neededCrew,
      get nightAmount(){ return nightAmount; }, get weather(){ return weather; },
      validateGame, validateLevels, validateI18n, validateConfig,
      saveGame, loadGame, setLang, detectLang,
      get save(){ return save; },     set save(v){ save=v; },
      get lang(){ return lang; },
      get levelIdx(){ return levelIdx; },
      get zen(){ return zen; },        set zen(v){ zen=v; },
      // выставить текущий уровень кампании (levelKey=индекс — как в buildLevel)
      setLevel(i){ levelIdx=i; levelKey=i; LV=LEVELS[i]; },
      // прогон РЕАЛЬНОГО пути завершения смены: выставляем результат и зовём те же
      // computeStars()/recordResult(), что и в игре — проверяем звёзды, открытие
      // следующего уровня и сохранение, не трогая отрисовку и ввод.
      simulateResult(opts){
        opts = opts || {};
        zen = false;
        levelIdx = opts.level||0; levelKey = levelIdx; LV = LEVELS[levelIdx];
        served = opts.served||0; upgradesDone = opts.upgrades||0;
        runPenalties = opts.penalties||0; runCrashes = opts.crashes||0;
        const stars = computeStars(); recordResult();
        return { stars, unlocked: save.unlocked, best: save.best[levelKey], saved: save.stars[levelKey] };
      },
    };
  }
})();
</script>
