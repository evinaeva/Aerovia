<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PlaneFlow</title>
<style>
  /* ===== облик «ночной радар» (см. CHANGELOG 0.10) ===== */
  :root{
    --ink:#0a1622;
    --tarmac:#1b2530;
    --tarmac-2:#222e3b;
    --water:#10303a;
    --grid:#13354a;
    --phosphor:#bfe9ff;
    --paper:#e9e6dc;
    --muted:#7f9bb0;
    --amber:#f4a259;   /* ремонт */
    --teal:#4ecdc4;    /* топливо */
    --ice:#7fd6ff;     /* де-айсинг */
    --rose:#ef798a;    /* посадка людей */
    --gold:#f4cf5e;    /* вип / деньги / вылет */
    --life:#ef5365;
    --coin:#f4cf5e;
    --panel:rgba(16,26,38,.96);
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#060b12;overflow:hidden;overscroll-behavior:none;position:fixed;width:100%;inset:0}
  body{
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    color:var(--paper);
    user-select:none;-webkit-user-select:none;
  }
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;touch-action:none;display:block}

  .overlay{
    position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:radial-gradient(120% 90% at 50% 40%, rgba(6,11,18,.55), rgba(6,11,18,.92));
    backdrop-filter:blur(2px);z-index:5;
  }
  /* меню: сцена-радар на канвасе видна целиком */
  #startScreen{background:none;backdrop-filter:none}
  .panel{text-align:center;padding:30px 26px;max-width:420px;margin:auto;flex:0 0 auto}
  .panel.wide{max-width:740px}
  .panel.card{background:var(--panel);border:1.5px solid rgba(191,233,255,.2);border-radius:16px}
  .panel .kicker{font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase}
  .panel h1{
    font-family:var(--serif);font-weight:400;
    font-size:46px;letter-spacing:.04em;margin:12px 0 6px;color:var(--phosphor);
    text-shadow:0 0 26px rgba(191,233,255,.45);
  }
  .panel p{font-size:13px;line-height:1.7;color:var(--muted);margin:10px 0 0}
  .panel .big{font-size:48px;margin:8px 0 0;letter-spacing:.02em}
  #finalStars{color:var(--gold);font-size:52px;letter-spacing:.08em;text-shadow:0 0 24px rgba(244,207,94,.5)}
  .btn{
    display:inline-block;cursor:pointer;
    border:1.5px solid rgba(191,233,255,.32);color:var(--paper);
    background:rgba(127,155,176,.06);
    font:inherit;font-size:13px;letter-spacing:.12em;text-transform:uppercase;
    padding:13px 22px;border-radius:10px;transition:.15s;
  }
  .btn:hover{color:var(--phosphor);border-color:rgba(191,233,255,.7);background:rgba(191,233,255,.12)}
  .btn-primary{background:var(--phosphor);border-color:var(--phosphor);color:var(--ink);box-shadow:0 0 16px rgba(191,233,255,.35)}
  .btn-primary:hover{background:var(--phosphor);color:var(--ink);box-shadow:0 0 26px rgba(191,233,255,.55)}
  .btn-teal{border-color:rgba(78,205,196,.45);color:var(--teal)}
  .btn-teal:hover{color:var(--teal);border-color:var(--teal);background:rgba(78,205,196,.10)}
  .btn-rose{border-color:rgba(239,121,138,.45);color:var(--rose)}
  .btn-rose:hover{color:var(--rose);border-color:var(--rose);background:rgba(239,121,138,.10)}
  .btn-quiet{border-color:rgba(127,155,176,.35);color:var(--muted)}
  .bglyph{margin-right:7px}
  .ctarow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  .hidden{display:none}
  .settings{margin-top:16px;text-align:left}
  .opt{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--paper);margin:12px 0;letter-spacing:.04em;cursor:pointer;text-transform:none}
  .opt input{width:16px;height:16px;accent-color:var(--phosphor)}
  .logbox{margin-top:14px;max-height:130px;overflow:auto;border-top:1px solid rgba(127,155,176,.25);padding-top:8px}
  .logrow{font-size:11px;color:var(--paper);padding:2px 0;letter-spacing:.03em}
  .logrow.muted{color:var(--muted)}
  .pausegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .pausegrid .btn{width:100%}
  /* выбор смены — карточки */
  .levellist{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0 8px}
  .levelcard{position:relative;overflow:hidden;text-align:left;font:inherit;color:var(--paper);cursor:pointer;
    background:#1e2a35;border:1.5px solid rgba(191,233,255,.2);border-radius:14px;padding:14px 16px;transition:.15s}
  .levelcard::after{content:"";position:absolute;right:-26px;bottom:-26px;width:84px;height:84px;
    border:1.5px solid rgba(191,233,255,.07);border-radius:50%}
  .levelcard:hover{border-color:rgba(191,233,255,.6);background:#243140;box-shadow:0 0 16px rgba(191,233,255,.25)}
  .levelcard.locked{background:#141b23;border-color:rgba(127,155,176,.2);color:var(--muted);cursor:default}
  .levelcard.locked:hover{border-color:rgba(127,155,176,.2);background:#141b23;box-shadow:none}
  .levelcard .lvkick{font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}
  .levelcard .lvnum{font-family:var(--serif);font-size:38px;line-height:1.1;margin:4px 0 2px}
  .levelcard .lvname{font-family:var(--serif);font-size:12px;color:var(--paper);opacity:.85;margin:0 0 6px;line-height:1.15}
  .levelcard .lvstars{font-size:14px;color:var(--gold);letter-spacing:.12em;text-shadow:0 0 10px rgba(244,207,94,.45)}
  .levelcard.locked .lvstars{color:var(--muted);text-shadow:none;font-size:10px;letter-spacing:.2em;text-transform:uppercase}
  .biomecard{min-height:120px}
  .biomecard .bioemoji{font-size:30px;line-height:1}
  .biomecard .lvkick{font-size:13px;letter-spacing:.06em;text-transform:none;color:var(--paper);margin-top:6px}
  .biomecard .biotag{font-size:10.5px;line-height:1.5;color:var(--muted);margin:4px 0 8px}
  .biomecard.locked .bioemoji{filter:grayscale(1);opacity:.55}
  /* статистика на экране итога */
  .stats{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:18px;padding:14px 18px;
    border:1.5px solid rgba(191,233,255,.15);border-radius:14px;background:rgba(10,22,34,.6)}
  .stat{text-align:left}
  .stat .label{font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  .stat .val{font-size:17px;margin-top:4px}
  .v-phos{color:var(--phosphor)} .v-gold{color:var(--gold)} .v-life{color:var(--life)} .v-teal{color:var(--teal)}
  /* график нагрузки/принято на экране итога смены */
  .statgraph{width:100%;height:132px;margin-top:16px;display:block;border-radius:14px;
    border:1.5px solid rgba(191,233,255,.15);background:rgba(10,22,34,.6)}
  .langbtns{display:flex;gap:8px;flex-wrap:wrap}
  .langbtn{border:1.5px solid rgba(127,155,176,.4);color:var(--muted);background:transparent;
    font:inherit;font-size:11px;letter-spacing:.08em;padding:6px 12px;border-radius:8px;cursor:pointer}
  .langbtn:hover{color:var(--phosphor);border-color:var(--phosphor)}
  .langbtn.on{color:var(--phosphor);border-color:var(--phosphor);background:rgba(191,233,255,.08)}
  .vno{margin-top:18px;font-size:10px;color:var(--muted);letter-spacing:.12em}
  /* окно целей смены */
  .goalrows{margin-top:18px}
  .goalrow{display:flex;gap:14px;align-items:center;text-align:left;padding:11px 14px;margin:9px 0;
    border:1.5px solid rgba(191,233,255,.15);border-radius:12px;background:rgba(10,22,34,.55)}
  .goalrow .gs{color:var(--gold);font-size:15px;letter-spacing:.05em;flex:0 0 auto;min-width:48px;
    text-shadow:0 0 10px rgba(244,207,94,.45)}
  .goalrow .gt{font-size:12.5px;color:var(--paper);line-height:1.5}
  .goalzen{font-size:13px;line-height:1.7;color:var(--muted);margin-top:16px}

  /* ---- медали ---- */
  .panel-wide{max-width:580px;width:94%;max-height:88vh;display:flex;flex-direction:column;padding:26px 24px}
  .medalcount{font-size:12px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .medalgrid{overflow:auto;text-align:left;margin:14px 0 6px;padding-right:6px}
  .tierhead{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--phosphor);margin:14px 0 6px;border-bottom:1px solid rgba(191,233,255,.18);padding-bottom:4px}
  .tierhead:first-child{margin-top:0}
  .medal{display:flex;gap:11px;align-items:flex-start;padding:8px 10px;margin:6px 0;
    border:1.5px solid rgba(127,155,176,.22);border-radius:10px;background:rgba(127,155,176,.04)}
  .medal.got{border-color:rgba(244,207,94,.55);background:rgba(244,207,94,.06);box-shadow:0 0 12px rgba(244,207,94,.12)}
  .medal .ic{font-size:21px;line-height:1.1;filter:grayscale(1);opacity:.45;flex:0 0 auto;width:26px;text-align:center}
  .medal.got .ic{filter:none;opacity:1}
  .medal .mt{font-size:12.5px;color:var(--paper);letter-spacing:.02em}
  .medal.locked .mt{color:var(--muted)}
  .medal .md{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .medal .mp{font-size:10px;color:var(--phosphor);margin-top:3px;letter-spacing:.04em}

  /* ---- всплывашка получения медали ---- */
  #achToast{position:fixed;left:50%;top:13%;transform:translateX(-50%) translateY(-22px);
    z-index:9;display:flex;gap:13px;align-items:center;padding:12px 20px;border-radius:12px;
    background:rgba(10,22,34,.95);border:1.5px solid var(--gold);color:var(--paper);
    box-shadow:0 0 18px rgba(244,207,94,.35), 0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;
    transition:opacity .32s ease, transform .32s ease;max-width:86%}
  #achToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #achToast .ic{font-size:28px}
  #achToast .lbl{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
  #achToast .ttl{font-size:14px;margin-top:3px;color:var(--paper)}
  #achToast .dsc{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.45}
</style>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');

  // ---- cozy sprite atlas (canvas) ----
  // Sprite sheets (assets/sprites/planeflow-*.svg) are fetched once into a hidden
  // holder; each <symbol> is rasterised into an <img> at device-pixel size, cached,
  // and blitted per frame. Until a sprite is ready (or if COZY is off) the call
  // returns false and the caller falls back to its procedural draw — so the game
  // never renders blank and the look can be toggled instantly.
  const COZY = true;
  const SPRITES = (() => {
    const cache = new Map();
    const stripF = s => s.replace(/\s*filter="url\([^)]*\)"/g, ''); // drop filter refs (defs live in the sheet, not the standalone svg)
    function img(id, w, h){
      const pw = Math.max(1, Math.round(w * dpr)), ph = Math.max(1, Math.round(h * dpr));
      const key = id + '@' + pw + 'x' + ph;
      let im = cache.get(key);
      if(!im){
        const sym = document.getElementById(id);
        if(!sym) return null;
        const vb = sym.getAttribute('viewBox') || '0 0 64 64';
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + vb +
                    '" width="' + pw + '" height="' + ph + '">' + stripF(sym.innerHTML) + '</svg>';
        im = new Image(); im.decoding = 'async';
        im.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        cache.set(key, im);
      }
      return im;
    }
    const ok = im => im && im.complete && im.naturalWidth > 0;
    const A = {
      ready: false,
      has(id){ return !!document.getElementById(id); },
      blitC(id, cx, cy, dw, dh, rot){
        if(!A.ready) return false; const im = img(id, dw, dh); if(!ok(im)) return false;
        ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot);
        ctx.drawImage(im, -dw / 2, -dh / 2, dw, dh); ctx.restore(); return true;
      },
      blit(id, dx, dy, dw, dh){
        if(!A.ready) return false; const im = img(id, dw, dh); if(!ok(im)) return false;
        ctx.drawImage(im, dx, dy, dw, dh); return true;
      }
    };
    // fetch sheets into a hidden holder, then go live (browser only; no-op under the test harness)
    try {
      if (typeof fetch !== 'undefined' && typeof Image !== 'undefined') {
        const holder = document.createElement('div');
        holder.id = 'pf-sprites'; holder.setAttribute('aria-hidden', 'true');
        holder.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden';
        document.body.appendChild(holder);
        const sheets = ['aircraft', 'field', 'hud', 'effects', 'brand']
          .map(n => 'assets/sprites/planeflow-' + n + '.svg');
        Promise.all(sheets.map(u => fetch(u).then(r => r.ok ? r.text() : '').catch(() => '')))
          .then(parts => { holder.innerHTML = parts.join('\n'); A.ready = true; })
          .catch(() => {});
      }
    } catch (e) { /* non-DOM env: stay procedural */ }
    return A;
  })();

  // ---- palette helpers ----
  const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  const COL = {};
  ['ink','tarmac','tarmac-2','water','phosphor','paper','muted','amber','teal','ice','rose','gold','life','coin']
    .forEach(n => COL[n] = css('--'+n));

  // service -> color (названия услуг — в i18n: svc.*)
  const SVC = {
    repair: {color: COL.amber},
    fuel:   {color: COL.teal},
    board:  {color: COL.rose},
    deice:  {color: COL.ice},
    depart: {color: COL.gold},
  };

  // ---- i18n ----
  // Весь видимый игроком текст — через t(key, params). en — основной/фолбэк.
  // Значение-массив = формы множественного числа (выбор по params.n через _plural).
  // Добавление языка = добавить словарь (_name, _locale, _plural + ключи), логика не меняется.
  const I18N = {
    en: {
      _name:'English', _locale:'en-US',
      _plural: n => (n===1 ? 0 : 1),
      'app.name':'PlaneFlow',

  function dayCycle(time){
    const P = K.DAYNIGHT_PERIOD;
    const phase = ((time % P) + P) % P / P;             // 0..1, устойчиво к time<0

      if(!o){ p.push(L+'нет objective'); }
      else {

        if(!(o.target>0)) p.push(L+'objective.target должен быть > 0');
        if(o.time!=null && !(o.time>0)) p.push(L+'objective.time должен быть > 0');
      }
      const sides = lv.sides || {};
      ['top','left','bottom'].forEach(side=>{
        const c = sides[side];
        if(!c){ p.push(L+'нет стороны "'+side+'"'); return; }

      if(lv.startMoney!=null && !(lv.startMoney>0)) p.push(L+'startMoney должен быть > 0');
      if(lv.weather!=null && lv.weather!==true) p.push(L+'weather должен быть true (или отсутствовать)');
      if(lv.deice!=null && lv.deice!==true) p.push(L+'deice должен быть true (или отсутствовать)');
      const ev = lv.events || {};
      Object.keys(ev).forEach(k=>{
        if(!EVENT_KEYS.includes(k)) p.push(L+'неизвестное событие "'+k+'"');
        else if(typeof ev[k]!=='boolean') p.push(L+'событие "'+k+'" должно быть boolean');

    });
    return p;
