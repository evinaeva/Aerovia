      ctx.beginPath(); ctx.arc(0,0,16*ui*vs,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
      ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle=rcol;
      ctx.shadowColor=rcol; ctx.shadowBlur=9; ctx.stroke();
      ctx.restore();
    }
    // пульсирующее кольцо срочного борта в воздухе (аварийный — красный, медицинский — розовый)
    if((pl.emergency||pl.medical) && pl.zone==='air'){
      const p=0.5+0.5*Math.sin(nowT*0.006), pc=pl.emergency?COL.life:COL.rose;
      ctx.beginPath(); ctx.arc(pl.x,pl.y,(20*ui+p*3*ui)*vs,0,7);
      ctx.lineWidth=2; ctx.strokeStyle=hexa(pc,.4+.4*p); ctx.stroke();
    }
    // выделение — cozy-кольцо (спрайт) с фолбэком на пунктир (масштаб ⟂ SZ())
    if(pl.selected && !(COZY && SPRITES.blitC('ring-selected', pl.x, pl.y, K.GRAB*SZ(), K.GRAB*SZ()))){
      ctx.save(); ctx.beginPath(); ctx.arc(pl.x,pl.y,K.GRAB*0.5*SZ(),0,7);
      ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.6); ctx.setLineDash([4,5]); ctx.stroke(); ctx.restore();
    }

    // короткий «толчок» при касании: корпус отскакивает вверх и оседает (затухающая дуга)
    let by = pl.y;
    if(pl.bounceAt){
      const p=(nowT - pl.bounceAt)/K.LAND_BUMP_MS;
      if(p>=0 && p<1) by -= Math.sin(Math.PI*p)*(1-p)*4*ui;
      else pl.bounceAt=0;
    }
    if(LV.bonus && !inMenu) drawBug(pl);              // гусеница / куколка / бабочка по стадии
    else drawPlaneBodyAt(pl.x, by, pl.ang, ui*0.5*SZ()*vs, pl.vip, pl.emergency, pl.medical);

    // пузырёк нужды над бортом
    if(pl.zone!=='bay'){
      const _ny = pl.y-28*ui*vs;
      if(LV.bonus){
        // бонус: над гусеницей — цветок нужного цвета (её цель). Куколка/бабочка — без пузырька.
        if(pl.bug==='cat') drawFlower(pl.x, _ny, 9*ui, BSP[pl.species||0].petal);
      } else if(!(COZY && SPRITES.blitC('svc-'+need, pl.x, _ny, 33*ui, 33*ui))) {
        drawIcon(need, pl.x, _ny, 12.7*ui, ncol, COL.ink);   // cozy-чип svc-* (фолбэк: процедурная иконка)
      }
    }
  }

  // Карточка выбранного борта в левом верхнем углу: очередь его потребностей
  // (цепочка услуг) + оставшееся время терпения числом. Появляется только когда
  // борт выбран — иначе угол остаётся пустым. Общая для всех скинов.
  function drawPlaneCard(){
    if(!(selected && !selected.dead)) return;
    const hud=HUD_H();
    const chain=selected.requests, n=chain.length;
    const bw2=30*ui, gap2=16*ui, x0=14*ui, y0=hud+10*ui;
    const pw=n*bw2+(n-1)*gap2+16*ui;
    rr(x0,y0,pw,44*ui,9*ui); ctx.fillStyle='rgba(33,29,51,.72)'; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,.12); rr(x0,y0,pw,44*ui,9*ui); ctx.stroke();
    const tag = selected.vip ? (t('hud.plane')+' · '+t('hud.vip'))
              : selected.emergency ? (t('hud.plane')+' '+t('hud.sos'))
              : selected.medical ? (t('hud.plane')+' · '+t('hud.med'))
              : t('hud.plane');
    ctx.fillStyle = selected.emergency?COL.life : selected.medical?COL.rose : hexa(COL.muted,.8);
    ctx.font=`${7.5*ui}px ${MONO}`; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(tag, x0+8*ui, y0+8*ui);
    // ── оставшееся терпение борта: число, цвет — по запасу (бирюза→янтарь→красный) ──
    let prem=null, pmax=null;
    if(selected.zone==='air'){ prem=selected.airTime; pmax=selected.airMax; }
    else if(selected.zone!=='bay'){ prem=selected.groundTime; pmax=selected.groundMax; }
    else if(selected.serveMax){ prem=selected.serveTime; pmax=selected.serveMax; }
    if(prem!=null && isFinite(prem) && isFinite(pmax) && pmax>0){
      const pf=Math.max(0,Math.min(1,prem/pmax));
      const pcol = selected.emergency ? COL.life : (pf>0.5?COL.teal:pf>0.25?COL.amber:COL.life);
      ctx.textAlign='right'; ctx.fillStyle=pcol; ctx.font=`700 ${10*ui}px ${MONO}`;
      ctx.fillText(fmtTime(Math.max(0,prem)), x0+pw-8*ui, y0+8*ui);
    }
    for(let i=0;i<n;i++){
      const ty=chain[i];
      // бонус: цвет/иконки шага — по виду гусеницы (цветок → бабочка), а не услуга
      const c = (LV.bonus && ty!=='depart') ? BSP[selected.species||0].petal
              : (LV.bonus && ty==='depart') ? BSP[selected.species||0].wing
              : SVC[ty].color;
      const bx=x0+8*ui+i*(bw2+gap2), bcy=y0+26*ui;
      if(i>0){
        ctx.strokeStyle=hexa(COL.muted,.4); ctx.lineWidth=2; ctx.setLineDash([3,4]);
        ctx.beginPath(); ctx.moveTo(bx-gap2+3*ui,bcy); ctx.lineTo(bx-3*ui,bcy); ctx.stroke(); ctx.setLineDash([]);
      }
      const active = i===selected.reqIndex;
      ctx.globalAlpha = i<selected.reqIndex ? 0.3 : 1;
      rr(bx,y0+15*ui,bw2,22*ui,6*ui);
      ctx.fillStyle=active?hexa(c,.16):'rgba(127,155,176,.05)'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(c,active?.9:.4);
      rr(bx,y0+15*ui,bw2,22*ui,6*ui); ctx.stroke();
      if(LV.bonus){
        const sp=selected.species||0;
        if(ty==='depart') drawButterfly(bx+bw2/2, bcy, 0, ui*0.42, sp);   // финал — бабочка
        else drawFlower(bx+bw2/2, bcy, 9*ui, c);                          // шаг — цветок своего цвета
      } else if(!(COZY && SPRITES.blitC('svc-'+ty, bx+bw2/2, bcy, 28*ui, 28*ui)))
        drawIcon(ty, bx+bw2/2, bcy, 12*ui, c, '#211d33');
      ctx.globalAlpha=1;
    }
  }

  // Мультяшный HUD: отдельные кремовые пилюли (жизни · таймер · монеты · борта)
  // вдоль верха + кнопка паузы справа — крупные иконки-спрайты, как на референсе.
  function drawCartoonHUD(){
    const hud=HUD_H();
    const cy=Math.round(hud*0.52);
    const PH=Math.round(Math.min(hud-8*ui, 30*ui));
    const py=Math.round(cy-PH/2);
    const ic=Math.round(PH*0.76);            // размер иконки
    ctx.textBaseline='middle';
    function pill(x, sprite, glyph, gcol, text, tcol){
      ctx.font=`800 ${15*ui}px ${MONO}`;
      const tw = text ? ctx.measureText(text).width : 0;
      const padL=11*ui, gapIT=7*ui, padR=14*ui;
      const w=Math.round(padL + ic + (text? gapIT+tw : 0) + padR);
      rr(x,py,w,PH,PH/2); ctx.fillStyle='rgba(255,247,228,.96)'; ctx.fill();
      ctx.lineWidth=2.5; ctx.strokeStyle='rgba(58,42,23,.55)'; rr(x,py,w,PH,PH/2); ctx.stroke();
      const icx=x+padL+ic/2;
      if(!(COZY && sprite && SPRITES.blitC(sprite, icx, cy, ic, ic))){
        ctx.fillStyle=gcol||'#3a2a17'; ctx.textAlign='center'; ctx.font=`${ic}px sans-serif`; ctx.fillText(glyph||'', icx, cy);
      }
      if(text){ ctx.fillStyle=tcol||'#3a2a17'; ctx.textAlign='left'; ctx.font=`800 ${15*ui}px ${MONO}`; ctx.fillText(text, x+padL+ic+gapIT, cy); }
      return x+w;
    }
    let x=12*ui; const g=8*ui;
    x = pill(x, 'heart', '❤', '#ff4d5e', String(Math.max(0,lives)), '#c43a48') + g;
    x = pill(x, 'coin', '🪙', '#caa53a', fmtMoney(money), money<0?'#e0392f':'#5e4a16') + g;
    const endless = survival || LV.objective.race;
    const mv = LV.objective.metric==='upgrades'?upgradesDone:served;
    const ptxt = endless ? fmtNum(served) : (fmtNum(mv)+'/'+fmtNum(LV.objective.target));
    x = pill(x, 'plane', '✈', '#2f6fb0', ptxt, '#23415e') + g;
    // таймер раунда — в правый верхний угол, перед кнопкой паузы
    const tShown = LV.objective.time ? Math.max(0, LV.objective.time-gameTime) : gameTime;
    const urgent = LV.objective.time && tShown<=10;
    const ttxt = fmtTime(tShown);
    ctx.font=`800 ${15*ui}px ${MONO}`;
    const tpw = Math.round(11*ui + ic + 7*ui + ctx.measureText(ttxt).width + 14*ui);
    pill(Math.round(pauseBtn.x - g - tpw), 'clock', '⏱', '#3a2a17', ttxt, urgent?'#e0392f':'#3a2a17');
    // пауза — справа
    const pp=pauseBtn, pcx=pp.x+pp.w/2, pcy=pp.y+pp.h/2, ps=Math.max(pp.w,pp.h,PH);
    if(!(COZY && !paused && SPRITES.blitC('pause-btn', pcx, pcy, ps, ps))){
      rr(pp.x,pp.y,pp.w,pp.h,8*ui); ctx.fillStyle='rgba(255,247,228,.96)'; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='rgba(58,42,23,.55)'; rr(pp.x,pp.y,pp.w,pp.h,8*ui); ctx.stroke();
      ctx.fillStyle='#3a2a17';
      if(!paused){ ctx.fillRect(pcx-6*ui,pcy-6*ui,4*ui,12*ui); ctx.fillRect(pcx+2*ui,pcy-6*ui,4*ui,12*ui); }
      else { ctx.beginPath(); ctx.moveTo(pcx-5*ui,pcy-6*ui); ctx.lineTo(pcx+7*ui,pcy); ctx.lineTo(pcx-5*ui,pcy+6*ui); ctx.closePath(); ctx.fill(); }
    }
    drawPlaneCard();   // левый верхний угол: очередь потребностей + терпение
  }

  function drawHUD(){
    const sd = skinDef();
    if(sd.hud){ sd.hud(); return; }   // собственный рендерер HUD скина (только облик)
    const hud=HUD_H();
    // плавающая панель
    rr(10*ui,6*ui,W-20*ui,hud-12*ui,9*ui);
    ctx.fillStyle=NEON?'rgba(7,13,30,.82)':'rgba(33,29,51,.85)'; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,NEON?.3:.12); rr(10*ui,6*ui,W-20*ui,hud-12*ui,9*ui); ctx.stroke();
    const cy=hud/2;
    ctx.textBaseline='middle';
    // ── левый кластер: жизни · деньги · комбо (мокап 01) ──
    for(let i=0;i<K.START_LIVES;i++) heart(26*ui+i*19*ui, cy, 6.3*ui, i<lives?COL.life:null);
    let lx = 26*ui + K.START_LIVES*19*ui + 8*ui;
    if(COZY) SPRITES.blitC('coin', lx+6*ui, cy, 15*ui, 15*ui);
    else { ctx.textAlign='left'; ctx.fillStyle=COL.coin; ctx.font=`${12*ui}px ${MONO}`; ctx.fillText('$', lx, cy); }
    ctx.textAlign='left'; ctx.font=`700 ${15*ui}px ${MONO}`;
    ctx.fillStyle = money<0?COL.life:COL.coin;
    ctx.shadowColor=hexa(COL.gold,.4); ctx.shadowBlur=9*ui;
    ctx.fillText(fmtMoney(money), lx+15*ui, cy); ctx.shadowBlur=0;
    lx += 15*ui + ctx.measureText(fmtMoney(money)).width + 13*ui;
    if(lvFx.combo && combo>1){
      const ct='×'+fmtNum(comboMult(),1);
      ctx.font=`800 ${12*ui}px ${MONO}`;
      const cbw=ctx.measureText(ct).width + 16*ui;
      rr(lx,cy-10*ui,cbw,20*ui,10*ui); ctx.fillStyle=hexa(COL.phosphor,.16); ctx.fill();
      ctx.lineWidth=1.2; ctx.strokeStyle=hexa(COL.phosphor,.6); rr(lx,cy-10*ui,cbw,20*ui,10*ui); ctx.stroke();
      ctx.fillStyle=COL.phosphor; ctx.textAlign='center'; ctx.fillText(ct, lx+cbw/2, cy);
    }
    // ── правый: таймер перед кнопкой паузы ──
    const tShown = LV.objective.time ? Math.max(0, LV.objective.time-gameTime) : gameTime;
    const urgent = LV.objective.time && tShown<=10;
    ctx.textAlign='right'; ctx.fillStyle=urgent?COL.life:COL.paper; ctx.font=`700 ${15*ui}px ${MONO}`;
    ctx.fillText(fmtTime(tShown), pauseBtn.x-14*ui, cy);
    // ── центр: уровень + счёт + полоса прогресса цели ──
    const mv = LV.objective.metric==='upgrades'?upgradesDone:served;
    const endless = survival || LV.objective.race;   // race (L5): «без лимита», без потолка
    const cxC = W*0.5;
    ctx.textAlign='center';
    const cnt = endless ? ('✈ '+fmtNum(served)) : (fmtNum(mv)+'  /  '+fmtNum(LV.objective.target));
    ctx.fillStyle=hexa(COL.paper,.92); ctx.font=`${10*ui}px ${MONO}`;
    ctx.fillText(currentLevelName()+'   ·   '+cnt, cxC, cy-6*ui);
    if(!endless){
      const target=LV.objective.target||1, frac=Math.max(0,Math.min(1,mv/target));
      const bw3=170*ui, bx3=cxC-bw3/2, by3=cy+5*ui, bh3=6*ui;
      rr(bx3,by3,bw3,bh3,bh3/2); ctx.fillStyle='rgba(127,155,176,.20)'; ctx.fill();
      if(frac>0){ rr(bx3,by3,Math.max(bh3,bw3*frac),bh3,bh3/2); ctx.fillStyle=NEON?COL.teal:'#5dca7a'; ctx.fill(); }
    }

    // кнопка паузы — cozy-чип (на паузе поверх рисуем «play»)
    const pcx=pauseBtn.x+pauseBtn.w/2, pcy=pauseBtn.y+pauseBtn.h/2;
    const cozyPause = COZY && !paused &&
      SPRITES.blitC('pause-btn', pcx, pcy, Math.max(pauseBtn.w,pauseBtn.h), Math.max(pauseBtn.w,pauseBtn.h));
    if(!cozyPause){
      rr(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,8*ui);
      ctx.fillStyle='rgba(154,111,212,.10)'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.phosphor,.4);
      rr(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,8*ui); ctx.stroke();
      ctx.fillStyle=COL.paper;
      if(!paused){
        ctx.fillRect(pcx-6*ui,pcy-6*ui,4*ui,12*ui);
        ctx.fillRect(pcx+2*ui,pcy-6*ui,4*ui,12*ui);
      } else {
        ctx.beginPath(); ctx.moveTo(pcx-5*ui,pcy-6*ui); ctx.lineTo(pcx+7*ui,pcy); ctx.lineTo(pcx-5*ui,pcy+6*ui); ctx.closePath(); ctx.fill();
      }
    }

    // очередь потребностей выбранного борта + его терпение — карточка слева сверху
    drawPlaneCard();
  }

  function fmtTime(s){ const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(Math.floor(s%60)).padStart(2,'0'); return m+':'+ss; }
  function drawToast(){
    const a = toast.t<2.0 ? 1 : (2.4-toast.t)/0.4;
    const col = toast.good?COL.coin:COL.life;
    ctx.save(); ctx.globalAlpha=Math.max(0,a);
    ctx.font=`${12*ui}px ${MONO}`;
    const w=ctx.measureText(toast.text).width+44*ui, h=24*ui;
    const x=W/2-w/2, y=HUD_H()+12*ui;
    rr(x,y,w,h,12*ui); ctx.fillStyle='rgba(26,22,40,.92)'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.7);
    ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=10; rr(x,y,w,h,12*ui); ctx.stroke(); ctx.shadowBlur=0;
    if(!(COZY && SPRITES.blitC(toast.good?'check':'heart-crack', x+14*ui, y+h/2, 15*ui, 15*ui))){
      ctx.beginPath(); ctx.arc(x+13*ui,y+h/2,3.5*ui,0,7); ctx.fillStyle=col; ctx.fill();
    }
    ctx.fillStyle=COL.paper; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(toast.text, x+26*ui, y+h/2);
    ctx.restore();
  }
  function boom(x,y){ effects.push({x,y,t:0,life:0.55,kind:'crash'}); }
  function nearMiss(x,y){ effects.push({x,y,t:0,life:0.5,kind:'near'}); }
  function pulseFx(x,y,kind,life){ effects.push({x,y,t:0,life:life||0.55,kind}); }
  // kind → cozy-спрайт и цвет процедурного фолбэка
  const FX_SPRITE={near:'fx-ripple',crash:'fx-crash',touchdown:'fx-touchdown',takeoff:'fx-takeoff',success:'fx-success',error:'fx-error'};
  function drawEffects(dt){
    for(let i=effects.length-1;i>=0;i--){
      const e=effects[i]; e.t+=dt;
      const k=e.t/e.life;
      if(k>=1){ effects.splice(i,1); continue; }
      const a=1-k;
      ctx.save(); ctx.translate(e.x,e.y);
      if(e.kind==='lock'){
        // фиксация маршрута на боксе: короткая яркая белая вспышка (без cozy-спрайта)
        ctx.beginPath(); ctx.arc(0,0,(9+k*15)*ui,0,7);
        ctx.lineWidth=2.5*a+0.5; ctx.strokeStyle=hexa('#ffffff',.9*a); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,5*(1-k)*ui+1,0,7); ctx.fillStyle=hexa('#ffffff',.85*a); ctx.fill();
        ctx.restore(); continue;
      }
      if(COZY){
        const sz=(e.kind==='crash'?(44+k*64):(20+k*56))*ui;
        ctx.globalAlpha=a;
        if(SPRITES.blitC(FX_SPRITE[e.kind]||'fx-ripple',0,0,sz,sz)){ ctx.globalAlpha=1; ctx.restore(); continue; }
        ctx.globalAlpha=1;
      }
      if(e.kind==='near'){
        // near-miss «уфф»: мягкая двойная волна без искр и жести
        ctx.beginPath(); ctx.arc(0,0,(8+k*30)*ui,0,7);
        ctx.lineWidth=2.5*a+0.5; ctx.strokeStyle=hexa(COL.phosphor,.7*a); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,(4+k*18)*ui,0,7);
        ctx.lineWidth=2*a+0.5; ctx.strokeStyle=hexa(COL.amber,.55*a); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,7*(1-k)*ui,0,7); ctx.fillStyle=hexa('#ffffff',.5*a); ctx.fill();
        ctx.restore(); continue;
      }
      if(e.kind!=='crash'){
        // мягкое одиночное кольцо (фолбэк для touchdown/takeoff/success/error)
        const fc={touchdown:COL.muted,takeoff:COL.paper,success:'#5dca7a',error:COL.life}[e.kind]||COL.paper;
        ctx.beginPath(); ctx.arc(0,0,(8+k*26)*ui,0,7);
        ctx.lineWidth=2*a+0.5; ctx.strokeStyle=hexa(fc,.6*a); ctx.stroke();
        ctx.restore(); continue;
      }
      // ударная волна
      ctx.beginPath(); ctx.arc(0,0,(6+k*44)*ui,0,7);
      ctx.lineWidth=3*a+0.5; ctx.strokeStyle=hexa(COL.life,.6*a); ctx.stroke();
      // разлетающиеся искры
      for(let s2=0;s2<8;s2++){
        const ang=s2/8*Math.PI*2, d=(10+k*40)*ui;
        ctx.fillStyle=hexa(s2%2?COL.amber:COL.gold, a);
        ctx.beginPath(); ctx.arc(Math.cos(ang)*d,Math.sin(ang)*d,(2.5*a+1)*ui,0,7); ctx.fill();
      }
      // вспышка в центре
      ctx.beginPath(); ctx.arc(0,0,8*(1-k)*ui,0,7); ctx.fillStyle=hexa('#ffffff',.7*a); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }
  // плавающие награды: «+N ₿» при вылете, «−50%» при штрафе, «−N ₿» при краше
  function drawFloaters(dt){
    for(let i=floaters.length-1;i>=0;i--){
      const f=floaters[i]; f.t+=dt;
      const k=f.t/f.life;
      if(k>=1){ floaters.splice(i,1); continue; }
      ctx.globalAlpha=1-k*k;
      ctx.font=`600 ${13*ui}px ${MONO}`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=f.col; ctx.shadowColor=f.col; ctx.shadowBlur=8;
      ctx.fillText(f.text, f.x, f.y - k*26*ui);
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // ---- тихий туториал «покажи и дай сделать» ----
  // Ведём первый борт за руку: подсветка цели + подсказка одной строкой. Шаги
  // переключаются по факту действий игрока (сел → обслужил → на взлёт), без
  // модалок и стены текста. Прошёл один полный цикл — туториал больше не всплывает.
  function completeTutorial(){
    if(!tut) return;
    tut=null; save.tutorialDone=true; saveGame();
    Analytics.track('tutorial_complete', {});
    toast={text:t('tut.done'), t:0, good:true};
  }
  function updateTutorial(){
    if(!tut || !tut.plane) return;
    const p=tut.plane;
    if(p.dead){ tut.plane=null; tut.step='land'; return; }   // разбился — учим на следующем
    const prev=tut.step;
    if(tut.step==='land' && p.zone!=='air') tut.step='service';
    if(tut.step==='service' && curNeed(p)==='depart') tut.step='takeoff';
    if(tut.step!==prev) Analytics.track('tutorial_step', {step: tut.step});
    // завершение — в depart(): полный цикл от посадки до вылета пройден
  }
  function tutTarget(){
    const p=tut.plane; if(!p) return null;
    if(tut.step==='service'){
      const need=curNeed(p);
      const bay=bays.find(b=>b.open && b.type===need);
      return bay ? {x:bay.x+bay.w/2, y:bay.y+bay.h/2} : null;
    }
    // land / takeoff — ближайшая открытая полоса
    let best=null, bd=1e9;
    for(const r of runways){ if(r.closed) continue; const d=Math.abs(p.y-r.cy); if(d<bd){bd=d;best=r;} }
    return best ? {x:best.x+best.w*0.5, y:best.cy} : null;
  }
  function drawTutorial(){
    if(!tut || !tut.plane || tut.plane.dead || paused) return;
    const p=tut.plane;
    if(p.zone==='bay') return;                 // обслуживается в боксе — просто ждём, без подсказок
    const target=tutTarget(); if(!target) return;
    const col=COL.phosphor;
    ctx.save();
    // путеводная пунктирная линия борт → цель
    ctx.setLineDash([8,9]); ctx.lineDashOffset=-nowT*0.04;
    ctx.lineWidth=2.5; ctx.strokeStyle=hexa(col,.5);
    ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(target.x,target.y); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur=0;
    // пульсирующее кольцо у цели
    const pr=0.5+0.5*Math.sin(nowT*0.005);
    ctx.beginPath(); ctx.arc(target.x,target.y,(14+pr*7)*ui,0,7);
    ctx.lineWidth=2.5; ctx.strokeStyle=hexa(col,.35+.45*pr); ctx.stroke();
    // «палец»: точка-касание едет от борта к цели по кругу — показывает жест
    const ph=(nowT*0.0006)%1, fx=p.x+(target.x-p.x)*ph, fy=p.y+(target.y-p.y)*ph;
    ctx.beginPath(); ctx.arc(fx,fy,7*ui,0,7); ctx.fillStyle=hexa(col,.85); ctx.fill();
    ctx.beginPath(); ctx.arc(fx,fy,11*ui,0,7); ctx.lineWidth=2; ctx.strokeStyle=hexa(col,.5); ctx.stroke();
    ctx.restore();
    // подсказка одной строкой — мягкая плашка внизу по центру
    let txt;
    if(tut.step==='service') txt=t('tut.service',{svc:t('svc.'+curNeed(p))});
    else if(tut.step==='takeoff') txt=t('tut.takeoff');
    else txt=t('tut.land');
    ctx.save();
    ctx.font=`${12.5*ui}px ${MONO}`;
    const w=ctx.measureText(txt).width+48*ui, h=30*ui;
    const x=W/2-w/2, y=H-h-(14*ui+safe.b);
    rr(x,y,w,h,12*ui); ctx.fillStyle='rgba(26,22,40,.92)'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.6);
    ctx.shadowColor=hexa(col,.4); ctx.shadowBlur=10; rr(x,y,w,h,12*ui); ctx.stroke(); ctx.shadowBlur=0;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=col; ctx.fillText('☞', x+14*ui, y+h/2);
    ctx.fillStyle=COL.paper; ctx.fillText(txt, x+36*ui, y+h/2);
    ctx.restore();
  }

  // сцена главного меню: радар с разверткой, дрейфующий борт, свечение горизонта
  function drawMenuScene(tm){
    if(COZY){
      // cozy menu background (cover-fit); falls back to the radar scene if not ready
      const ar=1280/720; let dw=W, dh=W/ar; if(dh<H){ dh=H; dw=H*ar; }
      if(SPRITES.blit('menu-bg', (W-dw)/2, (H-dh)/2, dw, dh)) return;
    }
    ctx.fillStyle=COL.ink; ctx.fillRect(0,0,W,H);
    starfield(tm);
    const rx=W*0.74, ry=H*0.52, R=Math.min(W,H)*0.42;
    ctx.save(); ctx.translate(rx,ry);
    for(let i=1;i<=4;i++){ ctx.beginPath(); ctx.arc(0,0,R*i/4,0,7);
      ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.phosphor,.08+i*0.01); ctx.stroke(); }
    ctx.strokeStyle=hexa(COL.phosphor,.07); ctx.lineWidth=1;
    for(let i=0;i<8;i++){ const a=i*Math.PI/4;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R); ctx.stroke(); }
    ctx.save(); ctx.rotate(tm*0.0013);
    const grad=ctx.createLinearGradient(0,0,R,0);
    grad.addColorStop(0,hexa(COL.phosphor,.28)); grad.addColorStop(1,hexa(COL.phosphor,0));
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,-0.5,0); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill(); ctx.restore();
    [[0.55,1.1],[0.8,3.0],[0.35,4.6],[0.62,5.6]].forEach((b2,i)=>{
      const x=Math.cos(b2[1])*R*b2[0], y=Math.sin(b2[1])*R*b2[0];
      const f=0.4+0.6*Math.abs(Math.sin(tm*0.002+i));
      ctx.fillStyle=hexa(COL.phosphor,f); ctx.beginPath(); ctx.arc(x,y,2.5,0,7); ctx.fill();
    });
    ctx.restore();
    // дрейфующий борт по небу
    const px=((tm*0.025)%(W+240))-120, py=H*0.24+Math.sin(tm*0.0008)*14;
    drawPlaneBodyAt(px,py,Math.sin(tm*0.0008)*0.06,ui*0.6,false,false);
    // бирюзовое свечение горизонта
    const hg=ctx.createLinearGradient(0,H-120*ui,0,H);
    hg.addColorStop(0,'rgba(16,48,58,0)'); hg.addColorStop(1,hexa(COL.teal,.10));
    ctx.fillStyle=hg; ctx.fillRect(0,H-120*ui,W,120*ui);
    vignette();
  }

  function frame(ts){
    if(!lastTs)lastTs=ts;
    let dt=(ts-lastTs)/1000; lastTs=ts;
    if(dt>0.05)dt=0.05;
    nowT=ts;
    // лёгкое замедление времени на миг near-miss (таймер идёт в реальном
    // времени, замедляется только симуляция — вспышки/всплывашки тикают как обычно)
    let udt = dt;
    if(slowmo>0){ slowmo=Math.max(0, slowmo-dt); udt = dt*K.SLOWMO_SCALE; }
    if(running && !paused) update(udt);

    if(inMenu){
      drawMenuScene(ts);
    } else {
      drawField(ts);
      drawRunways(ts);
      if(LV.biome) drawForest(ts);
      bays.forEach(drawBay);
      planes.forEach(p=>{ if(!p.dead) drawPlane(p); });
      drawEffects(dt);
      vignette();
      drawFloaters(dt);
      drawHUD();
      if(tut) drawTutorial();
      if(toast){ toast.t+=dt; if(toast.t>2.4) toast=null; else drawToast(); }
    }
    requestAnimationFrame(frame);
  }

  function endLevel(reasonKey){          // reasonKey — ключ i18n (end.*)
    running=false; const prevBest = save.best[levelKey]||0; recordResult();
    const stars=computeStars(), v=metricValue(), passed=stars>=1;
    Analytics.track(passed ? 'level_complete' : 'level_fail', {
      level: levelKey,
      mode: currentMode(),
      reason: reasonKey, stars,
      metric: LV.objective && LV.objective.metric, value: v, target: LV.objective && LV.objective.target,
      money, peak: statPeak, time_s: Math.round(gameTime), lives: Math.max(0, lives),
    });
    ACH.onLevelEnd(passed, stars, lives>=K.START_LIVES);
    // Survival → счёт захода (обслуженные борта) уходит в глобальный рейтинг; место в
    // таблице открывает пороговые ранг-медали. Каркас: mock-провайдер сейчас, бэкенд потом.
    // Не-survival режимы рейтинг не трогают (кампания/бонусы остаются как есть).
    if(currentMode()==='survival'){
      const runScore = served;
      Leaderboard.submitRun({mode:'survival', score:runScore}).then(res=>{
        lastShift.survivalScore = runScore;
        if(res){ lastShift.ranks = res.ranks; ACH.onRank(res.ranks); }

      }).catch(()=>{});

    document.getElementById('overKicker').textContent = survival ? t('over.survival') : t(passed?'over.passed':'over.failed');
    document.getElementById('finalStars').innerHTML = survival
      ? '<span class="pop" style="display:inline-flex;color:var(--m-gold)">'+SVGIC('trophy')+'</span>'
      : [0,1,2].map(i=>
      '<span class="'+(i<stars?'pop':'off')+'" style="display:inline-flex'+(i<stars?';animation-delay:'+(i*0.13)+'s':'')+'">'+SVGIC('star')+'</span>').join('');
    const unit = t(LV.objective.metric==='upgrades'?'unit.upgrades':'unit.planes', {n:v});
    document.getElementById('overMsg').textContent = survival
      ? t(served>prevBest ? 'over.survRecord' : 'over.survResult', {n:fmtNum(served), best:fmtNum(Math.max(served,prevBest)), money:fmtMoney(money)})
      : t('over.result', {reason:t(reasonKey), desc:objectiveDesc(), n:fmtNum(v), unit, money:fmtMoney(money)});
    // снимок смены — для карточки статистики, графика и шеринга
    lastShift = {
      passed, stars, surv:survival, metric:LV.objective.metric, v, target:survival?null:LV.objective.target,
      money, peak:statPeak, time:gameTime,
      levelName: currentLevelName(),
      samples: statSamples.slice(),
    };
    // карточка статистики смены
    const statsBox=document.getElementById('overStats'); statsBox.innerHTML='';
    [[LV.objective.metric==='upgrades'?t('stats.upgrades'):t('stats.served'), survival?fmtNum(v):(fmtNum(v)+' / '+fmtNum(LV.objective.target)), 'v-phos'],
     [t('stats.money'), fmtMoney(money), 'v-gold'],
     [t('stats.peak'), '✈ '+fmtNum(statPeak), 'v-teal'],
     [t('stats.lives'), '♥ '+fmtNum(Math.max(0,lives))+' / '+fmtNum(K.START_LIVES), 'v-life'],
     [t('stats.time'), fmtTime(gameTime), 'v-phos']
    ].forEach(s2=>{
      const d=document.createElement('div'); d.className='rstat';
      d.innerHTML=`<div class="k">${s2[0]}</div><div class="v ${s2[2]}">${s2[1]}</div>`;
      statsBox.appendChild(d);
    });
    const hasNext = !LV.biome && !LV.bonus && levelIdx+1<LEVELS.length && (debug.unlockAll||(levelIdx+1)<save.unlocked);
    document.getElementById('nextBtn').classList.toggle('hidden', !hasNext);
    document.getElementById('overScreen').classList.remove('hidden');
    // график рисуем после показа экрана — нужен реальный размер канваса
  }

  // ---- статистика смены: график во времени + карточка для шеринга ----
  // Рисуем в произвольный 2D-контекст (экранный канвас или офскрин для картинки):
  // область «нагрузка» (бирюза) + линия «принято» (золото) на общей оси времени.
  function drawTimeline(g, x, y, w, h, shift){
    const pad=10, gx=x+pad+18, gy=y+pad, gw=w-pad*2-18, gh=h-pad*2-14;
    g.fillStyle=hexa(COL.phosphor,.04); g.fillRect(x,y,w,h);
    // сетка
    g.strokeStyle=hexa(COL.phosphor,.10); g.lineWidth=1;
    for(let i=0;i<=3;i++){ const yy=gy+gh*i/3; g.beginPath(); g.moveTo(gx,yy); g.lineTo(gx+gw,yy); g.stroke(); }
    const s=shift.samples||[];
    if(s.length<2){
      g.fillStyle=hexa(COL.muted,.7); g.font=`11px ${MONO}`; g.textAlign='center'; g.textBaseline='middle';
      g.fillText('—', x+w/2, y+h/2); return;
    }
    const tMax=Math.max(shift.time, s[s.length-1].t, 1);
    const loadMax=Math.max(2, ...s.map(p=>p.load));
    const servMax=Math.max(1, ...s.map(p=>p.served));
    const X=t=>gx + gw*Math.min(1,t/tMax);
    const Yl=v=>gy+gh - gh*(v/loadMax);
    const Ys=v=>gy+gh - gh*(v/servMax);
    // нагрузка — заливка + линия
    g.beginPath(); g.moveTo(X(s[0].t), gy+gh);
    s.forEach(p=>g.lineTo(X(p.t), Yl(p.load))); g.lineTo(X(s[s.length-1].t), gy+gh); g.closePath();
    g.fillStyle=hexa(COL.teal,.16); g.fill();
    g.beginPath(); s.forEach((p,i)=>{ const fx=X(p.t),fy=Yl(p.load); i?g.lineTo(fx,fy):g.moveTo(fx,fy); });
    g.strokeStyle=COL.teal; g.lineWidth=2; g.lineJoin='round'; g.stroke();
    // принято — золотая линия (накопительно)
    g.beginPath(); s.forEach((p,i)=>{ const fx=X(p.t),fy=Ys(p.served); i?g.lineTo(fx,fy):g.moveTo(fx,fy); });
    g.strokeStyle=COL.gold; g.lineWidth=2; g.stroke();
    // подписи осей: пик нагрузки слева сверху, время справа снизу
    g.textBaseline='middle'; g.fillStyle=hexa(COL.teal,.9); g.font=`9px ${MONO}`; g.textAlign='right';
    g.fillText(String(loadMax), gx-4, gy+2);
    g.fillStyle=hexa(COL.muted,.8); g.textAlign='left'; g.textBaseline='alphabetic';
    g.fillText('0:00', gx, y+h-3); g.textAlign='right'; g.fillText(fmtTime(tMax), gx+gw, y+h-3);
    // легенда
    g.textAlign='left'; g.textBaseline='middle'; g.font=`9px ${MONO}`;
    g.fillStyle=COL.teal; g.fillRect(gx+2,gy+5,8,3); g.fillStyle=hexa(COL.muted,.9); g.fillText(t('graph.load'), gx+14, gy+6);
    const lx=gx+14+g.measureText(t('graph.load')).width+12;
    g.fillStyle=COL.gold; g.fillRect(lx,gy+5,8,3); g.fillStyle=hexa(COL.muted,.9); g.fillText(t('graph.served'), lx+12, gy+6);
  }
  // локальный скруглённый прямоугольник для офскрин-контекста (rr() завязан на ctx)
  function rrp(g,x,y,w,h,r){ r=Math.min(r,w/2,h/2);
    g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  // квадратная карточка для «поделиться картинкой»
  function drawShareCard(canvas, shift){
    const S=1080, g=canvas.getContext('2d');
    const grad=g.createLinearGradient(0,0,0,S);
    grad.addColorStop(0,'#0e2230'); grad.addColorStop(1,COL.ink);
    g.fillStyle=grad; g.fillRect(0,0,S,S);
    g.fillStyle=hexa(COL.phosphor,.06); for(let i=0;i<70;i++){ const rx=(i*173)%S, ry=(i*97)%S; g.fillRect(rx,ry,2,2); }
    // шапка
    g.textAlign='center';
    g.fillStyle=COL.phosphor; g.font=`700 64px ${MONO}`; g.fillText(t('app.name'), S/2, 130);
    g.fillStyle=hexa(COL.muted,.9); g.font=`24px ${MONO}`;
    g.fillText((shift.surv?t('over.survival'):(shift.passed?t('over.passed'):t('over.failed')))+' · '+shift.levelName, S/2, 178);
    // звёзды
    g.fillStyle=COL.gold; g.font=`80px ${MONO}`; g.shadowColor=hexa(COL.gold,.5); g.shadowBlur=24;
    g.fillText(shift.surv?('✈ '+fmtNum(shift.v)):('★'.repeat(shift.stars)+'☆'.repeat(3-shift.stars)), S/2, 290); g.shadowBlur=0;
    // плитки статистики 2×2
    const tiles=[
      [shift.metric==='upgrades'?t('stats.upgrades'):t('stats.served'), shift.surv?fmtNum(shift.v):(fmtNum(shift.v)+' / '+fmtNum(shift.target)), COL.phosphor],
      [t('stats.money'), fmtMoney(shift.money), COL.gold],
      [t('stats.peak'), '✈ '+fmtNum(shift.peak), COL.teal],
      [t('stats.time'), fmtTime(shift.time), COL.phosphor],
    ];
    const tw=440, th=120, gap=40, ox=(S-tw*2-gap)/2, oy=340;
    tiles.forEach((tl,i)=>{ const cx=ox+(i%2)*(tw+gap), cy=oy+Math.floor(i/2)*(th+gap);
      rrp(g,cx,cy,tw,th,18); g.fillStyle=hexa(COL.phosphor,.05); g.fill();
      g.lineWidth=2; g.strokeStyle=hexa(COL.phosphor,.15); rrp(g,cx,cy,tw,th,18); g.stroke();
      g.textAlign='left'; g.textBaseline='alphabetic';
      g.fillStyle=hexa(COL.muted,.85); g.font=`20px ${MONO}`; g.fillText(tl[0].toUpperCase(), cx+26, cy+44);
      g.fillStyle=tl[2]; g.font=`600 46px ${MONO}`; g.fillText(tl[1], cx+26, cy+98);
    });
    // график во времени
    g.textAlign='left'; g.textBaseline='alphabetic';
    g.fillStyle=hexa(COL.muted,.85); g.font=`20px ${MONO}`; g.fillText(t('graph.title').toUpperCase(), ox, 700);
    // drawTimeline использует пиксельные шрифты ~9-11px → масштабируем контекст
    g.save(); g.translate(ox, 720); g.scale(2.4,2.4);
    drawTimeline(g, 0,0, (tw*2+gap)/2.4, 230/2.4, shift); g.restore();
    g.textAlign='center'; g.fillStyle=hexa(COL.phosphor,.5); g.font=`22px ${MONO}`;
    g.fillText('#PlaneFlow', S/2, S-46);
  }
  async function shareShift(){
    if(!lastShift) return;
    const card=document.createElement('canvas'); card.width=1080; card.height=1080;
    drawShareCard(card, lastShift);
    card.toBlob(async blob=>{
      if(!blob) return;
      const file=new File([blob], 'planeflow-shift.png', {type:'image/png'});
      try{
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:t('app.name')}); return;
        }
      }catch(e){ /* отмена/нет поддержки — падаем в скачивание */ }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='planeflow-shift.png'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }, 'image/png');
  }

  // узловые уровни кампании: где впервые включается событие/механика (см. LEVELS).
  // Возвращает {idx:[ключи]} — по этим уровням на карте рисуем иконку фичи (до
  // открытия уровня она спрятана «туманом»). Данные-управляемо: новый блок в
  // LEVELS автоматически даёт новый узел, ничего не хардкодим (см. validateLevels).
  function levelFeatures(){
    const seen=new Set(), out={};
    LEVELS.forEach((lv,i)=>{
      const ev=lv.events||{}, fresh=[];
      EVENT_KEYS.forEach(k=>{ if(ev[k] && !seen.has(k)){ fresh.push(k); seen.add(k); } });
      if(fresh.length) out[i]=fresh;
    });
    return out;
  }

    '<rect x="30" y="8" width="10" height="7" rx="2" fill="#bfe9ff" opacity=".85"/>'+  // стекло
    '<circle cx="34" cy="5" r="2" fill="#ef5365"/>'+                                   // маячок
    '<circle cx="19" cy="33" r="7" fill="#1c1828" stroke="#0e0b16" stroke-width="2"/>'+
    '<circle cx="38" cy="33" r="7" fill="#1c1828" stroke="#0e0b16" stroke-width="2"/>'+
    '<circle cx="19" cy="33" r="2.4" fill="#5a5470"/><circle cx="38" cy="33" r="2.4" fill="#5a5470"/></svg>';
  // карта уровней (дизайн-система): пагинация по LV_PER, ветка бонус-уровня,
  // узлы со звёздами/замком/бейджем механики. Данные те же (LEVELS, save.stars,
  // save.unlocked, bonusAfter/bonusUnlocked) — меняется только облик.
  let levelPage = 0, levelPageInit = false;
  const LV_PER = 5;
  function renderLevels(){
    const host=document.getElementById('levelList'); host.innerHTML='';
    let got=0; for(let i=0;i<LEVELS.length;i++) got+=save.stars[i]||0;
    const max=LEVELS.length*3, sc=document.getElementById('starCount');
    if(sc) sc.innerHTML=SVGIC('star')+` <b>${got}</b> <span class="muted">/ ${max}</span> <span class="unit">${t('levels.stars')}</span>`;

    const feats=levelFeatures();
    const pages=Math.max(1, Math.ceil(LEVELS.length/LV_PER));
    const cur=Math.min(save.unlocked-1, LEVELS.length-1);   // текущий играбельный (0-based)
    if(!levelPageInit){ levelPage=Math.floor(cur/LV_PER); levelPageInit=true; }  // открыть на текущем
    if(levelPage>=pages) levelPage=pages-1; if(levelPage<0) levelPage=0;
    const start=levelPage*LV_PER;
    const tiles=[]; for(let i=start;i<Math.min(start+LV_PER,LEVELS.length);i++) tiles.push(i);

    const map=document.createElement('div'); map.className='lvlmap';
    const prev=document.createElement('button'); prev.className='lvlmap__arrow'; prev.innerHTML=SVGIC('back');
    prev.disabled=levelPage===0; prev.onclick=()=>{ levelPage--; renderLevels(); };
    const next=document.createElement('button'); next.className='lvlmap__arrow'; next.innerHTML=SVGIC('fwd');
    next.disabled=levelPage>=pages-1; next.onclick=()=>{ levelPage++; renderLevels(); };
    const stage=document.createElement('div'); stage.className='lvlmap__stage';
    const line=document.createElement('div'); line.className='lvlmap__line'; stage.appendChild(line);

    // бонус-уровень, чей «after» попадает на эту страницу — ветка над лентой
    let pageBonus=null; for(const i of tiles){ const bn=bonusAfter(i+1); if(bn){ pageBonus=bn; break; } }
    if(pageBonus){
      const unl=bonusUnlocked(pageBonus);
      const wrap=document.createElement('div'); wrap.className='lvlmap__bonus';
      const node=document.createElement('div'); node.className='lvlnode bonus'+(unl?'':' locked');
      node.style.cursor=unl?'pointer':'default';
      node.innerHTML=`<div class="bonus-tag">${pageBonus.emoji||'★'}</div>`+SVGIC('gift');
      node.title = unl ? (bonusName(pageBonus)+(pageBonus.emoji?' '+pageBonus.emoji:'')) : t('bonus.req',{n:pageBonus.after});
      if(unl) node.onclick=()=>startBonus(pageBonus);
      const branch=document.createElement('div'); branch.className='branch';
      wrap.appendChild(node); wrap.appendChild(branch); stage.appendChild(wrap);
    }

    const nodes=document.createElement('div'); nodes.className='lvlmap__nodes';
    tiles.forEach(i=>{
      const unlocked=debug.unlockAll||i<save.unlocked, stars=save.stars[i]||0;
      const st = !unlocked ? 'locked' : (i===cur ? 'active' : 'done');
      const node=document.createElement('div'); node.className='lvlnode '+st;
      let inner='';
      if(unlocked) inner+='<div class="lvlnode__stars">'+[0,1,2].map(n=>'<span'+(n<stars?'':' class="off"')+' style="display:inline-flex">'+SVGIC('star')+'</span>').join('')+'</div>';
      inner+= unlocked ? `<span class="lvlnode__num">${String(i+1).padStart(2,'0')}</span>` : SVGIC('lock');
      const feat=feats[i];
      if(feat){ const meta=FEATURE_META[feat[0]]||{icon:'?'}; inner+=`<span class="lvlnode__feat" title="${unlocked?t('feat.'+feat[0]):t('feat.mystery')}">${unlocked?meta.icon:'?'}</span>`; }
      if(st==='active') inner+=`<div class="lvlnode__label">${t('start.play')}</div>`;
      node.innerHTML=inner;
      let label=t('level.name',{n:i+1})+' — '+levelName(i);
      if(!unlocked) label+=' — '+t('levels.locked');
      else if(feat) label+=' — '+t('feat.'+feat[0]);
      node.setAttribute('aria-label',label);
      if(unlocked) node.onclick=()=>startLevel(i);
      nodes.appendChild(node);
    });
    stage.appendChild(nodes);
    map.appendChild(prev); map.appendChild(stage); map.appendChild(next);

    const dots=document.createElement('div'); dots.className='lvlmap__dots';
    for(let p=0;p<pages;p++){ const d=document.createElement('span'); d.className='dot'+(p===levelPage?' on':''); d.onclick=()=>{ levelPage=p; renderLevels(); }; dots.appendChild(d); }

    host.appendChild(map); host.appendChild(dots);
  }
  // сцепка между вагонами; если bn задан — на ней «выпавший чемодан» = бонус-уровень N½
  // (открыт — кликабелен и показывает 🦋, закрыт — «?» с подсказкой про нужный уровень)
  function couplingEl(bn){
    const cp=document.createElement('div'); cp.className='coupling';
    if(bn){
      const unl=bonusUnlocked(bn), done=(save.stars['bonus_'+bn.id]||0)>0;
      if(unl) cp.className += done?' unlocked done':' unlocked';
      const label = unl ? (bonusName(bn)+(bn.emoji?' '+bn.emoji:'')) : t('bonus.req',{n:bn.after});
      const sc=document.createElement('span'); sc.className='bonuscase';
      sc.setAttribute('title',label); sc.setAttribute('aria-label',label);
      sc.textContent = unl ? (bn.emoji||(bn.after+'½')) : '?';
      if(unl) sc.onclick=()=>startBonus(bn);
      cp.appendChild(sc);
    }
    return cp;
  }

  // ---- полноэкранный режим (для телефона: убирает прокрутку и адресную строку) ----
  function lockLandscape(){
    try{ if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){}
  }
  function inFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function toggleFullscreen(){
    const el = document.documentElement;
    if(!inFullscreen()){
      const req = el.requestFullscreen || el.webkitRequestFullscreen;   // iOS Safari не поддерживает fullscreen для div — там помогает «Добавить на экран»
      if(req){ try{ const r = req.call(el); if(r && r.then) r.then(lockLandscape).catch(()=>{}); else lockLandscape(); }catch(e){} }
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if(exit){ try{ exit.call(document); }catch(e){} }
    }
  }
  { const b=document.getElementById('fsBtn'); if(b) b.onclick=toggleFullscreen; }

  // ---- окно постановки целей смены ----
  // Показывается в начале каждого раунда (на паузе), а также по кнопке «Цели» в
  // паузе. Закрыть: «Понятно» или тап мимо карточки. Звёзды: 1★ цель, 2★ без
  // наземных штрафов, 3★ без крушений (см. computeStars). В Survival — рекорд без звёзд.
  let goalsFromPause=false;
  // Цели смены одной разметкой: звёзды (1★ цель, 2★ без наземных штрафов, 3★ без
  // крушений) + подсказка биома. В Survival — рекорд без звёзд. Используется и окном
  // постановки целей в начале раунда, и встроенным блоком в паузе.
  // иконки целей (24×24, цвет наследуется через currentColor — раскрашиваем в CSS)
  const GICON = {
    clock:  '<svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.6" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.4V12l3.1 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    plane:  '<svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 16v-1.9l-7.5-4.7V3.7a1.5 1.5 0 0 0-3 0v5.7L3 14.1V16l7.5-2.3V18.6L8.4 20.1V21.6l3.1-.9 3.1.9v-1.5l-2.1-1.5V13.7z" fill="currentColor"/></svg>',
    wrench: '<svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21.7 18.4l-7.1-7.1a4.6 4.6 0 0 0-5.8-5.9l2.9 2.9-2.5 2.5-2.9-2.9a4.6 4.6 0 0 0 5.9 5.8l7.1 7.1a1 1 0 0 0 1.4 0l1.1-1.1a1 1 0 0 0 0-1.3z" fill="currentColor"/></svg>',
    // гусеница (для бонус-мира «луг бабочек»): сегменты-кружки + голова с усиками
    caterpillar: '<svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="15.5" r="3" fill="currentColor"/><circle cx="9.4" cy="14.6" r="3.3" fill="currentColor"/><circle cx="14" cy="13.7" r="3.5" fill="currentColor"/><circle cx="18.4" cy="12.6" r="3.8" fill="currentColor"/><path d="M17.4 9.1l-.7-2.2M19.7 9l.9-2.1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  };
  const INF = '∞';
  function hasI18n(key){ return (I18N[lang] && I18N[lang][key]!=null) || (I18N[DEFAULT_LANG] && I18N[DEFAULT_LANG][key]!=null); }
  // окно/блок целей: вызов + обучающая строка + цели и звёзды-градация иконками.
  // Та же разметка для окна постановки целей и для встроенного блока в паузе.
  function goalRowsHTML(){
    if(survival){
      const best = save.best[levelKey]||0;
      const hint = LV.biome ? `<p class="m-subtitle">${t('biome.'+LV.biome+'.hint')}</p>` : '';
      return `${hint}<p class="m-subtitle">${t('goals.survival')}</p>`+
        `<div class="goal-line"><span class="g g--inf">${GICON.clock}${INF}</span>`+
        `<span class="g g--target">${GICON.plane}${fmtNum(best)}</span></div>`;
    }
    const o = LV.objective, stars = o.stars || [o.target, o.target, o.target];
    // основная метрика: гусеница на лугу бабочек, 🔧 на апгрейд-уровнях, иначе ✈
    const primary = LV.bonus==='butterfly' ? GICON.caterpillar
                  : o.metric==='upgrades' ? GICON.wrench : GICON.plane;
    // вызов (краткое описание) + обучающая строка
    let head;
    if(LV.biome) head = `<p class="m-subtitle">${t('biome.'+LV.biome+'.hint')}</p>`;
    else if(LV.bonus) head = `<p class="m-subtitle">${objectiveDesc()}</p>`;
    else {
      const n = levelIdx+1, dk='level.d.'+n, hk='level.h.'+n;
      head = `<p class="m-subtitle">${hasI18n(dk) ? t(dk) : objectiveDesc()}</p>`;
      if(hasI18n(hk)) head += `<p class="m-subtitle" style="color:var(--m-accent)">${t(hk)}</p>`;
    }
    // сводка целей: ⏱ время/∞  +  основная метрика (потолок или ∞ для race)
    const timeStr = o.time ? fmtTime(o.time) : INF;
    const headTarget = o.race ? INF : fmtNum(o.target);
    let line = `<div class="goal-line"><span class="g g--inf">${GICON.clock}${timeStr}</span>`+
               `<span class="g g--target">${primary}${headTarget}</span>`;
    if(o.upg) line += `<span class="g g--target">${GICON.wrench}${fmtNum(o.upg[o.upg.length-1])}</span>`;
    line += `</div>`;
    // пороги звёзд (3★ сверху): ★-иконки + порог по метрике (+ 🔧 на старших)
    const rows = [2,1,0].map(i=>{
      const st=i+1;
      const starsHtml=[0,1,2].map(n=>'<span'+(n<st?'':' class="off"')+' style="display:inline-flex">'+SVGIC('star')+'</span>').join('');
      let req = `<span class="req">${primary}${fmtNum(stars[i])}</span>`;
      if(o.upg && o.upg[i]>0) req = `<span class="req">${primary}${fmtNum(stars[i])} <span class="req-upg">${GICON.wrench}${fmtNum(o.upg[i])}</span></span>`;
      return `<div class="row"><span class="stars">${starsHtml}</span>${req}</div>`;
    }).join('');
    return `${head}${line}<div class="thresholds">${rows}</div>`;
  }
  function buildGoalsContent(){

  // ================= ДОСТИЖЕНИЯ / МЕДАЛИ =================
  // Самодостаточный модуль: ловит игровые события через ACH.onX(...), копит
  // прогресс в save.ach (список открытых) и save.stats (накопительные счётчики).
  // Шум ограничен: максимум 2 медали за раунд, всплывашки не чаще раза в минуту
  // (см. RUN_CAP/TOAST_GAP_MS); во всплывашке — название и за что дана.
  // ⏳ pending:true — медали под фичи, которых пока нет (бесконечный режим, Daily) —
  // крючки есть, но в текущих уровнях не срабатывают и не нужны для «Легенды».
  const ACH = (() => {
    // анти-шум: не больше RUN_CAP медалей за раунд (остальные придут в следующих
    // сменах — условия перепроверяются), уведомления не чаще TOAST_GAP_MS
    const RUN_CAP=2, TOAST_GAP_MS=60000, TOAST_SHOW_MS=4000;
    const S = { ach:[], stats:{landed:0,services:0,departed:0,earned:0,vip:0,noCrashStreak:0,perfect:0} };
    let unlocked = new Set();
    let run = null;
    function newRun(){ run = {landed:0,services:0,departed:0,opens:0,upgrades:0,peakAir:0,
      landTimes:[], types:new Set(), debug:false, time:0, given:0}; }
    newRun();

    const defs = [
      // --- Тир 1: лайтовые ---
      {id:'land1',   tier:1, ic:'🛬'},
      {id:'svc1',    tier:1, ic:'🧰'},
      {id:'takeoff1',tier:1, ic:'🛫'},
      {id:'money1',  tier:1, ic:'🪙'},
      {id:'bayopen1',tier:1, ic:'🏗️'},
      {id:'upg1',    tier:1, ic:'⬆️'},
      {id:'pause',   tier:1, ic:'⏸️'},
      {id:'level1',  tier:1, ic:'✅'},
      {id:'vip1',    tier:1, ic:'💛'},
      {id:'land10',  tier:1, ic:'🎓', prog:S=>[S.landed,10]},
      // --- Тир 2: обычные ---
      {id:'land100', tier:2, ic:'🌊', prog:S=>[S.landed,100]},
      {id:'svc100',  tier:2, ic:'🔧', prog:S=>[S.services,100]},
      {id:'earn1000',tier:2, ic:'💵', prog:S=>[S.earned,1000]},
      {id:'fullchain',tier:2,ic:'🎯'},
      {id:'nopenalty',tier:2,ic:'🧊'},
      {id:'nolife',  tier:2, ic:'❤️'},
      {id:'air5',    tier:2, ic:'🛫'},
      {id:'star3',   tier:2, ic:'🌟'},
      {id:'vip25',   tier:2, ic:'💼', prog:S=>[S.vip,25]},
      {id:'baymax',  tier:2, ic:'🛠️'},
      // --- Тир 3: сложные ---
      {id:'nocrash', tier:3, ic:'☁️'},
      {id:'perfect', tier:3, ic:'💎'},
      {id:'air8',    tier:3, ic:'🤹'},
      {id:'speed20', tier:3, ic:'⚡'},
      {id:'minimalist',tier:3,ic:'🪨'},
      {id:'millionaire',tier:3,ic:'💰', prog:S=>[S.earned,1000000]},
      {id:'combo10', tier:3, ic:'🔥'},
      {id:'marathon',tier:3, ic:'🏃', pending:true},
      // --- Тир 4: задротские ---
      {id:'streak1000',tier:4,ic:'🧠', prog:S=>[S.noCrashStreak,1000]},
      {id:'land10000',tier:4,ic:'🎖️', prog:S=>[S.landed,10000]},
      {id:'all3star',tier:4, ic:'⭐'},
      {id:'ascetic', tier:4, ic:'🧘'},
      {id:'perfectionist',tier:4,ic:'🥇', prog:S=>[S.perfect,10]},
      {id:'daily7',  tier:4, ic:'📅', pending:true},
      {id:'sleepless',tier:4,ic:'🌙', pending:true},
      {id:'surv500', tier:4, ic:'🛟'},
      {id:'combo50', tier:4, ic:'🔥', pending:true},
      // --- Соревновательные (ранговые): пороговые НАВСЕГДА, по глобальному рейтингу.
      //     comp:true → НЕ входят в требование «Легенды» (Легенда = мастерство соло-игры,
      //     не зависит от чужих результатов и наличия сервера). См. ACH.onRank / Leaderboard. ---
      {id:'rank_top100', tier:4, ic:'🏅', comp:true},
      {id:'rank_top10',  tier:4, ic:'🏆', comp:true},
      {id:'rank_1',      tier:4, ic:'👑', comp:true},
      {id:'legend',  tier:4, ic:'🛐'},
      // --- Тир 5: секретные / фановые (скрыты до получения) ---
      {id:'crash10s',tier:5, ic:'💥', hidden:true},
      {id:'asleep',  tier:5, ic:'😴', hidden:true},
      {id:'crashbay',tier:5, ic:'🅿️', hidden:true},
      {id:'crashrw', tier:5, ic:'💢', hidden:true},
      {id:'groundto',tier:5, ic:'⌛', hidden:true},
      {id:'moneyneg',tier:5, ic:'🤑', hidden:true},
      {id:'longshift',tier:5,ic:'🕰️', hidden:true, pending:true},
      {id:'zoo',     tier:5, ic:'🦁', hidden:true},
    ];

    function persist(){ save.ach=[...unlocked]; save.stats=S.stats; saveGame(); }
    // Третья и далее медаль за раунд СГОРАЕТ: отложенной выдачи нет, в новом раунде
    // «за прошлое» ничего не приходит. Одноразовые (за 1 действие) можно получить,
    // только совершив действие заново; накопительные прогресса не теряют
    // (save.stats растёт) и придут при следующем срабатывании счётчика.
    function give(id){
      if(unlocked.has(id)) return;
      if(run.given>=RUN_CAP) return;
      const d=defs.find(x=>x.id===id); if(!d) return;
      run.given++;
      unlocked.add(id); persist(); toastAch(d);
      checkLegend();
    }
    function checkLegend(){
      if(unlocked.has('legend')) return;
      const need=defs.filter(x=>x.id!=='legend' && !x.pending && !x.comp);
      if(need.every(x=>unlocked.has(x.id))) give('legend');
    }
    // выдать медаль МИМО RUN_CAP (для редких крупных событий — ранг в глобальном рейтинге).
    // Лимит «2 за раунд» сделан против шума накопительных медалей; ранг-медаль им не является.
    function giveForce(id){
      if(unlocked.has(id)) return;
      const d=defs.find(x=>x.id===id); if(!d) return;
      unlocked.add(id); persist(); toastAch(d); checkLegend();
    }

    // всплывашка: очередь, по одной, не чаще раза в минуту; на границе раундов
    // остаток очереди показывается сразу (flushToasts) — в новый раунд не утекает
    let q=[], showing=false, lastShown=-1e9, gapTimer=null;
    function toastAch(d){ q.push(d); if(!showing) pump(); }
    function pump(){
      const el=document.getElementById('achToast');
      if(!q.length){ showing=false; return; }
      showing=true;
      const wait = lastShown + TOAST_GAP_MS - performance.now();
      if(wait>0){ gapTimer=setTimeout(()=>{ gapTimer=null; pump(); }, wait); return; }
      lastShown = performance.now();
      const d=q.shift();
      document.getElementById('achIc').textContent=d.ic;
      document.getElementById('achTtl').textContent=t('ach.'+d.id+'.t');
      document.getElementById('achDsc').textContent=t('ach.'+d.id+'.d');
      SND.medal();
      el.classList.add('show');
      setTimeout(()=>{ el.classList.remove('show'); setTimeout(pump, 360); }, TOAST_SHOW_MS);
    }
    function flushToasts(){
      lastShown=-1e9;
      if(gapTimer){ clearTimeout(gapTimer); gapTimer=null; pump(); }
    }

    return {
      defs,
      init(){ S.ach=Array.isArray(save.ach)?save.ach:[]; Object.assign(S.stats, save.stats||{}); unlocked=new Set(S.ach); },
      onLevelStart(){ flushToasts(); newRun(); },   // рестарт посреди раунда: недопоказанное — сразу, хвостов нет
      onPlaneTouched(pl){ if(pl) pl.everTouched=true; },
      onPause(){ give('pause'); },
      onLand(){
        S.stats.landed++; run.landed++; S.stats.noCrashStreak++;
        run.landTimes.push(gameTime);
        give('land1');
        if(S.stats.landed>=10) give('land10');
        if(S.stats.landed>=100) give('land100');
        if(S.stats.landed>=10000) give('land10000');
        if(S.stats.noCrashStreak>=1000) give('streak1000');
        if(run.landed>=500) give('surv500');
        const cut=gameTime-60; while(run.landTimes.length && run.landTimes[0]<cut) run.landTimes.shift();
        if(run.landTimes.length>=20) give('speed20');
      },
      onService(){ S.stats.services++; run.services++; give('svc1'); if(S.stats.services>=100) give('svc100'); },
      onDepart(pl, pay){
        S.stats.departed++; run.departed++; S.stats.earned+=Math.max(0,pay);
        run.types.add(pl.emergency?'emg':(pl.vip?'vip':'std'));
        give('takeoff1'); if(S.stats.earned>=1) give('money1');
        if(S.stats.earned>=1000) give('earn1000');
        if(S.stats.earned>=1000000) give('millionaire');
        if(pl.vip){ S.stats.vip++; give('vip1'); if(S.stats.vip>=25) give('vip25'); }
        if(pl.nSvc>=2) give('fullchain');
        if(combo>=10) give('combo10');
        if(combo>=50) give('combo50');
        if(run.types.has('std')&&run.types.has('vip')&&run.types.has('emg')) give('zoo');
        persist();
      },
      onBayOpen(){ run.opens++; give('bayopen1'); },
      onBayUpgrade(b){ run.upgrades++; give('upg1'); if(b.lvl>=K.BAY_MAX_LVL) give('baymax'); },
      onGroundTimeout(){ give('groundto'); },
      onCrash(pl, reason){
        S.stats.noCrashStreak=0; persist();
        if(gameTime<10) give('crash10s');
        if(reason==='loss.collisionBay') give('crashbay');
        if(reason==='loss.collisionRunway') give('crashrw');
        if(reason==='loss.airTimeout' && !pl.everTouched) give('asleep');
      },
      onTick(dt){
        if(debug.infiniteLives||debug.richStart) run.debug=true;
        run.time+=dt;
        let air=0; for(const p of planes) if(!p.dead && p.zone==='air') air++;
        if(air>run.peakAir) run.peakAir=air;
        if(run.peakAir>=5) give('air5');
        if(run.peakAir>=8) give('air8');
        if(money<0) give('moneyneg');
        if(run.time>=900) give('marathon');
        if(run.time>=1800) give('longshift');
        if(run.time>=3600) give('sleepless');
      },
      onLevelEnd(passed, stars, livesFull){
        const clean=!run.debug;
        if(passed){
          give('level1');
          if(clean && livesFull) give('nolife');
          if(clean && runPenalties===0) give('nopenalty');
          if(clean && runCrashes===0) give('nocrash');
          if(clean && run.opens===0) give('minimalist');
        }
        if(stars>=3){
          give('star3');
          if(clean && livesFull) give('perfect');
          if(clean && run.opens===0 && run.upgrades===0) give('ascetic');
          S.stats.perfect++; if(S.stats.perfect>=10) give('perfectionist');
          let all=LEVELS.length>0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)<3) all=false;
          if(all) give('all3star');
        } else {
          S.stats.perfect=0;
        }
        persist();
        checkLegend();    // «Легенда» (вся коллекция) — на итогах раунда, не посреди игры
        flushToasts();    // остаток уведомлений — на экран итогов, в новый раунд не утекает
      },
      // ранг-медали (пороговые навсегда): лучший достигнутый ранг по ЛЮБОМУ срезу
      // (all-time/month/week) открывает медаль. Зовётся после Leaderboard.submitRun().
      onRank(ranks){
        if(!ranks) return;
        let best=Infinity; for(const k in ranks){ const r=ranks[k]; if(r) best=Math.min(best, r); }
        if(best<=100) giveForce('rank_top100');
        if(best<=10)  giveForce('rank_top10');
        if(best===1)  giveForce('rank_1');
      },
      flushToasts,
      list(){
        const out=[];
        for(const d of defs){
          let prog=null;
          if(d.prog) prog=d.prog(S.stats);
          else if(d.id==='all3star'){ let c=0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)>=3)c++; prog=[c,LEVELS.length]; }
          else if(d.id==='legend'){ const tot=defs.filter(x=>x.id!=='legend'&&!x.pending&&!x.comp); prog=[tot.filter(x=>unlocked.has(x.id)).length, tot.length]; }
          out.push({id:d.id,tier:d.tier,ic:d.ic,title:t('ach.'+d.id+'.t'),desc:t('ach.'+d.id+'.d'),hidden:!!d.hidden,pending:!!d.pending,got:unlocked.has(d.id),prog});
        }
        return out;
      },
    };
  })();

  // ---- экран медалей ----
  let medalFrom='start';
  const MEDAL_RAR=['r-common','r-rare','r-epic','r-legend','r-legend'];   // tier 1..5 → редкость диска
  function renderMedals(){
    const list=ACH.list();
    const got=list.filter(m=>m.got).length, total=list.length;
    document.getElementById('medalCount').innerHTML =
      SVGIC('medal')+` <b>${got}</b> <span class="muted">/ ${total}</span>`;
    const grid=document.getElementById('medalGrid'); grid.innerHTML='';
    const pct=total?Math.round(got/total*100):0;
    const prog=document.createElement('div'); prog.className='medal-progress'; prog.style.gridColumn='1 / -1';
    prog.innerHTML=`<div class="medal-progress__track"><div class="medal-progress__fill" style="width:${pct}%"></div></div>`;
    grid.appendChild(prog);
    for(const tier of [1,2,3,4,5]){
      const items=list.filter(x=>x.tier===tier); if(!items.length) continue;
      const head=document.createElement('div'); head.className='medal-cat';
      head.textContent=t('medals.tier'+tier); grid.appendChild(head);
      for(const m of items){
        const masked = m.hidden && !m.got;             // секретная и ещё не открыта
        const rar = MEDAL_RAR[tier-1]||'r-common';
        const el=document.createElement('div');
        el.className='medal2 '+rar+(m.got?' unlocked':' locked');
        const ic = masked ? '❔' : m.ic;
        const title = masked ? t('medals.secretTitle') : m.title;
        let desc = masked ? t('medals.secretDesc') : m.desc;
        if(m.pending && !m.got && !masked) desc += t('medals.pendingNote');
        let foot;
        if(m.prog && !m.got && !masked){
          const c=Math.min(m.prog[0],m.prog[1]);
          foot=`<div class="medal2__desc" style="color:var(--m-gold);font-weight:800">${fmtNum(c)} / ${fmtNum(m.prog[1])}</div>`;
        } else foot=`<span class="medal2__rar">${t('medals.tier'+tier)}</span>`;
        el.innerHTML=(m.got?`<span class="medal2__check">${SVGIC('check')}</span>`:'')+
          `<div class="medal2__disc">${m.got?ic:SVGIC('lock')}</div>`+
          `<div class="medal2__name">${title}</div><div class="medal2__desc">${desc}</div>${foot}`;
        grid.appendChild(el);
      }
    }
  }
  function openMedals(from){ medalFrom=from||'start'; renderMedals(); hideAllScreens();
    document.getElementById('medalScreen').classList.remove('hidden'); }
  document.getElementById('medalsBtn').onclick=()=>openMedals('start');
  { const b=document.getElementById('leaderboardBtn'); if(b) b.onclick=showLeaderboard; }
  { const b=document.getElementById('leaderboardBackBtn'); if(b) b.onclick=()=>{ showStart(); }; }
  document.getElementById('medalsBackBtn').onclick=()=>{
    if(medalFrom==='levels'){ hideAllScreens(); showLevels(); }
    else showStart();
  };

  loadGame();
  loadDebug();                        // восстановление отладочных читов (localStorage)
  saveGame();                         // миграция: сейв сразу переезжает под новый ключ
  ACH.init();
  lang = save.lang || DEFAULT_LANG;   // сохранённый выбор > английский по умолчанию
  applyI18n();
  applyMenuIcons();                   // заполнить статические иконки меню (data-mic)
  updateStartChips();                 // чип звёзд на главном экране
  Analytics.init();                   // шина метрик: userId/сессия/first_open + ловля крашей
  // мягкая самопроверка конфига при загрузке: в dev сразу видно в консоли, если
  // новая механика/уровень нарушили правила (жёстко это же проверяют тесты)
  try{ const _pr = validateGame(); if(_pr.length) console.error('[PlaneFlow] проблемы конфига:\n  '+_pr.join('\n  ')); }catch(e){ console.error(e); }
  SND.setEnabled(save.sound!==false); HAP.on = save.vibro!==false;
  syncSettingsUI();
  document.getElementById('ver').textContent=VERSION;
  resize();
  requestAnimationFrame(frame);

  // ---- тест-API (только при ?test=1) ----
  // Даёт тестам дотянуться до чистой логики и до путей завершения уровня без
  // рефактора всей игры и без хрупкой имитации перетаскивания. В обычном запуске
  // (без ?test=1) ничего не выставляется — прод-поведение не меняется.
  if(typeof location!=='undefined' && /[?&]test=1(?:&|$)/.test(location.search)){
    window.__GAME = {
      VERSION, LEVELS, BIOMES, BONUS, K, I18N, SVC, DEFAULT_LANG, EVENT_KEYS, SVC_TYPES, WEATHER_KINDS,
      t, levelEvents, levelName, objectiveDesc, computeStars, metricValue, goalRowsHTML,
      levelEconomy, levelEffects, levelDifficulty, levelPace, paceInterval, paceCap, airPatience,
      dayCycle, weatherTaxiMult, neededCrew,
      bonusAfter, bonusUnlocked, bonusName,
      get nightAmount(){ return nightAmount; }, get weather(){ return weather; },
      validateGame, validateLevels, validateBonus, validateI18n, validateConfig,
      saveGame, loadGame, setLang, detectLang, Analytics,
      get save(){ return save; },     set save(v){ save=v; },
      get lang(){ return lang; },
      get levelIdx(){ return levelIdx; },
      get survival(){ return survival; }, set survival(v){ survival=v; },
      currentMode, periodBucket, Leaderboard, ACH, validateLeaderboard,
      get served(){ return served; }, set served(v){ served=v; },
      // выставить текущий уровень кампании (levelKey=индекс — как в buildLevel)
      setLevel(i){ levelIdx=i; levelKey=i; LV=LEVELS[i]; },
      // выставить бонус-уровень как текущий (без layout/DOM — для проверки окна целей)
      setBonus(b){ curBiome=null; curBonus=b; levelIdx=-1; levelKey='bonus_'+b.id; LV=b.level; },
      // выставить биом-карту (Survival) как текущую — для тестов levelEvents/Survival
      setBiome(b){ curBiome=b; curBonus=null; survival=true; levelIdx=-1; levelKey='b_'+b.id; LV=b.level; },
      // прогон РЕАЛЬНОГО пути завершения смены: выставляем результат и зовём те же
      // computeStars()/recordResult(), что и в игре — проверяем звёзды, открытие
      // следующего уровня и сохранение, не трогая отрисовку и ввод.
      simulateResult(opts){
        opts = opts || {};
        survival = false;
        levelIdx = opts.level||0; levelKey = levelIdx; LV = LEVELS[levelIdx];
        served = opts.served||0; upgradesDone = opts.upgrades||0;
        runPenalties = opts.penalties||0; runCrashes = opts.crashes||0;
        const stars = computeStars(); recordResult();
        return { stars, unlocked: save.unlocked, best: save.best[levelKey], saved: save.stars[levelKey] };
      },
    };
  }
})();
</script>

<script>
/* ===== PWA: регистрация service worker + тост обновления =====
 * SW даёт офлайн-старт; контент по-прежнему обновляется мгновенно (navigation
 * грузится network-first). Когда меняется сам sw.js (VERSION), новый воркер
 * встаёт в ожидание, мы показываем тост, и по нажатию делаем skipWaiting +
 * единоразовый reload через событие controllerchange. */
(() => {
  if (!('serviceWorker' in navigator)) {
    // Без service worker контент и так грузится network-first — «проверить
    // обновления» сводится к обычной перезагрузке свежей страницы.
    window.pwaCheckForUpdates = () => { location.reload(); return Promise.resolve('updating'); };
    return;
  }
  const swUrl = new URL('sw.js', location.href).href; // относительно подпапки (GitHub Pages)
  let swReg = null;

  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return; reloading = true; location.reload();
  });

  function showUpdate(worker) {
    const t = document.getElementById('pwaUpdate'); if (!t || !worker) return;
    t.classList.add('show');
    const btn = document.getElementById('pwaUpdateBtn');
    btn.onclick = () => { t.classList.remove('show'); worker.postMessage('SKIP_WAITING'); };
  }

  // Проверка обновлений по запросу (кнопка в настройках). Возвращает Promise со
  // строкой-статусом: 'updating' — нашли новую версию приложения, она сама
  // применится и перезагрузит страницу (sw.js делает skipWaiting на install);
  // 'refreshed' — версия актуальна, перекачали закэшированные ресурсы/PNG скинов
  // и перезагружаемся; 'offline' — проверка не удалась (нет сети).
  window.pwaCheckForUpdates = async () => {
    if (!swReg) { location.reload(); return 'updating'; }
    try { await swReg.update(); } catch { return 'offline'; }

    // Если появился новый воркер — это апдейт приложения. sw.js на install
    // вызывает skipWaiting()+clients.claim(), так что controllerchange сам
    // перезагрузит страницу; на всякий случай подталкиваем waiting-воркер.
    const incoming = swReg.installing || swReg.waiting;
    if (incoming) {
      const nudge = () => { if (swReg.waiting) swReg.waiting.postMessage('SKIP_WAITING'); };
      if (incoming.state === 'installed') nudge();
      else incoming.addEventListener('statechange', () => { if (incoming.state === 'installed') nudge(); });
      return 'updating';
    }

    // Shell актуален — просим SW освежить кэш ресурсов (спрайты, PNG скинов),
    // ждём подтверждения и перезагружаемся, чтобы отрисовался новый арт.
    const sw = navigator.serviceWorker.controller;
    if (!sw) { reloading = true; location.reload(); return 'refreshed'; }
    await new Promise((resolve) => {
      let done = false;
      const finish = () => { if (done) return; done = true; navigator.serviceWorker.removeEventListener('message', onMsg); resolve(); };
      const onMsg = (ev) => { if (ev.data && ev.data.type === 'ASSETS_REFRESHED') finish(); };
      navigator.serviceWorker.addEventListener('message', onMsg);
      sw.postMessage({ type: 'REFRESH_ASSETS' });
      setTimeout(finish, 8000); // подстраховка, если ответ не пришёл
    });
    reloading = true; location.reload();
    return 'refreshed';
  };

  window.addEventListener('load', () => {
    navigator.serviceWorker.register(swUrl).then((reg) => {
      swReg = reg;
      // обновление уже скачалось, пока вкладка была закрыта
      if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', () => {
          // controller != null → это апдейт, а не первая установка
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdate(nw);
        });
      });
      // долго открытая вкладка/установленное приложение — периодически проверяем деплой
      setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);
    }).catch(() => { /* нет https / приватный режим — игра работает и без SW */ });
  });
})();
</script>
