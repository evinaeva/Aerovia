<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PlaneFlow</title>
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="application-name" content="PlaneFlow">
<meta name="apple-mobile-web-app-title" content="PlaneFlow">
<meta name="theme-color" content="#16131f">
<style>
  /* ===== облик «cozy / stylized-flat» (см. CHANGELOG) ===== */
  :root{
    --ink:#16131f;
    --tarmac:#242842;
    --tarmac-2:#2c3150;
    --water:#1c3a42;
    --grid:#2a2f4a;
    --phosphor:#cdb0f7;   /* cozy-акцент (бывш. радарный циан) */
    --paper:#f4eede;
    --muted:#9a93b5;
    --amber:#f2a93b;   /* ремонт */
    --teal:#4ecdc4;    /* топливо */
    --ice:#7fd6ff;     /* де-айсинг */
    --rose:#ef798a;    /* посадка людей */
    --gold:#f4cf5e;    /* вип / деньги / вылет */
    --life:#ef5365;
    --coin:#f4cf5e;
    --panel:rgba(33,29,51,.96);
    --raised:#2a2540;          /* warm raised card surface (mockups) */
    --pur-line:rgba(154,111,212,.32);
    --card-r:20px;             /* card corner radius (warm rounded) */
    --serif:Georgia,"Times New Roman",serif;
    /* UI font: warm sans-serif per wireframes.md (canvas still uses MONO separately) */
    --ui:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#110e18;overflow:hidden;overscroll-behavior:none;position:fixed;width:100%;inset:0}
  body{
    font-family:var(--ui);
    color:var(--paper);
    user-select:none;-webkit-user-select:none;
  }
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;touch-action:none;display:block}

  .overlay{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    background:radial-gradient(120% 90% at 50% 40%, rgba(6,11,18,.55), rgba(6,11,18,.92));
    backdrop-filter:blur(2px);z-index:5;
  }
  /* панель масштабируется под экран телефона (см. fitOverlays): origin по центру,
     чтобы уменьшенная панель оставалась в центре и не появлялся скролл меню. */
  .overlay>.panel{transform-origin:center center;margin:0}
  /* меню: сцена-радар на канвасе видна целиком */
  #startScreen{background:none;backdrop-filter:none}
  /* старт — две колонки: бренд+арт слева, рейл действий справа (wireframes.md, мокап 01) */
  .startpanel{max-width:880px;width:94%;display:flex;align-items:center;gap:34px;text-align:left;padding:24px 30px}
  .start-brand{flex:1 1 auto;min-width:0}
  .start-brand .wordmark{margin:6px 0 8px;width:min(440px,100%)}
  .start-brand p{margin:8px 0 0}
  .start-rail{flex:0 0 248px;display:flex;flex-direction:column;gap:11px;
    background:var(--raised);border:1.5px solid var(--pur-line);border-radius:24px;
    padding:18px;box-shadow:0 18px 48px rgba(8,6,16,.5)}
  .start-rail .btn{width:100%}
  .start-rail #startBtn{padding:18px 22px;font-size:18px;border-radius:16px}
  .start-rail-row{display:flex;gap:11px}
  .start-rail-row .btn{flex:1}
  .start-rail-row #fsBtn{flex:0 0 52px;padding:14px 0}
  @media (max-width:620px){.startpanel{flex-direction:column;gap:18px}.start-rail{flex-basis:auto;width:100%}}
  .panel{text-align:center;padding:30px 26px;max-width:420px;margin:auto;flex:0 0 auto}
  .panel.wide{max-width:740px}
  .panel.card{background:var(--raised);border:1.5px solid var(--pur-line);border-radius:var(--card-r);
    box-shadow:0 18px 48px rgba(8,6,16,.5)}
  .panel .kicker{font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
  .panel h1{
    font-family:var(--ui);font-weight:800;
    font-size:38px;letter-spacing:.01em;margin:12px 0 6px;color:var(--paper);
    text-shadow:0 0 18px rgba(191,233,255,.18);
  }
  .wordmark{display:block;width:min(340px,82%);height:auto;margin:14px auto 4px}
  #startScreen .wm-fallback{display:none} /* бренд — вордмарк-спрайт; текст остаётся фолбэком для ридеров */
  .panel p{font-size:13px;line-height:1.7;color:var(--muted);margin:10px 0 0}
  .panel .big{font-size:48px;margin:8px 0 0;letter-spacing:.02em}
  #finalStars{color:var(--gold);font-size:52px;letter-spacing:.08em;text-shadow:0 0 24px rgba(244,207,94,.5)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;
    border:1.5px solid var(--pur-line);color:var(--paper);
    background:rgba(127,155,176,.06);
    font:inherit;font-weight:600;font-size:14px;letter-spacing:.02em;text-transform:none;
    padding:14px 24px;border-radius:14px;transition:.15s;
  }
  .btn:active{transform:scale(.97)}
  .btn:hover{color:var(--phosphor);border-color:rgba(181,140,240,.7);background:rgba(154,111,212,.12)}
  .btn-primary{background:#5dca7a;border-color:#5dca7a;color:var(--ink);font-weight:700;box-shadow:0 6px 18px rgba(93,202,122,.32)}
  .btn-primary:hover{background:#6fdb8b;border-color:#6fdb8b;color:var(--ink);box-shadow:0 8px 26px rgba(93,202,122,.45)}
  .btn-teal{border-color:rgba(78,205,196,.45);color:var(--teal)}
  .btn-teal:hover{color:var(--teal);border-color:var(--teal);background:rgba(78,205,196,.10)}
  .btn-rose{border-color:rgba(239,121,138,.45);color:var(--rose)}
  .btn-rose:hover{color:var(--rose);border-color:var(--rose);background:rgba(239,121,138,.10)}
  .btn-quiet{border-color:rgba(127,155,176,.35);color:var(--muted)}
  .bglyph{margin-right:7px}
  .ctarow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  .hidden{display:none}
  .settings{margin-top:16px;text-align:left;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));column-gap:20px;align-content:start}
  .settings .full{grid-column:1/-1}
  .upd-status{font-size:12px;color:var(--muted);text-align:left;margin:2px 2px 0;min-height:15px;line-height:1.3}
  /* settings rows = label left, big toggle switch right (wireframes.md) */
  .opt{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;color:var(--paper);
    margin:2px 0;padding:11px 2px;letter-spacing:0;cursor:pointer;text-transform:none;
    border-bottom:1px solid rgba(154,111,212,.14)}
  .opt span{order:1}
  .opt .langbtns{order:2}
  .opt input[type=checkbox]{order:2;appearance:none;-webkit-appearance:none;margin:0;position:relative;
    width:48px;height:26px;border-radius:14px;background:#241f33;border:1.5px solid var(--pur-line);
    cursor:pointer;transition:.15s;flex:0 0 auto}
  .opt input[type=checkbox]::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;
    border-radius:50%;background:var(--muted);transition:.15s}
  .opt input[type=checkbox]:checked{background:#5dca7a;border-color:#5dca7a}
  .opt input[type=checkbox]:checked::after{transform:translateX(22px);background:#fff}
  .subhead{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--phosphor);margin:18px 0 6px;border-bottom:1px solid rgba(191,233,255,.18);padding-bottom:4px}
  /* угловые виджеты главного экрана: флаг языка (справа внизу) и отладка (слева внизу) */
  /* медали + настройки: ряд справа внизу, прямо над флагом языка */
  .corner-actions{position:absolute;right:16px;bottom:62px;z-index:7;display:flex;gap:10px}
  .corner-actions .btn{width:56px;height:38px;padding:0;border-radius:9px;font-size:20px;
    background:var(--raised);box-shadow:0 6px 18px rgba(8,6,16,.5)}
  .corner-actions .bglyph{margin:0}
  .corner-flag{position:absolute;right:16px;bottom:16px;z-index:7;width:56px;height:38px;padding:0;
    border:1.5px solid var(--pur-line);border-radius:9px;background:var(--raised);overflow:hidden;cursor:pointer;
    box-shadow:0 6px 18px rgba(8,6,16,.5);transition:.15s}
  .corner-flag:hover{border-color:rgba(181,140,240,.7)}
  .corner-flag:active{transform:scale(.95)}
  .corner-flag svg{display:block;width:100%;height:100%;pointer-events:none}
  .corner-debug{position:absolute;left:16px;bottom:16px;z-index:7}
  .corner-debug-btn{width:46px;height:46px;padding:0;border:1.5px solid var(--pur-line);border-radius:12px;
    background:var(--raised);color:var(--muted);font-size:22px;line-height:1;cursor:pointer;
    box-shadow:0 6px 18px rgba(8,6,16,.5);transition:.15s}
  .corner-debug-btn:hover{color:var(--phosphor);border-color:rgba(181,140,240,.7)}
  .corner-debug-btn:active{transform:scale(.95)}
  .corner-debug-pop{position:absolute;left:0;bottom:54px;min-width:230px;text-align:left;
    background:var(--raised);border:1.5px solid var(--pur-line);border-radius:14px;padding:6px 14px 8px;
    box-shadow:0 18px 48px rgba(8,6,16,.6)}
  .corner-debug-pop .opt{margin:0;cursor:pointer}
  .corner-debug-pop .opt:last-child{border-bottom:none}
  .logbox{margin-top:14px;max-height:130px;overflow:auto;border-top:1px solid rgba(127,155,176,.25);padding-top:8px}
  .logrow{font-size:11px;color:var(--paper);padding:2px 0;letter-spacing:.03em}
  .logrow.muted{color:var(--muted)}
  .pausegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .pausegrid .btn{width:100%}
  .pausegrid-3{grid-template-columns:1fr 1fr 1fr;gap:10px}
  .pausegrid-3 .btn{padding:13px 6px}
  /* пауза: живая полоса статуса забега (время · деньги · прогресс цели) */
  .statstrip{display:flex;justify-content:center;flex-wrap:wrap;gap:22px;margin:6px 0 4px;padding:11px 0;
    border-top:1px solid rgba(191,233,255,.12);border-bottom:1px solid rgba(191,233,255,.12)}
  .statstrip .stat{display:flex;align-items:center;gap:7px;font-size:15px;letter-spacing:.04em}
  .statstrip .si{font-size:14px}
  .objlabel{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin:16px 0 2px}
  /* выбор смены — карточки */
  .levellist{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:9px;margin:14px 0 6px}
  .levelcard{position:relative;overflow:hidden;text-align:left;font:inherit;color:var(--paper);cursor:pointer;
    background:#211d33;border:1px solid rgba(154,111,212,.25);border-radius:10px;padding:7px 9px 8px;
    transition:.15s;box-shadow:0 1px 5px rgba(10,8,20,.35)}
  .levelcard:hover{border-color:rgba(181,140,240,.6);background:#2a2540;box-shadow:0 0 12px rgba(154,111,212,.3)}
  .levelcard.locked{background:#1b1726;border-color:rgba(138,140,153,.18);color:var(--muted);cursor:default}
  .levelcard.locked:hover{border-color:rgba(138,140,153,.18);background:#1b1726;box-shadow:0 1px 5px rgba(10,8,20,.35)}
  .levelcard .lvthumb{height:24px;border-radius:6px;margin:-1px -2px 5px;overflow:hidden;
    background:radial-gradient(120% 120% at 30% 20%,#2a2540,#14111e)}
  .levelcard .lvthumb svg{display:block;width:100%;height:100%}
  .levelcard.locked .lvthumb{opacity:.45}
  .levelcard .lvkick{font-size:7px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  .levelcard .lvnum{font-family:"Segoe UI",system-ui,sans-serif;font-weight:800;font-size:17px;line-height:1.05;margin:1px 0 0;color:#f4eede}
  .levelcard.locked .lvnum{color:var(--muted)}
  .levelcard .lvname{font-size:9px;color:var(--paper);opacity:.85;margin:0;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .levelcard .lvmeta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;min-height:11px}
  .levelcard .lvstars{display:inline-flex;gap:1.5px}
  .levelcard .lvstars svg{width:11px;height:11px;display:block}
  .levelcard .lvbest{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.02em}
  .levelcard .lvlock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(20,17,30,.55)}
  .biomecard{min-height:120px}
  .biomecard .bioemoji{font-size:30px;line-height:1}
  .biomecard .lvkick{font-size:13px;letter-spacing:.06em;text-transform:none;color:var(--paper);margin-top:6px}
  .biomecard .biotag{font-size:10.5px;line-height:1.5;color:var(--muted);margin:4px 0 8px}
  .biomecard.locked .bioemoji{filter:grayscale(1);opacity:.55}
  /* ===== карта уровней «багажная тележка» ===== */
  /* Экран выбора смены — лента багажной тележки аэропорта: тягач тащит вагоны
     (по 3 чемодана-уровня) к самолёту. Каждый 3-й уровень — узловой: на нём
     впервые появляется механика, её иконка до открытия спрятана «туманом»
     («дотянуть до сюрприза»). Между вагонами на земле — выпавшие чемоданы
     (бонус-уровни, пока тизер «скоро»). Сверху панели — счётчик ★ получено/всего. */
  .starcount{display:inline-flex;align-items:center;gap:7px;margin:8px auto 0;padding:6px 15px;
    border:1.5px solid rgba(244,207,94,.4);border-radius:20px;background:rgba(244,207,94,.07);
    font-size:14px;letter-spacing:.04em;color:var(--gold)}
  .starcount svg{width:15px;height:15px;display:block}
  .starcount b{font-weight:800;color:#fbe9a8;font-size:15px}
  .starcount .sclbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-left:3px}
  #levelList{display:block;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    margin:14px -24px 2px;padding:18px 26px 28px;scrollbar-width:thin;scrollbar-color:#4a4366 transparent;
    background:linear-gradient(#191522,#241d33 72%,#15111d)}
  #levelList::-webkit-scrollbar{height:7px}
  #levelList::-webkit-scrollbar-thumb{background:#4a4366;border-radius:4px}
  #levelList .cart-row{display:inline-flex;align-items:flex-end;min-width:100%;padding:0 2px}
  /* вагон-платформа на двух колёсах */
  #levelList .wagon{flex:0 0 auto;position:relative;margin:0 3px 14px}
  #levelList .wagon-bed{display:flex;align-items:flex-end;gap:9px;padding:9px 12px 11px;
    background:linear-gradient(#3c3552,#322b48);border:1.5px solid #4d4569;border-radius:9px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.06),0 3px 8px rgba(0,0,0,.35)}
  #levelList .wagon::before,#levelList .wagon::after{content:"";position:absolute;bottom:-11px;
    width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#5a5470,#1c1828);
    border:2px solid #0e0b16;box-shadow:0 2px 3px rgba(0,0,0,.4)}
  #levelList .wagon::before{left:16px}#levelList .wagon::after{right:16px}
  /* сцепка между вагонами + выпавший чемодан (бонус, тизер «скоро») */
  #levelList .coupling{flex:0 0 auto;align-self:flex-end;position:relative;width:30px;height:5px;
    margin:0 -1px 27px;background:#3a3550;border-radius:3px}
  #levelList .bonuscase{position:absolute;left:50%;bottom:-21px;width:27px;height:19px;
    transform:translateX(-50%) rotate(-13deg);border-radius:4px;
    background:linear-gradient(#6a5740,#4e3f2c);border:1.5px solid #2c2417;
    box-shadow:0 2px 4px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:#caa15e}
  #levelList .bonuscase::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;
    background:rgba(0,0,0,.28);transform:translateY(-1px)}
  /* чемодан-уровень (сбрасываем оформление .levelcard, id-селектор перебивает) */
  #levelList .suitcase{position:relative;flex:0 0 auto;width:56px;padding:0;border:0;border-radius:0;
    background:transparent;box-shadow:none;overflow:visible;font:inherit;color:var(--paper);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}
  #levelList .suitcase:hover{background:transparent;box-shadow:none}
  #levelList .case-stars{display:flex;gap:1px;height:12px}
  #levelList .case-stars svg{width:12px;height:12px;display:block}
  #levelList .case-body{position:relative;width:54px;height:44px;border-radius:8px;
    background:linear-gradient(#caa15e,#a07b46);border:1.5px solid #6e5430;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.22),0 3px 7px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s}
  #levelList .case-handle{position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    width:18px;height:9px;border:2px solid #6e5430;border-bottom:0;border-radius:6px 6px 0 0}
  #levelList .case-strap{position:absolute;top:0;bottom:0;left:11px;width:4px;background:rgba(0,0,0,.16);
    box-shadow:30px 0 0 rgba(0,0,0,.16)}
  #levelList .case-num{position:relative;font-family:"Segoe UI",system-ui,sans-serif;font-weight:800;
    font-size:16px;color:#3a2c14;text-shadow:0 1px 0 rgba(255,255,255,.25)}
  #levelList .case-lock{position:absolute}
  #levelList .suitcase:hover .case-body{transform:translateY(-2px);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.22),0 7px 13px rgba(0,0,0,.45)}
  #levelList .suitcase.done .case-body{background:linear-gradient(#e7c266,#c89a44);border-color:#8a6b2e}
  #levelList .suitcase.done .case-handle{border-color:#8a6b2e}
  #levelList .suitcase.current .case-body{box-shadow:0 0 0 2px var(--phosphor),
    0 0 16px rgba(205,176,247,.6),inset 0 2px 0 rgba(255,255,255,.22)}
  #levelList .suitcase.locked{cursor:default}
  #levelList .suitcase.locked .case-body{background:linear-gradient(#3a3550,#2c2740);border-color:#4a4564;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.05),0 2px 6px rgba(0,0,0,.4)}
  #levelList .suitcase.locked .case-handle{border-color:#4a4564}
  #levelList .suitcase.locked .case-strap{opacity:.5}
  /* бейдж новой механики (узловой уровень): открыт — иконка; закрыт — «туман» с «?» */
  #levelList .case-feat{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:15px;line-height:1;border:2px solid #5a5276;margin-bottom:3px;
    box-shadow:0 2px 8px rgba(0,0,0,.45)}
  #levelList .case-feat.mystery{color:#cfc7e6;font-weight:800;
    background:repeating-linear-gradient(45deg,#352e4a,#352e4a 4px,#2a2440 4px,#2a2440 8px)}
  #levelList .case-feat.shown{background:#3c3552;color:#fff}
  #levelList .case-feat.shown.fvip{background:radial-gradient(circle at 35% 30%,#ffe39a,#e7b94e);border-color:#b78a2e;color:#5a4410}
  #levelList .case-feat.shown.frush{background:radial-gradient(circle at 35% 30%,#ffd49a,#f2a93b);border-color:#b8701f;color:#5a3410}
  #levelList .case-feat.shown.fmedical{background:radial-gradient(circle at 35% 30%,#ffd0d8,#ef798a);border-color:#c2566a;color:#5a1420}
  #levelList .case-feat.shown.femergency{background:radial-gradient(circle at 35% 30%,#bdeee9,#4ecdc4);border-color:#2f9a92;color:#0d3a36}
  /* тягач справа (тащит вагоны к борту) и финиш-самолёт */
  #levelList .tractor{flex:0 0 auto;align-self:flex-end;width:54px;height:46px;margin:0 0 14px 2px}
  #levelList .tractor svg{display:block;width:100%;height:100%;overflow:visible}
  #levelList .destination{flex:0 0 auto;align-self:flex-end;margin:0 8px 12px 10px;
    display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted)}
  #levelList .destination .plane{font-size:30px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
  #levelList .destination .dlabel{font-size:8px;letter-spacing:.18em;text-transform:uppercase}
  /* выпавший чемодан-сюрприз = бонус-уровень: открыт (кликабелен), закрыт, пройден */
  #levelList .coupling .bonuscase{cursor:default}
  #levelList .coupling.unlocked .bonuscase{cursor:pointer;color:#3a2c14;
    background:linear-gradient(#ffc0dd,#ff9ec7);border-color:#c2566a;
    box-shadow:0 2px 6px rgba(255,158,199,.45),0 0 0 0 rgba(255,158,199,.5)}
  #levelList .coupling.unlocked .bonuscase:hover{transform:translateX(-50%) rotate(-13deg) translateY(-2px);
    box-shadow:0 6px 12px rgba(255,158,199,.5)}
  #levelList .coupling.done .bonuscase{background:linear-gradient(#ffd9ec,#ff9ec7);border-color:#c2566a}
  /* статистика на экране итога */
  .stats{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:18px;padding:16px 18px;
    border:1.5px solid var(--pur-line);border-radius:16px;background:rgba(28,24,48,.6)}
  .stat{text-align:left}
  .stat .label{font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  .stat .val{font-size:17px;margin-top:4px}
  .v-phos{color:var(--phosphor)} .v-gold{color:var(--gold)} .v-life{color:var(--life)} .v-teal{color:var(--teal)}
  /* график нагрузки/принято на экране итога смены */
  .langbtns,.skinbtns{display:flex;gap:8px;flex-wrap:wrap}
  .langbtn{border:1.5px solid rgba(127,155,176,.4);color:var(--muted);background:transparent;
    font:inherit;font-size:11px;letter-spacing:.08em;padding:6px 12px;border-radius:8px;cursor:pointer}
  .langbtn:hover{color:var(--phosphor);border-color:var(--phosphor)}
  .langbtn.on{color:var(--phosphor);border-color:var(--phosphor);background:rgba(191,233,255,.08)}
  .vno{margin-top:18px;font-size:10px;color:var(--muted);letter-spacing:.12em}
  /* окно целей смены */
  .goalrows{margin-top:18px}
  .goalrow{display:flex;gap:14px;align-items:center;text-align:left;padding:12px 15px;margin:9px 0;
    border:1.5px solid var(--pur-line);border-radius:12px;background:rgba(28,24,48,.55)}
  .goalrow .gs{color:var(--gold);font-size:15px;letter-spacing:.05em;flex:0 0 auto;min-width:48px;
    text-shadow:0 0 10px rgba(244,207,94,.45)}
  .goalrow .gt{font-size:12.5px;color:var(--paper);line-height:1.5}
  .goalzen{font-size:13px;line-height:1.7;color:var(--muted);margin-top:16px}
  /* окно целей: вызов + обучающая строка + цели и звёзды иконками */
  .goalsboard{margin-top:16px;text-align:center}
  .goal-challenge{font-size:14px;line-height:1.5;color:var(--paper);margin:0 0 6px}
  .goal-hint{font-size:12px;line-height:1.5;color:var(--phosphor);opacity:.92;margin:0 0 15px}
  .goal-objrow{display:flex;justify-content:center;gap:26px;margin:0 0 14px;flex-wrap:wrap}
  .gobj{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--gold)}
  .gobj.clock{color:var(--phosphor)} .gobj.upg{color:var(--phosphor)}
  .gicon{width:18px;height:18px;display:block;flex:0 0 auto}
  .goal-stars{border:1.5px solid var(--pur-line);border-radius:12px;background:rgba(28,24,48,.55);
    padding:6px 16px;display:inline-block;min-width:200px}
  .gstar-row{display:flex;align-items:center;gap:14px;padding:8px 2px}
  .gstar-row+.gstar-row{border-top:1px solid rgba(154,111,212,.16)}
  .gstar{color:var(--gold);font-size:13px;letter-spacing:1px;min-width:56px;text-align:left;
    text-shadow:0 0 10px rgba(244,207,94,.45)}
  .gstar-val{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;color:var(--paper)}
  .gstar-val .gicon{width:16px;height:16px;color:var(--teal)}
  .gstar-val.upg .gicon{color:var(--phosphor)}

  /* ---- медали ---- */
  .panel-wide{max-width:580px;width:94%;max-height:88vh;display:flex;flex-direction:column;padding:26px 24px}
  .medalcount{font-size:12px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .medalgrid{overflow:auto;text-align:left;margin:14px 0 6px;padding-right:6px}
  .tierhead{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--phosphor);margin:14px 0 6px;border-bottom:1px solid rgba(191,233,255,.18);padding-bottom:4px}
  .tierhead:first-child{margin-top:0}
  .medal{display:flex;gap:11px;align-items:flex-start;padding:8px 10px;margin:6px 0;
    border:1.5px solid rgba(127,155,176,.22);border-radius:10px;background:rgba(127,155,176,.04)}
  .medal.got{border-color:rgba(244,207,94,.55);background:rgba(244,207,94,.06);box-shadow:0 0 12px rgba(244,207,94,.12)}
  .medal .ic{font-size:21px;line-height:1.1;filter:grayscale(1);opacity:.45;flex:0 0 auto;width:26px;text-align:center}
  .medal.got .ic{filter:none;opacity:1}
  .medal .mt{font-size:12.5px;color:var(--paper);letter-spacing:.02em}
  .medal.locked .mt{color:var(--muted)}
  .medal .md{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .medal .mp{font-size:10px;color:var(--phosphor);margin-top:3px;letter-spacing:.04em}

  /* ---- всплывашка получения медали ---- */
  #achToast{position:fixed;left:50%;top:13%;transform:translateX(-50%) translateY(-22px);
    z-index:9;display:flex;gap:13px;align-items:center;padding:12px 20px;border-radius:12px;
    background:rgba(10,22,34,.95);border:1.5px solid var(--gold);color:var(--paper);
    box-shadow:0 0 18px rgba(244,207,94,.35), 0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;
    transition:opacity .32s ease, transform .32s ease;max-width:86%}
  #achToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #achToast .ic{font-size:28px}
  #achToast .lbl{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
  #achToast .ttl{font-size:14px;margin-top:3px;color:var(--paper)}
  #achToast .dsc{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.45}
  /* PWA: «доступно обновление» — тост у нижнего края с кнопкой перезапуска */
  #pwaUpdate{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(22px);
    z-index:20;display:flex;gap:14px;align-items:center;padding:11px 14px 11px 18px;border-radius:12px;
    background:rgba(10,22,34,.96);border:1.5px solid var(--teal);color:var(--paper);
    box-shadow:0 0 18px rgba(78,205,196,.3), 0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;
    transition:opacity .32s ease, transform .32s ease;max-width:90%}
  #pwaUpdate.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #pwaUpdate .ttl{font-size:13px;color:var(--paper)}
  #pwaUpdate .btn-upd{font:inherit;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;padding:8px 14px;border-radius:9px;border:1.5px solid var(--teal);
    background:rgba(78,205,196,.16);color:var(--paper)}
  #pwaUpdate .btn-upd:active{transform:translateY(1px)}

  /* ============================================================
     PlaneFlow Design System — unified menu styles (menus/menu.css,
     inlined as-is minus its html/body/.stage shell resets). Skins switch
     via data-skin on <html>; menu tokens are --m-*. See menus/HANDOFF.md.
     ============================================================ */

  /* base DS tokens referenced bare by the menu system (from tokens/effects.css) */
  :root{
    --text-glow-gold: 0 0 22px rgba(244,207,94,0.5);
    --shadow-raised: 0 2px 8px rgba(10,6,20,0.35);
    --glow-gold: 0 0 14px rgba(244,207,94,0.5);
  }

/* ============================================================
   PlaneFlow — Unified Menu System
   One consistent menu language across all screens, skinnable.
   Built on the design-system tokens (tokens/*.css via styles.css).

   Principle observed from the shipped screens: every menu PANEL
   stays a dark warm navy-purple surface with cream text in ALL
   skins. What a skin changes is the BOARD behind, the panel
   roundness, the signature glow/accent, the primary green, and
   how chunky the buttons feel.  All menu tokens are `--m-*`.
   ============================================================ */

/* -------- BASE / default = "Уютный" (cozy night) ---------- */
:root {
  /* surfaces */
  --m-panel:        #221d33;
  --m-panel-2:      #1a1726;          /* sunken well / table */
  --m-panel-3:      #2a2440;          /* raised inner chip / row */
  --m-panel-border: rgba(181,140,240,0.20);
  --m-panel-edge:   rgba(255,255,255,0.05); /* top gloss hairline */
  --m-panel-shadow: 0 24px 60px rgba(8,5,18,0.62);
  --m-divider:      rgba(181,140,240,0.14);

  /* radii */
  --m-r-panel:  20px;
  --m-r-card:   16px;
  --m-r-chip:   11px;
  --m-r-btn:    13px;

  /* text */
  --m-text-strong: #f4eede;
  --m-text-body:   #e8e0cf;
  --m-text-muted:  #9b9aa8;
  --m-kicker:      #8f8aa3;

  /* semantic accents */
  --m-primary:        #5dca7a;
  --m-primary-deep:   #3f9e5a;
  --m-primary-text:   #11331e;
  --m-primary-glow:   0 0 20px rgba(93,202,122,0.40);
  --m-danger:         #e0584f;
  --m-danger-soft:    rgba(224,88,79,0.55);
  --m-gold:           #f4cf5e;
  --m-life:           #ef5365;
  --m-plane:          #4ecdc4;
  --m-coin:           #f2a93b;
  --m-accent:         #b58cf0;        /* skin signature (active states) */
  --m-accent-glow:    0 0 22px rgba(181,140,240,0.40);

  /* ghost / neutral button */
  --m-ghost-bg:     #2a2440;
  --m-ghost-border: rgba(181,140,240,0.40);
  --m-ghost-text:   #e8e0cf;

  /* buttons */
  --m-btn-h:    52px;
  --m-btn-h-lg: 60px;
  --m-btn-h-sm: 42px;
  --m-btn-stroke: 1.5px;
  --m-btn-lift: 0px;          /* cartoon adds a chunky bottom edge */

  /* board */
  --m-board: radial-gradient(120% 120% at 50% -10%, #2a2440 0%, #1a1d2e 46%, #14111e 100%);
  --m-scrim: rgba(12,9,22,0.58);
  --m-board-blur: 3px;

  /* type roles (from DS) */
  --m-font-display: "Fredoka", system-ui, sans-serif;
  --m-font-ui: "Nunito", system-ui, sans-serif;

  /* motion */
  --m-ease: cubic-bezier(0.34, 1.2, 0.5, 1);
  --m-ease-bounce: cubic-bezier(0.34, 1.56, 0.5, 1);
  --m-dur: 0.24s;
}

/* -------- "Мультяшный" (Cartoon — bright daytime) --------- */
[data-skin="cartoon"] {
  --m-panel:        #262238;
  --m-panel-2:      #1d1a2b;
  --m-panel-3:      #322c48;
  --m-panel-border: rgba(255,255,255,0.10);
  --m-panel-edge:   rgba(255,255,255,0.09);
  --m-panel-shadow: 0 22px 46px rgba(20,40,18,0.40), 0 6px 0 rgba(20,16,30,0.30);

  --m-r-panel: 26px;
  --m-r-card:  20px;
  --m-r-chip:  13px;
  --m-r-btn:   18px;

  --m-primary:      #36d36b;
  --m-primary-deep: #1f9e4c;
  --m-primary-text: #0d3a1e;
  --m-primary-glow: 0 0 22px rgba(54,211,107,0.42);
  --m-danger:       #ff4d5e;
  --m-gold:         #ffce3a;
  --m-life:         #ff4d5e;
  --m-plane:        #1fb6d8;
  --m-coin:         #ffce3a;
  --m-accent:       #b58cf0;
  --m-accent-glow:  0 0 22px rgba(181,140,240,0.42);

  --m-ghost-bg:     #322c48;
  --m-ghost-border: rgba(255,255,255,0.16);

  --m-btn-h:    56px;
  --m-btn-h-lg: 64px;
  --m-btn-stroke: 0px;
  --m-btn-lift: 4px;

  --m-board: linear-gradient(180deg, #bfe6f7 0%, #a6dcf2 52%, #9fd96f 52%, #6fbf4a 100%);
  --m-scrim: rgba(18,32,16,0.42);
  --m-board-blur: 2px;
  --m-ease: var(--m-ease-bounce);
}

/* -------- "Неон" (muted night radar) --------------------- */
[data-skin="neon"] {
  --m-panel:        #0f1c3c;
  --m-panel-2:      #0a1228;
  --m-panel-3:      #14264e;
  --m-panel-border: rgba(111,198,221,0.32);
  --m-panel-edge:   rgba(111,198,221,0.12);
  --m-panel-shadow: 0 24px 60px rgba(3,7,20,0.7), 0 0 30px rgba(111,198,221,0.10);
  --m-divider:      rgba(111,198,221,0.18);

  --m-r-panel: 14px;
  --m-r-card:  12px;
  --m-r-chip:  10px;
  --m-r-btn:   12px;

  --m-text-strong: #dff4ff;
  --m-text-body:   #b9d2e8;
  --m-text-muted:  #6f88b5;
  --m-kicker:      #6f88b5;

  --m-primary:      #6cc88f;
  --m-primary-deep: #3f9e6a;
  --m-primary-text: #05140d;
  --m-primary-glow: 0 0 22px rgba(108,200,143,0.40);
  --m-danger:       #e85f7e;
  --m-gold:         #e6c562;
  --m-life:         #e85f7e;
  --m-plane:        #6fc6dd;
  --m-coin:         #e6c562;
  --m-accent:       #6fc6dd;
  --m-accent-glow:  0 0 22px rgba(111,198,221,0.40);

  --m-ghost-bg:     rgba(20,38,78,0.7);
  --m-ghost-border: rgba(111,198,221,0.32);
  --m-ghost-text:   #b9d2e8;

  --m-btn-h:    52px;
  --m-btn-h-lg: 60px;

  --m-board: radial-gradient(80% 80% at 50% 42%, #122046 0%, #0c1430 55%, #070c1c 100%);
  --m-scrim: rgba(5,9,22,0.6);
  --m-board-blur: 3px;
  --m-ease: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================================
   BOARD  (the airport behind the menus)
   ============================================================ */
.board { position: absolute; inset: 0; overflow: hidden; }
.board__art { position: absolute; inset: 0; transition: filter var(--m-dur) ease; }
.scene--dimmed .board__art { filter: blur(var(--m-board-blur)) brightness(0.82); }

/* cartoon sky decorations */
.cloud {
  position: absolute; background: rgba(255,255,255,0.9);
  border-radius: 999px; filter: blur(2px);
  box-shadow: 0 8px 24px rgba(120,160,190,0.25);
}
.sun {
  position: absolute; width: 92px; height: 92px; border-radius: 999px;
  background: radial-gradient(circle at 38% 36%, #fff4c2, #ffd34d 60%, #ffc62e);
  box-shadow: 0 0 60px rgba(255,206,58,0.6);
}
/* cozy lamp glow blobs */
.lamp {
  position: absolute; width: 180px; height: 180px; border-radius: 999px;
  background: radial-gradient(circle, rgba(255,184,77,0.30), rgba(255,184,77,0) 70%);
}
/* neon radar */
.radar-ring {
  position: absolute; border-radius: 999px;
  border: 1px solid rgba(111,198,221,0.16);
}

/* abstract building/plane silhouettes on the board */
.blob { position: absolute; border-radius: 30px; opacity: 0.9; }

/* fullscreen scrim for navigation screens */
.scrim { position: absolute; inset: 0; background: var(--m-scrim); }

/* ============================================================
   SCREEN LAYERS
   ============================================================ */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
.screen--center { align-items: center; justify-content: center; }

/* entrance animates TRANSFORM only — base state stays visible so a
   paused/background iframe never hides content (frozen = visible). */
@media (prefers-reduced-motion: no-preference) {
  .screen { animation: screenIn var(--m-dur) var(--m-ease) both; }
  .panel  { animation: panelIn var(--m-dur) var(--m-ease) both; }
}
@keyframes screenIn { from { transform: translateY(8px); } to { transform: none; } }
@keyframes panelIn {
  from { transform: translateY(14px) scale(0.985); }
  to   { transform: none; }
}

/* ============================================================
   PANEL  (the modal card)
   ============================================================ */
.panel {
  position: relative;
  width: var(--panel-w, 432px);
  max-width: calc(100% - 48px);
  background: var(--m-panel);
  border: 1px solid var(--m-panel-border);
  border-radius: var(--m-r-panel);
  box-shadow: var(--m-panel-shadow), inset 0 1px 0 var(--m-panel-edge);
  padding: 26px 30px 28px;
}
.panel--wide { --panel-w: 600px; }
.panel--wide2 { --panel-w: 680px; }
.panel--wide3 { --panel-w: 720px; }

/* horizontal two-column body */
.h-split { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; margin-top: 18px; }
.h-split--bias { grid-template-columns: 1.05fr 0.95fr; }
.h-split--text { grid-template-columns: 1.2fr 0.8fr; }
.h-split > .m-actions { margin-top: 0; align-self: stretch; justify-content: center; }

/* vertical stat list (pause, horizontal layout) */
.stat-list { display: flex; flex-direction: column; gap: 11px; }
.stat-list .rs { display: inline-flex; align-items: center; gap: 9px; justify-content: flex-start; font-size: 17px; }
.stat-list .rs .lbl { color: var(--m-text-muted); font-weight: 700; font-size: 12px;
  text-transform: uppercase; letter-spacing: .08em; }

/* horizontal main-menu button row */
.menu-row { display: flex; flex-direction: row; gap: 14px; }
.menu-row > .m-btn { flex: 1; min-width: 150px; }
.panel__corner {
  position: absolute; top: 16px; right: 16px; width: 38px; height: 38px;
  display: grid; place-items: center; cursor: pointer;
  border-radius: 11px; background: var(--m-panel-3);
  border: 1px solid var(--m-panel-border); color: var(--m-text-muted);
  transition: filter var(--m-dur) ease, color var(--m-dur) ease, border-color var(--m-dur) ease;
}
.panel__corner svg { width: 17px; height: 17px; }
.panel__corner:hover { color: var(--m-text-body); border-color: var(--m-accent); filter: brightness(1.1); }

/* ============================================================
   HEADER  (kicker + Fredoka title + optional counter)
   one consistent header across every screen
   ============================================================ */
.m-head { text-align: center; }
.m-kicker {
  font-size: 12px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--m-kicker);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.m-kicker svg { width: 13px; height: 13px; }
.m-title {
  font-family: var(--m-font-display);
  font-weight: 700; color: var(--m-text-strong);
  margin: 8px 0 0; line-height: 1.06; letter-spacing: 0.005em;
}
.m-title--xl { font-size: 40px; }
.m-title--lg { font-size: 32px; }
.m-title--md { font-size: 26px; }
.m-subtitle {
  color: var(--m-text-muted); font-size: 15px; line-height: 1.5;
  text-align: center; margin: 8px auto 0; max-width: 30ch; text-wrap: pretty;
}

/* counter pill (stars / medals) */
.m-counter {
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  padding: 7px 16px; border-radius: var(--m-r-pill, 999px);
  background: rgba(16,12,24,0.55); backdrop-filter: blur(6px);
  border: 1px solid rgba(244,207,94,0.45);
  color: var(--m-gold); font-weight: 800; font-size: 15px;
  margin-top: 14px;
}
.m-counter svg { width: 16px; height: 16px; }
.m-counter .muted { color: var(--m-text-muted); font-weight: 700; }
.m-counter .unit { color: var(--m-text-muted); font-weight: 700; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase; }

/* ============================================================
   BUTTONS  — fixed height, single line, icon-left, unified gaps
   variants: primary (green) · ghost (dark outline) · danger (red)
   sizes: default · lg · sm   modifier: block (full width)
   ============================================================ */
.m-btn {
  appearance: none; cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px; height: var(--m-btn-h); padding: 0 22px;
  font-family: var(--m-font-ui); font-weight: 800; font-size: 15px;
  letter-spacing: 0.01em; white-space: nowrap; line-height: 1;
  border-radius: var(--m-r-btn);
  border: var(--m-btn-stroke) solid transparent;
  transition: transform var(--m-dur) var(--m-ease),
              box-shadow var(--m-dur) ease, filter var(--m-dur) ease,
              background var(--m-dur) ease;
}
.m-btn > span.m-btn__t { overflow: hidden; text-overflow: ellipsis; }
.m-btn svg { width: 18px; height: 18px; flex: none; }
.m-btn--lg { height: var(--m-btn-h-lg); font-size: 17px; padding: 0 28px; }
.m-btn--sm { height: var(--m-btn-h-sm); font-size: 13px; padding: 0 16px; }
.m-btn--block { width: 100%; }

.m-btn--primary {
  background: var(--m-primary); color: var(--m-primary-text);
  box-shadow: 0 var(--m-btn-lift) 0 var(--m-primary-deep), var(--m-primary-glow);
}
.m-btn--primary:hover { filter: brightness(1.05); }

.m-btn--ghost {
  background: var(--m-ghost-bg); color: var(--m-ghost-text);
  border-color: var(--m-ghost-border);
  box-shadow: 0 var(--m-btn-lift) 0 rgba(0,0,0,0.25);
}
.m-btn--ghost:hover { filter: brightness(1.1); border-color: var(--m-accent); }

.m-btn--danger {
  background: transparent; color: var(--m-danger);
  border: 1.5px solid var(--m-danger-soft, var(--m-danger));
}
.m-btn--danger:hover { background: rgba(224,88,79,0.12); box-shadow: 0 0 16px rgba(224,88,79,0.30); }

.m-btn:active { transform: translateY(var(--m-btn-lift)) scale(0.97); box-shadow: none; }
.m-btn[disabled] { opacity: 0.45; cursor: not-allowed; }

/* a consistent action area at the bottom of a panel */
.m-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.m-actions__row { display: flex; gap: 12px; flex-wrap: wrap; }
.m-actions__row > .m-btn { flex: 1 1 auto; min-width: 0; }

/* the canonical "Назад" — ghost, centered, bottom */
.m-back-wrap { display: flex; justify-content: center; margin-top: 14px; }
.m-back { min-width: 184px; }

/* ============================================================
   HUD CHIPS  (top bars + bottom corner icons) — unified
   ============================================================ */
.hud { position: absolute; inset: 0; pointer-events: none; }
.hud > * { pointer-events: auto; }
.hud__tl { position: absolute; top: 16px; left: 16px; display: flex; gap: 10px; }
.hud__tr { position: absolute; top: 16px; right: 16px; display: flex; gap: 10px; }
.hud__br { position: absolute; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 10px; }
.hud__bl { position: absolute; bottom: 16px; left: 16px; }

.chip {
  display: inline-flex; align-items: center; gap: 8px; height: 40px;
  padding: 0 14px 0 10px; border-radius: 999px;
  background: rgba(20,16,28,0.72); backdrop-filter: blur(8px);
  border: 1px solid var(--m-panel-border);
  color: var(--m-text-body); font-weight: 800; font-size: 15px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
.chip__ic {
  width: 26px; height: 26px; border-radius: 8px; flex: none;
  display: grid; place-items: center; background: rgba(255,255,255,0.06);
}
.chip__ic svg { width: 16px; height: 16px; }
.chip--life .chip__ic svg { color: var(--m-life); }
.chip--coin .chip__ic svg { color: var(--m-coin); }
.chip--plane .chip__ic svg { color: var(--m-plane); }
.chip--time .chip__ic svg { color: var(--m-text-muted); }
.chip .muted { color: var(--m-text-muted); font-weight: 700; }

.icon-btn {
  width: 48px; height: 48px; border-radius: 14px; cursor: pointer;
  display: grid; place-items: center;
  background: rgba(20,16,28,0.78); backdrop-filter: blur(8px);
  border: 1px solid var(--m-panel-border); color: var(--m-text-body);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  transition: filter var(--m-dur) ease, transform var(--m-dur) var(--m-ease), border-color var(--m-dur) ease;
}
.icon-btn:hover { filter: brightness(1.15); border-color: var(--m-accent); }
.icon-btn:active { transform: scale(0.94); }
.icon-btn svg { width: 22px; height: 22px; }
.icon-btn--flag { padding: 0; overflow: hidden; font-size: 24px; }
.icon-btn--danger { color: var(--m-danger); }

/* ============================================================
   STAT WELL + GRID  (results / pause readouts)
   ============================================================ */
.stat-well {
  background: var(--m-panel-2); border: 1px solid var(--m-divider);
  border-radius: var(--m-r-card); padding: 14px 18px;
}
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 12px; }
.stat { text-align: center; }
.stat__k {
  font-size: 10.5px; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--m-text-muted); margin-bottom: 5px;
}
.stat__v { font-size: 20px; font-weight: 800; color: var(--m-text-strong);
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.stat__v svg { width: 16px; height: 16px; }
.stat__v--money { color: var(--m-gold); }
.stat__v--plane { color: var(--m-plane); }
.stat__v--life { color: var(--m-life); }

/* inline stat row (pause header) */
.stat-row { display: flex; align-items: center; justify-content: center; gap: 20px;
  padding: 11px 0; border-top: 1px solid var(--m-divider); border-bottom: 1px solid var(--m-divider); }
.stat-row .rs { display: inline-flex; align-items: center; gap: 7px; font-weight: 800; font-size: 16px; color: var(--m-text-strong); }
.stat-row .rs svg { width: 16px; height: 16px; }

/* ============================================================
   GOAL + THRESHOLDS TABLE
   ============================================================ */
.goal-line { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 14px; }
.goal-line .g { display: inline-flex; align-items: center; gap: 7px; font-weight: 800; font-size: 17px; }
.goal-line .g--target { color: var(--m-gold); }
.goal-line .g--inf { color: var(--m-text-muted); }
.goal-line svg { width: 18px; height: 18px; }

.thresholds {
  margin-top: 18px; background: var(--m-panel-2);
  border: 1px solid var(--m-divider); border-radius: var(--m-r-card);
  overflow: hidden;
}
.thresholds .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 20px;
}
.thresholds .row + .row { border-top: 1px solid var(--m-divider); }
.thresholds .stars { display: inline-flex; gap: 3px; color: var(--m-gold); }
.thresholds .stars svg { width: 17px; height: 17px; }
.thresholds .stars .off { color: var(--m-text-muted); opacity: 0.35; }
.thresholds .req { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; color: var(--m-text-strong); }
.thresholds .req svg { width: 17px; height: 17px; color: var(--m-plane); }

/* ============================================================
   STARS (big rating row)
   ============================================================ */
.star-row { display: flex; justify-content: center; gap: 12px; margin: 8px 0 2px; }
.star-row svg { width: 46px; height: 46px; color: var(--m-gold);
  filter: drop-shadow(0 0 14px rgba(244,207,94,0.55)); }
.star-row .off { color: var(--m-text-muted); opacity: 0.3; filter: none; }
@media (prefers-reduced-motion: no-preference) {
  .star-row .pop { animation: starPop 0.5s var(--m-ease-bounce) both; }
}
@keyframes starPop { 0% { transform: scale(0.6) rotate(-14deg); } 100% { transform: none; } }

/* ---- triumph (results) ---- */
.triumph-kicker { font-size: 12.5px; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--m-gold); }
.star-row--xl { margin: 12px 0 8px; gap: 14px; }
.star-row--xl svg { width: 62px; height: 62px;
  filter: drop-shadow(0 0 18px rgba(244,207,94,0.6)); }
.reward { font-family: var(--m-font-display); font-weight: 700; font-size: 40px;
  color: var(--m-gold); text-shadow: var(--text-glow-gold); line-height: 1; margin: 6px 0 2px; }
.reward-sub { color: var(--m-text-muted); font-size: 14px; margin: 4px auto 0; max-width: 36ch; }
.result-stats { display: flex; justify-content: center; margin: 18px 0 2px; }
.result-stats .rstat { padding: 0 22px; position: relative; text-align: center; }
.result-stats .rstat + .rstat::before { content: ""; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%); width: 1px; height: 30px; background: var(--m-divider); }
.result-stats .rstat .k { font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--m-text-muted); }
.result-stats .rstat .v { font-size: 19px; font-weight: 800; color: var(--m-text-strong);
  margin-top: 4px; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.result-stats .rstat .v svg { width: 15px; height: 15px; }

/* ---- objective sub-label (pause / goals) ---- */
.obj-sub { text-align: center; font-size: 12px; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--m-accent); margin-top: 8px; }

/* ---- level title with inline number badge (pause / goals) ---- */
.lvl-head { display: flex; align-items: center; justify-content: center; gap: 12px; }
.lvl-badge {
  flex: none; min-width: 40px; height: 40px; padding: 0 10px; border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--m-font-display); font-weight: 700; font-size: 20px;
  background: rgba(181,140,240,0.16); border: 1.5px solid var(--m-accent);
  color: var(--m-accent); box-shadow: var(--m-accent-glow);
}
.lvl-head .m-title { margin: 0; white-space: nowrap; }

/* ---- centered objective block ("Цели" merged with thresholds) ---- */
.obj-block { max-width: 380px; margin: 18px auto 0; }
.obj-block__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px 10px;
}
.obj-block__head .lbl { font-size: 12px; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--m-accent); }
.obj-block__head .tgt { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  font-weight: 800; font-size: 15px; color: var(--m-gold); }
.obj-block__head .tgt svg { width: 16px; height: 16px; }
.obj-block .thresholds { margin-top: 0; }

/* ---- subtle text button (settings reset) ---- */
.m-text-btn { appearance: none; background: none; border: 0; cursor: pointer;
  font-family: var(--m-font-ui); font-weight: 700; font-size: 12.5px; color: var(--m-text-muted);
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 8px;
  transition: color var(--m-dur) ease, background var(--m-dur) ease; }
.m-text-btn svg { width: 14px; height: 14px; }
.m-text-btn:hover { color: var(--m-danger); background: rgba(224,88,79,0.08); }

/* ============================================================
   TOGGLE SWITCH + SEGMENTED + ROWS  (settings)
   ============================================================ */
.set-row { display: flex; align-items: center; justify-content: space-between;
  padding: 11px 0; border-top: 1px solid var(--m-divider); }
.set-row__label { font-weight: 700; font-size: 16px; color: var(--m-text-body); }
.set-row__hint { font-size: 12.5px; color: var(--m-text-muted); margin-top: 2px; }

.switch { width: 56px; height: 32px; border-radius: 999px; cursor: pointer; flex: none;
  background: var(--m-panel-3); border: 1px solid var(--m-panel-border); position: relative;
  transition: background var(--m-dur) ease; }
.switch.on { background: var(--m-primary); border-color: transparent; }
.switch .knob { position: absolute; top: 3px; left: 3px; width: 26px; height: 26px;
  border-radius: 999px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.35);
  transition: left var(--m-dur) var(--m-ease); }
.switch.on .knob { left: 27px; }

.segmented { display: inline-flex; gap: 6px; background: var(--m-panel-2);
  padding: 5px; border-radius: 999px; border: 1px solid var(--m-divider); }
.segmented button { appearance: none; cursor: pointer; border: 0; background: transparent;
  color: var(--m-text-muted); font-family: var(--m-font-ui); font-weight: 800; font-size: 13px;
  padding: 8px 16px; border-radius: 999px; transition: all var(--m-dur) ease; white-space: nowrap; }
.segmented button.active { background: var(--m-accent); color: #fff;
  box-shadow: var(--m-accent-glow); }

/* ============================================================
   LEVEL BOARD  (Уровни) — paginated, with a bonus branch
   ============================================================ */
.lvlmap { flex: 1; min-height: 0; display: flex; align-items: stretch; gap: 14px; width: 100%; }
.lvlmap__arrow {
  align-self: center; width: 52px; height: 52px; flex: none; border-radius: 50%; cursor: pointer;
  display: grid; place-items: center; background: var(--m-ghost-bg);
  border: 1px solid var(--m-ghost-border); color: var(--m-text-body);
  transition: filter var(--m-dur) ease, transform var(--m-dur) var(--m-ease), border-color var(--m-dur) ease;
}
.lvlmap__arrow:hover:not(:disabled) { filter: brightness(1.12); border-color: var(--m-accent); }
.lvlmap__arrow:active:not(:disabled) { transform: scale(0.94); }
.lvlmap__arrow:disabled { opacity: 0.3; cursor: default; }
.lvlmap__arrow svg { width: 24px; height: 24px; }

.lvlmap__stage {
  flex: 1; min-width: 0; position: relative; border-radius: 24px;
  background: var(--m-panel-2); border: 1px solid var(--m-divider);
  overflow: hidden; display: flex; align-items: center;
}
.lvlmap__line { position: absolute; left: 6%; right: 6%; top: 50%; transform: translateY(-50%);
  height: 6px; border-radius: 999px; background: var(--m-panel-3); }
.lvlmap__nodes { position: relative; z-index: 1; flex: 1; display: flex;
  justify-content: space-around; align-items: center; padding: 0 14px; }

.lvlnode {
  width: 92px; height: 92px; border-radius: 22px; position: relative; flex: none; cursor: pointer;
  display: grid; place-items: center; background: var(--m-panel-3);
  border: 1.5px solid var(--m-panel-border); color: var(--m-text-body);
  box-shadow: inset 0 1px 0 var(--m-panel-edge), var(--shadow-raised);
  transition: transform var(--m-dur) var(--m-ease), filter var(--m-dur) ease;
}
.lvlnode:hover { filter: brightness(1.08); }
.lvlnode.locked { color: var(--m-text-muted); background: var(--m-panel-2); cursor: default; opacity: 0.85; }
.lvlnode.locked svg { width: 28px; height: 28px; opacity: 0.7; }
.lvlnode.done { background: rgba(93,202,122,0.14); border-color: rgba(93,202,122,0.5); }
.lvlnode.active { border: 2.5px solid var(--m-gold); color: var(--m-gold);
  box-shadow: var(--glow-gold); transform: scale(1.1); }
.lvlnode__num { font-family: var(--m-font-display); font-weight: 700; font-size: 30px; }
.lvlnode__stars { position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 3px; }
.lvlnode__stars svg { width: 16px; height: 16px; color: var(--m-gold); }
.lvlnode__stars .off { color: var(--m-text-muted); opacity: 0.35; }
.lvlnode__label { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--m-gold); }

/* bonus level in a branch above the line, after the 5th level */
.lvlmap__bonus { position: absolute; right: 5%; bottom: 50%; z-index: 2; margin-bottom: 3px;
  display: flex; flex-direction: column; align-items: center; }
.lvlmap__bonus .branch { width: 2px; height: 26px;
  background: repeating-linear-gradient(var(--m-accent) 0 4px, transparent 4px 8px); opacity: 0.7; }
.lvlnode.bonus { width: 72px; height: 72px; border-radius: 20px; box-shadow: var(--m-accent-glow);
  background: rgba(181,140,240,0.18); border: 1.5px dashed var(--m-accent); color: var(--m-accent); }
.lvlnode.bonus svg { width: 30px; height: 30px; }
.bonus-tag { position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--m-accent); background: var(--m-panel); padding: 2px 8px; border-radius: 999px;
  border: 1px solid var(--m-panel-border); white-space: nowrap; }

.lvlmap__dots { display: flex; justify-content: center; gap: 7px; margin-top: 14px; }
.lvlmap__dots .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--m-panel-3);
  border: 1px solid var(--m-panel-border); cursor: pointer; transition: all var(--m-dur) ease; }
.lvlmap__dots .dot.on { background: var(--m-accent); border-color: transparent;
  box-shadow: var(--m-accent-glow); width: 22px; }

/* ---- per-skin theming of the level map ---- */
[data-skin="cartoon"] .lvlmap__stage {
  background: linear-gradient(180deg, rgba(122,196,108,0.22), rgba(60,120,60,0.34));
  border-color: rgba(255,255,255,0.14); }
[data-skin="cartoon"] .lvlmap__line { height: 14px;
  background: #b98a52; box-shadow: inset 0 2px 0 rgba(255,255,255,0.18), inset 0 -3px 0 rgba(0,0,0,0.2);
  border-top: 2px dashed rgba(255,255,255,0.4); border-image: none; }
[data-skin="cartoon"] .lvlnode { box-shadow: 0 5px 0 rgba(20,16,30,0.4); }

[data-skin="neon"] .lvlmap__stage {
  background: radial-gradient(120% 100% at 50% 50%, rgba(18,32,70,0.6), rgba(9,17,38,0.72)); }
[data-skin="neon"] .lvlmap__line { height: 2px; background: var(--m-accent);
  box-shadow: var(--m-accent-glow); opacity: 0.55; }
[data-skin="neon"] .lvlnode { border-radius: 999px; }
[data-skin="neon"] .lvlnode.bonus { border-radius: 999px; }

[data-skin="cozy"] .lvlmap__line {
  background: repeating-linear-gradient(90deg, var(--m-panel-3) 0 18px, transparent 18px 30px); }

/* ============================================================
   BIOME GRID  (Биомы)
   ============================================================ */
.biome-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  width: 100%; max-width: 760px; margin: 0 auto; }
.biome {
  background: var(--m-panel); border: 1px solid var(--m-panel-border);
  border-radius: var(--m-r-card); padding: 15px 16px; position: relative;
  display: flex; flex-direction: column; min-height: 128px;
  box-shadow: inset 0 1px 0 var(--m-panel-edge);
}
.biome.locked { opacity: 0.72; }
.biome__ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
  background: var(--m-panel-3); font-size: 22px; margin-bottom: 10px; }
.biome__name { font-family: var(--m-font-display); font-weight: 600; font-size: 17px;
  color: var(--m-text-strong); line-height: 1.15; }
.biome__desc { font-size: 12.5px; color: var(--m-text-muted); margin-top: 6px; line-height: 1.45;
  flex: 1; text-wrap: pretty; }
.biome__foot { margin-top: 12px; display: flex; align-items: center; gap: 6px; }
.biome__stars { display: flex; align-items: center; gap: 2px; color: var(--m-gold); font-size: 13.5px; font-weight: 600; }
.biome__stars svg { width: 15px; height: 15px; }
.biome__best { color: var(--m-text-muted); margin: 0 3px 0 5px; font-size: 12px; font-weight: 500; }
.biome__lock { display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
  font-weight: 800; color: var(--m-coin); }
.biome__lock svg { width: 14px; height: 14px; }

/* ============================================================
   MEDALS — trophy case (Медали)
   ============================================================ */
.medal-cat { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--m-accent); margin: 2px 2px 0; }

/* progress toward all medals */
.medal-progress { width: 100%; max-width: 760px; margin: 0 auto 12px; }
.medal-progress__track { height: 9px; border-radius: 999px; background: var(--m-panel-2);
  border: 1px solid var(--m-divider); overflow: hidden; }
.medal-progress__fill { height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--m-gold), var(--m-coin));
  box-shadow: 0 0 14px rgba(244,207,94,0.5); }

.medal-grid2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  width: 100%; max-width: 820px; margin: 0 auto; }
.medal-grid2 .medal-cat { grid-column: 1 / -1; margin-bottom: -4px; }

.medal2 { position: relative; text-align: center; padding: 12px 10px 11px;
  border-radius: var(--m-r-card); background: var(--m-panel);
  border: 1px solid var(--m-panel-border); box-shadow: inset 0 1px 0 var(--m-panel-edge);
  overflow: hidden; }
.medal2__disc { width: 50px; height: 50px; border-radius: 999px; margin: 0 auto 8px;
  display: grid; place-items: center; position: relative; color: #fff;
  border: 2px solid rgba(255,255,255,0.25); }
.medal2__disc svg { width: 24px; height: 24px; }
.medal2__name { font-weight: 800; font-size: 14px; color: var(--m-text-strong); }
.medal2__desc { font-size: 11.5px; color: var(--m-text-muted); margin-top: 4px; line-height: 1.4;
  text-wrap: pretty; }

/* rarity disc colors */
.medal2.r-common  .medal2__disc { background: radial-gradient(circle at 38% 30%, #86e3a6, #3f9e6a); }
.medal2.r-rare    .medal2__disc { background: radial-gradient(circle at 38% 30%, #7fd0ea, #3a8fc4); }
.medal2.r-epic    .medal2__disc { background: radial-gradient(circle at 38% 30%, #c4a3f0, #7b53c4); }
.medal2.r-legend  .medal2__disc { background: radial-gradient(circle at 38% 30%, #ffe79a, #f2a400); }

/* unlocked = glow + shine; locked = drained */
.medal2.unlocked { border-color: rgba(244,207,94,0.4); }
.medal2.unlocked .medal2__disc { box-shadow: 0 0 22px rgba(244,207,94,0.55); }
.medal2.unlocked::before { content: ""; position: absolute; top: -40%; left: -30%; width: 60%; height: 180%;
  background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.14) 50%, transparent 60%);
  transform: rotate(8deg); pointer-events: none; }
.medal2.locked .medal2__disc { background: var(--m-panel-3); color: var(--m-text-muted);
  border-color: var(--m-panel-border); box-shadow: none; }
.medal2.locked .medal2__name { color: var(--m-text-body); }
.medal2__check { position: absolute; top: 10px; right: 10px; width: 22px; height: 22px;
  border-radius: 999px; background: var(--m-gold); color: var(--navy-950, #14111e);
  display: grid; place-items: center; }
.medal2__check svg { width: 14px; height: 14px; }
.medal2__rar { display: inline-block; margin-top: 6px; font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
.r-common  .medal2__rar { color: #86e3a6; background: rgba(93,202,122,0.14); }
.r-rare    .medal2__rar { color: #7fd0ea; background: rgba(74,180,214,0.14); }
.r-epic    .medal2__rar { color: #c4a3f0; background: rgba(154,111,212,0.16); }
.r-legend  .medal2__rar { color: var(--m-gold); background: rgba(244,207,94,0.14); }

/* main-menu brand block */
.brand { text-align: left; max-width: 230px; }
.brand__kicker, .brand__mark, .brand__tag, .brand__ver { text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.brand__kicker { font-size: 12px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--m-text-muted); line-height: 1.7; }
.brand__mark { font-family: var(--m-font-display); font-weight: 700; font-size: 18px;
  color: var(--m-gold); letter-spacing: 0.14em; display: inline-flex; align-items: center; gap: 6px; margin: 4px 0 14px; }
.brand__mark svg { width: 15px; height: 15px; }
.brand__tag { font-size: 15px; color: var(--m-text-body); line-height: 1.5; text-wrap: pretty; }
.brand__ver { font-size: 12px; color: var(--m-text-muted); margin-top: 16px; }

.menu-col { display: flex; flex-direction: column; gap: 14px; width: 300px; }

/* scrollable region inside fullscreen screens */
.scroller { width: 100%; display: flex; flex-direction: column; align-items: center;
  overflow-y: auto; overflow-x: hidden; }
.scroller::-webkit-scrollbar { width: 8px; }
.scroller::-webkit-scrollbar-thumb { background: var(--m-panel-3); border-radius: 999px; }


  /* ---- project glue between the game shell and the inlined menu system ---- */
  .start-wrap{display:flex;align-items:center;justify-content:center;gap:clamp(24px,5vw,60px);flex-wrap:wrap}
  .screen__col{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;width:100%}
  .mic{display:inline-flex;align-items:center;justify-content:center}
  .icon-btn--flag svg{width:100%;height:100%;display:block}
  /* legacy id-specificity rules must not override the new menu classes */
  #startScreen{background:none;backdrop-filter:none}
  #levelList{display:flex;flex-direction:column;flex:1;min-height:0;background:none;overflow:visible;margin:0;padding:0}
  #finalStars{font-size:inherit;color:inherit;text-shadow:none;letter-spacing:0}

  /* feature badge on a level node (new-mechanic levels) */
  .lvlnode{position:relative}
  .lvlnode__feat{position:absolute;top:-9px;left:-7px;width:24px;height:24px;border-radius:50%;
    display:grid;place-items:center;font-size:12px;line-height:1;background:var(--m-panel-3);
    border:1.5px solid var(--m-panel-border);box-shadow:var(--shadow-raised);color:var(--m-text-body)}

  /* ============================================================
     MAIN SCREEN — three per-skin finals (PlaneFlow main-screen handoff).
     ONE DOM; only positioning / signature treatment differs, driven by
     [data-skin]. Logic & button components stay shared (see CLAUDE.md).
       neon (base) : brand left·center  · glass CTA panel right·center
       cartoon     : big outlined wordmark · no-panel chunky CTA right
       cozy        : brand upper-left    · glass CTA row in the thumb zone
     ============================================================ */
  #startScreen .pf-main{ display:block; }              /* full-bleed canvas, children placed absolutely */
  #startScreen .pf-main > *{ position:absolute; }
  #startScreen .pf-scrim{ inset:0; pointer-events:none; z-index:0; }
  #startScreen .pf-chips{ top:18px; right:18px; display:flex; gap:10px; z-index:7; }
  #startScreen .pf-corner{ right:18px; bottom:18px; display:flex; gap:10px; z-index:7; }
  #startScreen .chip--star .chip__ic svg{ color:var(--m-gold); }

  /* brand: kicker · wordmark · tagline · ver */
  #startScreen .pf-brand{ left:7%; top:50%; transform:translateY(-50%); max-width:min(46%,460px);
    text-align:left; z-index:2; }
  #startScreen .brand__mark{ font-family:var(--m-font-display); font-weight:700; font-size:52px;
    line-height:1; letter-spacing:0; color:var(--m-text-strong); display:inline-flex; align-items:center;
    gap:.24em; margin:6px 0 0; }
  #startScreen .brand__mark .mic svg{ width:.78em; height:.78em; }
  #startScreen .brand__plane{ color:var(--m-accent); filter:drop-shadow(0 0 8px var(--m-accent)); }
  #startScreen .brand__word{ display:inline-flex; }
  #startScreen .brand__w1,#startScreen .brand__w2{ display:inline; }
  #startScreen .brand__kicker{ margin:0 0 12px; }
  #startScreen .brand__tag{ display:block; margin-top:16px; }
  #startScreen .brand__tag-ic{ display:none; }
  #startScreen .brand__ver{ margin-top:18px; }

  /* CTA group — vertical centering via margin (NOT transform: the .panel
     entrance keyframe ends at transform:none and would clobber translateY). */
  #startScreen .pf-cta{ right:7%; top:0; bottom:0; height:fit-content; margin-block:auto;
    width:min(40%,308px); padding:24px 22px; z-index:2; }
  #startScreen .pf-cta .menu-col{ width:100%; gap:13px; }

  /* ---- neon (base panel = matte glass) ---- */
  [data-skin="neon"] #startScreen .pf-cta{ background:rgba(14,26,56,.66); backdrop-filter:blur(8px); }
  [data-skin="neon"] #startScreen .brand__word{ text-shadow:0 0 14px rgba(111,198,221,.55); }

  /* ---- cozy ---- */
  [data-skin="cozy"] #startScreen .pf-scrim{ background:
      linear-gradient(115deg, rgba(8,5,18,.55) 0%, transparent 46%),
      linear-gradient(0deg, rgba(8,5,18,.5), transparent 44%); }
  [data-skin="cozy"] #startScreen .pf-brand{ top:21%; transform:none; max-width:min(52%,440px); }
  [data-skin="cozy"] #startScreen .brand__mark{ font-size:clamp(38px,7vw,60px); }
  [data-skin="cozy"] #startScreen .brand__word{ text-shadow:0 0 26px rgba(255,184,77,.4); }
  [data-skin="cozy"] #startScreen .pf-cta{ left:7%; right:auto; top:auto; bottom:8%; margin-block:0;
    height:auto; width:auto; max-width:none; background:none; border:none; box-shadow:none; padding:0; backdrop-filter:none; }
  [data-skin="cozy"] #startScreen .pf-cta .menu-col{ flex-direction:row; width:auto; gap:14px; align-items:center; }
  [data-skin="cozy"] #startScreen .pf-cta .m-btn{ width:auto; }
  [data-skin="cozy"] #startScreen .pf-cta .m-btn--ghost{ background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.28); color:#fff; backdrop-filter:blur(12px); box-shadow:0 6px 18px rgba(0,0,0,.3); }

  /* ---- cartoon ---- */
  [data-skin="cartoon"] #startScreen .pf-scrim{ background:linear-gradient(90deg, rgba(20,15,25,.16), transparent 46%); }
  [data-skin="cartoon"] #startScreen .pf-chips{ left:18px; right:auto; }
  [data-skin="cartoon"] #startScreen .pf-brand{ max-width:min(48%,480px); }
  [data-skin="cartoon"] #startScreen .brand__plane{ display:none; }
  [data-skin="cartoon"] #startScreen .brand__word{ display:block; }
  [data-skin="cartoon"] #startScreen .brand__w1,[data-skin="cartoon"] #startScreen .brand__w2{ display:block; }
  [data-skin="cartoon"] #startScreen .brand__mark{ font-size:clamp(50px,9vw,80px); line-height:.9; color:#fffaf0;
    text-shadow:5px 6px 0 #3a2a17, -2px 0 0 #3a2a17, 0 -2px 0 #3a2a17, 0 2px 0 #3a2a17, 2px 0 0 #3a2a17; }
  [data-skin="cartoon"] #startScreen .brand__kicker{ color:#fffaf0; text-shadow:1.5px 1.5px 0 #3a2a17; }
  [data-skin="cartoon"] #startScreen .brand__tag{ display:inline-flex; align-items:center; gap:10px;
    padding:8px 14px; border-radius:999px; background:#fffaf0; border:2.5px solid #3a2a17;
    box-shadow:0 3px 0 rgba(58,42,23,.3); color:#3a2a17; font-weight:800; white-space:nowrap; text-shadow:none; }
  [data-skin="cartoon"] #startScreen .brand__tag-ic{ display:inline-flex; color:#ffce3a; filter:drop-shadow(1px 1px 0 #3a2a17); }
  [data-skin="cartoon"] #startScreen .brand__tag svg{ width:18px; height:18px; }
  [data-skin="cartoon"] #startScreen .brand__ver{ color:#fffaf0; text-shadow:1px 1px 0 rgba(58,42,23,.6); }
  [data-skin="cartoon"] #startScreen .pf-cta{ right:8%; width:min(40%,286px); background:none; border:none;
    box-shadow:none; padding:0; backdrop-filter:none; }
  [data-skin="cartoon"] #startScreen .pf-cta .menu-col{ gap:14px; }
  [data-skin="cartoon"] #startScreen .pf-cta .m-btn--primary{ border:3px solid #1f7d3e; box-shadow:0 5px 0 #1f7d3e; }
  [data-skin="cartoon"] #startScreen .pf-cta .m-btn--ghost{ background:#fffaf0; color:#3a2a17;
    border:3px solid #3a2a17; box-shadow:0 5px 0 rgba(58,42,23,.45); }

  /* small landscape: keep the two side clusters from colliding */
  @media (max-width:560px){
    #startScreen .brand__mark{ font-size:40px; }
    [data-skin="cartoon"] #startScreen .brand__mark{ font-size:clamp(40px,12vw,58px); }
    #startScreen .pf-cta{ width:min(46%,260px); }
  }
</style>
