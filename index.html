        requests:[type,'depart'], reqIndex:0, nSvc:1,
        zone:'field',                                             // сразу на земле — без воздуха/ВПП
        entering:false, path:[], moving:false, selected:false,
        landing:false, takeoff:false, exiting:false,
        runway:null, bay:null,
        airTime:Infinity, airMax:Infinity, waitMult:2,
        groundTime:groundMax, groundMax, serveTime:0, serveMax:0, landedAt:0,
        halfPay:false, dead:false,
        reward: econ.svcReward,
        vip:false, emergency:false, medical:false,
      });
      return;
    }
    // спец-борты как мини-события (раздел 3 копилки): частный джет (вип),
    // «топливо на нуле» (срочный + бонус), медицинский (приоритет — высадка пациента).
    const evs = levelEvents();                                           // какие спецборты разрешены уровнем
    const vip = evs.vip && Math.random() < K.VIP_CHANCE;                 // частный джет
    const emergency = evs.emergency && !vip && Math.random() < K.EMERGENCY_CHANCE;        // «топливо на нуле»
    const medical = evs.medical && !vip && !emergency && Math.random() < K.MEDICAL_CHANCE; // медицинский
    const pool = shuffle(['repair','fuel','board']);
    // медицинский: высаживает пациента в пассажирском боксе, затем сразу вылет
    const nSvc = medical ? 1 : (Math.random() < K.TWO_SVC_CHANCE ? 2 : 1);
    const requests = medical ? ['board','depart'] : pool.slice(0, nSvc).concat(['depart']);
    // де-айсинг: в снегопад обычный борт обязан пройти антиобледенение перед вылетом
    // (медицинский — «вне очереди», пропускаем). Шаг ставится прямо перед 'depart'.
    if(LV.deice && weather==='snow' && !medical) requests.splice(requests.length-1, 0, 'deice');
    const waitMult = (vip||medical) ? 1 : 2;                             // НАЗЕМНОЕ терпение: джет и медицинский нетерпеливы
    // воздушное терпение: ФИКС. окно (K.AIR_BASE) — одинаковое на всех уровнях; pace не влияет.
    // спецборты урезают его множителем: vip вдвое нетерпеливее (FAQ), топливо-на-нуле —
    // садить срочно, медицинский — тоже спешит.
    // бонус-мир «спокойный»: гусеницы терпеливые (level.calm растягивает таймеры)
    const calmMult = LV.calm || 1;
    const airBase = airPatience({vip, emergency, medical}, calmMult);
    const bonus = (vip?2:1) * (emergency?K.EMERGENCY_BONUS:1) * (medical?K.MEDICAL_BONUS:1);
    const reward = Math.round(nSvc * econ.svcReward * bonus);
    // вертикальная позиция зависания — у одной из полос/между ними
    const y = field.y0 + 30*ui + Math.random()*(field.y1 - field.y0 - 60*ui);
    spawnedTotal++;
    planes.push({
      id: ++planeSeq,
      x: W + 40*ui, y, ang: Math.PI, // влетает с правого края, нос влево
      vip, emergency, medical, requests, reqIndex:0,
      zone:'air',            // air | runway | field | bay
      entering:true,         // глиссада с правого края до точки зависания
      path:[], moving:false, selected:false,
      landing:false, takeoff:false, exiting:false,
      runway:null, bay:null,
      airTime: airBase, airMax: airBase,
      groundTime:0, groundMax:0, waitMult,
      serveTime:0, serveMax:0, landedAt:0,
      halfPay:false, dead:false,
      reward,
      nSvc,
    });
    // в туториале первый прилетевший борт становится «учебным» — его и ведём
    if(tut && !tut.plane) tut.plane = planes[planes.length-1];
    // анонс мини-события (срочные борта «ломают рутину»); не на старте/в туториале
    if(gameTime>0 && !tut){
      if(emergency) toast={text:t('toast.emergency'), t:0, good:false};
      else if(medical) toast={text:t('toast.medical'), t:0, good:false};
    }
  }

  // ---- лесной биом: помехи на ВПП и спец-бригады ----
  // Точка выезда бригад — низ сервисного здания (рисуется сверху поля).
  function serviceHome(){
    const s=field.service;
    if(s) return {x:s.x+s.w/2, y:s.y+s.h};
    return {x:(field.x0+field.x1)/2, y:field.y0};
  }
  // какая бригада нужна на помеху: пила на падающее дерево (срубить, пока не легло),
  // техслужба на лежащее дерево/оленя, орёл — разогнать птиц.
  function neededCrew(h){
    if(h.kind==='tree') return h.fallen ? 'truck' : 'chainsaw';
    if(h.kind==='deer') return 'truck';
    if(h.kind==='snow') return 'plow';
    return 'eagle';
  }
  // помеха под пальцем (для тапа): берём ближайшую ещё не обслуживаемую
  function hazardAt(p){
    let best=null, bd=46*ui;
    for(const h of hazards){ if(h.dispatched) continue; const d=dist(h.x,h.y,p.x,p.y); if(d<bd){bd=d;best=h;} }
    return best;
  }
  function spawnHazard(){
    // оставляем хотя бы одну полосу открытой; на полосу — не больше одной помехи
    if(hazards.length >= Math.max(1, runways.length-1)) return;
    const free = runways.filter(r=>!r.closed && r.hazard==null);
    if(!free.length) return;
    const r = free[Math.floor(Math.random()*free.length)];
    // снежный занос — только в снегопад (зимний геймплей поверх лесных помех)
    const pool = weather==='snow' ? ['tree','deer','birds','snow'] : ['tree','deer','birds'];
    const kind = pool[Math.floor(Math.random()*pool.length)];
    const h = { id:++hazardSeq, kind, runway:r, t:0, dispatched:false, done:false };
    if(kind==='snow'){
      h.x = r.x + r.w*0.5; h.y = r.cy;
      r.closed = true;                                  // занос на полосе — закрыта, пока не расчистит плуг
      toast = {text:t('forest.snow'), t:0, good:false};
    } else if(kind==='tree'){
      h.beaver = Math.random() < FOR.BEAVER_CHANCE;     // бобёр грызёт — падает медленнее
      h.fallTime = h.beaver ? FOR.TREE_FALL_BEAVER : FOR.TREE_FALL;
      h.fallen = false;
      h.x = r.x + 12*ui; h.y = r.cy;                    // у полевого торца полосы
      toast = {text:t('forest.tree'), t:0, good:false};
    } else if(kind==='deer'){
      h.x = r.x + r.w*0.42; h.y = r.cy;
      r.closed = true;                                  // зверь на полосе — сразу закрыта
      toast = {text:t('forest.deer'), t:0, good:false};
    } else {
      h.x = r.x + r.w*0.5; h.y = r.y + 8*ui;
      r.closed = true;                                  // птицы над полосой — закрыта
      toast = {text:t('forest.birds'), t:0, good:false};
    }
    r.hazard = h.id;
    hazards.push(h);
    SND.penalty();
  }
  // выслать бригаду из сервисного здания к помехе (по тапу игрока)
  function dispatchCrew(h){
    if(h.dispatched || h.done) return;
    h.dispatched = true;
    const home = serviceHome();
    crews.push({ kind:neededCrew(h), hazard:h, phase:'out',
                 x:home.x, y:home.y, hx:home.x, hy:home.y,
                 tx:h.x, ty:h.y, workT:0, done:false });
    addFloat(home.x, home.y-14*ui, t('forest.crew.'+neededCrew(h)), COL.teal);
    SND.build(); HAP.tap();
  }
  // помеха устранена: открыть полосу, убрать помеху, премия (если убрала бригада)
  function resolveHazard(h, rewarded){
    if(!h || h.done) return;
    h.done = true;
    if(h.runway.hazard===h.id) h.runway.hazard=null;
    h.runway.closed = false;
    hazards = hazards.filter(x=>x!==h);
    if(rewarded){
      money += FOR.REWARD;
      addFloat(h.x, h.y-18*ui, '+'+fmtMoney(FOR.REWARD), COL.coin);
      SND.served(); HAP.ok();
      toast = {text:t('forest.cleared'), t:0, good:true};
    }
  }
  function updateForest(dt){
    if(gameTime>=nextHazard){ spawnHazard(); nextHazard = gameTime + FOR.SPAWN_MIN + Math.random()*(FOR.SPAWN_MAX-FOR.SPAWN_MIN); }
    // помехи
    for(const h of hazards){
      if(h.done) continue;
      h.t += dt;
      if(h.kind==='tree'){
        if(!h.fallen && h.t>=h.fallTime){ h.fallen=true; h.runway.closed=true; } // легло поперёк полосы
      } else if(h.kind==='deer'){
        if(!h.dispatched && h.t>=FOR.DEER_LIFE) resolveHazard(h, false);          // олень сам ушёл
      } else if(h.kind==='birds'){
        if(!h.dispatched && h.t>=FOR.BIRD_LIFE) resolveHazard(h, false);          // птицы улетели
      }
      // снег (kind==='snow') сам не уходит — нужен плуг (создаёт «всегда есть дело»)
    }
    // спец-авто: едут к помехе → работают → возвращаются домой
    for(const c of crews){
      if(c.phase==='work'){
        c.workT -= dt;
        if(c.workT<=0){ resolveHazard(c.hazard, true); c.phase='home'; c.tx=c.hx; c.ty=c.hy; }
        continue;
      }
      const d = dist(c.x,c.y,c.tx,c.ty);
      if(d<=4){
        if(c.phase==='out'){ c.phase='work'; c.workT=FOR.WORK_TIME; }
        else c.done=true;
      } else {
        const step = Math.min(FOR.CREW_SPEED*dt, d);
        c.x += (c.tx-c.x)/d*step; c.y += (c.ty-c.y)/d*step;
      }
    }
    crews = crews.filter(c=>!c.done);
  }

  // ---- geometry ----
  const rectHit = (px,py,r) => px>r.x && px<r.x+r.w && py>r.y && py<r.y+r.h;
  const dist = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);

  // ---- input ----
  let selected=null, drag=null;
  function pt(e){
    const r=cv.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return {x:s.clientX-r.left, y:s.clientY-r.top};
  }
  function pickPlane(p){
    let best=null, bd=K.GRAB;
    for(const pl of planes){
      if(pl.zone==='bay') continue;
      const d=dist(pl.x,pl.y,p.x,p.y);
      if(d<bd){bd=d;best=pl;}
    }
    return best;
  }
  function pickBay(p){
    for(const b of bays) if(rectHit(p.x,p.y,b)) return b;
    return null;
  }
  // открытый бокс под точкой (для фиксации конца маршрута)
  function openBayAt(p){
    for(const b of bays) if(b.open && rectHit(p.x,p.y,b)) return b;
    return null;
  }
  // конец нарисованного маршрута попал в бокс → ведём борт ровно по оси ворот
  // (подход снаружи → центр), так что въезд получается строго по центру и носом вперёд
  function lockRouteToBay(pl, b){
    const o=dirOut(b);
    const cx=b.x+b.w/2, cy=b.y+b.h/2;
    const vert=Math.abs(o.dy)>Math.abs(o.dx);
    const half=(vert?b.h:b.w)/2;
    const apx=cx+o.dx*(half+22*ui), apy=cy+o.dy*(half+22*ui);  // точка подхода на оси ворот, снаружи
    // срезаем хвост маршрута, попавший внутрь бокса, и достраиваем «подход → центр»
    while(pl.path.length && rectHit(pl.path[pl.path.length-1].x, pl.path[pl.path.length-1].y, b)) pl.path.pop();
    pl.path.push({x:apx,y:apy},{x:cx,y:cy});
    pl.moving=true;
    // обратная связь игроку: маленькая вспышка + щелчок у ворот
    pulseFx(cx+o.dx*half, cy+o.dy*half, 'lock', 0.28);
    SND.lock(); HAP.tap();
  }
  // открытая ВПП под точкой (для фиксации конца маршрута при взлёте/посадке)
  function openRunwayAt(p){
    for(const r of runways){ if(!r.closed && rectHit(p.x,p.y,r)) return r; }
    return null;
  }
  // конец маршрута доведён на ВПП → притягиваем к оси полосы и фиксируем, как у бокса
  // (посадка — створ у небесного торца; взлёт — створ у полевого торца), вспышка + щелчок
  function lockRouteToRunway(pl, r){
    while(pl.path.length && rectHit(pl.path[pl.path.length-1].x, pl.path[pl.path.length-1].y, r)) pl.path.pop();
    const tx = (pl.zone==='air') ? (r.x + r.w - PLANE_LEN()*0.5) : (r.stopX + 8*ui);
    const ty = r.cy;
    pl.path.push({x:tx, y:ty});
    pl.moving=true;
    pulseFx(tx, ty, 'lock', 0.28);
    SND.lock(); HAP.tap();
  }
  function bayUpCost(b){ if(b.deice) return null; return b.open ? (K.BAY_UP_COST[b.lvl]||null) : K.BAY_OPEN_COST; }

  function down(e){
    if(!running) return;
    e.preventDefault();
    const p=pt(e);
    // pause button
    if(rectHit(p.x,p.y,pauseBtn)){ setPaused(!paused); return; }
    if(paused) return;

    // bay tap -> open / upgrade
    const b=pickBay(p);
    if(b){
      const cost=bayUpCost(b);
      if(cost!=null && money>=cost){
        money-=cost;
        if(!b.open){ b.open=true; ACH.onBayOpen(b); } else { b.lvl++; ACH.onBayUpgrade(b); }
        upgradesDone++;
        SND.build(); HAP.tap();
      }
      return;
    }
    // лесной биом: тап по помехе высылает нужную спец-бригаду из сервисного здания
    if(LV.biome){
      const h=hazardAt(p);
      if(h){ dispatchCrew(h); return; }
    }
    // plane
    const pl=pickPlane(p);
    if(pl){
      selected=pl; ACH.onPlaneTouched(pl);
      SND.pick(); HAP.tap();
      planes.forEach(x=>x.selected=false); pl.selected=true;
      drag={plane:pl, start:p, last:p, drew:false};
    } else {
      selected=null; planes.forEach(x=>x.selected=false);
    }
  }
  function move(e){
    if(!drag||paused) return;
    e.preventDefault();
    if(drag.locked) return;          // маршрут уже зафиксирован на боксе — дальше не тянем
    const p=pt(e);
    if(!drag.drew && dist(p.x,p.y,drag.start.x,drag.start.y)>10){
      drag.drew=true;
      drag.plane.path=[];            // начинаем новый маршрут
      drag.plane.moving=true;        // борт трогается сразу, как пошла линия
    }
    if(drag.drew && dist(p.x,p.y,drag.last.x,drag.last.y)>12){
      drag.plane.path.push({x:p.x,y:p.y});
      drag.last=p;
      // конец траектории доведён в цель → фиксируем маршрут (вспышка + щелчок)
      if(!LV.bonus){
        const pl=drag.plane;
        const b = (pl.zone!=='air') ? openBayAt(p) : null;   // бокс — только с земли
        if(b){ lockRouteToBay(pl, b); drag.locked=true; }
        else {
          // …или на ВПП: посадка (борт в воздухе) / взлёт (на земле, нужда 'depart')
          const r = openRunwayAt(p);
          if(r && (pl.zone==='air' || curNeed(pl)==='depart')){ lockRouteToRunway(pl, r); drag.locked=true; }
        }
      }
    }
  }
  // конец воздушной траектории, заведённой на открытую ВПП, притягиваем в центр полосы
  // на полкорпуса от её правого (небесного) торца — посадка всегда по оси и в одну точку
  function snapAirPathToRunway(pl){
    if(pl.zone!=='air' || !pl.path.length) return;
    const last = pl.path[pl.path.length-1];
    for(const r of runways){
      if(r.closed) continue;
      if(rectHit(last.x, last.y, r)){ last.x = r.x + r.w - PLANE_LEN()*0.5; last.y = r.cy; break; }
    }
  }
  function up(){
    if(!drag) return;
    const pl=drag.plane;
    if(drag.drew){
      snapAirPathToRunway(pl);             // посадочный створ — в центр ВПП
      pl.moving = pl.path.length>0;        // поехали по маршруту
      pl.exiting=false;
    } else {
      // тап: если есть маршрут — переключаем стоп/движение
      if(pl.path.length) pl.moving = !pl.moving;
    }
    drag=null;
  }
  // На тач-устройствах один тап порождает И pointer-, И touch-событие. Если
  // слушать оба, down() срабатывает дважды на одно касание: для паузы (тоггл
  // setPaused(!paused)) это значит «вкл, тут же выкл» — кнопка как будто мёртвая.
  // Поэтому используем Pointer Events там, где они есть (везде в совр. браузерах),
  // и только при их отсутствии откатываемся на Touch Events.
  if(window.PointerEvent){
    cv.addEventListener('pointerdown',down);
    cv.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
  } else {
    cv.addEventListener('touchstart',down,{passive:false});
    cv.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',up);
  }

  // ---- crashes ----
  function freeRes(pl){
    if(pl.runway){ if(pl.runway.occupied===pl) pl.runway.occupied=null; pl.runway=null; }
    if(pl.bay){ if(pl.bay.occupied===pl) pl.bay.occupied=null; pl.bay=null; }
  }
  // reason — ключ i18n (loss.*): в lossLog хранится ключ, перевод — при показе
  function logLoss(pl, reason, moneyPenalty){
    if(pl.dead) return;
    pl.dead=true; boom(pl.x,pl.y); freeRes(pl);
    SND.crash(); HAP.crash();
    combo=0; runCrashes++;          // крушение сбрасывает серию и портит «чистоту»
    ACH.onCrash(pl, reason);
    if(!debug.infiniteLives) lives--;
    if(moneyPenalty){ money-=pl.reward; addFloat(pl.x, pl.y-24*ui, '−'+fmtMoney(pl.reward), COL.life); }
    lossLog.push({t:gameTime, reason});
    if(lossLog.length>12) lossLog.shift();
    toast={text:(debug.infiniteLives?'✈ ':'−1 ✈ ')+t(reason), t:0, good:false};
    console.log('[PlaneFlow] '+(debug.infiniteLives?'(∞) ':'-1 ✈ ')+t(reason)+' | t='+fmtTime(gameTime)+' | lives='+lives);
  }
  function killAir(pl){ logLoss(pl, 'loss.airTimeout', false); }
  function killCrash(pl, reason){ logLoss(pl, reason||'loss.collision', true); }

  function curNeed(pl){ return pl.requests[pl.reqIndex]; }

  function land(pl, r){            // начать посадку на полосу r
    pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
    pl.landing=true; pl.moving=true; pl.path=[]; pl.touched=false;
  }
  // момент касания (за корпус до полевого торца): толчок + визг резины.
  // FX касания живут здесь, а не в startGround, — это и есть «приземление».
  function touchdown(pl){
    pl.touched=true; pl.y=pl.runway.cy; pl.bounceAt=nowT;
    SND.screech(); HAP.tap();                        // визг резины
  }
  function startGround(pl){
    pl.landing=false; pl.moving=false; pl.zone='runway'; // стоит на полосе, ждёт руления
    const rem = pl.nSvc; // число услуг (без вылета)
    pl.groundMax = (K.GROUND_BASE + rem*K.GROUND_STEP) * pl.waitMult * (LV.calm || 1);
    pl.groundTime = pl.groundMax;
    pl.landedAt = gameTime;          // для экспресс-бонуса
    if(!pl.touched) touchdown(pl);   // страховка, если докатился без отдельного касания
    ACH.onLand(pl);
  }
  // наземный таймаут: −50% оплаты (звук/вибро/всплывающий «−50%» — в одном месте)
  function groundPenalty(pl){
    pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl);
    SND.penalty(); HAP.penalty();
    addFloat(pl.x, pl.y-20*ui, '−50%', COL.amber);
  }
  function serveTimeFor(b){ return K.SERVE_BASE / (1 + b.lvl*K.UP_SPEED); }
  function comboMult(){ return 1 + Math.min(combo, K.COMBO_MAX)*K.COMBO_STEP; }

  function depart(pl){             // успешный вылет
    served++;
    let pay = pl.reward, express=false;
    if(pl.halfPay){                // наземный штраф рвёт серию и режет оплату вдвое
      combo=0; pay = Math.round(pay*0.5);
    } else {
      combo++;                                       // серия растёт всегда (для достижений/HUD)
      // денежные эффекты применяются, только если ВКЛЮЧЕНЫ на этой карте (lvFx) —
      // так комбо/экспресс можно вводить постепенно; экономика учитывает это же
      express = lvFx.express && (gameTime - pl.landedAt) <= K.EXPRESS_TIME;
      const cm = lvFx.combo ? comboMult() : 1;
      pay = Math.round(pay * cm * (express?K.EXPRESS_BONUS:1));
      if(express) toast={text:t('toast.express', {money:fmtMoney(pay)}), t:0, good:true};
    }
    money += pay;
    SND.depart(express); HAP.ok();
    // якорь всплывашек — у вылетающего борта; награды стопкой ползут вверх над бортом
    const fx = pl.runway ? pl.runway.x+pl.runway.w-34*ui : Math.min(pl.x, W-40*ui);
    const fy = pl.runway ? pl.runway.cy : pl.y;
    addFloat(fx, fy, '+'+fmtMoney(pay), pl.halfPay?COL.muted:COL.coin);
    pulseFx(fx, fy+12*ui, 'takeoff', 0.6);   // отрыв: спид-лайны
    // мгновенный дофамин: «×N комбо» за серию и «вовремя!» за экспресс — над «+N ₿»
    let stack = 17*ui;
    if(lvFx.combo && combo>=2){ addFloat(fx, fy-stack, t('float.combo',{x:combo}), COL.gold); stack+=17*ui; }
    if(express){ addFloat(fx, fy-stack, t('float.express'), COL.teal); stack+=17*ui; }
    // бонус-мир: метаморфоза — гусеница вылетает бабочкой 🦋 + премия-нектар
    if(LV.bonus){
      const pollen = Math.max(2, Math.round(pl.reward * 0.5));
      money += pollen;
      addFloat(fx, fy-stack, '🦋 +'+fmtMoney(pollen), COL.rose);
      pulseFx(fx, fy, 'success', 0.6);
    }
    ACH.onDepart(pl, pay);
    if(tut && tut.plane===pl) completeTutorial();
    pl.dead=true; freeRes(pl);
  }
  function metricValue(){ return LV.objective.metric==='upgrades' ? upgradesDone : served; }
  // звёзды-градация (как в референсе): пороги stars=[1★,2★,3★] по основной метрике.
  // upg (если задан) — доп. порог по апгрейдам для соответствующей звезды: чтобы
  // взять 2★/3★, нужно дотянуть И метрику, И апгрейды (✈+🔧 на L3).
  function computeStars(){
    const o = LV.objective, v = metricValue(), th = o.stars || [o.target, o.target, o.target];
    let s = 0;
    for(let i=0; i<th.length; i++){
      if(v >= th[i] && (!o.upg || upgradesDone >= o.upg[i])) s = i+1; else break;
    }
    return s;
  }
  function recordResult(){
    // Survival: только личный рекорд карты (обслуженные борта); звёзды/прогресс кампании не трогаем
    if(survival){
      if(save.best[levelKey]==null || served>save.best[levelKey]) save.best[levelKey]=served;
      saveGame(); return;
    }
    const stars=computeStars();
    if(save.best[levelKey]==null || served>save.best[levelKey]) save.best[levelKey]=served;
    if(save.stars[levelKey]==null || stars>save.stars[levelKey]) save.stars[levelKey]=stars;
    // прогресс кампании двигают только её уровни (числовой ключ); биом-карты — нет
    if(typeof levelKey==='number' && stars>=1 && save.unlocked < levelIdx+2) save.unlocked = Math.min(LEVELS.length, levelIdx+2);
    saveGame();
  }

  // ---- update ----
  function steer(pl, tx, ty, spd, dt){
    const desired=Math.atan2(ty-pl.y, tx-pl.x);
    let diff=desired-pl.ang;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    const max=K.TURN*dt;
    pl.ang += Math.max(-max,Math.min(max,diff));
    pl.x += Math.cos(pl.ang)*spd*dt;
    pl.y += Math.sin(pl.ang)*spd*dt;
  }
  // плавный доворот курса к target (без смещения) — для парковки в боксе
  function turnTo(pl, target, dt){
    let d=target-pl.ang; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
    const m=K.TURN*dt; pl.ang += Math.max(-m, Math.min(m, d));
  }
  function followPath(pl, spd, dt){
    if(!pl.path.length){ return false; }
    const wp=pl.path[0];
    steer(pl, wp.x, wp.y, spd, dt);
    const turnR = spd/K.TURN;                       // радиус разворота
    const capture = Math.max(K.ARRIVE, turnR*0.6);  // порог «доехал»
    const d = dist(pl.x,pl.y,wp.x,wp.y);
    // точка «позади по курсу» (за носом борта)
    const toX=wp.x-pl.x, toY=wp.y-pl.y;
    const behind = (toX*Math.cos(pl.ang) + toY*Math.sin(pl.ang)) < 0;
    // Выкидываем точку только если ДОЕХАЛИ (близко) или орбитим её рядом
    // (близкая точка позади = проскочили мимо). ДАЛЁКУЮ точку позади НЕ трогаем —
    // к ней борт разворачивается, а не считает уже пройденной. Иначе борт,
    // которому нужно развернуться (типично — готовый к вылету борт у бокса, а
    // ВПП сзади), выкидывал весь нарисованный маршрут и «буксовал» на месте.
    if(d < capture || (behind && d < turnR*1.5)) pl.path.shift();
    return true;
  }

  function update(dt){
    // динамические события (на чистых картах отключены: next* = Infinity)
    if(gameTime>=nextRush){ rushUntil=gameTime+K.RUSH_DUR; nextRush=gameTime+K.RUSH_PERIOD; toast={text:t('toast.rush'), t:0, good:false}; }
    if(gameTime>=nextWind){
      const open=runways.filter(r=>!r.closed);
      if(open.length>1){ open[Math.floor(Math.random()*open.length)].closed=true; windUntil=gameTime+K.WIND_DUR; toast={text:t('toast.wind'), t:0, good:false}; }
      nextWind=gameTime+K.WIND_PERIOD;
    }
    if(windUntil>0 && gameTime>=windUntil){ runways.forEach(r=>r.closed=false); windUntil=0; }
    if(gameTime>=nextFog){ fogUntil=gameTime+K.FOG_DUR; nextFog=gameTime+K.FOG_PERIOD; toast={text:t('toast.fog'), t:0, good:false}; }
    // «часы» суток (логика; визуал берёт nightAmount). Не влияют на сложность.
    { const dc = dayCycle(gameTime); dayPhase = dc.phase; nightAmount = dc.night; }
    // погода: окна rain/snow по таймеру (движок выключен, если nextWeather=Infinity)
    if(gameTime>=nextWeather){
      weather = Math.random()<K.WEATHER_SNOW_CHANCE ? 'snow' : 'rain';
      weatherUntil = gameTime+K.WEATHER_DUR; nextWeather = gameTime+K.WEATHER_PERIOD;
      toast = {text:t('toast.weather.'+weather), t:0, good:false};
    }
    if(weather!=='clear' && gameTime>=weatherUntil) weather='clear';
    const rush = gameTime<rushUntil;
    const fog = gameTime<fogUntil;
    // руление замедляют и туман, и непогода — берём наименьший (самый «вязкий») множитель
    const taxiSpeed = K.SPEED_TAXI * Math.min(fog?K.FOG_TAXI:1, weatherTaxiMult(weather));
    // spawn — ТЕМП уровня (pace) задаёт и частоту прилёта, и лимит одновременных бортов:
    // чем выше pace, тем короче интервал и больше бортов в небе разом → меньше «простоя».
    spawnTimer-=dt;
    const campaign = !LV.biome && !LV.bonus;
    // survival: темп (и потолок неба) растёт со временем; кампания — фикс. pace уровня; бонус — спокойный фон
    const pace = campaign ? levelPace(LV) : (survival ? survivalPace() : K.PACE_DEFAULT);
    const interval = paceInterval(pace, served, rush);
    // в туториале держим в небе только один борт — спокойно ведём его за руку
    const cap = tut ? 1 : ((campaign || survival) ? paceCap(pace) : K.MAX_PLANES);
    // кампания «посадить N»: всего прилетает ровно N бортов. Survival/race — поток бесконечный.
    const spawnCap = (!survival && LV.objective.metric==='served' && !LV.objective.race) ? LV.objective.target : Infinity;
    if(spawnTimer<=0 && planes.length<cap && spawnedTotal<spawnCap){ spawnPlane(); spawnTimer=interval; }

    updateTutorial();
    ACH.onTick(dt);
    if(LV.biome==='forest') updateForest(dt);

    for(const pl of planes){
      if(pl.dead) continue;

      // ---- AIR ----
      if(pl.zone==='air'){
        // влёт с правого края до точки зависания; игрок может перехватить маршрутом
        if(pl.entering){
          if(pl.moving && pl.path.length){ pl.entering=false; }
          else {
            steer(pl, field.hoverX, pl.y, K.SPEED_AIR, dt);
            if(pl.x<=field.hoverX){ pl.x=field.hoverX; pl.ang=Math.PI; pl.entering=false; }
            else continue;
          }
        }
        pl.airTime-=dt; if(pl.airTime<=0){ killAir(pl); continue; }
        if(pl.moving && pl.path.length){
          followPath(pl, K.SPEED_AIR, dt);
        }
        // заход на посадку: с неба на поле — ТОЛЬКО через ВПП. Сесть можно, лишь когда
        // борт идёт по оси открытой полосы (в пределах её полотна по вертикали). Если
        // маршрут ведёт мимо полос — рубеж ВПП работает как стена: дальше борт не
        // пускаем, он скользит вдоль неё, пока не выйдет на створ свободной полосы.
        // (садимся даже на занятую полосу — крушение только при физическом контакте)
        if(pl.x <= field.rwR){
          let best=null;
          for(const r of runways){ if(r.closed) continue; if(pl.y>=r.y && pl.y<=r.y+r.h){ best=r; break; } }
          if(best) land(pl, best);
          else pl.x = field.rwR;   // мимо полосы — упёрся в рубеж ВПП
        }
        continue;
      }

      // ---- RUNWAY ----
      if(pl.zone==='runway'){
        if(pl.landing){
          // идём по оси полосы к полевому торцу; за корпус до него — касание (толчок +
          // визг), дальше докатываемся уже на земле, не меняя размер
          const r=pl.runway;
          steer(pl, r.stopX, r.cy, K.SPEED_AIR*0.8, dt);
          if(!pl.touched && pl.x <= r.stopX + PLANE_LEN()) touchdown(pl);
          if(pl.touched) pl.y += (r.cy - pl.y) * Math.min(1, dt*8);   // держим по оси
          if(pl.x <= r.stopX+2){ pl.x=r.stopX; pl.y=r.cy; startGround(pl); }
          continue;
        }
        if(pl.takeoff){
          pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl);
          // крошечная остановка на старте: выравниваемся по оси и замираем, как настоящие
          // борта перед разгоном — затем плавно ускоряемся к небу, увеличиваясь
          if(pl.holdT>0){
            pl.holdT-=dt; turnTo(pl, 0, dt);
            pl.y += (pl.runway.cy - pl.y) * Math.min(1, dt*8);
            continue;
          }
          steer(pl, pl.runway.exitX+200, pl.runway.cy, K.SPEED_TAKEOFF, dt);
          if(pl.x > W+30){ depart(pl); }
          continue;
        }
        // стоит на полосе, ждёт руления к боксу
        pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl);
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
          if(!rectHit(pl.x,pl.y,pl.runway)){          // съехал с полосы на поле
            if(pl.runway.occupied===pl) pl.runway.occupied=null;
            pl.runway=null; pl.zone='field';
          }
        }
        continue;
      }

      // ---- FIELD (руление) ----
      if(pl.zone==='field'){
        // бонус-мир: терпение гусеницы тикает, но улетающую бабочку не штрафуем
        if(!(LV.bonus && pl.bug==='fly')){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl); }
        const need=curNeed(pl);
        // бонус-мир: бабочка упорхивает к правому краю (без ВПП) и «вылетает»
        if(LV.bonus && pl.bug==='fly'){
          pl.moving=true;
          steer(pl, W+90*ui, pl.y-30*ui, K.SPEED_TAKEOFF*0.7, dt);   // вверх-вправо за край
          if(pl.x > W+30){ depart(pl); }
          continue;
        }
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
          if(LV.bonus) pl.bonusCrawl=false;                          // игрок повёл сам — авто-вползание отменяем
        } else if(LV.bonus && pl.bonusCrawl){
          // авто-вползание с правого края до кромки поля, дальше ждём игрока
          // (игрок может перехватить раньше — потянул маршрут → bonusCrawl снимается выше)
          const ex = field.x1 - 24*ui;
          steer(pl, ex, pl.y, taxiSpeed, dt);
          if(pl.x <= ex){ pl.x=ex; pl.bonusCrawl=false; pl.moving=false; }
        } else if(pl.exiting){
          pl.exiting=false; pl.moving=false;
        }
        // вылет: все услуги сделаны -> заезд на полосу
        if(need==='depart'){
          for(const r of runways){
            if(!r.closed && rectHit(pl.x,pl.y,r)){
              // выезд на ОТКРЫТУЮ полосу под взлёт (крушение — только при контакте на ВПП)
              pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
              pl.takeoff=true; pl.moving=true; pl.path=[]; pl.holdT=K.TAKEOFF_HOLD;
              break;
            }
          }
        } else {
          // заезд в бокс
          for(const b of bays){
            if(!b.open) continue;
            if(rectHit(pl.x,pl.y,b)){
              if(b.type!==need){ /* не тот бокс — простаиваем рядом */ break; }
              if(b.occupied && b.occupied!==pl){ if(!LV.bonus){ killCrash(pl,'loss.collisionBay'); killCrash(b.occupied,'loss.collisionBay'); } }
              else {
                pl.zone='bay'; pl.bay=b; b.occupied=pl;
                pl.moving=false; pl.path=[];
                pl.serveMax=serveTimeFor(b); pl.serveTime=pl.serveMax;
                if(LV.bonus){ pl.bug='cocoon'; pl.landedAt=gameTime; }   // бонус: окуклилась; «вовремя» — от входа в цветок
                else { pl.bayPhase='in'; }                              // кампания: плавный заезд носом к стене
                SND.dock();
              }
              break;
            }
          }
        }
        continue;
      }

      // ---- BAY (обслуживание): плавный заезд по центру носом к стене → стоянка →
      //      по завершении услуги: к центру, разворот носом наружу, плавный выезд и остановка ----
      if(pl.zone==='bay'){
        const b=pl.bay, o=dirOut(b);
        // бонус-мир: гусеница окуклилась — куколка спокойно сидит в серединке цветка,
        // без маневра; по истечении времени метаморфозы превращается в бабочку
        if(LV.bonus){
          pl.serveTime-=dt;
          const fcx=b.x+b.w/2, fcy=b.y+b.h*0.40;        // центр цветка (где он нарисован)
          pl.x += (fcx-pl.x)*Math.min(1, dt*6); pl.y += (fcy-pl.y)*Math.min(1, dt*6);
          if(pl.serveTime<=0){
            b.occupied=null; pl.bay=null;
            pl.reqIndex++; ACH.onService(pl); SND.served();
            pulseFx(fcx,fcy,'success',0.6);
            pl.bug='fly'; pl.ang=0;                       // вылупилась бабочка — курс к краю
            pl.zone='field'; pl.x=fcx; pl.y=fcy; pl.moving=true; pl.path=[];
          }
          continue;
        }
        pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay) groundPenalty(pl);
        const cx=b.x+b.w/2, cy=b.y+b.h/2;
        const vert=Math.abs(o.dy)>Math.abs(o.dx);
        const half=(vert? b.h : b.w)/2;
        const L=13*ui, gap=4*ui;                   // полудлина борта + зазор до стены
        const parkA = -(half - L - gap);           // центр борта у дальней стены (целиком внутри)
        const exitA =  (half + L + gap);           // центр борта снаружи у ворот — точка остановки после выезда
        // держим борт ровно на оси ворот → нет касания боковых стен
        if(vert) pl.x += (cx-pl.x)*Math.min(1, dt*6);
        else     pl.y += (cy-pl.y)*Math.min(1, dt*6);
        const along = vert ? (pl.y-cy)*o.dy : (pl.x-cx)*o.dx;  // вдоль оси, наружу +
        const step = taxiSpeed*dt*0.85;
        const setAlong = a => { if(vert) pl.y=cy+a*o.dy; else pl.x=cx+a*o.dx; };
        const angIn=Math.atan2(-o.dy,-o.dx), angOut=Math.atan2(o.dy,o.dx);
        // обслуживание идёт, пока борт заезжает и стоит носом к стене (не во время выезда)
        if(pl.bayPhase!=='out'){
          pl.serveTime-=dt;
          if(pl.serveTime<=0){
            // услуга выполнена → награда игроку и переход к плавному выезду
            pl.bayPhase='out';
            pl.reqIndex++; ACH.onService(pl); SND.served();
            pulseFx(cx,cy,'success',0.5);
          }
        }
        if(pl.bayPhase==='out'){
          // ВЫЕЗД: подать к центру (клиренс для разворота) → довернуть носом наружу →
          // плавно выехать к точке остановки и встать (без рывка/телепорта)
          let d=angOut-pl.ang; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
          if(along < -0.5){
            turnTo(pl, angOut, dt*1.6);                          // от дальней стены к центру, попутно доворачивая
            setAlong(along + Math.min(step, 0-along));
          } else if(Math.abs(d)>0.12){
            turnTo(pl, angOut, dt*2);                            // на центре — разворот носом наружу
          } else {
            turnTo(pl, angOut, dt*2);
            setAlong(along + Math.min(step, exitA-along));       // плавный выезд к точке остановки
            if(along>=exitA-0.5){
              // выехал целиком — освобождаем бокс, встаём в поле и стоим
              b.occupied=null; pl.bay=null; pl.bayPhase=null;
              pl.zone='field'; setAlong(exitA); pl.x=clampX(pl.x); pl.y=clampY(pl.y);
              pl.moving=false; pl.path=[]; pl.exiting=false;
            }
          }
        } else {
          // ЗАЕЗД/СТОЯНКА: нос к стене, доезжаем к дальней стене и ждём обслуживания
          turnTo(pl, angIn, dt*2);
          setAlong(along + Math.sign(parkA-along)*Math.min(step, Math.abs(parkA-along)));
        }
        continue;
      }
    }

    // столкновения (в спокойном бонус-мире отключены — поток без проигрыша)
    // Физический контакт любых двух наземных бортов — на поле И на полосе, в т.ч.
    // межзонно: садящийся/взлетающий борт, въезжающий в стоящего на торце ВПП, —
    // это крушение, а не «уфф» (борта в воздухе «сверху», в краш не входят).
    if(!LV.bonus){
      const phys = planes.filter(p=>!p.dead && (p.zone==='field' || p.zone==='runway'));
      for(let i=0;i<phys.length;i++)
        for(let j=i+1;j<phys.length;j++){
          const a=phys[i], b=phys[j];
          if(dist(a.x,a.y,b.x,b.y)<K.CRASH_DIST){
            const reason = (a.zone==='runway' && b.zone==='runway') ? 'loss.collisionRunway' : 'loss.collisionField';
            killCrash(a,reason); killCrash(b,reason);
          }
        }
    }

    // near-miss «уфф»: два борта едва разошлись (ближе NEAR_DIST, но не краш) и
    // именно СБЛИЖАЛИСЬ в этот миг — вспышка + лёгкое замедление + «уфф». Это
    // украшение, без штрафа. Антидребезг — по паре бортов (NEAR_COOL),
    // карта пар пересобирается каждый кадр (сама чистит ушедшие/севшие борта).
    if(!LV.bonus){           // спокойный луг — гусеницы/бабочки не пугают друг друга
      const air = planes.filter(p=>!p.dead && p.zone!=='bay' && !p.entering);
      const next={};
      for(let i=0;i<air.length;i++)
        for(let j=i+1;j<air.length;j++){
          const a=air[i], b=air[j], d=dist(a.x,a.y,b.x,b.y);
          if(d >= K.NEAR_DIST*1.5) continue;                 // далеко — не отслеживаем
          // «уфф» — только на поле: в воздухе борта расходятся по высоте, а на ВПП
          // манёвра нет (сближение там — это уже краш, а не near-miss)
          if(a.zone!=='field' || b.zone!=='field') continue;
          const key = a.id<b.id ? a.id+'-'+b.id : b.id+'-'+a.id;
          const prev = nearMissPairs[key];
          let cool = prev ? prev.cool : 0;
          // нужен предыдущий кадр и реальное сближение — иначе спавн рядом или
          // два зависших борта дали бы ложное «уфф»
          const closing = prev && d < prev.last - 0.01;
          if(d>=K.CRASH_DIST && d<K.NEAR_DIST && closing && gameTime>=cool){
            nearMiss((a.x+b.x)/2, (a.y+b.y)/2);
            addFloat((a.x+b.x)/2, (a.y+b.y)/2 - 18*ui, t('float.nearMiss'), COL.phosphor);
            SND.nearmiss(); HAP.near();
            slowmo = Math.max(slowmo, K.SLOWMO_DUR);
            cool = gameTime + K.NEAR_COOL;
          }
          next[key] = {cool, last:d};
        }
      nearMissPairs = next;
    }

    // уборка
    for(let i=planes.length-1;i>=0;i--) if(planes[i].dead){ if(selected===planes[i]) selected=null; planes.splice(i,1); }

    // тревожный бип: у кого-то терпение на исходе (дублирует красное кольцо звуком;
    // чем меньше осталось — тем чаще бип)
    if(gameTime>=alarmAt){
      let mf=1;
      for(const pl of planes){
        if(pl.dead) continue;
        let fr=null;
        if(pl.zone==='air') fr=Math.max(0,pl.airTime)/pl.airMax;
        else if(pl.zone!=='bay') fr=Math.max(0,pl.groundTime)/Math.max(1,pl.groundMax);
        if(fr!=null && fr<mf) mf=fr;
      }
      if(mf<0.25){ SND.alarm(); alarmAt=gameTime+0.45+mf*2.4; }
    }

    if(lives<=0){ endLevel('end.lives'); return; }
    // survival/race — без потолка по принятым: survival кончается по жизням, race по времени
    if(!survival && !LV.objective.race && metricValue() >= LV.objective.target){ endLevel('end.goal'); return; }
    // все борты прилетели и поле пусто, а цель не набрана — смена окончена (без софтлока)
    if(!survival && LV.objective.metric==='served' && !LV.objective.race && spawnedTotal>=LV.objective.target && planes.length===0 && served<LV.objective.target){ endLevel('end.done'); return; }
    // статистика смены: пик одновременной нагрузки + редкие отсчёты для графика
    if(planes.length>statPeak) statPeak=planes.length;
    if(gameTime>=statNextAt){
      statSamples.push({t:gameTime, load:planes.length, served});
      statNextAt = gameTime + statStep;
      // в survival ряд может расти бесконечно — прорежаем и удваиваем шаг
      if(statSamples.length>180){ statSamples = statSamples.filter((_,i)=>i%2===0); statStep*=2; }
    }
    gameTime+=dt;
    if(!survival && LV.objective.time && gameTime>=LV.objective.time){ endLevel('end.time'); return; }
  }
  function dirOut(b){ // направление "наружу из бокса" в поле
    if(b.side==='top') return {dx:0,dy:1};
    if(b.side==='bottom') return {dx:0,dy:-1};
    if(b.side==='deice') return {dx:-1,dy:0}; // у правого края поля, ворота влево
    return {dx:1,dy:0}; // left
  }
  const clampX = x => Math.max(field.x0+10, Math.min(field.x1-10, x));
  const clampY = y => Math.max(field.y0+10, Math.min(field.y1-10, y));

  // ---- render ----
  function rr(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  // ---- облик «ночной радар»: помощники ----
  const MONO='ui-monospace,"SF Mono",Menlo,Consolas,monospace';
  function hexa(c,a){ if(!c || c[0]!=='#') return c;
    const n=parseInt(c.slice(1),16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

  function starfield(tm){ // мерцающие звёзды в верхней части неба
    for(let i=0;i<55;i++){
      const x=(i*97.13)%W, y=(i*53.7)%(H*0.6);
      const tw=0.3+0.7*Math.abs(Math.sin(tm*0.0008+i));
      ctx.fillStyle=hexa(COL.phosphor, 0.05+0.10*tw);
      ctx.fillRect(x,y,1.5,1.5);
    }
  }
  function vignette(){ // мягкое затемнение краёв
    const g=ctx.createRadialGradient(W/2,H*0.4,H*0.2,W/2,H/2,W*0.7);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.42)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  function heart(x,y,r,fill){ // жизни в HUD
    if(COZY && SPRITES.blitC(fill?'heart':'heart-empty', x, y, r*2.6, r*2.6)) return;
    ctx.save(); ctx.translate(x,y); ctx.beginPath(); ctx.moveTo(0,r*0.7);
    ctx.bezierCurveTo(-r*1.3,-r*0.4,-r*0.5,-r*1.1,0,-r*0.35);
    ctx.bezierCurveTo(r*0.5,-r*1.1,r*1.3,-r*0.4,0,r*0.7); ctx.closePath();
    if(fill){ ctx.fillStyle=fill; ctx.shadowColor=hexa(fill,.6); ctx.shadowBlur=7; ctx.fill(); ctx.shadowBlur=0; }
    else { ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.muted,.45); ctx.stroke(); }
    ctx.restore();
  }

  // иконки услуг (центр в (cx,cy), размер r)
  function iconGear(cx,cy,r,col,hole){ ctx.save(); ctx.translate(cx,cy); ctx.fillStyle=col;
    const teeth=8, ro=r, ri=r*0.74, tw=0.2; ctx.beginPath();
    for(let i=0;i<teeth;i++){ const a=i/teeth*Math.PI*2, a0=a-tw,a1=a+tw,a2=a+Math.PI/teeth-tw,a3=a+Math.PI/teeth+tw;
      ctx.lineTo(Math.cos(a0)*ro,Math.sin(a0)*ro); ctx.lineTo(Math.cos(a1)*ro,Math.sin(a1)*ro);
      ctx.lineTo(Math.cos(a2)*ri,Math.sin(a2)*ri); ctx.lineTo(Math.cos(a3)*ri,Math.sin(a3)*ri); }
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,r*0.34,0,7); ctx.fillStyle=hole||COL.tarmac; ctx.fill(); ctx.restore(); }
  function iconDrop(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy-r*0.1); ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.bezierCurveTo(r*0.9,-r*0.1,r*0.85,r*0.9,0,r);
    ctx.bezierCurveTo(-r*0.85,r*0.9,-r*0.9,-r*0.1,0,-r); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(-r*0.22,r*0.28,r*0.22,0,7); ctx.fillStyle=hexa('#ffffff',.4); ctx.fill(); ctx.restore(); }
  function iconPerson(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy); ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,-r*0.5,r*0.34,0,7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-r*0.62,r*0.9); ctx.quadraticCurveTo(-r*0.6,-r*0.05,0,-r*0.05);
    ctx.quadraticCurveTo(r*0.6,-r*0.05,r*0.62,r*0.9); ctx.closePath(); ctx.fill(); ctx.restore(); }
  function iconDepart(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(-Math.PI/4);
    ctx.scale(r/26,r/26); planeShape(col); ctx.restore(); }
  function iconSnow(cx,cy,r,col){ ctx.save(); ctx.translate(cx,cy);   // снежинка: 6 лучей
    ctx.strokeStyle=col; ctx.lineWidth=Math.max(1,r*0.16); ctx.lineCap='round';
    for(let k=0;k<6;k++){ ctx.rotate(Math.PI/3);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.62); ctx.lineTo(r*0.26,-r*0.84); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.62); ctx.lineTo(-r*0.26,-r*0.84); ctx.stroke();
    }
    ctx.restore(); }
  function drawIcon(type,cx,cy,r,col,hole){
    if(type==='repair') iconGear(cx,cy,r,col,hole);
    else if(type==='fuel') iconDrop(cx,cy,r,col);
    else if(type==='board') iconPerson(cx,cy,r,col);
    else if(type==='deice') iconSnow(cx,cy,r,col);
    else iconDepart(cx,cy,r,col);
  }

  // силуэт авиалайнера (нос по курсу, +x; габарит ~48 единиц)
  function planeShape(col){ ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(26,0); ctx.quadraticCurveTo(14,-5,-6,-5); ctx.lineTo(-22,-3.5);
    ctx.lineTo(-22,3.5); ctx.lineTo(-6,5); ctx.quadraticCurveTo(14,5,26,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,-3); ctx.lineTo(-15,-22); ctx.lineTo(-20,-21); ctx.lineTo(-6,-3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,3); ctx.lineTo(-15,22); ctx.lineTo(-20,21); ctx.lineTo(-6,3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-16,-2.5); ctx.lineTo(-24,-10); ctx.lineTo(-27,-9.5); ctx.lineTo(-20,-2.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-16,2.5); ctx.lineTo(-24,10); ctx.lineTo(-27,9.5); ctx.lineTo(-20,2.5); ctx.closePath(); ctx.fill(); }
  // корпус с тенью/окнами/свечением; vip — золото, аварийный — тёплый светлый,
  // медицинский — белый с красным крестом на фюзеляже
  // визуальный масштаб борта (перспектива небо↔земля). На ВПП во время посадки/взлёта
  // меняется ПЛАВНО по позиции вдоль полосы: у полевого торца (stopX) — наземный,
  // у небесного края (exitX) — небесный. Одна формула покрывает оба направления:
  // садящийся борт едет stopX←exitX (ужимается), взлетающий exitX→stopX… наоборот
  // (раздувается) — обоим достаточно интерполяции по x.
  function planeScale(pl){
    const A=K.PLANE_SKY_SCALE, G=K.PLANE_GND_SCALE;
    if(pl.zone==='air') return A;
    if(pl.zone==='runway' && pl.runway && (pl.landing || pl.takeoff)){
      const r=pl.runway;
      const tdX = r.stopX + PLANE_LEN();   // точка касания/отрыва — корпус от полевого торца
      const skyX = r.x + r.w;              // правый конец ВПП — небо
      if(pl.x <= tdX) return G;            // наземный участок: катится/стоит, размер фиксирован
      if(pl.x >= skyX) return A;
      return G + (pl.x - tdX) / Math.max(1, skyX - tdX) * (A - G);
    }
    return G;   // field / bay / борт стоит на полосе
  }
  function drawPlaneBodyAt(x,y,ang,s,vip,emergency,medical){
    if(LV.bonus && !inMenu){ drawCaterpillar(x,y,ang,s); return; }   // бонус-мир: борт → гусеница (в меню-радаре оставляем самолёт)
    if(COZY){
      // sprite is authored nose-up; game heading has nose along +x → rotate ang+90°
      const _id = medical ? 'plane-medevac' : emergency ? 'plane-emergency' : vip ? 'plane-vip' : 'plane';
      if(SPRITES.blitC(_id, x, y, 62*s, 62*s, ang + Math.PI/2)) return;
    }
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.scale(s,s);
    ctx.save(); ctx.translate(5,7); ctx.globalAlpha=.28; planeShape('#000'); ctx.restore();
    if(vip){ ctx.shadowColor=hexa(COL.gold,.6); ctx.shadowBlur=16; }
    else if(NEON){ ctx.shadowColor=hexa(COL.phosphor,.7); ctx.shadowBlur=10; }
    planeShape(vip?COL.gold:(emergency?'#e7d8cf':COL.paper));
    ctx.shadowBlur=0;
    ctx.fillStyle=hexa(COL.phosphor,.55); ctx.fillRect(-2,-1.2,18,2.4);
    ctx.fillStyle=hexa(COL.ink,.5); ctx.beginPath(); ctx.moveTo(26,0); ctx.lineTo(16,-3.2); ctx.lineTo(16,3.2); ctx.closePath(); ctx.fill();
    ctx.fillStyle=hexa(COL.ink,.55);
    ctx.beginPath(); ctx.arc(-8,-12,2.4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-8,12,2.4,0,7); ctx.fill();
    if(medical){ ctx.fillStyle=COL.rose; ctx.fillRect(-7,-2,14,4); ctx.fillRect(-2,-7,4,14); } // красный крест поверх
    ctx.restore();
  }

  // неоновое поле: тёмный фон + радарная сетка/кольца/развёртка вместо
  // металлического апрона, терминала, травы и воды (боксы рисуются поверх)
  function drawNeonField(tm){
    ctx.fillStyle=COL.ink; ctx.fillRect(0,0,W,H);
    const ax=field.x0, ay=field.y0, aR=field.rwR, ab=field.y1;
    // лёгкая полноэкранная сетка
    ctx.save(); ctx.strokeStyle=hexa(COL.phosphor,.045); ctx.lineWidth=1;
    for(let gx=0; gx<W; gx+=34*ui){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(let gy=0; gy<H; gy+=34*ui){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    ctx.restore();
    // панель апрона
    const fx=ax-8*ui, fy=ay-8*ui, fw=(aR-ax)+16*ui, fh=(ab-ay)+16*ui;
    rr(fx,fy,fw,fh,16*ui);
    const fg=ctx.createLinearGradient(0,fy,0,fy+fh); fg.addColorStop(0,'#0c1740'); fg.addColorStop(1,'#070e26');
    ctx.fillStyle=fg; ctx.fill();
    // радар внутри апрона
    const rcx=(ax+aR)/2, rcy=(ay+ab)/2, rmax=Math.min(fw,fh)*0.46;
    ctx.save(); rr(fx,fy,fw,fh,16*ui); ctx.clip();
    ctx.strokeStyle=hexa(COL.phosphor,.10); ctx.lineWidth=1.2;
    for(let k=1;k<=4;k++){ ctx.beginPath(); ctx.arc(rcx,rcy,rmax*k/4,0,7); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(rcx-rmax,rcy); ctx.lineTo(rcx+rmax,rcy);
    ctx.moveTo(rcx,rcy-rmax); ctx.lineTo(rcx,rcy+rmax); ctx.stroke();
    // вращающаяся развёртка
    ctx.save(); ctx.translate(rcx,rcy); ctx.rotate(tm*0.0009);
    const grad=ctx.createLinearGradient(0,0,rmax,0);
    grad.addColorStop(0,hexa(COL.phosphor,.20)); grad.addColorStop(1,hexa(COL.phosphor,0));
    ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,rmax,-0.20,0.02); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.restore();
    // светящаяся рамка апрона
    ctx.save(); ctx.shadowColor=hexa(COL.phosphor,.6); ctx.shadowBlur=14;
    ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.55); rr(fx,fy,fw,fh,16*ui); ctx.stroke(); ctx.restore();
    if(LV.biome==='forest') drawForestDecor(tm, ax, ay, aR, ab);
    if(LV.bonus) drawBonusDecor(tm, ax, ay, aR, ab);
  }

  function drawField(tm){
    const sd = skinDef();
    if(sd.field){ sd.field(tm); return; }   // собственный рендерер сцены скина (только облик)
    // ночное небо + звёзды
    ctx.fillStyle=COL.ink; ctx.fillRect(0,0,W,H);
    starfield(tm);

    const ax=field.x0, ay=field.y0, aR=field.rwR, ab=field.y1;

    // вода справа за полосами: бесшовный тайл (фолбэк — градиент) + медленные волны
    // (в бонус-мире вода/берег уступают лугу — см. drawBonusDecor ниже)
    const wpat = (COZY && !LV.bonus) ? SPRITES.pattern('tile-water', 56*ui) : null;
    if(!LV.bonus){
      if(wpat){ ctx.fillStyle=wpat; ctx.fillRect(aR,0,W-aR,H); }
      else {
        const wg=ctx.createLinearGradient(aR,0,W,0);
        wg.addColorStop(0,COL.water); wg.addColorStop(1,'#142e34');
        ctx.fillStyle=wg; ctx.fillRect(aR,0,W-aR,H);
      }
      for(let i=0;i<6;i++){
        const yy=H*(i+1)/7 + Math.sin(tm*0.0015+i)*3;
        ctx.fillStyle=hexa(wpat?'#9adbe8':COL.phosphor,.06); ctx.fillRect(aR,yy,W-aR,2);
      }
    }
    // травяная кромка с песчаным берегом между полем и водой (cozy: трава → берег → вода)
    if(COZY && LV.biome!=='forest' && !LV.bonus){
      const gw=24*ui;
      ctx.fillStyle=SPRITES.pattern('tile-grass', 56*ui)||'#38482f';
      ctx.fillRect(aR,0,gw,H);
      ctx.fillStyle='#6b5c44'; ctx.fillRect(aR+gw,0,3*ui,H);   // песчаная полоска
      ctx.strokeStyle='rgba(232,224,207,.45)'; ctx.lineWidth=1.5; ctx.setLineDash([3,6]);
      ctx.beginPath(); ctx.moveTo(aR+gw+6*ui,0); ctx.lineTo(aR+gw+6*ui,H); ctx.stroke(); ctx.setLineDash([]); // пена прибоя
    }

    // металлическая рама апрона с заклёпками
    const fx=ax-8*ui, fy=ay-8*ui, fw=(aR-ax)+16*ui, fh=(ab-ay)+16*ui;
    const mg=ctx.createLinearGradient(0,fy,0,fy+fh); mg.addColorStop(0,'#3a3354'); mg.addColorStop(1,'#211d33');
    rr(fx,fy,fw,fh,14*ui); ctx.fillStyle=mg; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.12); rr(fx,fy,fw,fh,14*ui); ctx.stroke();
    ctx.fillStyle=hexa(COL.muted,.5);
    [[fx+6*ui,fy+6*ui],[fx+fw-6*ui,fy+6*ui],[fx+6*ui,fy+fh-6*ui],[fx+fw-6*ui,fy+fh-6*ui]]
      .forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],2.5*ui,0,7); ctx.fill(); });

    // тармак: бесшовный тайл со швами плит (фолбэк — градиент + штриховка) + осевая
    const tpat = COZY ? SPRITES.pattern('tile-tarmac', 56*ui) : null;
    if(tpat){ rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.fillStyle=tpat; ctx.fill(); }
    else {
      const tg=ctx.createLinearGradient(0,ay,0,ab); tg.addColorStop(0,COL['tarmac-2']); tg.addColorStop(1,COL.tarmac);
      rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.fillStyle=tg; ctx.fill();
    }
    ctx.save(); rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.clip();
    if(!tpat){
      ctx.strokeStyle=hexa(COL.ink,.5); ctx.lineWidth=1;
      for(let xx=ax-(ab-ay); xx<aR; xx+=30*ui){ ctx.beginPath(); ctx.moveTo(xx,ay); ctx.lineTo(xx+(ab-ay),ab); ctx.stroke(); }
    }
    ctx.strokeStyle=hexa(COL.gold,.2); ctx.lineWidth=2.5; ctx.setLineDash([12,10]);
    ctx.beginPath(); ctx.moveTo((ax+field.x1)/2, ay+24*ui); ctx.lineTo((ax+field.x1)/2, ab-24*ui); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();

    // терминал — cozy-спрайт (фолбэк: процедурное здание с окнами)
    const ix=ax+(field.x1-ax)*0.28, iy=ay+(ab-ay)*0.34;
    const iw=(field.x1-ax)*0.42, ih=(ab-ay)*0.32;
    if(!(COZY && SPRITES.blit('terminal', ix, iy, iw, ih))){
      rr(ix,iy,iw,ih,8*ui); ctx.fillStyle='#3a3354'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(COL.phosphor,.15); rr(ix,iy,iw,ih,8*ui); ctx.stroke();
      const wcols=7, wrows=2, wx0=ix+iw*0.09, wy0=iy+ih*0.14, wxs=(iw*0.86)/wcols, wys=ih*0.30;
      for(let r2=0;r2<wrows;r2++) for(let c2=0;c2<wcols;c2++){
        const lit=0.25+0.6*Math.abs(Math.sin(tm*0.001+r2*2+c2));
        ctx.fillStyle=hexa(COL.phosphor,0.10+0.18*lit);
        ctx.fillRect(wx0+c2*wxs, wy0+r2*wys, wxs*0.62, wys*0.5);
      }
    }
    ctx.fillStyle=hexa(COL.muted,.6); ctx.font=`${9*ui}px ${MONO}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t(LV.bonus?'canvas.garden':'canvas.terminal'), ix+iw/2, iy+ih-9*ui);

    if(LV.biome==='forest') drawForestDecor(tm, ax, ay, aR, ab);
    if(LV.bonus) drawBonusDecor(tm, ax, ay, aR, ab);
  }

  // Мультяшное дневное поле (скин cartoon): сплошная луговая зелень + непрерывная
  // вода справа — без тёмного тармака, металлической рамы и плиточных «квадратиков».
  // Палитра берётся из CARTOON_TOKENS через COL. Ср. drawNeonField / drawField.
  function drawCartoonField(tm){
    const ax=field.x0, ay=field.y0, aR=field.rwR, ab=field.y1;
    // палитра cartoon: COL отдаёт лишь часть токенов, поэтому грунт/воду берём прямо
    // из THEME.tokens (CARTOON_TOKENS) с дефолтами на случай иного скина
    const T=THEME.tokens||{}; const tk=(n,fb)=>T[n]||fb;
    const cGrass=tk('grass','#6fbf4a'), cGrassDim=tk('grass-dim','#5aa83c');
    const cWater=tk('water','#5fc7e8'), cWaterWave=tk('water-wave','#8fe0f5'), cSand=tk('sand','#e8d39a');
    // 1) трава на всё поле + мягкий дневной градиент (солнце сверху)
    ctx.fillStyle=cGrass; ctx.fillRect(0,0,W,H);
    const gg=ctx.createLinearGradient(0,0,0,H);
    gg.addColorStop(0,hexa('#ffffff',.12)); gg.addColorStop(.45,hexa('#ffffff',0));
    gg.addColorStop(1,hexa(cGrassDim,.30));
    ctx.fillStyle=gg; ctx.fillRect(0,0,W,H);
    // редкие травяные кустики — детерминированно (без random, стабильно по кадрам)
    ctx.fillStyle=hexa(cGrassDim,.35);
    for(let gx=ax+20*ui; gx<aR; gx+=72*ui){
      for(let gy=ay+26*ui; gy<ab; gy+=66*ui){
        const j=(((gx|0)*13+(gy|0)*7)%37)/37;
        ctx.beginPath(); ctx.ellipse(gx+j*18*ui, gy+j*12*ui, 3.4*ui, 1.7*ui, 0,0,7); ctx.fill();
      }
    }
    // 2) вода справа за полосами — непрерывный градиент + песчаный берег + волны
    const shore=14*ui;
    ctx.fillStyle=cSand; ctx.fillRect(aR,0,shore,H);
    const wg=ctx.createLinearGradient(aR+shore,0,W,0);
    wg.addColorStop(0,cWater); wg.addColorStop(1,cWaterWave);
    ctx.fillStyle=wg; ctx.fillRect(aR+shore,0,W-(aR+shore),H);
    for(let i=0;i<6;i++){
      const yy=H*(i+1)/7+Math.sin(tm*0.0015+i)*3;
      ctx.fillStyle=hexa('#ffffff',.14); ctx.fillRect(aR+shore,yy,W-(aR+shore),2*ui);
    }
    // 3) терминал — мультяшный спрайт в левом верхнем углу поля (как на референсе)
    const iw=(field.x1-ax)*0.30, ih=(ab-ay)*0.28;
    const ix=ax+2*ui, iy=ay+2*ui;
    SPRITES.blit('terminal', ix, iy, iw, ih);
    // 4) дневной декор: зелень в травяных карманах у ВПП + облака/птица над водой
    drawCartoonDecor(tm, ax, ay, aR, ab);
  }

  // Дневной декор классических cartoon-уровней (вариант «Зелёная бухта»): деревья и
  // кусты в травяных «карманах» колонны ВПП (берём геометрию runways, чтобы не лезть
  // на сами полосы) + мягко плывущие облака с птицей над водой. Рисуется ФОНОМ — до
  // полос/боксов/бортов, поэтому ничего из игрового слоя не перекрывает. Всё выводится
  // детерминированно по геометрии поля и времени кадра: стабильно и resize-safe.
  // Масштаб привязан к размеру бокса bw (см. layout): дерево ≈1.3×bw, куст ≈0.5×bw.
  function drawCartoonDecor(tm, ax, ay, aR, ab){
    if(LV.biome || LV.bonus) return;
    const bw = Math.min(56*ui*SZ(), (field.x1-field.x0)/2.4);   // размер бокса (как в layout)
    // — наземная зелень: дерево (w/h 0.681) + куст (1.123), якорим по основанию —
    const treeH=bw*1.3, treeW=treeH*0.681, bushH=bw*0.52, bushW=bushH*1.123;
    const tree=(bx,by)=>SPRITES.blit('tree', bx-treeW/2, by-treeH, treeW, treeH);
    const bush=(bx,by)=>SPRITES.blit('bush', bx-bushW/2, by-bushH, bushW, bushH);
    if(runways.length){
      // травяные карманы: над колонной ВПП, под ней и в пропущенной средней полосе.
      // «Прибрежную» группу ставим у правого края поля (ближе к берегу), как на ref-01.
      const colT=runways[0].y, last=runways[runways.length-1], colB=last.y+last.h;
      const xCoast=aR-treeW*0.55, pockets=[];
      if(colT-ay > treeH*0.75) pockets.push(colT-6*ui);             // верхний карман
      if(ab-colB > treeH*0.7)  pockets.push(ab-6*ui);               // нижний карман
      for(let i=1;i<runways.length;i++){                            // средние разрывы
        const gT=runways[i-1].y+runways[i-1].h, gB=runways[i].y;
        if(gB-gT > treeH*0.7) pockets.push(gB-6*ui);
      }
      pockets.forEach((by,k)=>{
        tree(xCoast, by);
        bush(xCoast-treeW*0.72-(k%2)*6*ui, by-2*ui);
      });
    }
    // — облака + птица над водой (мягкий горизонтальный дрейф, фон) —
    const water0=aR+14*ui, span=W-water0;
    if(span>16*ui){
      [['cloud',1.6,1.298],['cloud-2',2.0,1.308]].forEach((c,i)=>{
        const cw=bw*c[1], ch=cw/c[2], period=span+cw;
        const drift=((tm*0.006)+i*period*0.5)%period;
        const cx=water0-cw+drift, cy=ay+(14+i*46)*ui;
        ctx.save(); ctx.globalAlpha=0.9; SPRITES.blit(c[0], cx, cy, cw, ch); ctx.restore();
      });
      const birdW=bw*0.7, birdH=birdW/1.399;     // птица (w/h 1.399)
      const bx=water0+span*0.55+(Math.sin(tm*0.00045)*0.5+0.5)*span*0.3-birdW/2;
      const byb=ay+(ab-ay)*0.32+Math.sin(tm*0.0016)*6*ui;
      ctx.save(); ctx.globalAlpha=0.85; SPRITES.blit('bird', bx, byb, birdW, birdH); ctx.restore();
    }
  }

  function drawRunways(tm){
    const CART = SKIN==='cartoon';
    runways.forEach((r,i)=>{
      rr(r.x,r.y,r.w,r.h,7*ui); ctx.fillStyle=LV.bonus?'#6e5238':(NEON?'#0a1230':(CART?'#c7cfd6':'#1a1d2e')); ctx.fill();  // бонус: садовая дорожка; cartoon: светлый асфальт
      if(NEON && !r.closed){
        ctx.save(); ctx.shadowColor=hexa(COL.phosphor,.5); ctx.shadowBlur=8;
        ctx.lineWidth=1.6; ctx.strokeStyle=hexa(COL.phosphor,.5); rr(r.x,r.y,r.w,r.h,7*ui); ctx.stroke(); ctx.restore();
      } else {
        ctx.lineWidth=CART?2:1.5; ctx.strokeStyle=CART?hexa('#5a6470',.55):hexa(COL.muted,.18); rr(r.x,r.y,r.w,r.h,7*ui); ctx.stroke();
      }
      // осевая пунктирная (cartoon — белая, поверх светлого асфальта)
      ctx.strokeStyle=CART?hexa('#ffffff',r.occupied?0.6:0.92):hexa(COL.paper, r.occupied?0.35:0.5);
      ctx.lineWidth=2.5; ctx.setLineDash([18,15]);
      ctx.beginPath(); ctx.moveTo(r.x+12*ui,r.cy); ctx.lineTo(r.x+r.w-12*ui,r.cy); ctx.stroke(); ctx.setLineDash([]);
      // пороговые отметки с обоих торцов (cartoon — красные пороги как на референсе)
      ctx.fillStyle=CART?hexa(COL.life,.85):hexa(COL.paper,.4);
      for(let k=0;k<3;k++){
        ctx.fillRect(r.x+7*ui, r.cy-14*ui+k*11*ui, 5*ui, 4*ui);
        ctx.fillRect(r.x+r.w-12*ui, r.cy-14*ui+k*11*ui, 5*ui, 4*ui);
      }
      // огни кромок: золотые / янтарные (занята) / красные (закрыта), мерцают
      const blink=0.4+0.6*Math.abs(Math.sin(tm*0.004+i));
      const lc = r.closed?COL.life:(r.occupied?COL.amber:'#ffb84d'); // amber-glow по спеке cozy
      for(let k=0;k<=8;k++){
        const lx=r.x+9*ui+k*(r.w-18*ui)/8;
        ctx.fillStyle=hexa(lc,blink);
        ctx.beginPath(); ctx.arc(lx,r.y+5*ui,2*ui,0,7); ctx.fill();
        ctx.beginPath(); ctx.arc(lx,r.y+r.h-5*ui,2*ui,0,7); ctx.fill();
      }
      if(r.closed){
        rr(r.x,r.y,r.w,r.h,7*ui); ctx.fillStyle=hexa(COL.life,.16); ctx.fill();
        const cx=r.x+r.w/2, s=Math.min(r.w,r.h)*0.16;
        ctx.strokeStyle=hexa(COL.life,.8); ctx.lineWidth=3.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(cx-s,r.cy-s); ctx.lineTo(cx+s,r.cy+s);
        ctx.moveTo(cx+s,r.cy-s); ctx.lineTo(cx-s,r.cy+s); ctx.stroke();
        ctx.fillStyle=hexa(COL.life,.85); ctx.font=`${10*ui}px ${MONO}`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(t('canvas.closed'), cx, r.y+r.h-12*ui);
      } else {
        ctx.fillStyle=CART?hexa(COL.ink,.6):hexa(COL.muted,.7); ctx.font=`${(CART?15:9)*ui}px ${MONO}`;
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText(t('canvas.rwy',{n:'0'+(i+1)}), r.x+(CART?16:12)*ui, r.y+(CART?15:12)*ui);
      }
    });
  }

  // ---- лесной биом: отрисовка ----
  const FCOL = {edge:'#1d3a28', tree:'#2f7d4f', tree2:'#3fa15f', trunk:'#6b4f2a'};
  function pineTree(x,y,h,col){            // силуэт ёлки (вершина в y, основание ниже)
    const w=h*0.62;
    ctx.fillStyle=col;
    for(let k=0;k<3;k++){
      const ty=y+h*0.18*k, by=ty+h*0.42, ww=w*(0.6+0.2*k);
      ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x-ww/2,by); ctx.lineTo(x+ww/2,by); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle=FCOL.trunk; ctx.fillRect(x-h*0.05, y+h*0.78, h*0.1, h*0.18);
  }
  function emoji(g,x,y,size,glow){          // эмодзи-глиф по центру (x,y)
    ctx.save();
    ctx.font=`${size}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=COL.paper;                // фолбэк-цвет, если у системы нет цветных эмодзи
    if(glow){ ctx.shadowColor=glow; ctx.shadowBlur=9; }
    ctx.fillText(g,x,y); ctx.restore();
  }
  // ---- бонус-мир «луг бабочек»: гусеницы вместо бортов, цветы вместо боксов ----
  const BCOL = {sky:'#bfe8ff', meadow:'#d9f3c9', body:'#7fc241', body2:'#5fa830', petal:'#ff9ec7'};
  // три вида гусениц ↔ три цвета цветков ↔ три вида бабочек (пазл-сортировка):
  // species i соответствует типу бокса BTYPE[i]; цвет ведёт через все три стадии.
  const BTYPE = ['fuel','board','repair'];                 // какие боксы = какие виды
  const BSP = [
    { body:'#ff9ec7', body2:'#ef79a8', petal:'#ff5fa0', wing:'#ff8fc2', spot:'#ffe1ef' }, // розовый
    { body:'#ffd76a', body2:'#f0b53b', petal:'#ffc24d', wing:'#ffd169', spot:'#fff3cf' }, // золотой
    { body:'#c4a3ff', body2:'#a87cf0', petal:'#b07cff', wing:'#c79bff', spot:'#ece0ff' }, // сиреневый
  ];
  const bSpec = type => { const i = BTYPE.indexOf(type); return i<0 ? 0 : i; };  // тип бокса → вид
  // гусеница вдоль курса: нос (голова) по +x, сегменты тянутся к хвосту (−x)
  function drawCaterpillar(x,y,ang,s,sp){
    const C = BSP[sp||0];
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.scale(s,s);
    // тень под тельцем
    ctx.save(); ctx.translate(3,6); ctx.globalAlpha=.22; ctx.fillStyle='#000';
    for(let i=0;i<6;i++){ ctx.beginPath(); ctx.arc(12-i*9, 0, 7-i*0.4, 0, 7); ctx.fill(); }
    ctx.restore();
    for(let i=5;i>=0;i--){            // от хвоста к голове — голова рисуется поверх
      ctx.beginPath(); ctx.arc(12-i*9, 0, 7-i*0.4, 0, 7);
      ctx.fillStyle = (i%2) ? C.body : C.body2; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(16, 0, 8.5, 0, 7); ctx.fillStyle=C.body; ctx.fill();   // голова
    ctx.fillStyle='#1c241a';          // глазки
    ctx.beginPath(); ctx.arc(20,-3.2,1.8,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(20, 3.2,1.8,0,7); ctx.fill();
    ctx.strokeStyle=C.body2; ctx.lineWidth=1.6;  // усики с шариками
    ctx.beginPath(); ctx.moveTo(18,-4); ctx.lineTo(24,-9); ctx.moveTo(18,4); ctx.lineTo(24,9); ctx.stroke();
    ctx.fillStyle=C.petal;
    ctx.beginPath(); ctx.arc(24,-9,2,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(24,9,2,0,7); ctx.fill();
    ctx.restore();
  }
  // куколка (хризалида): висящая капля в цвете вида, с лёгким бликом
  function drawCocoon(x,y,s,sp){
    const C = BSP[sp||0];
    ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
    ctx.save(); ctx.translate(2,4); ctx.globalAlpha=.2; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(0,2,9,13,0,0,7); ctx.fill(); ctx.restore();
    ctx.fillStyle=C.body2;                          // тельце-капля
    ctx.beginPath(); ctx.moveTo(0,-15); ctx.quadraticCurveTo(11,-6,9,6); ctx.quadraticCurveTo(6,16,0,16);
    ctx.quadraticCurveTo(-6,16,-9,6); ctx.quadraticCurveTo(-11,-6,0,-15); ctx.closePath(); ctx.fill();
    ctx.fillStyle=C.body;                           // сегменты-насечки
    for(let i=-1;i<=2;i++){ ctx.beginPath(); ctx.ellipse(0,i*6,8-Math.abs(i),2.2,0,0,7); ctx.fill(); }
    ctx.fillStyle=C.spot; ctx.globalAlpha=.7;       // блик
    ctx.beginPath(); ctx.ellipse(-3,-6,2,4,0.4,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=C.body2; ctx.lineWidth=1.4;     // крючок-крепление к стеблю
    ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,-21); ctx.stroke();
    ctx.restore();
  }
  // бабочка вдоль курса: тельце по оси, 4 крыла в цвете вида + пятна
  function drawButterfly(x,y,ang,s,sp){
    const C = BSP[sp||0], flap = 0.7+0.3*Math.abs(Math.sin(nowT*0.012));
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.scale(s,s);
    ctx.save(); ctx.scale(1, flap);                 // взмах: крылья «дышат» по вертикали
    ctx.fillStyle=C.wing;
    [-1,1].forEach(sg=>{                              // переднее и заднее крыло с каждой стороны
      ctx.beginPath(); ctx.ellipse(3, sg*11, 11, 8, sg*0.5, 0, 7); ctx.fill();   // переднее
      ctx.beginPath(); ctx.ellipse(-7, sg*10, 8, 7, sg*-0.4, 0, 7); ctx.fill();  // заднее
    });
    ctx.fillStyle=C.spot;                            // пятна-глазки на крыльях
    [-1,1].forEach(sg=>{ ctx.beginPath(); ctx.arc(4, sg*12, 2.6, 0, 7); ctx.fill(); });
    ctx.restore();
    ctx.fillStyle='#3a2c14';                         // тельце
    ctx.beginPath(); ctx.ellipse(0,0,3,9,0,0,7); ctx.fill();
    ctx.strokeStyle='#3a2c14'; ctx.lineWidth=1;      // усики
    ctx.beginPath(); ctx.moveTo(6,-1); ctx.lineTo(11,-4); ctx.moveTo(6,1); ctx.lineTo(11,4); ctx.stroke();
    ctx.restore();
  }
  // выбрать стадию по pl.bug: гусеница → куколка (в цветке) → бабочка (вылет)
  function drawBug(pl){
    const sp = pl.species||0, s = ui*0.5;
    if(pl.bug==='cocoon') drawCocoon(pl.x, pl.y, s, sp);
    else if(pl.bug==='fly') drawButterfly(pl.x, pl.y, pl.ang, s*1.1, sp);
    else drawCaterpillar(pl.x, pl.y, pl.ang, s, sp);
  }
  // простой цветок: лепестки по кругу + золотая серединка
  function drawFlower(cx,cy,r,col){
    ctx.save();
    ctx.fillStyle=col;
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2;
      ctx.beginPath(); ctx.ellipse(cx+Math.cos(a)*r*0.62, cy+Math.sin(a)*r*0.62, r*0.5, r*0.3, a, 0, 7); ctx.fill(); }
    ctx.fillStyle='#f4cf5e'; ctx.beginPath(); ctx.arc(cx,cy,r*0.42,0,7); ctx.fill();
    ctx.restore();
  }
  function roundCloud(x,y,r){
    ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.arc(x+r*0.9,y+r*0.25,r*0.78,0,7); ctx.arc(x-r*0.9,y+r*0.25,r*0.68,0,7); ctx.fill();
  }
  // луговой антураж поверх апрона: небо-градиент с облаками за «полосами» +
  // зелёный налёт на поле с россыпью цветочков (вместо воды/тармака ночного порта)
  function drawBonusDecor(tm, ax, ay, aR, ab){
    const sg=ctx.createLinearGradient(aR,0,aR,H); sg.addColorStop(0,BCOL.sky); sg.addColorStop(1,BCOL.meadow);
    ctx.fillStyle=sg; ctx.fillRect(aR,0,W-aR,H);
    ctx.fillStyle='rgba(255,255,255,.55)';
    for(let i=0;i<4;i++){
      const cyy=H*(i+1)/5 + Math.sin(tm*0.0004+i)*6;
      const span=Math.max(1, W-aR-40*ui);
      const cxx=aR+20*ui + ((i*53*ui) % span);
      roundCloud(cxx, cyy, 15*ui);
    }
    ctx.save(); rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.clip();
    ctx.fillStyle='rgba(120,200,90,.16)'; ctx.fillRect(ax,ay,aR-ax,ab-ay);
    const pcol=[BCOL.petal, COL.gold, '#b58cf0'];
    for(let i=0;i<10;i++){
      const fxp=ax+18*ui + ((i*97*ui) % Math.max(1,(aR-ax-30*ui)));
      const fyp=ay+14*ui + ((i*61*ui) % Math.max(1,(ab-ay-24*ui)));
      drawFlower(fxp, fyp, 5*ui, pcol[i%3]);
    }
    ctx.restore();
  }
  // зелёный лесной антураж поверх фона апрона (вода справа → лесная кромка)
  function drawForestDecor(tm, ax, ay, aR, ab){
    // лесная кромка вместо воды за полосами
    ctx.fillStyle=FCOL.edge; ctx.fillRect(aR,0,W-aR,H);
    const cols=Math.max(2,Math.round((W-aR)/(34*ui)));
    for(let r2=0;r2<6;r2++) for(let c2=0;c2<cols;c2++){
      const tx=aR+18*ui+c2*((W-aR-24*ui)/Math.max(1,cols-1));
      const ty=18*ui + r2*(H-36*ui)/6 + (c2%2)*9*ui + Math.sin(tm*0.0006+c2)*1.5;
      pineTree(tx,ty,26*ui, r2%2?FCOL.tree:FCOL.tree2);
    }
    // лёгкий зелёный налёт на тармак
    ctx.save(); rr(ax,ay,aR-ax,ab-ay,9*ui); ctx.clip();
    ctx.fillStyle=hexa(FCOL.tree,.06); ctx.fillRect(ax,ay,aR-ax,ab-ay); ctx.restore();
  }
  // сервисное здание + помехи на полосах + спец-бригады
  function drawForest(tm){
    const sv=field.service;
    if(sv){
      // здание: корпус + крыша + гаражные ворота + эмблема
      rr(sv.x,sv.y,sv.w,sv.h,6*ui); ctx.fillStyle='#243b2d'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=hexa(FCOL.tree2,.6); rr(sv.x,sv.y,sv.w,sv.h,6*ui); ctx.stroke();
      ctx.fillStyle=hexa(FCOL.tree2,.5);
      ctx.beginPath(); ctx.moveTo(sv.x-2*ui,sv.y); ctx.lineTo(sv.x+sv.w/2,sv.y-7*ui); ctx.lineTo(sv.x+sv.w+2*ui,sv.y); ctx.closePath(); ctx.fill();
      // гаражные ворота (выезд бригад)
      const dw=sv.w*0.4, dh=sv.h*0.5;
      rr(sv.x+sv.w/2-dw/2, sv.y+sv.h-dh, dw, dh, 3*ui); ctx.fillStyle='#16241b'; ctx.fill();
      ctx.lineWidth=1; ctx.strokeStyle=hexa(COL.amber,.5); rr(sv.x+sv.w/2-dw/2, sv.y+sv.h-dh, dw, dh, 3*ui); ctx.stroke();
      emoji('🔧', sv.x+sv.w/2, sv.y+sv.h*0.34, 13*ui);
      ctx.fillStyle=hexa(COL.amber,.8); ctx.font=`${7*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(t('canvas.service'), sv.x+sv.w/2, sv.y+sv.h+2*ui);
    }
    // помехи
    for(const h of hazards){
      if(h.kind==='tree'){
        const ang = (h.fallen?1:Math.min(1,h.t/h.fallTime)) * (Math.PI*0.46); // 0 → стоит, ~83° → лежит поперёк
        ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(ang);
        // ствол растёт «вверх» (−y) от основания у поля; при падении поворачивается на полосу
        ctx.fillStyle=FCOL.trunk; ctx.fillRect(-3*ui, -10*ui, 6*ui, 10*ui);
        pineTree(0, -40*ui, 34*ui, FCOL.tree2);
        ctx.restore();
        if(h.beaver) emoji('🦫', h.x+12*ui, h.y+8*ui, 13*ui, hexa(COL.amber,.5)); // бобёр грызёт у основания
      } else if(h.kind==='deer'){
        emoji('🦌', h.x, h.y, 22*ui, hexa(COL.amber,.4));
      } else if(h.kind==='snow'){
        emoji('❄️', h.x, h.y, 22*ui, hexa(COL.teal,.5));   // занос на полосе (плейсхолдер под арт)
      } else { // birds
        for(let k=0;k<3;k++) emoji('🐦', h.x+(k-1)*15*ui, h.y+Math.sin(tm*0.006+k)*4*ui, 13*ui, hexa(COL.phosphor,.4));
      }
      // подсказка «тапни — вышлю бригаду»: пульсирующее кольцо + иконка нужной бригады
      if(!h.dispatched){
        const pulse=0.5+0.5*Math.abs(Math.sin(tm*0.005));
        ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.phosphor,.3+0.4*pulse);
        ctx.beginPath(); ctx.arc(h.x, h.y, (24+4*pulse)*ui, 0, 7); ctx.stroke();
        const ic = {truck:'🚙', eagle:'🦅', chainsaw:'🪚', plow:'🚜'}[neededCrew(h)];
        emoji(ic, h.x, h.y-32*ui, 14*ui, hexa(COL.teal,.5));
      }
    }
    // спец-авто в пути / за работой
    for(const c of crews){
      const ic = {truck:'🚙', eagle:'🦅', chainsaw:'🪚', plow:'🚜'}[c.kind];
      emoji(ic, c.x, c.y, 16*ui, hexa(COL.amber,.4));
      if(c.phase==='work'){               // искорки работы
        const pulse=Math.abs(Math.sin(tm*0.02));
        ctx.fillStyle=hexa(COL.gold,.4+0.4*pulse);
        ctx.beginPath(); ctx.arc(c.x+8*ui, c.y-6*ui, 2*ui*(1+pulse), 0, 7); ctx.fill();
      }
    }
  }

  // контур трёх стен бокса: сторона к полю (out) — открытые ворота, борт внутри виден
  function bayWalls(b,out,r){
    const x0=b.x, y0=b.y, x1=b.x+b.w, y1=b.y+b.h;
    ctx.beginPath();
    if(out.dy===1){ ctx.moveTo(x0,y1); ctx.arcTo(x0,y0,x1,y0,r); ctx.arcTo(x1,y0,x1,y1,r); ctx.lineTo(x1,y1); }
    else if(out.dy===-1){ ctx.moveTo(x0,y0); ctx.arcTo(x0,y1,x1,y1,r); ctx.arcTo(x1,y1,x1,y0,r); ctx.lineTo(x1,y0); }
    else if(out.dx===-1){ ctx.moveTo(x0,y0); ctx.arcTo(x1,y0,x1,y1,r); ctx.arcTo(x1,y1,x0,y1,r); ctx.lineTo(x0,y1); } // ворота слева
    else { ctx.moveTo(x1,y0); ctx.arcTo(x0,y0,x0,y1,r); ctx.arcTo(x0,y1,x1,y1,r); ctx.lineTo(x1,y1); }
  }

  function drawBay(b){
    const col=LV.bonus ? BSP[bSpec(b.type)].petal : SVC[b.type].color;   // бонус: цвет цветка по виду
    const busy=!!b.occupied;
    ctx.save();
    // нарисованная цельная панель бокса (пер-скиновый арт, напр. neon): bay-<type>
    // для открытого, bay-locked для закрытого — заменяет процедурную «стойло»-форму.
    // По контракту спрайт НЕ запекает иконку/ценник/прогресс — движок рисует их поверх.
    const panelDrawn = COZY && SPRITES.blitC(b.open ? ('bay-'+b.type) : 'bay-locked', b.x+b.w/2, b.y+b.h/2, b.w, b.h);
    if(!b.open){
      const enough = money>=K.BAY_OPEN_COST;
      if(!panelDrawn){
        rr(b.x,b.y,b.w,b.h,9*ui); ctx.fillStyle=NEON?'#0a1230':'#1f1b2c'; ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle=hexa(COL.muted,.25); rr(b.x,b.y,b.w,b.h,9*ui); ctx.stroke();
        // приглушённая иконка типа + замок
        ctx.globalAlpha=.35;
        if(!(COZY && SPRITES.blitC('svc-'+b.type, b.x+b.w/2, b.y+b.h*0.28, 33*ui, 33*ui)))
          drawIcon(b.type, b.x+b.w/2, b.y+b.h*0.28, 12*ui, COL.muted, '#1f1b2c');
        ctx.globalAlpha=1;
        const lx=b.x+b.w/2, ly=b.y+b.h*0.52;
        ctx.fillStyle=hexa(COL.muted,.8); rr(lx-7*ui,ly-4*ui,14*ui,11*ui,2.5*ui); ctx.fill();
        ctx.beginPath(); ctx.arc(lx,ly-4*ui,5*ui,Math.PI,0);
        ctx.lineWidth=2*ui; ctx.strokeStyle=hexa(COL.muted,.8); ctx.stroke();
      }
      // ценник-чип
      const chW=Math.min(b.w-10*ui,56*ui);
      rr(b.x+b.w/2-chW/2, b.y+b.h-19*ui, chW, 14*ui, 7*ui);
      ctx.fillStyle=hexa(COL.gold, enough?.16:.07); ctx.fill();
      ctx.fillStyle=enough?COL.coin:COL.muted; ctx.font=`${9*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(fmtMoney(K.BAY_OPEN_COST), b.x+b.w/2, b.y+b.h-12*ui);
      ctx.restore(); return;
    }

    // открытый бокс-«стойло»: пол + стены с трёх сторон, ворота в сторону поля,
    // рамка цвета услуги (ярче и со свечением, когда занят) — борт внутри виден
    const out=dirOut(b);
    if(!panelDrawn){
      rr(b.x,b.y,b.w,b.h,9*ui); ctx.fillStyle=LV.bonus?'#2e3a26':(NEON?'#0b1336':'#2a2440'); ctx.fill();   // бонус: грядка
      ctx.lineWidth=2;
      if(busy){ ctx.shadowColor=hexa(col,.6); ctx.shadowBlur=12; }
      else if(NEON){ ctx.shadowColor=hexa(col,.5); ctx.shadowBlur=8; }
      ctx.strokeStyle=hexa(col, busy?0.9:(NEON?0.75:0.45)); bayWalls(b,out,9*ui); ctx.stroke(); ctx.shadowBlur=0;
      // проём ворот: пунктирный порог + габаритные огни по углам
      let gx0,gy0,gx1,gy1;
      if(out.dy===1){ gx0=b.x; gy0=b.y+b.h; gx1=b.x+b.w; gy1=gy0; }
      else if(out.dy===-1){ gx0=b.x; gy0=b.y; gx1=b.x+b.w; gy1=gy0; }
      else if(out.dx===-1){ gx0=b.x; gy0=b.y; gx1=gx0; gy1=b.y+b.h; }
      else { gx0=b.x+b.w; gy0=b.y; gx1=gx0; gy1=b.y+b.h; }
      ctx.setLineDash([4*ui,5*ui]); ctx.lineWidth=1.5; ctx.strokeStyle=hexa(col,.22);
      ctx.beginPath(); ctx.moveTo(gx0,gy0); ctx.lineTo(gx1,gy1); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=hexa(col,.8);
      [[gx0,gy0],[gx1,gy1]].forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],2*ui,0,7); ctx.fill(); });
    }
    if(LV.bonus){
      // бонус-мир: бокс — это цветок своего цвета, виден всегда (куколка садится в серединку поверх)
      drawFlower(b.x+b.w/2, b.y+b.h*0.40, 18*ui, col);
    } else if(busy){
      // центр отдан припаркованному борту (рисуется поверх) —
      // тип услуги мелкой пиктограммой у дальней от ворот стены
      const iy = out.dy===-1 ? b.y+b.h-13*ui : b.y+13*ui;
      if(!(COZY && SPRITES.blitC('svc-'+b.type, b.x+13*ui, iy, 24*ui, 24*ui)))
        drawIcon(b.type, b.x+13*ui, iy, 9*ui, col, '#2a2440');
      // живая анимация обслуживания над бортом (искры/капли/посадка людей)
      if(COZY){
        const fxid={repair:'fx-weld',fuel:'fx-fuel',board:'fx-boarding',deice:'fx-droplet'}[b.type];
        const pp=0.62+0.38*Math.abs(Math.sin(nowT*0.006));
        ctx.save(); ctx.globalAlpha=pp;
        if(fxid) SPRITES.blitC(fxid, b.x+b.w/2, b.y+b.h*0.34, 26*ui*pp, 26*ui*pp);
        ctx.restore();
      }
    } else {
      if(!(COZY && SPRITES.blitC('svc-'+b.type, b.x+b.w/2, b.y+b.h*0.40, 45*ui, 45*ui)))
        drawIcon(b.type, b.x+b.w/2, b.y+b.h*0.36, 18*ui, col, '#2a2440');
      // подпись услуги
      ctx.fillStyle=hexa(col,.85); ctx.font=`${8*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(t('svc.'+b.type).toUpperCase(), b.x+b.w/2, b.y+b.h-18*ui);
    }
    // пипсы уровня
    const total=K.BAY_MAX_LVL, pip=5.2*ui, gap=4.5*ui;
    const startX=b.x+b.w/2-(total*(pip+gap)-gap)/2;
    for(let i=0;i<total;i++){
      ctx.fillStyle = i<b.lvl ? col : hexa(COL.muted,.18);
      ctx.beginPath(); ctx.arc(startX+i*(pip+gap)+pip/2, b.y+b.h-8*ui, pip/2, 0,7); ctx.fill();
    }
    // прогресс обслуживания — кружок в правом верхнем углу
    if(busy){
      const p=b.occupied, frac=1-Math.max(0,p.serveTime)/p.serveMax;
      const ccx=b.x+b.w-12*ui, ccy=b.y+12*ui;
      ctx.beginPath(); ctx.arc(ccx,ccy,7*ui,0,7); ctx.lineWidth=2.5*ui; ctx.strokeStyle=hexa(COL.ink,.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(ccx,ccy,7*ui,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
      ctx.lineWidth=2.5*ui; ctx.lineCap='round'; ctx.strokeStyle=col; ctx.stroke();
    }
    // подсказка цены апгрейда (жёлтым, если хватает)
    const up=bayUpCost(b);
    if(up!=null){
      const enough = money>=up;
      ctx.fillStyle = enough?COL.coin:COL.muted; ctx.font=`${9*ui}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('↑ '+fmtMoney(up), b.x+b.w/2, b.y+b.h+4*ui);
    }
    ctx.restore();
  }

  function drawPlane(pl){
    const need=curNeed(pl);
    const ncol=SVC[need].color;
    const vs=planeScale(pl);   // визуальная «перспектива»: кольца/пузырёк тянутся за бортом

    // маршрут — cozy-зелёная (radar-фосфор при COZY=off): сплошная тонкая линия
    if((pl.zone==='air'||pl.zone==='field'||pl.zone==='runway') && pl.path.length && pl.moving){
      const _rc = NEON ? COL.phosphor : '#5dca7a';
      ctx.save();
      ctx.strokeStyle=hexa(_rc, pl.selected?0.95:0.6);
      ctx.lineWidth=NEON?2.4:1.25; ctx.lineCap='round'; ctx.lineJoin='round'; // сплошная, на 50% тоньше, без мерцания
      if(NEON){ ctx.shadowColor=_rc; ctx.shadowBlur=pl.selected?12:7; }
      ctx.beginPath(); ctx.moveTo(pl.x,pl.y);
      for(const w of pl.path) ctx.lineTo(w.x,w.y);
      ctx.stroke(); ctx.shadowBlur=0;
      // наконечник-стрелка по направлению последнего сегмента
      {
        const tp=pl.path[pl.path.length-1];
        const pp=pl.path.length>1?pl.path[pl.path.length-2]:{x:pl.x,y:pl.y};
        const aAng=Math.atan2(tp.y-pp.y, tp.x-pp.x);
        ctx.setLineDash([]);
        if(!(COZY && SPRITES.blitC('route-arrow', tp.x, tp.y, 15*ui, 15*ui, aAng, _rc))){
          ctx.save(); ctx.translate(tp.x,tp.y); ctx.rotate(aAng);
          ctx.fillStyle=hexa(_rc, pl.selected?0.9:0.55);
          ctx.beginPath(); ctx.moveTo(7*ui,0); ctx.lineTo(-4*ui,-5*ui); ctx.lineTo(-4*ui,5*ui); ctx.closePath(); ctx.fill();
          ctx.restore();
        }
        // статичная точка-цель у выбранного борта (без мерцания)
        if(pl.selected){
          ctx.beginPath(); ctx.arc(tp.x,tp.y,5*ui,0,7);
          ctx.lineWidth=1.5; ctx.strokeStyle=hexa(_rc,.6); ctx.stroke();
        }
      }
      ctx.restore();
    }

    // кольцо терпения — ТОЛЬКО в воздухе: игрок без тапа видит, сколько борт ещё
    // потерпит до посадки. На земле (поле/ВПП) и в боксе кольца нет — поле чище.
    // у улетающей бабочки кольца нет — она уже «обслужена»
    let frac=null;
    if(LV.bonus && pl.bug==='fly') frac=null;
    else if(pl.zone==='air') frac=Math.max(0,pl.airTime)/pl.airMax;
    if(frac!=null){
      const rcol = pl.emergency ? COL.life : (frac>0.5 ? COL.teal : frac>0.25 ? COL.amber : COL.life);
      ctx.save(); ctx.translate(pl.x,pl.y);
      ctx.beginPath(); ctx.arc(0,0,16*ui*vs,0,7); ctx.lineWidth=3; ctx.strokeStyle=hexa(COL.ink,.6); ctx.stroke();
