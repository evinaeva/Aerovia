<script>
(() => {
  "use strict";
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');

  // ---- visual skin (A/B-able): 'cozy' (default) | 'neon' | 'cartoon' ----
  // Switch with ?skin=neon|cartoon in the URL (persists to localStorage) or
  // skin=cozy to reset. The neon skin turns the cozy sprite atlas off (everything
  // renders procedurally) and swaps the palette for neon tokens + extra glow. The
  // cartoon skin is a bright daytime recolour: it keeps the cozy atlas but injects
  // the saturated `--cartoon-*` palette via CARTOON_TOKENS, and auto-upgrades to
  // bespoke cartoon PNGs the moment assets/sprites/cartoon/ ships them.
  // порядок и состав скинов для UI/валидации; КОНТЕНТ каждого (палитра, масштаб,
  // атлас, рендереры, звуки) объявляется в SKIN_DEFS ниже — добавляя скин, правь
  // оба места. SKINS остаётся здесь, т.к. парсинг ?skin= идёт раньше токенов.
  const SKINS = ['cozy', 'neon', 'cartoon'];
  let SKIN = 'neon';   // скин по умолчанию (для нового игрока без сохранённого pf_skin)
  try {
    const _q = new URLSearchParams(location.search).get('skin');
    const _s = _q || localStorage.getItem('pf_skin');
    if (SKINS.includes(_s)) SKIN = _s;
    if (SKINS.includes(_q)) localStorage.setItem('pf_skin', _q);
  } catch (e) { /* no URL/localStorage in test harness */ }
  let NEON = SKIN === 'neon';   // bootstrap; authoritative источник — skinDef().glow (SKIN_DEFS ниже)
  // меню-стили (menu.css) переключаются атрибутом data-skin на корне — выставляем
  // его сразу на бутстрапе и далее в applySkin (логика рендера канваса не зависит).
  try { if (typeof document !== 'undefined' && document.documentElement) document.documentElement.setAttribute('data-skin', SKIN); } catch (e) {}

  // ---- палитра спрайтов: единый источник правды для перекраски ----
  // Спрайт-листы (assets/sprites/planeflow-*.svg) хранят цвета как
  // `var(--token, #fallbackhex)`, а не голым hex. Тема (THEME ниже) задаёт
  // значения токенов; их можно переопределять «сколько угодно» на лету.
  // Дефолтная тема пустая → срабатывает fallback-hex в самих SVG → вид 1-в-1
  // как раньше. Передай объект-переопределение в blitC/blit, чтобы перекрасить
  // отдельный спрайт под любую палитру; ключ кэша учитывает тему, поэтому разные
  // перекраски сосуществуют без коллизий.
  const PALETTE = {
    // базовые токены повторяют :root (cozy / stylized-flat)
    ink:'#16131f', tarmac:'#242842', water:'#1c3a42',
    paper:'#f4eede', amber:'#f2a93b', teal:'#4ecdc4', ice:'#7fd6ff',
    rose:'#ef798a', gold:'#f4cf5e', life:'#ef5365', phosphor:'#cdb0f7',
    // расширенные токены спрайтов (см. assets/sprites/README.md — карта токенов)
    'cream-100':'#f4eede', 'cream-200':'#e8e0cf', 'cream-outline':'#b9b0a0',
    'gold-dim':'#caa53a', 'gold-ink':'#5e4a16', 'amber-glow':'#ffb84d',
    'amber-core':'#ffd089', green:'#5dca7a', 'green-bright':'#7fe098',
    red:'#e0584f', blue:'#4ab4d6', chip:'#2a2440', 'navy-900':'#1a1d2e',
    'purple-700':'#3a3354', 'purple-600':'#46406a', 'bay-dim':'#1f1b2c',
    'gray-500':'#8a8c99', 'gray-600':'#6b6d7a', white:'#ffffff',
    grass:'#38482f', 'grass-dim':'#2e3b27', 'grass-tuft':'#46583b',
    'water-wave':'#2a525c', 'water-wave2':'#3a6b76', sand:'#6b5c44',
    wood:'#4a3f33', shadow:'#0a0614', 'sky-low':'#3a2f3e', 'sky-mid':'#241d33',
  };
  // Неоновая палитра: тёмная база + яркие насыщенные акценты со свечением.
  // Применяется как переопределение токенов при SKIN==='neon' — перекрашивает и
  // процедурную отрисовку (COL уважает THEME.tokens), и подписи/иконки.
  const NEON_TOKENS = {
    ink:'#070c1c', tarmac:'#0c1430', 'tarmac-2':'#0f1a3c', water:'#081024',
    phosphor:'#3ad2ff', 'cream-100':'#dff4ff', muted:'#5f7bb0',
    amber:'#ffb13b', teal:'#22e3c6', ice:'#5fd2ff', rose:'#ff4f9d',
    gold:'#ffd23b', life:'#ff3b6b',
  };
  // Мультяшная палитра: яркий дневной recolor (зелёное поле, голубая вода, кремовые
  // глянцевые боксы, сочные акценты). Зеркалит tokens/cartoon.css (`--cartoon-*`):
  // ключи здесь — это имена токенов спрайт-атласа/COL, значения — из cartoon.css.
  // Применяется как переопределение PALETTE при SKIN==='cartoon' и перекрашивает
  // и cozy-спрайты, и процедурную отрисовку. Bright — без неонового свечения.
  const CARTOON_TOKENS = {
    // линия/тень — единый тёплый тёмный контур
    ink:'#3a2a17', shadow:'#3a2a17', 'cream-outline':'#5a4326',
    // поле/окружение — луговая зелень, дневное небо
    tarmac:'#6fbf4a', 'tarmac-2':'#5aa83c', grass:'#6fbf4a', 'grass-dim':'#5aa83c',
    'grass-tuft':'#8fd96a', 'sky-low':'#bfe6f7', 'sky-mid':'#a6dcf2',
    // вода + берег
    water:'#5fc7e8', 'water-wave':'#8fe0f5', 'water-wave2':'#bff0fb', sand:'#e8d39a',
    // кремовые глянцевые боксы/панели
    paper:'#fff3d8', 'cream-100':'#fff3d8', 'cream-200':'#ffe9bc', 'bay-dim':'#ffe9bc',
    // сервисные акценты (сочные, дружелюбные)
    amber:'#ff8a1f', 'amber-glow':'#ffb05a', 'amber-core':'#ffd089',
    teal:'#1fb6d8', ice:'#5ec2e8', rose:'#ff5ca0',
    // монеты/звёзды/жизни
    gold:'#ffce3a', coin:'#ffce3a', 'gold-dim':'#f2a400', 'gold-ink':'#5e4a16', life:'#ff4d5e',
    // маршруты/валидность — яркая зелень
    phosphor:'#36d36b', green:'#36d36b', 'green-bright':'#6bef9a', red:'#ff4d5e', blue:'#2f6fb0',
    // глубокие/служебные поверхности → зелёные/коричневые тона вместо cozy-фиолета
    chip:'#4a3a28', 'navy-900':'#3a6b3a', 'purple-700':'#4d9433', 'purple-600':'#5aa83c',
    'gray-500':'#9a855f', 'gray-600':'#6b5333', muted:'#9a855f', white:'#ffffff',
  };
  // ──────────────────────────────────────────────────────────────────────────
  // РЕЕСТР СКИНОВ — единственное место, где скин «объявляет» свой контент.
  // ──────────────────────────────────────────────────────────────────────────
  // ПРАВИЛО «ЛОГИКА — РОДИТЕЛЬ НАД СКИНАМИ» (действует на скины, биомы и карты):
  //   Всё, что НЕ внешний вид и НЕ звуковой контент — общая логика, механика,
  //   расчёты, траектория, заезд в бокс, терпение, деньги, звёзды, события —
  //   живёт ВЫШЕ скинов и работает ОДИНАКОВО для всех скинов/биомов/карт. Скин
  //   меняет ТОЛЬКО содержание: палитру, масштаб отрисовки, какой атлас его
  //   подложка, опц. собственные рендереры сцены/HUD и набор звуков.
  //   Добавить скин/биом/карту = добавить запись СЮДА (+ строку в SKINS и i18n-
  //   ключ метки). НИКОГДА не форкать логику/механику/расчёты под имя скина —
  //   иначе придётся править траекторию и заезд в бокс на каждом скине и карте.
  //
  // Поля записи (всё — только облик/звук, без логики):
  //   tokens — переопределения PALETTE/COL (ТОЛЬКО цвета);
  //   scale  — визуальный масштаб техники (см. SZ). Геометрия (касание ВПП,
  //            столкновения) выводится из него ОДНОЙ общей формулой для всех
  //            скинов — меняется лишь число, а не расчёт;
  //   atlas  — 'cozy': подложка = перекрашенный cozy-атлас; 'procedural': рисуем
  //            процедурно, пока не доедет собственный арт (assets/sprites/<skin>/);
  //   glow   — неоновое свечение в процедурной отрисовке (флаг NEON);
  //   field/hud — опц. собственные рендереры сцены/HUD (ТОЛЬКО облик, без логики);
  //   sounds — опц. таблица переопределений ЗВУКОВОГО КОНТЕНТА по имени события
  //            (КОГДА звук играет — общая логика в местах вызова SND.*; ЧЕМ он
  //            звучит — контент скина). null = общий набор звуков;
  //   label  — i18n-ключ названия скина для переключателя в настройках.
  const SKIN_DEFS = {
    cozy:    { tokens: {},             scale: 1, atlas: 'cozy',       glow: false, field: null,             hud: null,           sounds: null, label: 'settings.skinCozy' },
    neon:    { tokens: NEON_TOKENS,    scale: 1, atlas: 'procedural', glow: true,  field: drawNeonField,    hud: null,           sounds: null, label: 'settings.skinNeon' },
    cartoon: { tokens: CARTOON_TOKENS, scale: 2, atlas: 'cozy',       glow: false, field: drawCartoonField, hud: drawCartoonHUD, sounds: null, label: 'settings.skinCartoon' },
  };
  // дескриптор активного скина (фолбэк на cozy для неизвестных кодов)
  const skinDef = () => SKIN_DEFS[SKIN] || SKIN_DEFS.cozy;
  // имя скина → объект-переопределение PALETTE (пустой = дефолтный cozy-вид)
  function skinTokens(skin){ return Object.assign({}, (SKIN_DEFS[skin] || SKIN_DEFS.cozy).tokens); }
  // Активная тема: набор переопределений PALETTE. Пустая = дефолтный вид.
  // Меняй ключи (или подменяй объект целиком), чтобы перекрасить весь арт.
  const THEME = { tokens: skinTokens(SKIN) };

  // ---- cozy sprite atlas (canvas) ----
  // Sprite sheets (assets/sprites/planeflow-*.svg) are fetched once into a hidden
  // holder; each <symbol> is rasterised into an <img> at device-pixel size, cached,
  // and blitted per frame. Until a sprite is ready (or if COZY is off) the call
  // returns false and the caller falls back to its procedural draw — so the game
  // never renders blank and the look can be toggled instantly.
  //
  // Перекраска: SVG используют `var(--token, #hex)`. Чтобы перекрасить, передай
  // в blitC/blit объект-переопределение токенов (напр. {gold:'#fff', amber:'#0f0'})
  // — он впрыснется в спрайт как <style>:root{--token:value}. Строка в `color`
  // по-прежнему задаёт `currentColor` (используется только для route-arrow).
  // cozy-спрайты включены только в cozy-скине; неон рендерится процедурно
  // (процедурный путь подхватывает неоновую палитру через THEME.tokens).
  let COZY = !NEON;
  // переключение скина «на лету» (из настроек) — без перезагрузки: меняет режим
  // рендера и палитру, следующий кадр перерисуется (кэш спрайтов/паттернов
  // ключуется по подписи темы, поэтому подхватывается автоматически).
  function applySkin(code){
    SKIN = SKINS.includes(code) ? code : 'cozy';
    NEON = skinDef().glow;   // свечение объявляет скин (SKIN_DEFS), не имя
    THEME.tokens = skinTokens(SKIN);
    try { document.documentElement.setAttribute('data-skin', SKIN); } catch (e) {}  // меню (menu.css) реагирует на data-skin
    refreshSpriteMode();
  }
  const SPRITES = (() => {
    const cache = new Map();
    const stripF = s => s.replace(/\s*filter="url\([^)]*\)"/g, ''); // drop filter refs (defs live in the sheet, not the standalone svg)
    // детерминированная подпись набора токенов для ключа кэша (sorted)
    function tokSig(t){
      const keys = Object.keys(t).sort();
      let s = '';
      for(const k of keys) s += k + ':' + t[k] + ';';
      return s;
    }
    // <style> с CSS-переменными темы; пусто, когда переопределений нет (дефолт)
    function styleBlock(t){
      const keys = Object.keys(t);
      if(!keys.length) return '';
      let css = '';
      for(const k of keys) css += '--' + k + ':' + t[k] + ';';
      return '<style>:root{' + css + '}</style>';
    }
    // PNG-арт пер-скина (растровый, с запечённым glow/глянцем/тенями — без SVG-
    // фильтров и токенов; кросс-платформенно надёжно). Какие id доступны как PNG —
    // задаёт манифест assets/sprites/<skin>/manifest.json (массив id); сам файл —
    // assets/sprites/<skin>/<id>.png. PNG имеет наивысший приоритет в img().
    const pngCache = new Map();   // 'skin/id' -> Image
    const pngIds = new Map();     // skin -> Set<id>
    function pngImg(id){
      const set = pngIds.get(SKIN);
      if(!set || !set.has(id)) return null;
      const key = SKIN + '/' + id;
      let im = pngCache.get(key);
      if(!im){
        im = new Image(); im.decoding = 'async';
        im.src = 'assets/sprites/' + SKIN + '/' + id + '.png';
        pngCache.set(key, im);
      }
      return im;   // может ещё грузиться — ok() ниже это учитывает (фолбэк до загрузки)
    }
    function img(id, w, h, color){
      // PNG-арт активного скина — высший приоритет (рисуется как есть, без темы)
      if(SKIN !== 'cozy'){ const pim = pngImg(id); if(pim) return pim; }
      const pw = Math.max(1, Math.round(w * dpr)), ph = Math.max(1, Math.round(h * dpr));
      // color может быть строкой (legacy currentColor) или объектом-переопределением токенов
      const tokens = (color && typeof color === 'object') ? color : null;
      const cstr = (typeof color === 'string') ? color : '';
      const sig = tokens ? tokSig(tokens) : '';
      // пер-скиновый override (SVG): при активном не-cozy скине символ `<skin>-<id>`
      // (если он загружен из assets/sprites/<skin>/) имеет приоритет над базовым.
      // Так нарисованный неон-арт «встаёт» поверх движка без правок call-site'ов.
      let symId = id;
      if(SKIN !== 'cozy' && document.getElementById(SKIN + '-' + id)) symId = SKIN + '-' + id;
      const key = symId + '@' + pw + 'x' + ph + cstr + (sig ? '#' + sig : '');
      let im = cache.get(key);
      if(!im){
        const sym = document.getElementById(symId);
        if(!sym) return null;
        const vb = sym.getAttribute('viewBox') || '0 0 64 64';
        const cattr = cstr ? ' color="'+cstr+'"' : '';
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + vb +
                    '" width="' + pw + '" height="' + ph + '"' + cattr + '>' +
                    (tokens ? styleBlock(tokens) : '') + stripF(sym.innerHTML) + '</svg>';
        im = new Image(); im.decoding = 'async';
        im.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        cache.set(key, im);
      }
      return im;
    }
    const ok = im => im && im.complete && im.naturalWidth > 0;
    // объединяет активную тему (THEME.tokens) с per-call переопределением.
    // Строку (currentColor) пропускаем как есть. Без темы и без override —
    // возвращаем сам color, чтобы дефолтный путь не плодил пустые объекты в кэше.
    function withTheme(color){
      const base = THEME.tokens;
      const hasBase = base && Object.keys(base).length;
      if(color && typeof color === 'object'){
        return hasBase ? Object.assign({}, base, color) : color;
      }
      // color — строка (или undefined): применяем активную тему, если она есть.
      // строковый currentColor через объект не пробросить, поэтому если есть и
      // тема, и строка — строка важнее для route-arrow (тема его не трогает).
      if(typeof color === 'string') return color;
      return hasBase ? base : undefined;
    }
    const A = {
      ready: false,
      skinReady: false,   // true когда загружены пер-скиновые листы активного скина
      get palette(){ return PALETTE; },
      // применить/сбросить тему: setTheme({gold:'#fff'}) — частично, setTheme(null) — сброс
      setTheme(tokens){ THEME.tokens = (tokens && typeof tokens === 'object') ? tokens : {}; },
      has(id){ return !!document.getElementById(id); },
      blitC(id, cx, cy, dw, dh, rot, color){
        if(!A.ready) return false; const im = img(id, dw, dh, withTheme(color)); if(!ok(im)) return false;
        ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot);
        ctx.drawImage(im, -dw / 2, -dh / 2, dw, dh); ctx.restore(); return true;
      },
      blit(id, dx, dy, dw, dh, color){
        if(!A.ready) return false; const im = img(id, dw, dh, withTheme(color)); if(!ok(im)) return false;
        ctx.drawImage(im, dx, dy, dw, dh); return true;
      },
      // бесшовный тайл → CanvasPattern (кэш по id+размеру+теме); null, пока спрайт не готов
      pattern(id, tile){
        if(!A.ready) return null;
        const tk = (THEME.tokens && Object.keys(THEME.tokens).length) ? THEME.tokens : null;
        const sig = tk ? JSON.stringify(Object.keys(tk).sort().map(k=>k+tk[k])) : '';
        const key = id + '#' + Math.round(tile * dpr) + sig;
        let p = patterns.get(key);
        if(p) return p;
        const im = img(id, tile, tile, tk || undefined);
        if(!ok(im)) return null;
        try{
          p = ctx.createPattern(im, 'repeat');
          if(p && p.setTransform && typeof DOMMatrix !== 'undefined')
            p.setTransform(new DOMMatrix().scale(1 / dpr));
          if(p) patterns.set(key, p);
          return p;
        }catch(e){ return null; }
      }
    };
    const patterns = new Map();
    const SHEETS = ['aircraft', 'field', 'hud', 'effects', 'brand'];
    const loadedSkins = new Set();
    // загрузить пер-скиновый набор листов из assets/sprites/<skin>/planeflow-*.svg.
    // Символы в них должны быть с id-префиксом `<skin>-` (напр. `neon-bay-repair`),
    // чтобы не конфликтовать с базовыми и резолвиться через img() при активном скине.
    // Когда хотя бы один символ доехал — A.skinReady=true и режим спрайтов
    // пересчитывается (см. refreshSpriteMode), так что нарисованный арт включается сам.
    A.loadSkin = function(skin){
      if (!skin || skin === 'cozy' || loadedSkins.has(skin)) return;
      loadedSkins.add(skin);
      try {
        if (typeof fetch === 'undefined' || typeof Image === 'undefined') return;
        const h = document.createElement('div');
        h.id = 'pf-sprites-' + skin; h.setAttribute('aria-hidden', 'true');
        h.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden';
        document.body.appendChild(h);
        const urls = SHEETS.map(n => 'assets/sprites/' + skin + '/planeflow-' + n + '.svg');
        Promise.all(urls.map(u => fetch(u).then(r => r.ok ? r.text() : '').catch(() => '')))
          .then(parts => {
            const html = parts.join('\n');
            if (html.trim()) { h.innerHTML = html; if (h.querySelector('symbol')) A.skinReady = true; }
            if (typeof refreshSpriteMode === 'function') refreshSpriteMode();
          }).catch(() => {});
        // PNG-манифест: список id, доступных как растровые ассеты этого скина
        fetch('assets/sprites/' + skin + '/manifest.json')
          .then(r => r.ok ? r.json() : null)
          .then(m => {
            const ids = Array.isArray(m) ? m : (m && Array.isArray(m.png) ? m.png : null);
            if (ids && ids.length) { pngIds.set(skin, new Set(ids)); A.skinReady = true; }
            if (typeof refreshSpriteMode === 'function') refreshSpriteMode();
          }).catch(() => {});
      } catch (e) { /* ignore */ }
    };
    // fetch base sheets into a hidden holder, then go live (browser only; no-op under the test harness)
    try {
      if (typeof fetch !== 'undefined' && typeof Image !== 'undefined') {
        const holder = document.createElement('div');
        holder.id = 'pf-sprites'; holder.setAttribute('aria-hidden', 'true');
        holder.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden';
        document.body.appendChild(holder);
        const sheets = SHEETS.map(n => 'assets/sprites/planeflow-' + n + '.svg');
        Promise.all(sheets.map(u => fetch(u).then(r => r.ok ? r.text() : '').catch(() => '')))
          .then(parts => {
            holder.innerHTML = parts.join('\n'); A.ready = true;
            if (SKIN !== 'cozy') A.loadSkin(SKIN);   // подтянуть арт активного скина
            if (typeof refreshSpriteMode === 'function') refreshSpriteMode();
          })
          .catch(() => {});
      }
    } catch (e) { /* non-DOM env: stay procedural */ }
    return A;
  })();

  // Решает, рисовать ли через спрайт-атлас (COZY=true) или процедурно (false)
  // для активного скина. cozy → всегда атлас. Не-cozy (напр. neon) → атлас только
  // когда его пер-скиновые листы загружены (A.skinReady); иначе процедурный
  // фолбэк (текущий неон), и параллельно подтягиваем арт скина.
  function refreshSpriteMode(){
    // подтянуть собственный арт активного не-cozy скина (PNG/SVG), если ещё не везли
    if (SKIN !== 'cozy' && !SPRITES.skinReady) SPRITES.loadSkin(SKIN);
    // режим подложки объявляет скин (SKIN_DEFS.atlas):
    //   'cozy'       → всегда (перекрашенный) cozy-атлас (так живёт и cartoon, пока
    //                  не доедет его собственный арт — img() сам отдаст PNG приоритетно);
    //   'procedural' → атлас только когда доехал собственный арт скина (neon),
    //                  иначе процедурный фолбэк.
    COZY = skinDef().atlas === 'cozy' ? true : !!SPRITES.skinReady;
  }
  refreshSpriteMode();

  // ---- palette helpers ----

  const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  const COL = {};

      .forEach(n => base[n] = css('--'+n));

    ['ink','tarmac','tarmac-2','water','phosphor','paper','muted','amber','teal','ice','rose','gold','life','coin']
      .forEach(n => Object.defineProperty(COL, n, {
        enumerable: true,
        get(){ const t = THEME.tokens; const tk = tokenOf[n] || n; return (t && t[tk]) || base[n]; }

  const DEFAULT_LANG = 'en';
  let lang = DEFAULT_LANG;

  function detectLang(){
    const cands = (navigator.languages && navigator.languages.length) ? navigator.languages
                 : [navigator.language || DEFAULT_LANG];
    for(const c of cands){
      const base = String(c).toLowerCase().split('-')[0];
      if(I18N[base]) return base;
    }
    return DEFAULT_LANG;
  }
  function t(key, params){
    let v = I18N[lang] && I18N[lang][key];
    if(v==null) v = I18N[DEFAULT_LANG][key];
    if(v==null) return key;
    if(Array.isArray(v)){
      const pf = I18N[lang]._plural || I18N[DEFAULT_LANG]._plural;
      const n = params && params.n!=null ? Math.abs(params.n) : 0;
      v = v[Math.min(pf(n), v.length-1)];
    }
    return String(v).replace(/\{(\w+)\}/g, (m,k)=> (params && k in params) ? params[k] : m);
  }
  function fmtNum(n, frac){
    const loc = (I18N[lang] && I18N[lang]._locale) || 'en-US';
    try{ return n.toLocaleString(loc, frac!=null ? {minimumFractionDigits:frac, maximumFractionDigits:frac} : undefined); }
    catch(e){ return String(n); }
  }
  function fmtMoney(n){ return t('fmt.money', {n: fmtNum(n)}); }
  function setLang(code){
    if(!I18N[code]) return;
    lang = code; save.lang = code; saveGame();
    applyI18n();
    Analytics.track('setting_changed', {key:'lang', value:code});
  }
  function applyI18n(){
    document.documentElement.lang = lang;
    document.title = t('app.title');
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    // иконочные кнопки без текста: озвучка/подсказка берётся из словаря
    document.querySelectorAll('[data-i18n-aria]').forEach(el => {
      const s = t(el.dataset.i18nAria); el.setAttribute('aria-label', s); el.setAttribute('title', s);
    });
    renderLangBtns();
    renderLangFlag();
    renderSkinBtns();
    if(!document.getElementById('pauseScreen').classList.contains('hidden')) buildPauseInfo();
  }
  function renderLangBtns(){
    // и в паузе, и в настройках стартового меню — оба контейнера .langbtns
    document.querySelectorAll('.langbtns').forEach(box => {
      box.innerHTML='';
      for(const code of Object.keys(I18N)){
        const b = document.createElement('button');
        b.className = 'langbtn' + (code===lang ? ' on' : '');
        b.textContent = I18N[code]._name || code;
        b.onclick = () => setLang(code);
        box.appendChild(b);
      }
    });
  }
  // флаги для углового переключателя языка (inline SVG — рисуются одинаково на всех
  // платформах, в отличие от эмодзи-флагов, которые Windows показывает буквами)
  const FLAGS = {
    en: '<svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="40" fill="#012169"/><path d="M0,0 60,40 M60,0 0,40" stroke="#fff" stroke-width="8"/><path d="M0,0 60,40 M60,0 0,40" stroke="#C8102E" stroke-width="4"/><rect x="25" width="10" height="40" fill="#fff"/><rect y="15" width="60" height="10" fill="#fff"/><rect x="27" width="6" height="40" fill="#C8102E"/><rect y="17" width="60" height="6" fill="#C8102E"/></svg>',
    ru: '<svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="40" fill="#fff"/><rect y="13.33" width="60" height="13.34" fill="#0039A6"/><rect y="26.67" width="60" height="13.33" fill="#D52B1E"/></svg>'
  };
  // флаг показывает ТЕКУЩИЙ язык; тап — переключение на следующий (всего два языка)
  function renderLangFlag(){
    const b = document.getElementById('langFlagBtn');
    if(!b) return;
    b.innerHTML = FLAGS[lang] || FLAGS[DEFAULT_LANG];
    b.setAttribute('aria-label', (I18N[lang] && I18N[lang]._name) || lang);
  }

  // ---- balance knobs (дефолты, потом крутим) ----

    ECON_UP_FRAC:   0.6,        // и долю работающих боксов, что возьмут апгрейд ур.1

    ECON_KIT_FLOOR: 0.8,        // competent-игрок должен суметь купить хотя бы эту долю «набора»
    // щедрость: набор по карману competent-игроку (×generosity ≥ kit). База ≥1 гарантирует,
    // что деньги НЕ блокируют 3★; прибавка за сложность компенсирует хаос/штрафы на тяжёлых картах
    ECON_GEN_BASE: 1.0, ECON_GEN_DIFF: 0.35,
    // реалистичный «скилл-добор» от ВКЛЮЧЁННЫХ эффектов (комбо/экспресс): сколько игрок
    // реально берёт сверх базы. Сложность рвёт серии → добор тем меньше, чем сложнее карта.
    ECON_COMBO_REAL: 0.5,       // доля теоретического максимума комбо, что реально достижима
    ECON_EXPRESS_SHARE: 0.35,   // базовая доля бортов, уходящих экспрессом
    ECON_CHAOS: 0.5,            // насколько сложность срезает комбо/экспресс (0..1)
    // множитель сложности (levelDifficulty): взвешенная сумма сигналов карты, как в жанре
    // (плотность потока · спецборты · таймер · среда), нормируется в ~[0, ECON_DIFF_CAP]
    ECON_W_EVENT: 0.25, ECON_W_TIME: 0.5, ECON_W_DENS: 0.5, ECON_W_ENV: 0.3,
    ECON_DIFF_NORM: 2.0, ECON_FLOW_REF: 32, ECON_DIFF_CAP: 1.2,
    START_LIVES: 3,
    // комбо / экспресс
    COMBO_MAX: 10, COMBO_STEP: 0.1,   // множитель денег до x2 за серию чистых вылетов
    EXPRESS_TIME: 12,                 // сек от посадки до вылета для экспресс-бонуса
    EXPRESS_BONUS: 1.5,               // x1.5 денег за быстрый цикл
    // спец-борты / события
    EMERGENCY_CHANCE: 0.12,           // доля бортов «топливо на нуле»
    EMERGENCY_BONUS: 1.5,             // x1.5 денег за аварийный борт
    MEDICAL_CHANCE: 0.10,             // доля «медицинских» бортов (приоритет)
    MEDICAL_AIR: 0.7,                 // множитель воздушного терпения медицинского (срочный)
    MEDICAL_BONUS: 2.5,               // x2.5 денег за медицинский (приоритетный борт)
    RUSH_PERIOD: 35, RUSH_DUR: 8,     // «час пик»: период и длительность волны
    WIND_PERIOD: 28, WIND_DUR: 12,    // смена ветра: период и длительность закрытия ВПП
    FOG_PERIOD: 45, FOG_DUR: 10,      // туман: период и длительность
    FOG_TAXI: 0.55,                   // множитель скорости руления в тумане

    // поэтому глушим их на всех уровнях. Код механик оставлен целиком — достаточно
    // вернуть флаг в false, чтобы события снова заработали по конфигу уровня/биома.
    WEATHER_EVENTS_OFF: true,         // глобально отключить туман+ветер во всех режимах

    DAYNIGHT_PERIOD: 150,             // сек на полный круг день→ночь→день

  // ---- лесной биом: помехи на ВПП и спец-бригады (см. docs/backlog.md) ----

  };

  // ---- level config ----
  // КАЖДЫЙ уровень — один шаг кривой «медленного нарастания сложности» (паттерн —
  // в docs/design/game-design/level-pattern.md). По нему же делаем будущие карты.
  //
  // objective:
  //   metric : 'served' | 'upgrades' — что считаем (принятые борты / апгрейды).
  //   stars  : [s1, s2, s3] — градация по звёздам (как в референсе): значение
  //            metric для 1★ / 2★ / 3★ по возрастанию. s3 — «потолок» уровня
  //            (по нему рисуется цель и им же ограничивается спавн). target
  //            проставляется автоматически = stars[2] (см. normObjective).
  //   time   : сек — лимит на время (необязателен). Часы тикают в обратку.
  //   race   : true — «успей за время» (L5): бортов столько, сколько успеешь
  //            принять; счёта-потолка нет, уровень кончается только по времени.
  //   upg    : [u1, u2, u3] — доп. порог по апгрейдам ДЛЯ ВЫСШИХ ЗВЁЗД при
  //            metric:'served' (L3): чтобы взять 2★/3★, нужно и принять борты,
  //            и сделать апгрейды (как ✈+🔧 в референсе).
  // sides/runways/startMoney — как раньше (startMoney по умолчанию K.START_MONEY).
  // events — спецборты/динамика (vip / rush / medical / emergency / fog / wind).
  //   L1–L6 — ОБУЧАЮЩИЙ БЛОК: чистые механики, без спецсобытий. Спецборты
  //   вводятся только с L7 (vip→L7, rush→L8, medical→L10) — см. validateLevels.
  // Имя/вызов/подсказка — в словаре: level.t.<n> / level.d.<n> / level.h.<n>.
  // КРИВАЯ ПО ИНТЕНСИВНОСТИ, а не по объёму: сложность растёт через ТЕМП (поле pace 0..1 —
  // частота прилёта + одновременность бортов), а воздушное терпение фикс. (K.AIR_BASE).
  // Структура — КЛАСТЕРЫ «введение → консолидация»: не каждый уровень даёт новую игрушку,
  // иначе их тяжело держать в памяти. Освоил пару механик → уровень-закрепление со всеми
  // сразу. pace по кампании НЕ убывает (валидатор это проверяет). Спецсобытия — не раньше
  // спокойного блока L1–L4 (см. CALM_LEVELS в validateLevels): vip→L5, emergency→L6,
  // rush→L8, medical→L9; каждый спецборт дебютирует один раз, дальше комбинируется.
  // Имя/вызов/подсказка — в словаре: level.t.<n> / level.d.<n> / level.h.<n>.
  const LEVELS = [
    // ── СПОКОЙНЫЙ БЛОК (L1–L4): чистые механики, без спецсобытий, низкий темп ──
    // L1 — посадка и обслуживание: маленькая цель, самый низкий темп (бережём первые 5 минут).
    { pace:0.00, objective:{ metric:'served', stars:[6,7,8] },

      runways:3, events:{} },

    { pace:0.34, objective:{ metric:'served', stars:[12,15,18] },
      sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },
      runways:3, events:{} },
    // ── БЛОК СПЕЦБОРТОВ (L5–L10): по одному новому, с консолидацией ──
    // L5 — введение: VIP (золотой, нетерпеливее, платит больше).
    { pace:0.44, objective:{ metric:'served', stars:[14,16,18] },

      sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },

    // L7 — КОНСОЛИДАЦИЯ: VIP + аварийный вместе, плотнее, без новой игрушки. Слегка зажата касса.
    { pace:0.64, objective:{ metric:'served', stars:[16,19,22] },

    { pace:0.74, objective:{ metric:'served', stars:[18,21,24] },

      runways:3, events:{ vip:true, rush:true } },
    // L9 — введение: медицинский (приоритет, быстрый цикл) поверх знакомого VIP.
    { pace:0.86, objective:{ metric:'served', stars:[18,21,24] },
      sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },
      runways:3, events:{ vip:true, medical:true } },
    // L10 — КАПСТОУН: всё сразу на максимальном темпе, зажатые ресурсы. Экзамен диспетчера.
    { pace:1.00, objective:{ metric:'served', stars:[22,26,30] },
      sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },

  // ---- biome maps (отдельная от кампании ветка карт) ----
  // Каждый биом — это конфиг уровня (как в LEVELS) + флаг biome для темы/помех.
  // ready:false — биом в работе, на экране показан как «скоро». Сервисное здание
  // (откуда выезжают спец-бригады) рисуется сверху поля у всех биом-карт.
  const BIOMES = [
    { id:'forest', emoji:'🌲', ready:true,
      level:{ biome:'forest', weather:true, deice:true, objective:{ metric:'served', stars:[10,12,14] },
        sides:{ top:{type:'fuel',slots:2,open:1}, left:{type:'board',slots:2,open:1}, bottom:{type:'repair',slots:2,open:1} },
        runways:3 } },
    { id:'arctic',   emoji:'❄️', ready:false },

  // ---- бонус-уровни (шуточный «другой мир» каждые 5 уровней) ----
  // Открывается после прохождения каждого 5-го уровня кампании (after=5,10,…) и
  // показывается в списке между N и N+1 как «N½» (не отдельный уровень кампании —
  // прогресс она не двигает, ключ сохранения строковый 'bonus_<id>', как у биомов).
  // Тот же движок «веди от А до Б», но реколор: борты → гусеницы, боксы → цветы,
  // удачный вылет → бабочка (🐛 → 🌸 → 🦋). Правила-сюрпризы: спокойный мир без
  // событий/спецбортов и с увеличенным терпением (level.calm), а каждый вылет —
  // метаморфоза в бабочку с бонус-нектаром (см. depart()).
  const BONUS = [
    { id:0, after:5,  emoji:'🦋',
      level:{ bonus:'butterfly', calm:1.5, objective:{ metric:'served', stars:[6,7,8] },
        sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },
        runways:3 } },
    { id:1, after:10, emoji:'🦋',
      level:{ bonus:'butterfly', calm:1.5, objective:{ metric:'served', stars:[8,10,12] },
        sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },
        runways:3 } },
  ];
  // Звёзды-градация: единая модель для кампании, биомов и бонусов. Из stars[] выводим
  // target (потолок уровня = 3★) — на него опираются HUD, спавн-кап и пути завершения.
  function normObjective(o){ if(o && Array.isArray(o.stars) && o.target==null) o.target = o.stars[o.stars.length-1]; return o; }
  LEVELS.forEach(lv=>normObjective(lv.objective));
  BIOMES.forEach(b=>{ if(b.level) normObjective(b.level.objective); });
  BONUS.forEach(b=>{ if(b.level) normObjective(b.level.objective); });

  // ---- ЭКОНОМИКА УРОВНЯ (деньги выводятся из сложности карты и её эффектов) ----
  // Деньги живут ВНУТРИ смены (сбрасываются каждый уровень — переноса нет). Чтобы
  // покупки (открыть/прокачать боксы) ощущались одинаково на ЛЮБОЙ карте — нынешней и
  // будущей — оплату за услугу (svcReward) и стартовую кассу (startMoney) мы НЕ задаём
  // вручную по уровням, а ВЫВОДИМ из конфига уровня. Модель гибкая: смотрит на поток
  // бортов, сложность и какие денежные эффекты (комбо/экспресс) реально включены.
  //
  // Опоры (как в time-management-жанре: Diner Dash и т.п. — база должна окупаться сама,
  // а «цепочки»/комбо — это бонус сверху за мастерство):
  //
  //   (A) «НАБОР» (buy-side) — что игрок должен суметь купить, пройдя смену на 3★:
  //         openable = Σ(slots−open) по сторонам;  working = открытые + round(openable·OPEN_FRAC)
  //         kitCost  = round(openable·OPEN_FRAC)·BAY_OPEN_COST + working·BAY_UP_COST[0]·UP_FRAC
  //
  //   (B) «СЛОЖНОСТЬ» (levelDifficulty 0..~1) — взвешенная сумма сигналов карты: плотность
  //       потока, активные спецборты, таймер/race, среда (погода/де-айс). Чем сложнее карта,
  //       тем ЩЕДРЕЕ деньги (generosity = GEN_BASE + GEN_DIFF·difficulty), потому что хаос
  //       съедает доход штрафами и рвёт серии. GEN_BASE ≥ 1 ⇒ деньги НЕ блокируют 3★.
  //
  //   (C) «СКИЛЛ-ДОБОР» (skillMult) — реалистичный множитель ТОЛЬКО от ВКЛЮЧЁННЫХ на карте
  //       эффектов (levelEffects): комбо (до ×2) и экспресс (×1.5). На ранних/коротких или
  //       тяжёлых картах добор меньше (серия не успевает вырасти / рвётся хаосом), а если
  //       эффект на карте ОТКЛЮЧЁН — его вклад 0. Так «комбо/экспресс вводятся постепенно»:
  //       выключаешь их на первых уровнях — экономика сама поднимает базовую оплату.
  //
  // Сводим: реальный доход competent-игрока должен ровно покрывать набор с запасом —
  //   startMoney + svcReward·avgNSvc·flow·skillMult  =  kitCost·generosity
  // решаем относительно svcReward и зажимаем в [SVC_MIN, SVC_MAX]. Слабый игрок (без
  // серий) получит меньше — «непросто»; чистая игра даёт весь набор с запасом — «честно».

  // комбо/экспресс по умолчанию ВКЛЮЧЕНЫ; уровень может их отключить (combo:false /
  // express:false) — постепенный ввод денежных эффектов. Экономика читает эти же флаги.
  function levelEffects(lv){
    return { combo: !(lv && lv.combo === false), express: !(lv && lv.express === false) };
  }
  // темп уровня (интенсивность) 0..1 — ГЛАВНАЯ ось сложности; задаёт частоту прилёта и
  // одновременность (см. K.PACE_*). Воздушное терпение от него НЕ зависит.
  function levelPace(lv){ const p = lv && lv.pace; return Math.max(0, Math.min(1, p==null ? 0 : p)); }
  // интервал спавна (сек) от темпа: pace 0 → SLOW, pace 1 → FAST; по ходу смены чуть
  // ускоряется (served), но не ниже пола. В час пик база ×0.5 (без пола — короткая волна).
  function paceInterval(pace, served, rush){
    const base = K.PACE_IVL_SLOW + (K.PACE_IVL_FAST - K.PACE_IVL_SLOW) * pace;
    return rush ? base * 0.5 : Math.max(K.SPAWN_MIN, base - (served||0) * K.SPAWN_DECAY);
  }
  // лимит одновременных бортов в небе от темпа: pace 0 → CAP_LOW, pace 1 → CAP_HIGH.
  function paceCap(pace){ return Math.round(K.PACE_CAP_LOW + (K.PACE_CAP_HIGH - K.PACE_CAP_LOW) * pace); }
  // SURVIVAL: темп нарастает со временем заезда от стартового (level.pace, иначе спокойный
  // дефолт) до 1.0 за SURV_RAMP_SECS (или level.survRamp). Чем дольше держишься — тем плотнее
  // поток и больше бортов в небе разом: это и есть растущая «сложность выживания» карты.
  function survivalPace(){
    const start = (LV && LV.pace!=null) ? levelPace(LV) : K.PACE_DEFAULT;
    const ramp  = (LV && LV.survRamp) || K.SURV_RAMP_SECS;
    const k = Math.max(0, Math.min(1, gameTime / ramp));
    return Math.min(1, start + (1 - start) * k);
  }
  // воздушное терпение борта (сек): ФИКС. окно K.AIR_BASE, спецборты урезают множителем;
  // от уровня/темпа НЕ зависит (только спец-тип и calm-бонус спокойного мира).
  function airPatience(flags, calm){
    const f = flags || {};
    const m = f.emergency ? 0.4 : (f.vip ? 0.5 : (f.medical ? K.MEDICAL_AIR : 1));
    return K.AIR_BASE * m * (calm || 1);
  }
  // вес каждого спецсобытия в сложности (mед/час-пик давят сильнее вип-джета)
  const EVENT_DIFF = { vip:0.5, rush:1.0, medical:1.0, emergency:0.8, fog:0.8, wind:0.8 };
  function levelFlow(o){
    const target = o && o.target!=null ? o.target : (o && Array.isArray(o.stars) ? o.stars[o.stars.length-1] : 1);
    return (o && o.metric==='served' && !o.race) ? Math.max(1, target)
                                                 : Math.max(1, Math.round(((o&&o.time)||180) / K.ECON_FLOW_SECS));
  }
  // множитель сложности уровня 0..~ECON_DIFF_CAP (чистая функция конфига)
  function levelDifficulty(lv){
    const o = (lv && lv.objective) || {}, ev = (lv && lv.events) || {};
    let eventScore = 0; for(const k in EVENT_DIFF) if(ev[k]) eventScore += EVENT_DIFF[k];
    const dens = levelPace(lv);                                   // интенсивность (темп) — главная ось
    const timeScore = o.race ? 1 : (o.time ? 0.5 : 0);            // давление времени
    const envScore = ((lv&&lv.weather)?1:0) + ((lv&&lv.deice)?1:0); // погода/де-айс
    let d = (K.ECON_W_EVENT*eventScore + K.ECON_W_TIME*timeScore
           + K.ECON_W_DENS*dens + K.ECON_W_ENV*envScore) / K.ECON_DIFF_NORM;
    if(lv && lv.calm > 0) d /= lv.calm;                          // спокойный мир (бонус) — легче
    return Math.max(0, Math.min(K.ECON_DIFF_CAP, d));
  }
  function levelEconomy(lv){
    const o = (lv && lv.objective) || {};
    const sides = (lv && lv.sides) || {};
    let open0 = 0, openable = 0;
    for(const s of ['top','left','bottom']){
      const c = sides[s]; if(!c) continue;
      open0 += c.open; openable += Math.max(0, c.slots - c.open);
    }
    const startMoney = (lv && lv.startMoney) || K.START_MONEY;
    const avgNSvc = 1 + K.TWO_SVC_CHANCE;
    const flow = levelFlow(o);
    // (A) набор, который смена должна профинансировать
    const expectOpen  = Math.round(openable * K.ECON_OPEN_FRAC);
    const workingBays = open0 + expectOpen;
    const kitCost = expectOpen * K.BAY_OPEN_COST + workingBays * K.BAY_UP_COST[0] * K.ECON_UP_FRAC;
    // (B) сложность → щедрость
    const difficulty = levelDifficulty(lv);
    const generosity = K.ECON_GEN_BASE + K.ECON_GEN_DIFF * difficulty;
    // (C) реалистичный скилл-добор от включённых эффектов
    const fx = levelEffects(lv);
    const comboReach   = Math.min(flow, K.COMBO_MAX) / K.COMBO_MAX;
    const comboHead    = fx.combo   ? (K.COMBO_STEP*K.COMBO_MAX) * comboReach * (1 - K.ECON_CHAOS*difficulty) * K.ECON_COMBO_REAL : 0;
    const expressHead  = fx.express ? (K.EXPRESS_BONUS - 1) * K.ECON_EXPRESS_SHARE * (1 - K.ECON_CHAOS*difficulty) : 0;
    const skillMult    = 1 + Math.max(0, comboHead) + Math.max(0, expressHead);
    // сводим и решаем относительно оплаты за услугу
    const need = Math.max(0, kitCost * generosity - startMoney);
    const svcReward = Math.max(K.SVC_MIN, Math.min(K.SVC_MAX,
      Math.round(need / (avgNSvc * flow * skillMult))));
    return { startMoney, svcReward, flow, kitCost, openable, difficulty, generosity, skillMult, effects:fx };
  }

  let LV = LEVELS[0], curBiome = null, curBonus = null;
  let econ = levelEconomy(LV);          // {startMoney, svcReward, …} — пересчитывается в reset()
  let lvFx = levelEffects(LV);          // какие денежные эффекты включены на текущей карте
  // бонус после прохождения уровня №levelNum (1-based); открыт, если тот пройден на ≥1★
  // (или включён отладочный тумблер «Открыть все уровни» — как у кампании, см. renderLevels)
  function bonusAfter(levelNum){ return BONUS.find(b=>b.after===levelNum) || null; }
  function bonusUnlocked(b){ return debug.unlockAll || (save.stars[b.after-1]||0) >= 1; }
  function bonusName(b){

  function objectiveDesc(){

  // ---- самопроверка конфига (страховка под новые механики) ----
  // Цель ровно та, для которой и заводили тесты: при добавлении уровня / события /
  // механики сразу ловить нарушение старых правил, а не ловить регрессию в проде.
  // validateGame() возвращает список проблем (пустой = всё ок). Зовётся мягко на
  // старте (console.error) и жёстко из тестов. См. docs/DEV.md, раздел «Тесты».
  const EVENT_KEYS = ['vip','emergency','medical','rush','fog','wind'];
  const SVC_TYPES  = ['fuel','board','repair'];
  const WEATHER_KINDS = ['clear','rain','snow'];
  // «часы» суток: фаза 0..1 (0 — полдень) и «ночность» 0..1 (1 — глубокая ночь).
  // Чистая функция времени: визуал берёт night, на саму игру это не влияет.
  function dayCycle(time){
    const P = K.DAYNIGHT_PERIOD;
    const phase = ((time % P) + P) % P / P;             // 0..1, устойчиво к time<0
    const night = (1 - Math.cos(phase * 2 * Math.PI)) / 2;  // плавно 0→1→0
    return { phase, night };

  function weatherTaxiMult(w){

  }
  // L1–L4 — спокойный блок (чистые механики, низкий темп). Спецсобытия вводятся только с L5.
  const CALM_LEVELS = 4;
  function validateLevels(){
    const p = [];
    if(!Array.isArray(LEVELS) || !LEVELS.length){ p.push('LEVELS пуст'); return p; }
    const firstSeen = {};   // тип события -> индекс уровня, где впервые включён
    LEVELS.forEach((lv,i)=>{
      const L = 'L'+(i+1)+': ';
      const o = lv.objective;
      if(!o){ p.push(L+'нет objective'); }
      else {
        if(!['served','upgrades'].includes(o.metric)) p.push(L+'неизвестная метрика "'+o.metric+'"');
        const th = o.stars;
        if(!Array.isArray(th) || th.length!==3) p.push(L+'objective.stars должен быть массивом из 3 порогов [1★,2★,3★]');
        else {
          if(!(th[0]>0)) p.push(L+'objective.stars[0] (порог 1★) должен быть > 0');
          if(!(th[0]<=th[1] && th[1]<=th[2])) p.push(L+'objective.stars должны идти по возрастанию (1★ ≤ 2★ ≤ 3★)');

        if(o.time!=null && !(o.time>0)) p.push(L+'objective.time должен быть > 0');
        if(o.race!=null && o.race!==true) p.push(L+'objective.race должен быть true (или отсутствовать)');
        if(o.race && !(o.time>0)) p.push(L+'race-уровень требует objective.time');
        if(o.upg!=null){
          if(o.metric!=='served') p.push(L+'objective.upg допустим только при metric "served"');
          if(!Array.isArray(o.upg) || o.upg.length!==3) p.push(L+'objective.upg должен быть массивом из 3 порогов');
          else if(!(o.upg[0]<=o.upg[1] && o.upg[1]<=o.upg[2])) p.push(L+'objective.upg должны идти по возрастанию');

        if(!SVC_TYPES.includes(c.type)) p.push(L+side+': неизвестный тип бокса "'+c.type+'"');
        if(!(c.slots>=1)) p.push(L+side+': slots должен быть >= 1');
        if(!(c.open>=0 && c.open<=c.slots)) p.push(L+side+': open вне диапазона [0, slots]');
      });
      if(!(lv.runways>=1)) p.push(L+'runways должен быть >= 1');
      if(lv.startMoney!=null && !(lv.startMoney>0)) p.push(L+'startMoney должен быть > 0');
      if(lv.weather!=null && lv.weather!==true) p.push(L+'weather должен быть true (или отсутствовать)');
      if(lv.deice!=null && lv.deice!==true) p.push(L+'deice должен быть true (или отсутствовать)');
      // экономика уровня (levelEconomy): оплата в границах, голая смена окупает хотя бы
      // ОДИН новый бокс, и с включёнными эффектами весь ожидаемый набор ДОСТИЖИМ —
      // прямая страховка от «не накопить на бокс» и от того, что деньги блокируют 3★
      if(o){
        const ec = levelEconomy(lv);
        if(!(ec.svcReward>=K.SVC_MIN && ec.svcReward<=K.SVC_MAX)) p.push(L+'svcReward вне [SVC_MIN, SVC_MAX]');
        const avg = 1 + K.TWO_SVC_CHANCE;
        const baseEarn = ec.svcReward * avg * ec.flow;
        if(!(baseEarn >= K.BAY_OPEN_COST)) p.push(L+'базового дохода смены не хватит даже на открытие одного бокса (экономика)');
        const realized = ec.startMoney + ec.svcReward * avg * ec.flow * ec.skillMult;
        if(!(realized >= ec.kitCost * K.ECON_KIT_FLOOR)) p.push(L+'даже с включёнными эффектами competent-игрок не наберёт и '+Math.round(K.ECON_KIT_FLOOR*100)+'% набора (экономика зажата)');
      }
      const ev = lv.events || {};
      Object.keys(ev).forEach(k=>{
        if(!EVENT_KEYS.includes(k)) p.push(L+'неизвестное событие "'+k+'"');
        else if(typeof ev[k]!=='boolean') p.push(L+'событие "'+k+'" должно быть boolean');
      });
      EVENT_KEYS.forEach(k=>{ if(ev[k] && firstSeen[k]==null) firstSeen[k]=i; });
      // спокойный блок L1–L4 — без единого спецсобытия
      if(i < CALM_LEVELS && EVENT_KEYS.some(k=>ev[k])) p.push(L+'спокойный блок L1–L'+CALM_LEVELS+' — без спецсобытий');
      // ТЕМП (pace) — главная ось сложности: обязателен, в [0,1], и НЕ убывает по кампании
      if(!(typeof lv.pace==='number' && lv.pace>=0 && lv.pace<=1)) p.push(L+'pace должен быть числом в [0,1] (темп/интенсивность уровня)');
      else if(i>0 && typeof LEVELS[i-1].pace==='number' && lv.pace < LEVELS[i-1].pace) p.push(L+'pace должен не убывать по кампании (интенсивность только растёт)');
    });
    // прогрессия: спецсобытия вводятся только после спокойного блока (с L5)
    Object.keys(firstSeen).forEach(k=>{
      const i = firstSeen[k];
      if(i < CALM_LEVELS) p.push('Событие "'+k+'" введено на L'+(i+1)+' — спецсобытия только с L'+(CALM_LEVELS+1)+' (L1–L'+CALM_LEVELS+' — спокойный блок)');
    });

  }
  function validateI18n(){

  }
  // проверка констант атмосферы (страховка под движки day/night и погоды)

    if(!(K.WEATHER_PERIOD>0)) p.push('K.WEATHER_PERIOD должен быть > 0');

  // бонус-уровни: каждый кратен 5 (бонус «каждые 5 уровней»), валидная раскладка,

  function validateBonus(){
    const p = [];
    if(!Array.isArray(BONUS)){ p.push('BONUS должен быть массивом'); return p; }
    const seen = {};
    BONUS.forEach((b,i)=>{
      const L = 'BONUS['+i+']: ';
      if(b.id==null) p.push(L+'нет id');
      else { if(seen[b.id]) p.push(L+'дублирующийся id '+b.id); seen[b.id]=1; }
      if(!(b.after>=1)) p.push(L+'after должен быть >= 1');
      else {
        if(b.after % 5 !== 0) p.push(L+'after должен быть кратен 5 (бонус каждые 5 уровней)');

      });

  // скины: каждый код из SKINS объявлен в реестре SKIN_DEFS (контент — там, а не

  // i18n и режим атласа. Страховка под правило «логика — родитель над скинами».
  function validateSkins(){
    const p = [], defKeys = Object.keys(SKIN_DEFS);
    SKINS.forEach(code=>{
      const d = SKIN_DEFS[code];
      if(!d){ p.push('skin "'+code+'" есть в SKINS, но нет записи в SKIN_DEFS'); return; }

  function validateGame(){ return validateLevels().concat(validateBonus()).concat(validateI18n()).concat(validateConfig()).concat(validateSkins()).concat(validateLeaderboard()); }
  let levelIdx = 0, levelKey = 0, levelPassed = false, upgradesDone = 0;

  // Раньше режим вычислялся инлайн-тернарником в нескольких местах — теперь одна функция (см. CLAUDE.md).
  function currentMode(){ return survival ? 'survival' : (curBiome ? 'biome' : (curBonus ? 'bonus' : 'campaign')); }
  let save = {unlocked:1, best:{}, stars:{}, lang:null, ach:[], stats:{}, sound:true, vibro:true, tutorialDone:false};
  // LEGACY_SAVE_KEY: до переименования в PlaneFlow сейв жил под старым ключом —

  // невидимого пробника, у которого padding = env(safe-area-inset-*) — так HUD и
  // кнопка паузы не залезают под бортик экрана (viewport-fit=cover включён).
  let safe={t:0,r:0,b:0,l:0}, safeProbe=null;
  function readSafe(){

        'padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';

  // если его панель выше/шире экрана — так меню перестаёт скроллиться на телефоне.
  function fitOverlays(){
    const vw = window.innerWidth, vh = window.innerHeight, margin = 10;
    document.querySelectorAll('.overlay').forEach(ov=>{
      const panel = ov.querySelector('.panel');
      if(!panel) return;
      panel.style.transform=''; // сброс перед замером натуральных размеров
      if(ov.classList.contains('hidden')) return;
      const r = panel.getBoundingClientRect();
      const s = Math.min(1, (vh-margin)/r.height, (vw-margin)/r.width);
      if(s < 0.999) panel.style.transform = 'scale('+s+')';
    });
  }

  }

  // ---- layout: bays, runways, hover slots ----
  let bays=[], runways=[], field={}, pauseBtn={};
  // Единый масштаб «крупности» техники: размеры борта, ВПП и бокса выводятся из него
  // ОДНОЙ общей формулой (общая для всех скинов — меняется лишь число). Само число —
  // визуальный контент скина (SKIN_DEFS.scale): cartoon ×2 под референс, cozy/neon ×1.
  const SZ = () => skinDef().scale;
  // длина корпуса борта (наземная), px — геометрия касания/отрыва на ВПП. Совпадает
  // с размером отрисовки drawPlaneBodyAt (62 · ui·0.5·SZ()) при наземном масштабе.
  const PLANE_LEN = () => 31 * SZ() * ui;
  function layout(){
    const hud = HUD_H();
    const M = 12*ui;
    // field taxi area (left ~60%); runways on right
    const fx0 = M, fy0 = hud + M;
    const fx1 = W*0.58, fy1 = H - M;
    field = {x0:fx0, y0:fy0, x1:fx1, y1:fy1};

    const bw = Math.min(56*ui*SZ(), (fx1-fx0)/2.4);
    const bh = bw*0.72;

    // build bays once (preserve open/level state across resize)
    if(!bays.length){
      bays = [];
      for(const side of ['top','left','bottom']){
        const cfg = LV.sides[side];
        for(let i=0;i<cfg.slots;i++){
          bays.push({side, type:cfg.type, slot:i,
                     open:i<cfg.open, lvl:0, occupied:null,
                     x:0,y:0,w:bw,h:bh});
        }
      }
      // отдельный бокс де-айсинга (инфраструктура: всегда открыт, без апгрейда) —
      // у правого края поля, ворота в поле; нужен только в снегопад (см. spawnPlane)
      if(LV.deice) bays.push({side:'deice', type:'deice', slot:0, deice:true,
                              open:true, lvl:0, occupied:null, x:0,y:0,w:bw,h:bh});
    }
    // position bays
    const bySide = s => bays.filter(b=>b.side===s);
    function spread(n, a, b){ // n centers within [a,b]
      const out=[]; const span=b-a; const step=span/(n+1);
      for(let i=0;i<n;i++) out.push(a+step*(i+1));
      return out;
    }
    const top=bySide('top'), left=bySide('left'), bot=bySide('bottom');
    spread(top.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      top[i].w=bw; top[i].h=bh; top[i].x=cx-bw/2; top[i].y=fy0;
    });
    spread(bot.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      bot[i].w=bw; bot[i].h=bh; bot[i].x=cx-bw/2; bot[i].y=fy1-bh;
    });
    spread(left.length, fy0+bh*0.7, fy1-bh*0.7).forEach((cy,i)=>{
      left[i].w=bw; left[i].h=bh; left[i].x=fx0; left[i].y=cy-bh/2;
    });
    // де-айс-бокс — у правого края поля, по центру по вертикали
    const de = bays.find(b=>b.side==='deice');
    if(de){ de.w=bw; de.h=bh; de.x=fx1-bw; de.y=(fy0+fy1)/2-bh/2; }

    // runways on right
    const rwL = W*0.60, rwR = W*0.85;
    const n = LV.runways;
    const top0 = hud + M, bot0 = H - M;
    const gap = 14*ui*SZ();                 // просвет между полосами (растёт вместе с ВПП)
    const rh = 38*ui*SZ();                  // ширина ВПП привязана к SZ() (≈ размах борта)
    const rwY0 = top0 + Math.max(0, ((bot0-top0) - (rh*n + gap*(n-1))) / 2); // центрируем n-слотов по вертикали
    // средняя ВПП удалена: раскладываем n вертикальных слотов как раньше, но
    // пропускаем центральный (нечётный n≥3) — крайние полосы остаются на своих местах
    const skip = (n>=3 && n%2===1) ? (n>>1) : -1;
    const slots = []; for(let i=0;i<n;i++) if(i!==skip) slots.push(i);
    if(!runways.length || runways.length!==slots.length){
      runways = slots.map(()=>({occupied:null, closed:false}));
    }
    slots.forEach((slotIdx,k)=>{
      const r=runways[k];
      r.x=rwL; r.y=rwY0 + slotIdx*(rh+gap); r.w=rwR-rwL; r.h=rh;
      r.cy = r.y + r.h/2;
      r.stopX = rwL + 26*ui;   // куда докатывается севший борт (полевой край)
      r.exitX = rwR + 10*ui;   // правый (водный) край
    });
    // hover x для прилетающих
    field.hoverX = W*0.93;
    field.rwL = rwL; field.rwR = rwR;

    // кнопка паузы отодвинута от правого края на запас + safe-area, чтобы не
    // оказаться под скруглением/вырезом телефона и нормально нажиматься
    pauseBtn = {x: W - safe.r - 16*ui - 36*ui, y: 6*ui, w: 36*ui, h: 30*ui};

    // сервисное здание биом-карт — сверху по центру апрона, между верхними боксами;
    // отсюда выезжают спец-бригады. У классических уровней его нет.
    if(LV.biome){
      const sw=Math.min(88*ui, (field.x1-field.x0)*0.32), sh=28*ui;
      field.service={ x:(field.x0+field.x1)/2 - sw/2, y:fy0+2*ui, w:sw, h:sh };
    } else field.service=null;
  }

  // ---- game state ----
  let planes=[], money=0, lives=0, served=0, gameTime=0;
  let running=false, paused=false, lastTs=0, spawnTimer=0, spawnedTotal=0;
  // статистика смены для экрана итога: пик одновременной нагрузки + временной ряд
  // (нагрузка/принято) для графика; lastShift — снимок последней смены для шеринга
  let statPeak=0, statSamples=[], statStep=1.5, statNextAt=0, lastShift=null;
  let inMenu=true;         // пока открыты меню/уровни/медали — на канвасе сцена-радар, не поле
  let nowT=0;              // время кадра (мс) для анимаций отрисовки
  let effects=[];          // анимации крушений
  let lossLog=[], toast=null;
  const debug={infiniteLives:false, richStart:false, unlockAll:false};
  const BIG_MONEY=999999;
  // отладочные читы сохраняются отдельным ключом и восстанавливаются при перезаходе
  const DEBUG_KEY='pf_debug';
  function loadDebug(){ try{ const d=JSON.parse(localStorage.getItem(DEBUG_KEY)); if(d&&typeof d==='object'){ debug.infiniteLives=!!d.infiniteLives; debug.richStart=!!d.richStart; debug.unlockAll=!!d.unlockAll; } }catch(e){} }
  function saveDebug(){ try{ localStorage.setItem(DEBUG_KEY, JSON.stringify({infiniteLives:debug.infiniteLives, richStart:debug.richStart, unlockAll:debug.unlockAll})); }catch(e){} }
  function syncDebugUI(){ const a=document.getElementById('optLives'), b=document.getElementById('optMoney'), c=document.getElementById('optUnlockAll'); if(a)a.checked=debug.infiniteLives; if(b)b.checked=debug.richStart; if(c)c.checked=debug.unlockAll; }
  let floaters=[];         // плавающие награды «+N ₿» / «×N комбо» / «уфф!» над полем
  let alarmAt=0;           // антидребезг тревожного бипа терпения
  let slowmo=0;            // секунды лёгкого замедления времени (near-miss)
  let nearMissPairs={};    // key «idA-idB» → время, до которого пара «остыла»
  let planeSeq=0;          // id бортов для антидребезга near-miss
  let tut=null;            // состояние тихого туториала: {step:'land'|'service'|'takeoff', plane}
  // лесной биом: активные помехи на полосах + выехавшие бригады + таймер спавна
  let hazards=[], crews=[], hazardSeq=0, nextHazard=0;
  function addFloat(x,y,text,col){ floaters.push({x,y,text,col,t:0,life:1.15}); }

  // ---- звук и вибрация (идеи из копилки: раздел 1) ----
  // Весь звук — синтез Web Audio, без файлов: события игры рождают мягкие ноты
  // одной гаммы (пентатоника ля-минор), краш — шумовой удар. Контекст создаётся
  // по первому жесту (autoplay-политика). Звук необязателен: всё дублируется
  // визуалом, выключатели — в настройках паузы (save.sound / save.vibro).
  const SND = (() => {
    const SCALE=[220,261.63,293.66,329.63,392,440,523.25,587.33,659.25]; // A3..E5
    let ac=null, master=null, enabled=true;
    function ensure(){
      if(!enabled) return null;
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return null;
      if(!ac){ ac=new AC(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination); }
      if(ac.state==='suspended') ac.resume();
      return ac;
    }
    function tone(freq,dur,type,vol,delay){
      if(!ensure()) return;
      const t0=ac.currentTime+(delay||0);
      const o=ac.createOscillator(), g=ac.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(vol||0.3,t0+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+(dur||0.18));
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0+(dur||0.18)+0.05);
    }
    function thud(){ // шумовой удар (крушение)
      if(!ensure()) return;
      const t0=ac.currentTime, dur=0.35;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const src=ac.createBufferSource(); src.buffer=buf;
      const f=ac.createBiquadFilter(); f.type='lowpass';
      f.frequency.setValueAtTime(900,t0); f.frequency.exponentialRampToValueAtTime(120,t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.65,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(f); f.connect(g); g.connect(master); src.start(t0);
    }
    function whoosh(){ // мягкий «уфф» near-miss: полосовой шум, проносится и стихает
      if(!ensure()) return;
      const t0=ac.currentTime, dur=0.34;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*Math.sin(Math.PI*e); }
      const src=ac.createBufferSource(); src.buffer=buf;
      const f=ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=1.4;
      f.frequency.setValueAtTime(420,t0); f.frequency.exponentialRampToValueAtTime(1100,t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(0.16,t0+0.06); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(f); f.connect(g); g.connect(master); src.start(t0);
    }
    function squeal(){ // короткий визг резины при касании: узкополосный шум, тон падает
      if(!ensure()) return;
      const t0=ac.currentTime, dur=0.16;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*(1-e); }
      const src=ac.createBufferSource(); src.buffer=buf;
      const f=ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=6;
      f.frequency.setValueAtTime(1800,t0); f.frequency.exponentialRampToValueAtTime(640,t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0);
      g.gain.exponentialRampToValueAtTime(0.20,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(f); f.connect(g); g.connect(master); src.start(t0);
    }
    const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1)); // случайный индекс ноты гаммы
    // Базовые рецепты звуков (cozy). Оставлены только три: тап по меню, щелчок
    // фиксации маршрута (вспышка в конце траектории) и визг колёс при посадке.
    // Остальные игровые звуки — пустышки (намеренно выключены), чтобы не трогать
    // десятки мест вызова.
    const RECIPES = {
      btn(){ tone(SCALE[ri(4,6)],0.05,'triangle',0.12); },                       // тап по кнопке меню
      lock(){ tone(1318.5,0.035,'square',0.13); tone(1760,0.05,'square',0.10,0.025); }, // щелчок: маршрут зафиксирован
      screech(){ squeal(); },                                                    // визг резины — касание ВПП
    };
    // Проигрыватель именованного события. ПРАВИЛО «логика — родитель над скинами»:
    // КОГДА звук играет — общая логика (места вызова SND.* в update/вводе, без
    // ветвления по скину); ЧЕМ он звучит — контент скина: SKIN_DEFS[скин].sounds
    // может переопределить рецепт по имени. null → общий базовый набор.
    function play(name){
      const over = skinDef().sounds;
      const fn = (over && over[name]) || RECIPES[name];
      if(fn) fn();
    }
    return {
      setEnabled(v){ enabled=v; },
      btn(){ play('btn'); }, lock(){ play('lock'); }, screech(){ play('screech'); },
      pick(){}, land(){}, dock(){}, served(){}, depart(){}, build(){},
      penalty(){}, crash(){}, medal(){}, alarm(){}, nearmiss(){},
    };
  })();
  const HAP = { // вибрация: Android — да, iOS веб — молча игнорирует (в обёртке будет плагин)
    on:true,
    v(p){ if(this.on && navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } },
    tap(){ this.v(12); }, ok(){ this.v([18,40,24]); }, penalty(){ this.v(35); }, crash(){ this.v([60,40,90]); },
    near(){ this.v([10,30,10]); },
  };
  // ---- Analytics: единая шина событий для soft-launch-метрик ----
  // ЭТО ЛОГИКА, НЕ КОНТЕНТ → одна для всех скинов/биомов/карт (см. CLAUDE.md). Скин —
  // это просто поле `skin` в каждом событии, никаких if(SKIN==='…'). Сейчас sink =
  // console + кольцевой буфер в localStorage; реальный провайдер (Firebase/GA4 или
  // свой бэкенд) подключается ОДНОЙ заменой Analytics.sink — ни одна точка track() не
  // меняется. Метрики (retention/session length/churn/conversion/ARPDAU/tutorial
  // dropoff) считаются на стороне провайдера из этих сырых событий.
  const Analytics = (() => {
    const UID_KEY='pf_uid', FIRST_KEY='pf_first_open', BUF_KEY='pf_evt_buffer';
    const BUF_MAX=500;              // кольцевой буфер: не растём бесконечно в localStorage
    const SESSION_GAP=30*60*1000;   // >30 мин без активности — это уже новая сессия
    let userId=null, sessionId=null, seq=0, sessionStartedAt=0, lastEventAt=0;
    let consent=true;               // до согласия события буферизуются, но sink молчит (задел под ATT/GDPR в сторах)
    let buffer=[], started=false, sink=defaultSink;

    const ls = {
      get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
      set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
    };
    function now(){ return Date.now(); }
    function uuid(){
      try{ if(self.crypto && crypto.randomUUID) return crypto.randomUUID(); }catch(e){}
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r=Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
      });
    }
    // дефолтный sink: тихий console.debug. Подмени Analytics.sink, чтобы лить провайдеру.
    function defaultSink(evt){ try{ if(console&&console.debug) console.debug('[evt]', evt.event, evt); }catch(e){} }

    function loadBuffer(){ try{ const a=JSON.parse(ls.get(BUF_KEY)); if(Array.isArray(a)) buffer=a; }catch(e){} }
    function persistBuffer(){ ls.set(BUF_KEY, JSON.stringify(buffer.slice(-BUF_MAX))); }

    // базовый контекст, который прикладывается к КАЖДОМУ событию
    function ctxBase(){
      let plat='web';
      try{ if(window.matchMedia && matchMedia('(display-mode: standalone)').matches) plat='pwa'; }catch(e){}
      return {
        userId, sessionId, seq:++seq, ts:now(),
        appVersion: (typeof VERSION!=='undefined' ? VERSION : null),
        skin: (typeof SKIN!=='undefined' ? SKIN : null),
        lang: (typeof lang!=='undefined' ? lang : null),
        platform: plat,
        screenW: (typeof innerWidth!=='undefined' ? innerWidth : 0),
        screenH: (typeof innerHeight!=='undefined' ? innerHeight : 0),
      };
    }
    function emit(evt){
      buffer.push(evt);
      if(buffer.length>BUF_MAX) buffer.splice(0, buffer.length-BUF_MAX);
      if(consent && !evt._sent){ try{ sink(evt); evt._sent=true; }catch(e){} }
      persistBuffer();
    }
    function touchSession(){
      const t=now();
      if(!sessionId || (t-lastEventAt)>SESSION_GAP){ if(sessionId) endSession(); startSession(); }
      lastEventAt=t;
    }
    function startSession(){
      sessionId=uuid(); sessionStartedAt=now(); lastEventAt=sessionStartedAt;
      emit(Object.assign(ctxBase(), {event:'session_start'}));
    }
    function endSession(){
      if(!sessionId) return;
      emit(Object.assign(ctxBase(), {event:'session_end', duration_ms: now()-sessionStartedAt}));
      sessionId=null;
    }
    // главная точка: зови track('level_start', {...}) из ЛЮБОГО места логики
    function track(event, props){
      if(!started) return;          // до init() нет userId/сессии — молчим
      touchSession();
      emit(Object.assign(ctxBase(), {event}, props||{}));
    }
    function init(){
      if(started) return;
      loadBuffer();
      userId = ls.get(UID_KEY); if(!userId){ userId=uuid(); ls.set(UID_KEY, userId); }
      const isFirst = !ls.get(FIRST_KEY);
      if(isFirst) ls.set(FIRST_KEY, String(now()));
      started=true;
      startSession();
      if(isFirst) emit(Object.assign(ctxBase(), {event:'first_open'}));
      // конец сессии при уходе со вкладки/закрытии; возврат позже gap → новая сессия
      try{
        document.addEventListener('visibilitychange', ()=>{
          if(document.visibilityState==='hidden') endSession(); else touchSession();
        });
        window.addEventListener('pagehide', endSession);
      }catch(e){}
      // краши: для soft launch критично понимать, на чём отваливаются
      try{
        window.addEventListener('error', e=>track('error', {
          message:String((e&&e.message)||(e&&e.type)||'error'),
          source:((e&&e.filename)||'')+':'+((e&&e.lineno)||0), kind:'error' }));
        window.addEventListener('unhandledrejection', e=>{
          const r=e&&e.reason; track('error', {message:String((r&&r.message)||r||'rejection'), kind:'unhandledrejection'}); });
      }catch(e){}
    }
    return {
      init, track,
      // consent-гейт под сторы: при отказе sink молчит; при согласии дольём накопленное
      setConsent(v){ consent=!!v; if(consent) buffer.forEach(e=>{ if(!e._sent){ try{ sink(e); e._sent=true; }catch(_){} } }); persistBuffer(); },
      get sink(){ return sink; }, set sink(fn){ if(typeof fn==='function') sink=fn; },
      dump(){ return buffer.slice(); }, clear(){ buffer=[]; persistBuffer(); },
      get userId(){ return userId; }, get sessionId(){ return sessionId; },
      // СПЯЩИЕ монетизационные хелперы: определены, но пока не вызываются (нет IAP/рекламы).
      // Когда появятся — зови Analytics.purchase({value,currency,sku}) / Analytics.adWatched({...}).
      purchase(o){ track('purchase', o||{}); track('revenue', {value:o&&o.value, currency:o&&o.currency, sku:o&&o.sku, kind:'iap'}); },
      adWatched(o){ track('ad_watched', o||{}); track('revenue', {value:o&&o.value, currency:o&&o.currency, kind:'ad'}); },
    };
  })();
  // дев-доступ из консоли (и точка подключения провайдера из обёртки): Analytics.dump()
  try{ window.PFAnalytics = Analytics; }catch(e){}

  // ---- Лидерборды: глобальный рейтинг игроков (all-time / month / week) ----
  // ЛОГИКА, НЕ КОНТЕНТ → одна для всех скинов/биомов/карт (см. CLAUDE.md): скин — лишь
  // поле в записи, никаких if(SKIN==='…'). Каркас: счёт за заход (метрика survival —
  // число обслуженных бортов) уходит через СВОПАЕМЫЙ `Leaderboard.provider`. Сейчас
  // provider = локальный mock-стор в localStorage (+синтетические боты, чтобы таблица не
  // пустовала); реальный бэкенд (свой API / Firebase / Supabase) подключается ОДНОЙ
  // заменой Leaderboard.provider — ни submitRun(), ни top() при этом не меняются (тот же
  // приём, что Analytics.sink). Идентичность игрока — модуль Account со свопаемым
  // authProvider: сейчас mock «локальный аккаунт», реальный Google Play Games / OAuth
  // встаёт в ТОТ ЖЕ интерфейс. Периоды (неделя/месяц) — чистая детерминированная функция
  // periodBucket(ts) в UTC, одинаковая на клиенте и будущем сервере (ISO-8601 неделя).
  const PERIODS = ['alltime','month','week'];
  function lbNow(){ return Date.now(); }
  // ISO-8601: ключ недели 'YYYY-Www' (год определяется четвергом недели) + 'YYYY-MM' месяца.
  function periodBucket(ts){
    const d = new Date(ts);
    const month = d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0');
    const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    const dayNum = (dt.getUTCDay()+6)%7;                 // Пн=0 … Вс=6
    dt.setUTCDate(dt.getUTCDate() - dayNum + 3);         // четверг текущей недели
    const firstThu = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
    const week = dt.getUTCFullYear()+'-W'+String(
      1 + Math.round(((dt - firstThu)/86400000 - 3 + ((firstThu.getUTCDay()+6)%7))/7)
    ).padStart(2,'0');
    return { alltime:'all', month, week };
  }

  // Идентичность: реальные аккаунты (выбор продукт-овнера). Сейчас authProvider — mock
  // «локальный аккаунт» (id из устойчивого pf_uid, ник задаёт игрок). Реальный вход
  // (Google Play Games / OAuth) заменяет Account.authProvider, ничего вокруг не трогая.
  // Аккаунт живёт в своём ключе и ПЕРЕЖИВАЕТ «Сбросить прогресс» (как язык/медали).
  const Account = (() => {
    const ACC_KEY='pf_account_v1', UID_KEY='pf_uid';
    let acct=null;
    function mockAuth(){
      let uid=null; try{ uid=localStorage.getItem(UID_KEY); }catch(e){}
      if(!uid){ uid='local-'+Math.abs((lbNow()^(Math.floor(Math.random()*1e9)))>>>0).toString(36); try{ localStorage.setItem(UID_KEY, uid); }catch(e){} }
      return Promise.resolve({ id:uid, name:null, provider:'mock' });
    }
    let authProvider = mockAuth;
    function load(){ try{ const a=JSON.parse(localStorage.getItem(ACC_KEY)); if(a&&a.id){ acct=a; } }catch(e){} }
    function persist(){ try{ localStorage.setItem(ACC_KEY, JSON.stringify(acct)); }catch(e){} }
    return {
      init(){ load(); },
      current(){ return acct; },
      signedIn(){ return !!(acct&&acct.id); },
      signIn(){ return Promise.resolve(authProvider()).then(a=>{ acct=Object.assign({name:null}, a); persist(); return acct; }); },
      signOut(){ acct=null; try{ localStorage.removeItem(ACC_KEY); }catch(e){} },
      setName(n){ if(!acct) return null; acct.name=String(n||'').trim().slice(0,24)||null; persist(); return acct; },
      get authProvider(){ return authProvider; }, set authProvider(fn){ if(typeof fn==='function') authProvider=fn; },
    };
  })();

  const Leaderboard = (() => {
    const STORE_KEY='pf_lb_v1', TOP_N=100, RING=5000;
    const ls = { get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
                 set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} } };
    function loadAll(){ try{ const a=JSON.parse(ls.get(STORE_KEY)); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
    function saveAll(a){ ls.set(STORE_KEY, JSON.stringify(a.slice(-RING))); }
    function defaultName(id){ return 'Player-'+String(id||'').slice(-4).toUpperCase(); }
    // mock «как бы глобальная» таблица: подсев несколько ботов, чтобы каркас и UI было
    // видно на пустом устройстве. На реальном бэкенде ботов нет — это деталь mock-провайдера.
    function seedBots(rows){
      if(rows.some(r=>r&&r._seed)) return rows;
      const bots=[['Skylark',38],['Maverick',31],['Tower-9',27],['Otto',22],['Foxtrot',18],['Breeze',14],['Cargo Joe',11],['Nimbus',8]];
      const base=lbNow();
      bots.forEach((b,i)=>rows.push({accountId:'bot-'+i, name:b[0], mode:'survival', score:b[1], ts:base-i*3600000, _seed:true}));
      return rows;
    }
    function rankRows(rows, period, mode){
      const curB = periodBucket(lbNow()), wantAll = (period==='alltime'), best={};
      rows.forEach(r=>{
        if(!r || (mode && r.mode!==mode)) return;
        if(!wantAll && periodBucket(r.ts)[period]!==curB[period]) return;
        const cur=best[r.accountId];
        if(!cur || r.score>cur.score || (r.score===cur.score && r.ts<cur.ts)) best[r.accountId]=r;
      });
      return Object.keys(best).map(k=>best[k]).sort((a,b)=> b.score-a.score || a.ts-b.ts)
        .map((r,i)=>({ rank:i+1, accountId:r.accountId, name:r.name||defaultName(r.accountId), score:r.score, ts:r.ts, seed:!!r._seed }));
    }
    // ПРОВАЙДЕР по умолчанию — локальный mock. Реальный бэкенд: тот же {submit, top}, но с сетью.
    const mockProvider = {
      submit(entry){ const rows=seedBots(loadAll()); rows.push(entry); saveAll(rows); return Promise.resolve(true); },
      top(period, mode){ return Promise.resolve(rankRows(seedBots(loadAll()), period, mode).slice(0,TOP_N)); },
    };
    let provider=mockProvider, started=false;
    return {
      init(){ if(started) return; started=true; Account.init(); },
      account: Account,
      periodBucket, PERIODS,
      get provider(){ return provider; }, set provider(p){ if(p&&typeof p.submit==='function'&&typeof p.top==='function') provider=p; },
      // отправить результат захода. score — число (survival: обслуженные борта). Возвращает
      // {score, ranks:{alltime,month,week}} — место игрока в каждом срезе (null, если вне TOP_N).
      submitRun(opts){
        opts=opts||{}; if(!started) this.init();
        return Promise.resolve(Account.signedIn()?Account.current():Account.signIn()).then(acct=>{
          const entry={ accountId:acct.id, name:acct.name||defaultName(acct.id), mode:opts.mode||'survival',
            score:Math.max(0, Math.round(+opts.score||0)), ts:lbNow(),
            skin:(typeof SKIN!=='undefined'?SKIN:null), v:(typeof VERSION!=='undefined'?VERSION:null) };
          return Promise.resolve(provider.submit(entry)).then(()=>{
            try{ Analytics.track('leaderboard_submit', {mode:entry.mode, score:entry.score}); }catch(e){}
            const tops=PERIODS.map(p=>Promise.resolve(provider.top(p, entry.mode)).then(list=>{
              const me=list.find(r=>r.accountId===acct.id); return [p, me?me.rank:null];
            }));
            return Promise.all(tops).then(pairs=>{ const ranks={}; pairs.forEach(x=>ranks[x[0]]=x[1]); return {score:entry.score, ranks}; });
          });
        });
      },
      top(period, mode){ if(!started) this.init(); return Promise.resolve(provider.top(period||'alltime', mode||'survival')); },
      me(period, mode){ const acct=Account.current(); if(!acct) return Promise.resolve(null);
        return Promise.resolve(provider.top(period||'alltime', mode||'survival')).then(list=>list.find(r=>r.accountId===acct.id)||null); },
      // личный рекорд (локальный кэш всех отправленных заходов этого аккаунта)
      bestScore(mode){ const acct=Account.current(); if(!acct) return 0;
        return loadAll().filter(r=>r&&r.accountId===acct.id&&(!mode||r.mode===mode)).reduce((m,r)=>Math.max(m,r.score),0); },
    };
  })();
  try{ window.PFLeaderboard = Leaderboard; }catch(e){}

  // конфиг-чек каркаса рейтингов (в духе validateSkins/validateLevels) — зовётся из validateGame()
  function validateLeaderboard(){
    const p=[];
    if(!Array.isArray(PERIODS)||!PERIODS.length){ p.push('PERIODS пуст'); return p; }
    let b; try{ b=periodBucket(lbNow()); }catch(e){ p.push('periodBucket() кинул исключение'); return p; }
    PERIODS.forEach(per=>{ if(b[per]==null) p.push('periodBucket() не даёт ключ для периода "'+per+'"'); });
    ['rank_top100','rank_top10','rank_1'].forEach(id=>{
      if(!ACH.defs.some(d=>d.id===id)) p.push('ранг-медаль "'+id+'" отсутствует в ACH.defs');
      Object.keys(I18N).forEach(c=>{ if(I18N[c]['ach.'+id+'.t']==null) p.push('нет перевода ach.'+id+'.t в языке "'+c+'"'); });
    });
    return p;
  }

  // Звук тапа по любым кнопкам в оверлеях меню (старт / пауза / уровни / настройки и т.д.).
  // Делегирование на document — ловит и динамически созданные кнопки (язык, скин, список уровней).
  document.addEventListener('pointerdown', e=>{
    const b = e.target.closest && e.target.closest('.overlay button');
    if(b && !b.disabled) SND.btn();
  });

  function reset(){
    econ = levelEconomy(LV); lvFx = econ.effects;   // оплата/касса и активные денежные эффекты — из уровня
    planes=[]; money=debug.richStart?BIG_MONEY:econ.startMoney; lives=K.START_LIVES; served=0; gameTime=0;
    // раунд начинается с пустого неба: первый борт прилетает через 1–3 секунды
    spawnTimer=1 + Math.random()*2; running=true; paused=false; inMenu=false;
    lossLog=[]; toast=null;
    document.getElementById('pauseScreen').classList.add('hidden');
    bays.forEach(b=>{ b.occupied=null;
      if(b.deice){ b.open=true; b.lvl=0; return; }   // де-айс — инфраструктура, всегда открыт
      const cfg=LV.sides[b.side]; b.open = b.slot < cfg.open; b.lvl=0; });
    runways.forEach(r=>{ r.occupied=null; r.closed=false; r.hazard=null; });
    effects=[]; floaters=[]; alarmAt=0; slowmo=0; nearMissPairs={}; selected=null; levelPassed=false; upgradesDone=0;
    statPeak=0; statSamples=[]; statStep=1.5; statNextAt=0; spawnedTotal=0;
    combo=0; runCrashes=0; runPenalties=0;
    rushUntil=0; windUntil=0; fogUntil=0;
    // атмосфера: «часы» суток идут всегда; погода — опциональный движок (флаг weather)
    dayPhase=0; nightAmount=0; weather='clear'; weatherUntil=0;
    nextWeather = LV.weather ? K.WEATHER_PERIOD : Infinity;
    hazards=[]; crews=[]; hazardSeq=0;
    const forest = LV.biome==='forest';
    if(LV.biome){
      // биом-карты (Survival) сохраняют динамику час-пика; у леса — свои помехи на
      // полосах вместо «ветра/тумана»
      nextRush = K.RUSH_PERIOD;
      nextWind = (forest||K.WEATHER_EVENTS_OFF)?Infinity:K.WIND_PERIOD;
      nextFog  = (forest||K.WEATHER_EVENTS_OFF)?Infinity:K.FOG_PERIOD;
      nextHazard = forest?FOR.SPAWN_FIRST:Infinity;
    } else {
      // кампания: динамические события включаются только если разрешены уровнем
      const evs = levelEvents();
      nextRush = evs.rush ? K.RUSH_PERIOD : Infinity;
      nextWind = (evs.wind && !K.WEATHER_EVENTS_OFF) ? K.WIND_PERIOD : Infinity;
      nextFog  = (evs.fog  && !K.WEATHER_EVENTS_OFF) ? K.FOG_PERIOD  : Infinity;
      nextHazard = Infinity;
    }
    ACH.onLevelStart();
    // тихий туториал «покажи и дай сделать»: только в кампании при первом запуске —
    // первый борт ведём за руку (подсветка + подсказка), без стены текста
    tut = (!save.tutorialDone && !LV.biome && !LV.bonus) ? {step:'land', plane:null} : null;
    Analytics.track('level_start', {
      level: levelKey,
      mode: currentMode(),
      objective: LV.objective && LV.objective.metric,
      target: LV.objective && LV.objective.target,
      startMoney: money,
    });
    if(tut) Analytics.track('tutorial_start', {step: tut.step});
    showGoals(false);          // крупное окно постановки целей в начале раунда (заодно ставит на паузу)
  }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function spawnPlane(){
    // бонус-мир «луг бабочек»: гусеница ВПОЛЗАЕТ справа по земле (не прилетает),
    // несёт одну услугу — цветок своего цвета (3 вида ↔ 3 цвета). Заползёт в свой
    // цветок → куколка → по таймеру → бабочка, упорхнёт к краю (см. update/depart).
    if(LV.bonus){
      const sp = Math.floor(Math.random()*BSP.length);          // вид (и цвет)
      const type = BTYPE[sp];                                    // совпадает с типом цветка-бокса
      const calmMult = LV.calm || 1;
      const groundMax = (K.GROUND_BASE + K.GROUND_STEP) * 2 * calmMult;  // терпеливые, спокойный мир
      const y = field.y0 + 30*ui + Math.random()*(field.y1 - field.y0 - 60*ui);
      spawnedTotal++;
      planes.push({
        id: ++planeSeq,
        x: W + 40*ui, y, ang: Math.PI,                            // вползает с правого края, головой влево
        species: sp, bug:'cat', bonusCrawl:true,                  // стадия гусеницы; авто-вползание до поля
