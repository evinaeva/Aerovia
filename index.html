<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tower</title>
<style>
  :root{
    --ink:#0a1622;
    --tarmac:#1b2530;
    --tarmac-2:#222e3b;
    --water:#10303a;
    --grid:#13354a;
    --phosphor:#bfe9ff;
    --paper:#e9e6dc;
    --muted:#7f9bb0;
    --amber:#f4a259;   /* ремонт */
    --teal:#4ecdc4;    /* топливо */
    --rose:#ef798a;    /* посадка людей */
    --gold:#f4cf5e;    /* вип */
    --life:#ef5365;
    --coin:#f4cf5e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);overflow:hidden}
  body{
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    color:var(--paper);
    user-select:none;-webkit-user-select:none;
  }
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;touch-action:none;display:block}

  .overlay{
    position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:radial-gradient(120% 90% at 50% 40%, rgba(10,22,34,.74), rgba(10,22,34,.95));
    backdrop-filter:blur(2px);z-index:5;
  }
  .panel{text-align:center;padding:34px 30px;max-width:380px;margin:auto;flex:0 0 auto}
  .panel .kicker{font-size:11px;letter-spacing:.34em;color:var(--phosphor);text-transform:uppercase}
  .panel h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:400;
    font-size:40px;letter-spacing:.01em;margin:14px 0 6px;color:var(--paper);
  }
  .panel p{font-size:13px;line-height:1.7;color:var(--muted);margin:10px 0 0}
  .panel .big{font-size:48px;color:var(--phosphor);margin:8px 0 0;letter-spacing:.02em}
  #finalStars{color:var(--gold);font-size:52px;letter-spacing:.08em}
  .btn{
    margin-top:24px;display:inline-block;cursor:pointer;
    border:1px solid var(--phosphor);color:var(--phosphor);background:transparent;
    font:inherit;font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    padding:13px 26px;border-radius:3px;transition:.2s;
  }
  .btn:hover{background:var(--phosphor);color:var(--ink)}
  .hidden{display:none}
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:18px;font-size:10px;letter-spacing:.1em;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%}
  .settings{margin-top:16px;text-align:left}
  .opt{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--paper);margin:12px 0;letter-spacing:.04em;cursor:pointer;text-transform:none}
  .opt input{width:16px;height:16px;accent-color:var(--phosphor)}
  .logbox{margin-top:14px;max-height:130px;overflow:auto;border-top:1px solid rgba(127,155,176,.25);padding-top:8px}
  .logrow{font-size:11px;color:var(--paper);padding:2px 0;letter-spacing:.03em}
  .logrow.muted{color:var(--muted)}
  #pauseScreen .btn{display:block;margin:14px auto 0}
  #overScreen .btn, #levelScreen .btn, #startScreen .btn{display:block;margin:12px auto 0}
  .levellist{display:flex;flex-direction:column;gap:10px;margin:18px 0 6px}
  .levelbtn{display:flex;justify-content:space-between;align-items:center;gap:14px;
    border:1px solid var(--phosphor);background:transparent;color:var(--paper);
    font:inherit;font-size:13px;padding:12px 16px;border-radius:3px;cursor:pointer;letter-spacing:.05em}
  .levelbtn:hover{background:rgba(191,233,255,.1)}
  .levelbtn.locked{border-color:rgba(127,155,176,.4);color:var(--muted);cursor:default}
  .levelbtn .lvbest{font-size:11px;color:var(--muted);letter-spacing:.03em}
  .btn-quiet{border-color:var(--muted);color:var(--muted)}
  .langbtns{display:flex;gap:8px;flex-wrap:wrap}
  .langbtn{border:1px solid var(--muted);color:var(--muted);background:transparent;
    font:inherit;font-size:11px;letter-spacing:.08em;padding:6px 12px;border-radius:3px;cursor:pointer}
  .langbtn:hover{color:var(--phosphor);border-color:var(--phosphor)}
  .langbtn.on{color:var(--phosphor);border-color:var(--phosphor);background:rgba(191,233,255,.08)}
  .vno{margin-top:16px;font-size:10px;color:var(--muted);letter-spacing:.12em}

  /* ---- медали ---- */
  .panel-wide{max-width:580px;width:94%;max-height:88vh;display:flex;flex-direction:column;padding:26px 24px}
  .medalcount{font-size:12px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .medalgrid{overflow:auto;text-align:left;margin:14px 0 6px;padding-right:6px}
  .tierhead{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--phosphor);margin:14px 0 6px;border-bottom:1px solid rgba(191,233,255,.18);padding-bottom:4px}
  .tierhead:first-child{margin-top:0}
  .medal{display:flex;gap:11px;align-items:flex-start;padding:8px 10px;margin:6px 0;
    border:1px solid rgba(127,155,176,.22);border-radius:6px}
  .medal.got{border-color:rgba(244,207,94,.55);background:rgba(244,207,94,.06)}
  .medal .ic{font-size:21px;line-height:1.1;filter:grayscale(1);opacity:.45;flex:0 0 auto;width:26px;text-align:center}
  .medal.got .ic{filter:none;opacity:1}
  .medal .mt{font-size:12.5px;color:var(--paper);letter-spacing:.02em}
  .medal.locked .mt{color:var(--muted)}
  .medal .md{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .medal .mp{font-size:10px;color:var(--phosphor);margin-top:3px;letter-spacing:.04em}

  /* ---- всплывашка получения медали ---- */
  #achToast{position:fixed;left:50%;top:13%;transform:translateX(-50%) translateY(-22px);
    z-index:9;display:flex;gap:13px;align-items:center;padding:12px 20px;border-radius:9px;
    background:rgba(16,18,22,.96);border:1px solid var(--gold);color:var(--paper);
    box-shadow:0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;
    transition:opacity .32s ease, transform .32s ease;max-width:86%}
  #achToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #achToast .ic{font-size:28px}
  #achToast .lbl{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
  #achToast .ttl{font-size:14px;margin-top:3px;color:var(--paper)}
</style>

<div id="stage">
  <canvas id="c"></canvas>

  <div class="overlay" id="startScreen">
    <div class="panel">
      <div class="kicker" data-i18n="start.kicker"></div>
      <h1 data-i18n="app.name"></h1>
      <p data-i18n="start.intro"></p>
      <div class="legend">
        <span><i class="dot" style="background:var(--amber)"></i><span data-i18n="legend.repair"></span></span>
        <span><i class="dot" style="background:var(--teal)"></i><span data-i18n="legend.fuel"></span></span>
        <span><i class="dot" style="background:var(--rose)"></i><span data-i18n="legend.board"></span></span>
        <span><i class="dot" style="background:var(--gold)"></i><span data-i18n="legend.vip"></span></span>
      </div>
      <button class="btn" id="startBtn" data-i18n="start.play"></button>
      <button class="btn" id="zenBtn" data-i18n="start.zen"></button>
      <button class="btn btn-quiet" id="medalsBtn" data-i18n="medals.btn"></button>
      <div class="vno"><span data-i18n="start.version"></span> <span id="ver"></span></div>
    </div>
  </div>

  <div class="overlay hidden" id="overScreen">
    <div class="panel">
      <div class="kicker" id="overKicker"></div>
      <div class="big" id="finalStars">☆☆☆</div>
      <p id="overMsg"></p>
      <button class="btn" id="nextBtn" data-i18n="over.next"></button>
      <button class="btn" id="againBtn" data-i18n="over.again"></button>
      <button class="btn" id="toLevelsBtn" data-i18n="over.toLevels"></button>
    </div>
  </div>

  <div class="overlay hidden" id="levelScreen">
    <div class="panel">
      <div class="kicker" data-i18n="levels.kicker"></div>
      <h1 data-i18n="levels.title"></h1>
      <div class="levellist" id="levelList"></div>
      <button class="btn" id="medalsBtn2" data-i18n="medals.btn"></button>
      <button class="btn" id="backBtn" data-i18n="levels.back"></button>
      <button class="btn btn-quiet" id="resetProgBtn" data-i18n="levels.reset"></button>
    </div>
  </div>

  <div class="overlay hidden" id="pauseScreen">
    <div class="panel">
      <div class="kicker" data-i18n="pause.kicker"></div>
      <h1 data-i18n="app.name"></h1>
      <div class="settings hidden" id="settingsPanel">
        <div class="opt" style="cursor:default"><span data-i18n="settings.language"></span><div class="langbtns" id="langBtns"></div></div>
        <label class="opt"><input type="checkbox" id="optLives"> <span data-i18n="settings.optLives"></span></label>
        <label class="opt"><input type="checkbox" id="optMoney"> <span data-i18n="settings.optMoney"></span></label>
        <div class="logbox" id="logBox"></div>
      </div>
      <button class="btn" id="resumeBtn" data-i18n="pause.resume"></button>
      <button class="btn" id="restartBtn" data-i18n="pause.restart"></button>
      <button class="btn" id="settingsBtn" data-i18n="pause.settings"></button>
      <button class="btn" id="menuBtn" data-i18n="pause.menu"></button>
    </div>
  </div>

  <div class="overlay hidden" id="medalScreen">
    <div class="panel panel-wide">
      <div class="kicker" data-i18n="medals.kicker"></div>
      <h1 data-i18n="medals.title"></h1>
      <div class="medalcount" id="medalCount"></div>
      <div class="medalgrid" id="medalGrid"></div>
      <button class="btn" id="medalsBackBtn" data-i18n="medals.back"></button>
    </div>
  </div>

  <div id="achToast">
    <div class="ic" id="achIc">🏅</div>
    <div><div class="lbl" data-i18n="ach.toastLabel"></div><div class="ttl" id="achTtl"></div></div>
  </div>
</div>

  const DEFAULT_LANG = 'en';
  let lang = DEFAULT_LANG;

  function detectLang(){
    const cands = (navigator.languages && navigator.languages.length) ? navigator.languages
                 : [navigator.language || DEFAULT_LANG];
    for(const c of cands){
      const base = String(c).toLowerCase().split('-')[0];
      if(I18N[base]) return base;
    }
    return DEFAULT_LANG;
  }
  function t(key, params){
    let v = I18N[lang] && I18N[lang][key];
    if(v==null) v = I18N[DEFAULT_LANG][key];
    if(v==null) return key;
    if(Array.isArray(v)){
      const pf = I18N[lang]._plural || I18N[DEFAULT_LANG]._plural;
      const n = params && params.n!=null ? Math.abs(params.n) : 0;
      v = v[Math.min(pf(n), v.length-1)];
    }
    return String(v).replace(/\{(\w+)\}/g, (m,k)=> (params && k in params) ? params[k] : m);
  }
  function fmtNum(n, frac){
    const loc = (I18N[lang] && I18N[lang]._locale) || 'en-US';
    try{ return n.toLocaleString(loc, frac!=null ? {minimumFractionDigits:frac, maximumFractionDigits:frac} : undefined); }
    catch(e){ return String(n); }
  }
  function fmtMoney(n){ return t('fmt.money', {n: fmtNum(n)}); }
  function setLang(code){
    if(!I18N[code]) return;
    lang = code; save.lang = code; saveGame();
    applyI18n();
  }
  function applyI18n(){
    document.documentElement.lang = lang;
    document.title = t('app.title');
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    renderLangBtns();
    refreshLog();
  }
  function renderLangBtns(){
    const box = document.getElementById('langBtns'); box.innerHTML='';
    for(const code of Object.keys(I18N)){
      const b = document.createElement('button');
      b.className = 'langbtn' + (code===lang ? ' on' : '');
      b.textContent = I18N[code]._name || code;
      b.onclick = () => setLang(code);
      box.appendChild(b);
    }
  }

  // ---- balance knobs (дефолты, потом крутим) ----

    EXPRESS_BONUS: 1.5,               // x1.5 денег за быстрый цикл

    EMERGENCY_BONUS: 1.5,             // x1.5 денег за аварийный борт
    RUSH_PERIOD: 35, RUSH_DUR: 8,     // «час пик»: период и длительность волны
    WIND_PERIOD: 28, WIND_DUR: 12,    // смена ветра: период и длительность закрытия ВПП

  // ---- level config ----
  // objective.metric: 'served' | 'upgrades'; target — порог для прохождения (1★);

  // наземных штрафов, 3★ без крушений.
  // Названия/описания не хранятся: имя = t('level.name'), описание = objectiveDesc().
  const LEVELS = [
    { objective:{ metric:'served', target:8 },
      sides:{ top:{type:'fuel',slots:2,open:1}, left:{type:'board',slots:2,open:1}, bottom:{type:'repair',slots:2,open:1} },
      runways:3 },
    { objective:{ metric:'served', target:12, time:120 },
      sides:{ top:{type:'fuel',slots:3,open:1}, left:{type:'board',slots:3,open:1}, bottom:{type:'repair',slots:3,open:1} },
      runways:3 },
    { objective:{ metric:'upgrades', target:4, time:150 },

      runways:3 },

  let LV = LEVELS[0];
  function objectiveDesc(){
    const o = LV.objective;
    const params = {n:o.target, time:o.time ? fmtTime(o.time) : ''};
    if(o.metric==='upgrades') return t('obj.upgrades', params);
    return o.time ? t('obj.servedTimed', params) : t('obj.served', params);
  }
  let levelIdx = 0, levelPassed = false, upgradesDone = 0;

  let rushUntil = 0, nextRush = 0;                    // «час пик»
  let windUntil = 0, nextWind = 0;                    // смена ветра (закрытие ВПП)

  // ---- canvas sizing ----
  let W=0, H=0, dpr=1, ui=1;
  const HUD_H = () => Math.round(44*ui);
  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ui = Math.max(0.7, Math.min(1.5, Math.min(W/1100, H/620)));
    layout();
  }
  window.addEventListener('resize', resize);

  // ---- layout: bays, runways, hover slots ----
  let bays=[], runways=[], field={}, pauseBtn={};
  function layout(){
    const hud = HUD_H();
    const M = 12*ui;
    // field taxi area (left ~60%); runways on right
    const fx0 = M, fy0 = hud + M;
    const fx1 = W*0.58, fy1 = H - M;
    field = {x0:fx0, y0:fy0, x1:fx1, y1:fy1};

    const bw = Math.min(96*ui, (fx1-fx0)/2.4);
    const bh = bw*0.72;

    // build bays once (preserve open/level state across resize)
    if(!bays.length){
      bays = [];
      for(const side of ['top','left','bottom']){
        const cfg = LV.sides[side];
        for(let i=0;i<cfg.slots;i++){
          bays.push({side, type:cfg.type, slot:i,
                     open:i<cfg.open, lvl:0, occupied:null,
                     x:0,y:0,w:bw,h:bh});
        }
      }
    }
    // position bays
    const bySide = s => bays.filter(b=>b.side===s);
    function spread(n, a, b){ // n centers within [a,b]
      const out=[]; const span=b-a; const step=span/(n+1);
      for(let i=0;i<n;i++) out.push(a+step*(i+1));
      return out;
    }
    const top=bySide('top'), left=bySide('left'), bot=bySide('bottom');
    spread(top.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      top[i].w=bw; top[i].h=bh; top[i].x=cx-bw/2; top[i].y=fy0;
    });
    spread(bot.length, fx0+bw*0.6, fx1-bw*0.6).forEach((cx,i)=>{
      bot[i].w=bw; bot[i].h=bh; bot[i].x=cx-bw/2; bot[i].y=fy1-bh;
    });
    spread(left.length, fy0+bh*0.7, fy1-bh*0.7).forEach((cy,i)=>{
      left[i].w=bw; left[i].h=bh; left[i].x=fx0; left[i].y=cy-bh/2;
    });

    // runways on right
    const rwL = W*0.60, rwR = W*0.85;
    const n = LV.runways;
    const top0 = hud + M, bot0 = H - M;
    const gap = 10*ui;
    const rh = ((bot0-top0) - gap*(n-1)) / n;
    if(!runways.length || runways.length!==n){
      runways = []; for(let i=0;i<n;i++) runways.push({occupied:null, closed:false});
    }
    for(let i=0;i<n;i++){
      const r=runways[i];
      r.x=rwL; r.y=top0 + i*(rh+gap); r.w=rwR-rwL; r.h=rh;
      r.cy = r.y + r.h/2;
      r.stopX = rwL + 26*ui;   // куда докатывается севший борт (полевой край)
      r.exitX = rwR + 10*ui;   // правый (водный) край
    }
    // hover x для прилетающих
    field.hoverX = W*0.93;
    field.rwL = rwL; field.rwR = rwR;

    pauseBtn = {x: W - 44*ui, y: 6*ui, w: 36*ui, h: 30*ui};
  }

  // ---- game state ----
  let planes=[], money=0, lives=0, served=0, gameTime=0;
  let running=false, paused=false, lastTs=0, spawnTimer=0;

  let lossLog=[], toast=null;

  const BIG_MONEY=999999;

  function reset(){
    planes=[]; money=debug.richStart?BIG_MONEY:K.START_MONEY; lives=K.START_LIVES; served=0; gameTime=0;
    spawnTimer=1.0; running=true; paused=false;
    lossLog=[]; toast=null;
    document.getElementById('pauseScreen').classList.add('hidden');
    document.getElementById('settingsPanel').classList.add('hidden');
    bays.forEach(b=>{ b.occupied=null; const cfg=LV.sides[b.side];
      b.open = b.slot < cfg.open; b.lvl=0; });
    runways.forEach(r=>{ r.occupied=null; r.closed=false; });
    effects=[]; selected=null; levelPassed=false; upgradesDone=0;
    combo=0; runCrashes=0; runPenalties=0;
    rushUntil=0; windUntil=0; fogUntil=0;
    nextRush = zen?Infinity:K.RUSH_PERIOD;
    nextWind = zen?Infinity:K.WIND_PERIOD;
    nextFog  = zen?Infinity:K.FOG_PERIOD;
    ACH.onLevelStart();
    toast = zen ? {text:t('toast.zenStart'), t:0, good:true}
                : {text:t('toast.goal', {desc:objectiveDesc()}), t:0, good:true};
    spawnPlane();
  }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function spawnPlane(){
    const vip = Math.random() < K.VIP_CHANCE;
    const emergency = !vip && Math.random() < K.EMERGENCY_CHANCE; // «топливо на нуле»
    const pool = shuffle(['repair','fuel','board']);
    const nSvc = Math.random() < 0.45 ? 2 : 1;
    const requests = pool.slice(0, nSvc).concat(['depart']);
    const waitMult = vip ? 1 : 2;
    // у аварийного борта воздушное терпение сильно меньше — садить срочно
    const airBase = (emergency ? K.AIR_BASE*0.4 : K.AIR_BASE) * waitMult;
    const bonus = (vip?2:1) * (emergency?K.EMERGENCY_BONUS:1);
    // вертикальная позиция зависания — у одной из полос/между ними
    const y = field.y0 + 30*ui + Math.random()*(field.y1 - field.y0 - 60*ui);
    planes.push({
      x: field.hoverX, y, ang: Math.PI, // нос влево
      vip, emergency, requests, reqIndex:0,
      zone:'air',            // air | runway | field | bay
      path:[], moving:false, selected:false,
      landing:false, takeoff:false, exiting:false,
      runway:null, bay:null,
      airTime: airBase, airMax: airBase,
      groundTime:0, groundMax:0, waitMult,
      serveTime:0, serveMax:0, landedAt:0,
      halfPay:false, dead:false,
      reward: Math.round(nSvc * K.MONEY_SVC * bonus),
      nSvc,
    });
  }

  // ---- geometry ----
  const rectHit = (px,py,r) => px>r.x && px<r.x+r.w && py>r.y && py<r.y+r.h;
  const dist = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);

  // ---- input ----
  let selected=null, drag=null;
  function pt(e){
    const r=cv.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return {x:s.clientX-r.left, y:s.clientY-r.top};
  }
  function pickPlane(p){
    let best=null, bd=K.GRAB;
    for(const pl of planes){
      if(pl.zone==='bay') continue;
      const d=dist(pl.x,pl.y,p.x,p.y);
      if(d<bd){bd=d;best=pl;}
    }
    return best;
  }
  function pickBay(p){
    for(const b of bays) if(rectHit(p.x,p.y,b)) return b;
    return null;
  }
  function bayUpCost(b){ return b.open ? (K.BAY_UP_COST[b.lvl]||null) : K.BAY_OPEN_COST; }

  function down(e){
    if(!running) return;
    e.preventDefault();
    const p=pt(e);
    // pause button
    if(rectHit(p.x,p.y,pauseBtn)){ setPaused(!paused); return; }
    if(paused) return;

    // bay tap -> open / upgrade
    const b=pickBay(p);
    if(b){
      const cost=bayUpCost(b);
      if(cost!=null && money>=cost){
        money-=cost;
        if(!b.open){ b.open=true; ACH.onBayOpen(b); } else { b.lvl++; ACH.onBayUpgrade(b); }
        upgradesDone++;
      }
      return;
    }
    // plane
    const pl=pickPlane(p);
    if(pl){
      selected=pl; ACH.onPlaneTouched(pl);
      planes.forEach(x=>x.selected=false); pl.selected=true;
      drag={plane:pl, start:p, last:p, drew:false};
    } else {
      selected=null; planes.forEach(x=>x.selected=false);
    }
  }
  function move(e){
    if(!drag||paused) return;
    e.preventDefault();
    const p=pt(e);
    if(!drag.drew && dist(p.x,p.y,drag.start.x,drag.start.y)>10){
      drag.drew=true;
      drag.plane.path=[];            // начинаем новый маршрут
      drag.plane.moving=true;        // борт трогается сразу, как пошла линия
    }
    if(drag.drew && dist(p.x,p.y,drag.last.x,drag.last.y)>12){
      drag.plane.path.push({x:p.x,y:p.y});
      drag.last=p;
    }
  }
  function up(){
    if(!drag) return;
    const pl=drag.plane;
    if(drag.drew){
      pl.moving = pl.path.length>0;        // поехали по маршруту
      pl.exiting=false;
    } else {
      // тап: если есть маршрут — переключаем стоп/движение
      if(pl.path.length) pl.moving = !pl.moving;
    }
    drag=null;
  }
  cv.addEventListener('pointerdown',down);
  cv.addEventListener('pointermove',move);
  window.addEventListener('pointerup',up);
  cv.addEventListener('touchstart',down,{passive:false});
  cv.addEventListener('touchmove',move,{passive:false});

  // ---- crashes ----
  function freeRes(pl){
    if(pl.runway){ if(pl.runway.occupied===pl) pl.runway.occupied=null; pl.runway=null; }
    if(pl.bay){ if(pl.bay.occupied===pl) pl.bay.occupied=null; pl.bay=null; }
  }
  // reason — ключ i18n (loss.*): в lossLog хранится ключ, перевод — при показе
  function logLoss(pl, reason, moneyPenalty){
    if(pl.dead) return;
    pl.dead=true; boom(pl.x,pl.y); freeRes(pl);
    combo=0; runCrashes++;          // крушение сбрасывает серию и портит «чистоту»
    ACH.onCrash(pl, reason);
    if(!debug.infiniteLives) lives--;
    if(moneyPenalty) money-=pl.reward;
    lossLog.push({t:gameTime, reason});
    if(lossLog.length>12) lossLog.shift();
    toast={text:(debug.infiniteLives?'✈ ':'−1 ✈ ')+t(reason), t:0, good:false};
    console.log('[Tower] '+(debug.infiniteLives?'(∞) ':'-1 ✈ ')+t(reason)+' | t='+fmtTime(gameTime)+' | lives='+lives);
  }
  function killAir(pl){ logLoss(pl, 'loss.airTimeout', false); }
  function killCrash(pl, reason){ logLoss(pl, reason||'loss.collision', true); }

  function curNeed(pl){ return pl.requests[pl.reqIndex]; }

  function land(pl, r){            // начать посадку на полосу r
    pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
    pl.landing=true; pl.moving=true; pl.path=[];
  }
  function startGround(pl){
    pl.landing=false; pl.moving=false; pl.zone='runway'; // стоит на полосе, ждёт руления
    const rem = pl.nSvc; // число услуг (без вылета)
    pl.groundMax = (K.GROUND_BASE + rem*K.GROUND_STEP) * pl.waitMult;
    pl.groundTime = pl.groundMax;
    pl.landedAt = gameTime;          // для экспресс-бонуса
    ACH.onLand(pl);
  }
  function serveTimeFor(b){ return K.SERVE_BASE / (1 + b.lvl*K.UP_SPEED); }
  function comboMult(){ return 1 + Math.min(combo, K.COMBO_MAX)*K.COMBO_STEP; }

  function depart(pl){             // успешный вылет
    served++;
    let pay = pl.reward;
    if(pl.halfPay){                // наземный штраф рвёт серию и режет оплату вдвое
      combo=0; pay = Math.round(pay*0.5);
    } else {
      combo++;
      const express = (gameTime - pl.landedAt) <= K.EXPRESS_TIME;
      pay = Math.round(pay * comboMult() * (express?K.EXPRESS_BONUS:1));
      if(express) toast={text:t('toast.express', {money:fmtMoney(pay)}), t:0, good:true};
    }
    money += pay;
    ACH.onDepart(pl, pay);
    pl.dead=true; freeRes(pl);
  }
  function metricValue(){ return LV.objective.metric==='upgrades' ? upgradesDone : served; }
  // звёзды: 1★ цель выполнена, +1★ без наземных штрафов, +1★ без крушений
  function computeStars(){
    if(metricValue() < LV.objective.target) return 0;
    let s=1;
    if(runPenalties===0) s++;
    if(runCrashes===0) s++;
    return s;
  }
  function recordResult(){
    if(zen) return;                  // Zen не влияет на звёзды/прогресс
    const stars=computeStars();
    if(save.best[levelIdx]==null || served>save.best[levelIdx]) save.best[levelIdx]=served;
    if(save.stars[levelIdx]==null || stars>save.stars[levelIdx]) save.stars[levelIdx]=stars;
    if(stars>=1 && save.unlocked < levelIdx+2) save.unlocked = Math.min(LEVELS.length, levelIdx+2);
    saveGame();
  }

  // ---- update ----
  function steer(pl, tx, ty, spd, dt){
    const desired=Math.atan2(ty-pl.y, tx-pl.x);
    let diff=desired-pl.ang;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    const max=K.TURN*dt;
    pl.ang += Math.max(-max,Math.min(max,diff));
    pl.x += Math.cos(pl.ang)*spd*dt;
    pl.y += Math.sin(pl.ang)*spd*dt;
  }
  function followPath(pl, spd, dt){
    if(!pl.path.length){ return false; }
    const wp=pl.path[0];
    steer(pl, wp.x, wp.y, spd, dt);
    // порог захвата масштабируем под радиус разворота (spd/TURN),
    // чтобы борт не орбитил точку, в которую физически не может вписаться
    const capture = Math.max(K.ARRIVE, (spd/K.TURN)*0.6);
    // точка пройдена, если она уже позади по курсу (скалярное произведение < 0)
    const toX=wp.x-pl.x, toY=wp.y-pl.y;
    const passed = (toX*Math.cos(pl.ang) + toY*Math.sin(pl.ang)) < 0;
    if(dist(pl.x,pl.y,wp.x,wp.y)<capture || passed) pl.path.shift();
    return true;
  }

  function update(dt){
    // динамические события (в Zen отключены: next* = Infinity)
    if(gameTime>=nextRush){ rushUntil=gameTime+K.RUSH_DUR; nextRush=gameTime+K.RUSH_PERIOD; toast={text:t('toast.rush'), t:0, good:false}; }
    if(gameTime>=nextWind){
      const open=runways.filter(r=>!r.closed);
      if(open.length>1){ open[Math.floor(Math.random()*open.length)].closed=true; windUntil=gameTime+K.WIND_DUR; toast={text:t('toast.wind'), t:0, good:false}; }
      nextWind=gameTime+K.WIND_PERIOD;
    }
    if(windUntil>0 && gameTime>=windUntil){ runways.forEach(r=>r.closed=false); windUntil=0; }
    if(gameTime>=nextFog){ fogUntil=gameTime+K.FOG_DUR; nextFog=gameTime+K.FOG_PERIOD; toast={text:t('toast.fog'), t:0, good:false}; }
    const rush = gameTime<rushUntil;
    const fog = gameTime<fogUntil;
    const taxiSpeed = fog ? K.SPEED_TAXI*K.FOG_TAXI : K.SPEED_TAXI;
    // spawn
    spawnTimer-=dt;
    const interval = rush ? K.SPAWN_BASE*0.4 : Math.max(K.SPAWN_MIN, K.SPAWN_BASE - served*0.05);
    if(spawnTimer<=0 && planes.length<K.MAX_PLANES){ spawnPlane(); spawnTimer=interval; }

    ACH.onTick(dt);

    for(const pl of planes){
      if(pl.dead) continue;

      // ---- AIR ----
      if(pl.zone==='air'){
        if(!zen){ pl.airTime-=dt; if(pl.airTime<=0){ killAir(pl); continue; } }
        if(pl.moving && pl.path.length){
          followPath(pl, K.SPEED_AIR, dt);
        }
        // заход на посадку: пересёк правый край полос -> захват ближайшей ОТКРЫТОЙ
        // (садимся даже на занятую — крушение только при физическом контакте)
        if(pl.x <= field.rwR){
          let best=null, bd=1e9;
          for(const r of runways){ if(r.closed) continue; const d=Math.abs(pl.y-r.cy); if(d<bd){bd=d;best=r;} }
          if(best) land(pl, best);
        }
        continue;
      }

      // ---- RUNWAY ----
      if(pl.zone==='runway'){
        if(pl.landing){
          // докатываемся до полевого края, выравниваясь по оси полосы
          const r=pl.runway;
          steer(pl, r.stopX, r.cy, K.SPEED_AIR*0.8, dt);
          if(pl.x <= r.stopX+2){ pl.x=r.stopX; pl.y=r.cy; startGround(pl); }
          continue;
        }
        if(pl.takeoff){
          if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay){ pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl); } }
          steer(pl, pl.runway.exitX+200, pl.runway.cy, K.SPEED_TAKEOFF, dt);
          if(pl.x > W+30){ depart(pl); }
          continue;
        }
        // стоит на полосе, ждёт руления к боксу
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay){ pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl); } }
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
          if(!rectHit(pl.x,pl.y,pl.runway)){          // съехал с полосы на поле
            if(pl.runway.occupied===pl) pl.runway.occupied=null;
            pl.runway=null; pl.zone='field';
          }
        }
        continue;
      }

      // ---- FIELD (руление) ----
      if(pl.zone==='field'){
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay){ pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl); } }
        const need=curNeed(pl);
        if(pl.moving && pl.path.length){
          followPath(pl, taxiSpeed, dt);
        } else if(pl.exiting){
          pl.exiting=false; pl.moving=false;
        }
        // вылет: все услуги сделаны -> заезд на полосу
        if(need==='depart'){
          for(const r of runways){
            if(!r.closed && rectHit(pl.x,pl.y,r)){
              // выезд на ОТКРЫТУЮ полосу под взлёт (крушение — только при контакте на ВПП)
              pl.zone='runway'; pl.runway=r; if(!r.occupied) r.occupied=pl;
              pl.takeoff=true; pl.moving=true; pl.path=[];
              break;
            }
          }
        } else {
          // заезд в бокс
          for(const b of bays){
            if(!b.open) continue;
            if(rectHit(pl.x,pl.y,b)){
              if(b.type!==need){ /* не тот бокс — простаиваем рядом */ break; }
              if(b.occupied && b.occupied!==pl){ if(!zen){ killCrash(pl,'loss.collisionBay'); killCrash(b.occupied,'loss.collisionBay'); } }
              else {
                pl.zone='bay'; pl.bay=b; b.occupied=pl;
                pl.x=b.x+b.w/2; pl.y=b.y+b.h/2; pl.moving=false; pl.path=[];
                pl.serveMax=serveTimeFor(b); pl.serveTime=pl.serveMax;
              }
              break;
            }
          }
        }
        continue;
      }

      // ---- BAY (обслуживание) ----
      if(pl.zone==='bay'){
        if(!zen){ pl.groundTime-=dt; if(pl.groundTime<=0 && !pl.halfPay){ pl.halfPay=true; runPenalties++; ACH.onGroundTimeout(pl); } }
        pl.serveTime-=dt;
        if(pl.serveTime<=0){
          const b=pl.bay; b.occupied=null; pl.bay=null;
          pl.reqIndex++; ACH.onService(pl);
          // выезд из бокса на поле
          pl.zone='field';
          const ex = clampX(b.x+b.w/2 + dirOut(b).dx*(b.w*0.6+24*ui));
          const ey = clampY(b.y+b.h/2 + dirOut(b).dy*(b.h*0.6+24*ui));
          pl.x=ex; pl.y=ey; pl.moving=false; pl.path=[];
        }
        continue;
      }
    }

    // столкновения (в Zen отключены — поток без проигрыша)
    if(!zen){
      // на поле (оба свободно рулят)
      const ground = planes.filter(p=>!p.dead && p.zone==='field');
      for(let i=0;i<ground.length;i++)
        for(let j=i+1;j<ground.length;j++){
          if(dist(ground[i].x,ground[i].y,ground[j].x,ground[j].y)<K.CRASH_DIST){
            killCrash(ground[i],'loss.collisionField'); killCrash(ground[j],'loss.collisionField');
          }
        }
      // на ВПП: физический контакт (заходящий бьёт стоящего, либо садящийся
      // пересекается со взлетающим), а не сам факт захода на полосу
      const onrw = planes.filter(p=>!p.dead && p.zone==='runway');
      for(let i=0;i<onrw.length;i++)
        for(let j=i+1;j<onrw.length;j++){
          if(dist(onrw[i].x,onrw[i].y,onrw[j].x,onrw[j].y)<K.CRASH_DIST){
            killCrash(onrw[i],'loss.collisionRunway'); killCrash(onrw[j],'loss.collisionRunway');
          }
        }
    }

    // уборка
    for(let i=planes.length-1;i>=0;i--) if(planes[i].dead){ if(selected===planes[i]) selected=null; planes.splice(i,1); }

    if(!zen){
      if(lives<=0){ endLevel('end.lives'); return; }
      if(metricValue() >= LV.objective.target){ endLevel('end.goal'); return; }
    }
    gameTime+=dt;
    if(!zen && LV.objective.time && gameTime>=LV.objective.time){ endLevel('end.time'); return; }
  }
  function dirOut(b){ // направление "наружу из бокса" в поле
    if(b.side==='top') return {dx:0,dy:1};
    if(b.side==='bottom') return {dx:0,dy:-1};
    return {dx:1,dy:0}; // left
  }
  const clampX = x => Math.max(field.x0+10, Math.min(field.x1-10, x));
  const clampY = y => Math.max(field.y0+10, Math.min(field.y1-10, y));

  // ---- render ----
  function rr(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function glyph(type, r){ // нарисовать иконку услуги в (0,0), размер r; цвет = текущий fill/stroke
    ctx.lineCap='round'; ctx.lineJoin='round';
    if(type==='fuel'){
      ctx.beginPath();
      ctx.moveTo(0,-r);
      ctx.bezierCurveTo(r,-r*0.1, r*0.7,r, 0,r);
      ctx.bezierCurveTo(-r*0.7,r, -r,-r*0.1, 0,-r);
      ctx.fill();
    } else if(type==='board'){
      ctx.beginPath(); ctx.arc(0,-r*0.45,r*0.36,0,7); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-r*0.5,r*0.75); ctx.lineTo(-r*0.32,-r*0.02);
      ctx.lineTo(r*0.32,-r*0.02); ctx.lineTo(r*0.5,r*0.75);
      ctx.closePath(); ctx.fill();
    } else if(type==='repair'){
      ctx.lineWidth=Math.max(2,r*0.26);
      ctx.beginPath(); ctx.arc(0,0,r*0.5,0,7); ctx.stroke();
      for(let k=0;k<8;k++){
        const a=k*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.5, Math.sin(a)*r*0.5);
        ctx.lineTo(Math.cos(a)*r*0.95, Math.sin(a)*r*0.95);
        ctx.stroke();
      }
    } else if(type==='depart'){
      // взлетающий самолётик (нос вверх-вправо)
      ctx.save(); ctx.rotate(-Math.PI/5);
      const s=r/15;
      ctx.beginPath();
      ctx.moveTo(15*s,0); ctx.lineTo(-10*s,8*s); ctx.lineTo(-5*s,1.5*s); ctx.lineTo(-13*s,-1*s);
      ctx.lineTo(-5*s,-3*s); ctx.lineTo(-10*s,-8*s); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  function drawField(){
    // трава
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#39482a'); g.addColorStop(1,'#28341f');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    const ax=field.x0, ay=field.y0, aR=field.rwR, ab=field.y1;

    // вода справа за полосами
    const wg=ctx.createLinearGradient(aR,0,W,0);
    wg.addColorStop(0,'#13414a'); wg.addColorStop(1,'#0c2d36');
    ctx.fillStyle=wg; ctx.fillRect(aR,0,W-aR,H);
    ctx.strokeStyle='rgba(120,190,200,.10)'; ctx.lineWidth=1.4;
    for(let i=0;i<5;i++){ const yy=H*(i+1)/6; ctx.beginPath();
      for(let xx=aR+8; xx<W; xx+=20){ ctx.lineTo(xx, yy+Math.sin((xx+i*40)/26)*3); } ctx.stroke(); }

    // металлическая рама апрона (фаска)
    const fx=ax-10*ui, fy=ay-10*ui, fw=(aR-ax)+20*ui, fh=(ab-ay)+20*ui;
    ctx.fillStyle='#5d4a31'; rr(fx,fy,fw,fh,18*ui); ctx.fill();
    ctx.fillStyle='#7a6342'; rr(fx+4*ui,fy+4*ui,fw-8*ui,fh-8*ui,15*ui); ctx.fill();

    // тармак
    ctx.fillStyle=COL.tarmac; rr(ax,ay,aR-ax,ab-ay,12*ui); ctx.fill();
    ctx.save();
    rr(ax,ay,aR-ax,ab-ay,12*ui); ctx.clip();
    ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=1;
    for(let xx=ax+50*ui; xx<aR; xx+=50*ui){ ctx.beginPath(); ctx.moveTo(xx,ay); ctx.lineTo(xx,ab); ctx.stroke(); }
    ctx.restore();

    // центральный терминал (декор)
    const ix=ax+(field.x1-ax)*0.28, iy=ay+(ab-ay)*0.34;
    const iw=(field.x1-ax)*0.42, ih=(ab-ay)*0.32;
    ctx.fillStyle=COL['tarmac-2']; rr(ix,iy,iw,ih,10*ui); ctx.fill();
    ctx.strokeStyle='rgba(191,233,255,.18)'; ctx.lineWidth=1.5; rr(ix,iy,iw,ih,10*ui); ctx.stroke();
    ctx.fillStyle='rgba(191,233,255,.30)'; ctx.font=`${11*ui}px ui-monospace,monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t('canvas.terminal'), ix+iw/2, iy+ih/2);
  }

  function drawRunways(){
    for(const r of runways){
      ctx.fillStyle='#161e26'; rr(r.x,r.y,r.w,r.h,5*ui); ctx.fill();
      // пороговые полосы (полевой край)
      ctx.fillStyle='rgba(233,230,220,.5)';
      const n=4, sh=(r.h-12*ui)/(n*2);
      for(let k=0;k<n;k++) ctx.fillRect(r.x+6*ui, r.y+6*ui+k*sh*2, 11*ui, sh);
      // осевая пунктирная
      ctx.strokeStyle=r.occupied?'rgba(244,162,89,.6)':'rgba(233,230,220,.6)';
      ctx.lineWidth=2; ctx.setLineDash([12,10]);
      ctx.beginPath(); ctx.moveTo(r.x+24*ui,r.cy); ctx.lineTo(r.x+r.w-8*ui,r.cy); ctx.stroke(); ctx.setLineDash([]);
      // бортовые огни
      const lc=r.occupied?COL.amber:COL.phosphor;
      ctx.fillStyle=lc; ctx.globalAlpha=.7;
      for(let xx=r.x+12*ui; xx<r.x+r.w-6*ui; xx+=22*ui){
        ctx.beginPath(); ctx.arc(xx, r.y+3.5*ui, 1.6*ui,0,7); ctx.fill();
        ctx.beginPath(); ctx.arc(xx, r.y+r.h-3.5*ui, 1.6*ui,0,7); ctx.fill();
      }
      ctx.globalAlpha=1;
      // закрытая полоса (смена ветра): красный оверлей + ✕ + ЗАКРЫТО
      if(r.closed){
        ctx.fillStyle='rgba(239,83,101,.18)'; rr(r.x,r.y,r.w,r.h,5*ui); ctx.fill();
        ctx.strokeStyle=COL.life; ctx.lineWidth=2; ctx.setLineDash([6,5]);
        rr(r.x+2*ui,r.y+2*ui,r.w-4*ui,r.h-4*ui,5*ui); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle=COL.life; ctx.font=`700 ${Math.min(13,r.h*0.4)*ui}px ui-monospace,monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(t('canvas.closed'), r.x+r.w/2, r.cy);
      }
    }
  }

  function drawBay(b){
    const c=SVC[b.type].color;
    ctx.save();
    // металлическая рама
    ctx.fillStyle='#3b3020'; rr(b.x-3*ui,b.y-3*ui,b.w+6*ui,b.h+6*ui,9*ui); ctx.fill();
    ctx.strokeStyle='#7a6342'; ctx.lineWidth=2*ui; rr(b.x-3*ui,b.y-3*ui,b.w+6*ui,b.h+6*ui,9*ui); ctx.stroke();

    if(!b.open){
      const enough = money>=K.BAY_OPEN_COST;
      ctx.fillStyle='#241d14'; rr(b.x,b.y,b.w,b.h,7*ui); ctx.fill();
      // замок
      const lx=b.x+b.w/2, ly=b.y+b.h/2-2*ui;
      ctx.fillStyle = enough?COL.coin:COL.muted;
      ctx.fillRect(lx-7*ui, ly, 14*ui, 11*ui);
      ctx.lineWidth=2.4*ui; ctx.strokeStyle = enough?COL.coin:COL.muted;
      ctx.beginPath(); ctx.arc(lx, ly, 5*ui, Math.PI, 2*Math.PI); ctx.stroke();
      // приглушённая иконка типа
      ctx.globalAlpha=0.35; ctx.fillStyle=c; ctx.strokeStyle=c;
      ctx.save(); ctx.translate(b.x+b.w/2, b.y+11*ui); glyph(b.type, 7*ui); ctx.restore();
      ctx.globalAlpha=1;
      // цена
      ctx.fillStyle = enough?COL.coin:COL.muted; ctx.font=`${10*ui}px ui-monospace,monospace`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(fmtMoney(K.BAY_OPEN_COST), b.x+b.w/2, b.y+b.h+4*ui);
      ctx.restore(); return;
    }

    // открытый бокс
    ctx.fillStyle=COL.tarmac; rr(b.x,b.y,b.w,b.h,7*ui); ctx.fill();
    ctx.globalAlpha=0.18; ctx.fillStyle=c; rr(b.x,b.y,b.w,b.h,7*ui); ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=c; ctx.lineWidth=2; rr(b.x,b.y,b.w,b.h,7*ui); ctx.stroke();
    // иконка услуги
    ctx.fillStyle=c; ctx.strokeStyle=c;
    ctx.save(); ctx.translate(b.x+b.w/2, b.y+b.h*0.40); glyph(b.type, 13*ui); ctx.restore();
    // прогресс обслуживания
    if(b.occupied){
      const p=b.occupied;
      const frac=1-Math.max(0,p.serveTime)/p.serveMax;
      ctx.strokeStyle=c; ctx.lineWidth=3*ui;
      ctx.beginPath();
      ctx.arc(b.x+b.w/2, b.y+b.h*0.40, 18*ui, -Math.PI/2, -Math.PI/2+frac*Math.PI*2);
      ctx.stroke();
    }
    // пипсы апгрейда
    const pip=5*ui, gap=4*ui, total=K.BAY_MAX_LVL;
    const startX=b.x+b.w/2-(total*(pip+gap)-gap)/2;
    for(let i=0;i<total;i++){
      ctx.fillStyle = i<b.lvl ? c : 'rgba(127,155,176,.35)';
      ctx.beginPath(); ctx.arc(startX+i*(pip+gap)+pip/2, b.y+b.h-7*ui, pip/2, 0,7); ctx.fill();
    }
    // подсказка цены апгрейда (зелёным если хватает)
    const up=bayUpCost(b);
    if(up!=null){
      const enough = money>=up;
      ctx.fillStyle = enough?COL.coin:COL.muted; ctx.font=`${9.5*ui}px ui-monospace,monospace`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('↑ '+fmtMoney(up), b.x+b.w/2, b.y+b.h+4*ui);
    }
    ctx.restore();
  }

  function drawPlane(pl){
    const need=curNeed(pl);
    const ncol=SVC[need].color;
    const body=pl.vip?COL.gold:COL.paper;

    // committed path
    if((pl.zone==='air'||pl.zone==='field'||pl.zone==='runway') && pl.path.length && pl.moving){
      ctx.save();
      ctx.strokeStyle=pl.selected?ncol:'rgba(191,233,255,.5)';
      ctx.globalAlpha=pl.selected?0.95:0.5; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(pl.x,pl.y);
      for(const w of pl.path) ctx.lineTo(w.x,w.y);
      ctx.stroke(); ctx.restore();
    }

    // patience ring (воздух/земля)
    let frac=null;
    if(pl.zone==='air') frac=Math.max(0,pl.airTime)/pl.airMax;
    else if(pl.zone!=='bay') frac=Math.max(0,pl.groundTime)/Math.max(1,pl.groundMax);
    if(frac!=null){
      ctx.save(); ctx.translate(pl.x,pl.y);
      ctx.strokeStyle = frac<0.3 ? COL.life : ncol;
      ctx.globalAlpha=0.7; ctx.lineWidth=2.5*ui;
      ctx.beginPath(); ctx.arc(0,0,15*ui, -Math.PI/2, -Math.PI/2+frac*Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // body
    ctx.save();
    ctx.translate(pl.x,pl.y); ctx.rotate(pl.ang);
    if(pl.selected){ ctx.beginPath(); ctx.arc(0,0,K.GRAB*0.5,0,7); ctx.strokeStyle=ncol; ctx.globalAlpha=.5; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1; }
    ctx.shadowColor=body; ctx.shadowBlur=8; ctx.fillStyle=body;
    // силуэт авиалайнера (нос по курсу, +x)
    const s=ui*0.62;
    ctx.beginPath();
    ctx.moveTo(20*s,0);
    ctx.lineTo(4*s,5*s); ctx.lineTo(2*s,16*s); ctx.lineTo(-3*s,16*s); ctx.lineTo(-2*s,5*s);
    ctx.lineTo(-10*s,3*s); ctx.lineTo(-10*s,-3*s); ctx.lineTo(-2*s,-5*s);
    ctx.lineTo(-3*s,-16*s); ctx.lineTo(2*s,-16*s); ctx.lineTo(4*s,-5*s);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // иконка текущей нужды над бортом
    if(pl.zone!=='bay'){
      ctx.save(); ctx.translate(pl.x, pl.y-24*ui);
      ctx.fillStyle=ncol; ctx.strokeStyle=ncol; glyph(need, 6.5*ui);
      ctx.restore();
    }
  }

  function drawHUD(){
    const hud=HUD_H();
    ctx.fillStyle='rgba(10,22,34,.82)'; ctx.fillRect(0,0,W,hud);
    ctx.strokeStyle='rgba(127,155,176,.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,hud); ctx.lineTo(W,hud); ctx.stroke();

    // жизни (сердца)
    ctx.textBaseline='middle';
    for(let i=0;i<K.START_LIVES;i++){
      ctx.fillStyle = i<lives ? COL.life : 'rgba(239,83,101,.22)';
      const hx=14*ui+i*20*ui, hy=hud/2;
      ctx.font=`${16*ui}px ui-monospace,monospace`; ctx.textAlign='left';
      ctx.fillText('♥', hx, hy);
    }
    // таймер (обратный отсчёт для уровней на время)
    const tShown = LV.objective.time ? Math.max(0, LV.objective.time-gameTime) : gameTime;
    ctx.fillStyle = (LV.objective.time && tShown<=10) ? COL.life : COL.phosphor;
    ctx.font=`${15*ui}px ui-monospace,monospace`; ctx.textAlign='center';
    ctx.fillText(fmtTime(tShown), W*0.42, hud/2);
    // деньги
    ctx.fillStyle=money<0?COL.life:COL.coin; ctx.textAlign='right';
    ctx.font=`600 ${16*ui}px ui-monospace,monospace`;
    ctx.fillText(fmtMoney(money), W - 56*ui, hud/2);
    // принято
    const mv = LV.objective.metric==='upgrades'?upgradesDone:served;
    ctx.fillStyle=COL.coin; ctx.font=`${12*ui}px ui-monospace,monospace`; ctx.textAlign='center';
    let prog = zen ? ('✈ '+fmtNum(served)) : (fmtNum(mv)+' / '+fmtNum(LV.objective.target));
    if(combo>1) prog += '   '+t('hud.combo', {x:fmtNum(comboMult(),1)});
    ctx.fillText(prog, W*0.62, hud/2);
    // название режима/уровня (угол)
    ctx.fillStyle='rgba(127,155,176,.7)'; ctx.font=`${11*ui}px ui-monospace,monospace`;
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText(zen?t('mode.zen'):t('level.name',{n:levelIdx+1}), W-12*ui, H-8*ui);
    ctx.textBaseline='middle';

    // pause button
    ctx.strokeStyle=COL.phosphor; ctx.lineWidth=1.5; ctx.globalAlpha=.9;
    rr(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,4*ui); ctx.stroke();
    ctx.fillStyle=COL.phosphor;
    const cx=pauseBtn.x+pauseBtn.w/2, cy=pauseBtn.y+pauseBtn.h/2;
    if(!paused){
      ctx.fillRect(cx-6*ui,cy-7*ui,4*ui,14*ui);
      ctx.fillRect(cx+2*ui,cy-7*ui,4*ui,14*ui);
    } else {
      ctx.beginPath(); ctx.moveTo(cx-5*ui,cy-7*ui); ctx.lineTo(cx+7*ui,cy); ctx.lineTo(cx-5*ui,cy+7*ui); ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha=1;

    // цепочка операций выбранного борта (слева сверху, под HUD)
    if(selected && !selected.dead){
      const chain=selected.requests;
      const cy2=hud+18*ui; let cx2=18*ui;
      ctx.fillStyle=COL.muted; ctx.font=`${9*ui}px ui-monospace,monospace`;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(selected.vip?t('hud.vip'):t('hud.plane'), cx2, cy2-14*ui);
      for(let i=0;i<chain.length;i++){
        const ty=chain[i], c=SVC[ty].color;   // ty, не t — не затенять t() из i18n
        ctx.globalAlpha = i<selected.reqIndex ? 0.3 : (i===selected.reqIndex?1:0.7);
        ctx.fillStyle=c; ctx.strokeStyle=c;
        ctx.save(); ctx.translate(cx2+9*ui, cy2+4*ui); glyph(ty, 8*ui); ctx.restore();
        if(i===selected.reqIndex){
          ctx.globalAlpha=1; ctx.strokeStyle=c; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.arc(cx2+9*ui, cy2+4*ui, 13*ui,0,7); ctx.stroke();
        }
        cx2+=26*ui;
      }
      ctx.globalAlpha=1;
    }
  }

  function fmtTime(s){ const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(Math.floor(s%60)).padStart(2,'0'); return m+':'+ss; }
  function drawToast(){
    const a = toast.t<2.0 ? 1 : (2.4-toast.t)/0.4;
    ctx.save(); ctx.globalAlpha=Math.max(0,a);
    ctx.font=`${13*ui}px ui-monospace,monospace`;
    const w=ctx.measureText(toast.text).width+28*ui, h=26*ui;
    const x=W/2-w/2, y=HUD_H()+10*ui;
    const col = toast.good?COL.coin:COL.life;
    ctx.fillStyle='rgba(16,18,22,.9)'; rr(x,y,w,h,6*ui); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=1.5; rr(x,y,w,h,6*ui); ctx.stroke();
    ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(toast.text, W/2, y+h/2);
    ctx.restore();
  }
  function boom(x,y){ effects.push({x,y,t:0,life:0.55}); }
  function drawEffects(dt){
    for(let i=effects.length-1;i>=0;i--){
      const e=effects[i]; e.t+=dt;
      const k=e.t/e.life;
      if(k>=1){ effects.splice(i,1); continue; }
      const R=10*ui + k*36*ui;
      ctx.save(); ctx.translate(e.x,e.y);
      // ударная волна
      ctx.globalAlpha=(1-k)*0.9; ctx.strokeStyle=COL.amber; ctx.lineWidth=3*ui;
      ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.stroke();
      ctx.strokeStyle=COL.rose; ctx.lineWidth=1.5*ui;
      ctx.beginPath(); ctx.arc(0,0,R*0.6,0,7); ctx.stroke();
      // искры
      ctx.globalAlpha=(1-k)*0.85; ctx.strokeStyle=COL.amber; ctx.lineWidth=2*ui;
      for(let s=0;s<8;s++){ const a=s*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*R*0.5, Math.sin(a)*R*0.5);
        ctx.lineTo(Math.cos(a)*R, Math.sin(a)*R); ctx.stroke(); }
      // центральная вспышка в начале
      if(k<0.45){ ctx.globalAlpha=(0.45-k)/0.45; ctx.fillStyle=COL.paper;
        ctx.beginPath(); ctx.arc(0,0,9*ui*(1-k),0,7); ctx.fill(); }
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  function frame(ts){
    if(!lastTs)lastTs=ts;
    let dt=(ts-lastTs)/1000; lastTs=ts;
    if(dt>0.05)dt=0.05;
    if(running && !paused) update(dt);

    drawField();
    drawRunways();
    bays.forEach(drawBay);
    planes.forEach(p=>{ if(!p.dead) drawPlane(p); });
    drawEffects(dt);
    drawHUD();

    if(toast){ toast.t+=dt; if(toast.t>2.4) toast=null; else drawToast(); }
    requestAnimationFrame(frame);
  }

  function endLevel(reasonKey){          // reasonKey — ключ i18n (end.*)
    running=false; recordResult();
    const stars=computeStars(), v=metricValue(), passed=stars>=1;
    ACH.onLevelEnd(passed, stars, lives>=K.START_LIVES);
    document.getElementById('overKicker').textContent = t(passed?'over.passed':'over.failed');
    document.getElementById('finalStars').textContent = '★'.repeat(stars)+'☆'.repeat(3-stars);
    const unit = t(LV.objective.metric==='upgrades'?'unit.upgrades':'unit.planes', {n:v});
    document.getElementById('overMsg').textContent =
      t('over.result', {reason:t(reasonKey), desc:objectiveDesc(), n:fmtNum(v), unit, money:fmtMoney(money)});
    const hasNext = levelIdx+1<LEVELS.length && (levelIdx+1)<save.unlocked;
    document.getElementById('nextBtn').classList.toggle('hidden', !hasNext);
    document.getElementById('overScreen').classList.remove('hidden');
  }

  // ---- меню / уровни / сохранение ----
  function loadGame(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&typeof s==='object'){ save.unlocked=s.unlocked||1; save.best=s.best||{}; save.stars=s.stars||{}; save.lang=(s.lang&&I18N[s.lang])?s.lang:null; save.ach=Array.isArray(s.ach)?s.ach:[]; save.stats=(s.stats&&typeof s.stats==='object')?s.stats:{}; } }catch(e){} }
  function saveGame(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }
  // язык и медали (ach/stats) — не прогресс уровней, сохраняем при сбросе
  function resetProgress(){ save={unlocked:1,best:{},stars:{},lang:save.lang,ach:save.ach||[],stats:save.stats||{}}; saveGame(); renderLevels(); }
  function buildLevel(idx){ levelIdx=idx; LV=LEVELS[idx]; bays=[]; runways=[]; layout(); }
  function hideAllScreens(){ ['startScreen','levelScreen','overScreen','pauseScreen','settingsPanel','medalScreen'].forEach(s=>document.getElementById(s).classList.add('hidden')); }
  function showLevels(){ renderLevels(); hideAllScreens(); document.getElementById('levelScreen').classList.remove('hidden'); }
  function startLevel(idx){ zen=false; buildLevel(idx); hideAllScreens(); reset(); }
  function startZen(){ zen=true; buildLevel(0); hideAllScreens(); reset(); }
  function renderLevels(){
    const list=document.getElementById('levelList'); list.innerHTML='';
    LEVELS.forEach((lv,i)=>{
      const unlocked = i < save.unlocked, stars=save.stars[i]||0;
      const b=document.createElement('button');
      b.className='levelbtn'+(unlocked?'':' locked');
      const starStr = unlocked ? ('★'.repeat(stars)+'☆'.repeat(3-stars)) : '🔒';
      b.innerHTML=`<span class="lvname">${t('level.name',{n:i+1})}</span><span class="lvbest">${starStr}</span>`;
      if(unlocked) b.onclick=()=>startLevel(i);
      list.appendChild(b);
    });
  }

  document.getElementById('startBtn').onclick=showLevels;
  document.getElementById('zenBtn').onclick=startZen;
  document.getElementById('backBtn').onclick=()=>{ hideAllScreens(); document.getElementById('startScreen').classList.remove('hidden'); };
  document.getElementById('resetProgBtn').onclick=resetProgress;
  document.getElementById('againBtn').onclick=()=>{ document.getElementById('overScreen').classList.add('hidden'); reset(); };
  document.getElementById('toLevelsBtn').onclick=showLevels;
  document.getElementById('nextBtn').onclick=()=>{ if(levelIdx+1<LEVELS.length) startLevel(levelIdx+1); };

  function setPaused(p){
    paused=p;
    if(p) ACH.onPause();
    document.getElementById('pauseScreen').classList.toggle('hidden', !p);
    if(!p) document.getElementById('settingsPanel').classList.add('hidden');
    else refreshLog();
  }
  function refreshLog(){
    const box=document.getElementById('logBox');
    if(!lossLog.length){ box.innerHTML=`<div class="logrow muted">${t('log.empty')}</div>`; return; }
    box.innerHTML=lossLog.slice().reverse().map(l=>`<div class="logrow">${fmtTime(l.t)} — ${t(l.reason)}</div>`).join('');
  }
  document.getElementById('resumeBtn').onclick=()=>setPaused(false);
  document.getElementById('restartBtn').onclick=()=>reset();
  document.getElementById('settingsBtn').onclick=()=>{
    document.getElementById('settingsPanel').classList.toggle('hidden'); refreshLog();
  };
  document.getElementById('menuBtn').onclick=()=>{
    recordResult(); running=false; paused=false; showLevels();
  };
  document.getElementById('optLives').onchange=e=>{ debug.infiniteLives=e.target.checked; };
  document.getElementById('optMoney').onchange=e=>{ debug.richStart=e.target.checked; if(debug.richStart) money=BIG_MONEY; };

  // ================= ДОСТИЖЕНИЯ / МЕДАЛИ =================
  // Самодостаточный модуль: ловит игровые события через ACH.onX(...), копит
  // прогресс в save.ach (список открытых) и save.stats (накопительные счётчики).
  // ⏳ pending:true — медали под фичи, которых пока нет (бесконечный режим, Daily) —
  // крючки есть, но в текущих уровнях не срабатывают и не нужны для «Легенды».
  const ACH = (() => {
    const S = { ach:[], stats:{landed:0,services:0,departed:0,earned:0,vip:0,noCrashStreak:0,perfect:0} };
    let unlocked = new Set();
    let run = null;
    function newRun(){ run = {landed:0,services:0,departed:0,opens:0,upgrades:0,peakAir:0,
      landTimes:[], types:new Set(), debug:false, time:0}; }
    newRun();

    const defs = [
      // --- Тир 1: лайтовые ---
      {id:'land1',   tier:1, ic:'🛬'},
      {id:'svc1',    tier:1, ic:'🧰'},
      {id:'takeoff1',tier:1, ic:'🛫'},
      {id:'money1',  tier:1, ic:'🪙'},
      {id:'bayopen1',tier:1, ic:'🏗️'},
      {id:'upg1',    tier:1, ic:'⬆️'},
      {id:'pause',   tier:1, ic:'⏸️'},
      {id:'level1',  tier:1, ic:'✅'},
      {id:'vip1',    tier:1, ic:'💛'},
      {id:'land10',  tier:1, ic:'🎓', prog:S=>[S.landed,10]},
      // --- Тир 2: обычные ---
      {id:'land100', tier:2, ic:'🌊', prog:S=>[S.landed,100]},
      {id:'svc100',  tier:2, ic:'🔧', prog:S=>[S.services,100]},
      {id:'earn1000',tier:2, ic:'💵', prog:S=>[S.earned,1000]},
      {id:'fullchain',tier:2,ic:'🎯'},
      {id:'nopenalty',tier:2,ic:'🧊'},
      {id:'nolife',  tier:2, ic:'❤️'},
      {id:'air5',    tier:2, ic:'🛫'},
      {id:'star3',   tier:2, ic:'🌟'},
      {id:'vip25',   tier:2, ic:'💼', prog:S=>[S.vip,25]},
      {id:'baymax',  tier:2, ic:'🛠️'},
      // --- Тир 3: сложные ---
      {id:'nocrash', tier:3, ic:'☁️'},
      {id:'perfect', tier:3, ic:'💎'},
      {id:'air8',    tier:3, ic:'🤹'},
      {id:'speed20', tier:3, ic:'⚡'},
      {id:'minimalist',tier:3,ic:'🪨'},
      {id:'millionaire',tier:3,ic:'💰', prog:S=>[S.earned,1000000]},
      {id:'combo10', tier:3, ic:'🔥'},
      {id:'marathon',tier:3, ic:'🏃', pending:true},
      // --- Тир 4: задротские ---
      {id:'streak1000',tier:4,ic:'🧠', prog:S=>[S.noCrashStreak,1000]},
      {id:'land10000',tier:4,ic:'🎖️', prog:S=>[S.landed,10000]},
      {id:'all3star',tier:4, ic:'⭐'},
      {id:'ascetic', tier:4, ic:'🧘'},
      {id:'perfectionist',tier:4,ic:'🥇', prog:S=>[S.perfect,10]},
      {id:'daily7',  tier:4, ic:'📅', pending:true},
      {id:'sleepless',tier:4,ic:'🌙', pending:true},
      {id:'zen500',  tier:4, ic:'🧘', pending:true},
      {id:'combo50', tier:4, ic:'🔥', pending:true},
      {id:'legend',  tier:4, ic:'🛐'},
      // --- Тир 5: секретные / фановые (скрыты до получения) ---
      {id:'crash10s',tier:5, ic:'💥', hidden:true},
      {id:'asleep',  tier:5, ic:'😴', hidden:true},
      {id:'crashbay',tier:5, ic:'🅿️', hidden:true},
      {id:'crashrw', tier:5, ic:'💢', hidden:true},
      {id:'groundto',tier:5, ic:'⌛', hidden:true},
      {id:'moneyneg',tier:5, ic:'🤑', hidden:true},
      {id:'longshift',tier:5,ic:'🕰️', hidden:true, pending:true},
      {id:'zoo',     tier:5, ic:'🦁', hidden:true},
    ];

    function persist(){ save.ach=[...unlocked]; save.stats=S.stats; saveGame(); }
    function give(id){
      if(unlocked.has(id)) return;
      const d=defs.find(x=>x.id===id); if(!d) return;
      unlocked.add(id); persist(); toastAch(d);
      if(id!=='legend'){
        const need=defs.filter(x=>x.id!=='legend' && !x.pending);
        if(need.every(x=>unlocked.has(x.id))) give('legend');
      }
    }

    // всплывашка (очередь, по одной)
    let q=[], showing=false;
    function toastAch(d){ q.push(d); if(!showing) pump(); }
    function pump(){
      const el=document.getElementById('achToast');
      if(!q.length){ showing=false; return; }
      showing=true; const d=q.shift();
      document.getElementById('achIc').textContent=d.ic;
      document.getElementById('achTtl').textContent=t('ach.'+d.id+'.t');
      el.classList.add('show');
      setTimeout(()=>{ el.classList.remove('show'); setTimeout(pump, 360); }, 2200);
    }

    return {
      defs,
      init(){ S.ach=Array.isArray(save.ach)?save.ach:[]; Object.assign(S.stats, save.stats||{}); unlocked=new Set(S.ach); },
      onLevelStart(){ newRun(); },
      onPlaneTouched(pl){ if(pl) pl.everTouched=true; },
      onPause(){ give('pause'); },
      onLand(){
        S.stats.landed++; run.landed++; S.stats.noCrashStreak++;
        run.landTimes.push(gameTime);
        give('land1');
        if(S.stats.landed>=10) give('land10');
        if(S.stats.landed>=100) give('land100');
        if(S.stats.landed>=10000) give('land10000');
        if(S.stats.noCrashStreak>=1000) give('streak1000');
        if(run.landed>=500) give('zen500');
        const cut=gameTime-60; while(run.landTimes.length && run.landTimes[0]<cut) run.landTimes.shift();
        if(run.landTimes.length>=20) give('speed20');
      },
      onService(){ S.stats.services++; run.services++; give('svc1'); if(S.stats.services>=100) give('svc100'); },
      onDepart(pl, pay){
        S.stats.departed++; run.departed++; S.stats.earned+=Math.max(0,pay);
        run.types.add(pl.emergency?'emg':(pl.vip?'vip':'std'));
        give('takeoff1'); if(S.stats.earned>=1) give('money1');
        if(S.stats.earned>=1000) give('earn1000');
        if(S.stats.earned>=1000000) give('millionaire');
        if(pl.vip){ S.stats.vip++; give('vip1'); if(S.stats.vip>=25) give('vip25'); }
        if(pl.nSvc>=2) give('fullchain');
        if(combo>=10) give('combo10');
        if(combo>=50) give('combo50');
        if(run.types.has('std')&&run.types.has('vip')&&run.types.has('emg')) give('zoo');
        persist();
      },
      onBayOpen(){ run.opens++; give('bayopen1'); },
      onBayUpgrade(b){ run.upgrades++; give('upg1'); if(b.lvl>=K.BAY_MAX_LVL) give('baymax'); },
      onGroundTimeout(){ give('groundto'); },
      onCrash(pl, reason){
        S.stats.noCrashStreak=0; persist();
        if(gameTime<10) give('crash10s');
        if(reason==='loss.collisionBay') give('crashbay');
        if(reason==='loss.collisionRunway') give('crashrw');
        if(reason==='loss.airTimeout' && !pl.everTouched) give('asleep');
      },
      onTick(dt){
        if(debug.infiniteLives||debug.richStart) run.debug=true;
        run.time+=dt;
        let air=0; for(const p of planes) if(!p.dead && p.zone==='air') air++;
        if(air>run.peakAir) run.peakAir=air;
        if(run.peakAir>=5) give('air5');
        if(run.peakAir>=8) give('air8');
        if(money<0) give('moneyneg');
        if(run.time>=900) give('marathon');
        if(run.time>=1800) give('longshift');
        if(run.time>=3600) give('sleepless');
      },
      onLevelEnd(passed, stars, livesFull){
        const clean=!run.debug;
        if(passed){
          give('level1');
          if(clean && livesFull) give('nolife');
          if(clean && runPenalties===0) give('nopenalty');
          if(clean && runCrashes===0) give('nocrash');
          if(clean && run.opens===0) give('minimalist');
        }
        if(stars>=3){
          give('star3');
          if(clean && livesFull) give('perfect');
          if(clean && run.opens===0 && run.upgrades===0) give('ascetic');
          S.stats.perfect++; if(S.stats.perfect>=10) give('perfectionist');
          let all=LEVELS.length>0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)<3) all=false;
          if(all) give('all3star');
        } else {
          S.stats.perfect=0;
        }
        persist();
      },
      list(){
        const out=[];
        for(const d of defs){
          let prog=null;
          if(d.prog) prog=d.prog(S.stats);
          else if(d.id==='all3star'){ let c=0; for(let i=0;i<LEVELS.length;i++) if((save.stars[i]||0)>=3)c++; prog=[c,LEVELS.length]; }
          else if(d.id==='legend'){ const tot=defs.filter(x=>x.id!=='legend'&&!x.pending); prog=[tot.filter(x=>unlocked.has(x.id)).length, tot.length]; }
          out.push({id:d.id,tier:d.tier,ic:d.ic,title:t('ach.'+d.id+'.t'),desc:t('ach.'+d.id+'.d'),hidden:!!d.hidden,pending:!!d.pending,got:unlocked.has(d.id),prog});
        }
        return out;
      },
    };
  })();

  // ---- экран медалей ----
  let medalFrom='start';
  function renderMedals(){
    const list=ACH.list();
    document.getElementById('medalCount').textContent =
      t('medals.count', {got:list.filter(m=>m.got).length, total:list.length});
    const grid=document.getElementById('medalGrid'); grid.innerHTML='';
    for(const tier of [1,2,3,4,5]){
      const head=document.createElement('div'); head.className='tierhead';
      head.textContent=t('medals.tier'+tier); grid.appendChild(head);
      for(const m of list.filter(x=>x.tier===tier)){
        const masked = m.hidden && !m.got;             // секретная и ещё не открыта
        const el=document.createElement('div');
        el.className='medal'+(m.got?' got':' locked');
        const ic = masked ? '❔' : m.ic;
        const title = masked ? t('medals.secretTitle') : m.title;
        let desc = masked ? t('medals.secretDesc') : m.desc;
        if(m.pending && !m.got && !masked) desc += t('medals.pendingNote');
        let prog='';
        if(m.prog && !m.got && !masked){
          const c=Math.min(m.prog[0],m.prog[1]);
          prog=`<div class="mp">${fmtNum(c)} / ${fmtNum(m.prog[1])}</div>`;
        }
        el.innerHTML=`<div class="ic">${ic}</div><div><div class="mt">${title}</div><div class="md">${desc}</div>${prog}</div>`;
        grid.appendChild(el);
      }
    }
  }
  function openMedals(from){ medalFrom=from||'start'; renderMedals(); hideAllScreens();
    document.getElementById('medalScreen').classList.remove('hidden'); }
  document.getElementById('medalsBtn').onclick=()=>openMedals('start');
  document.getElementById('medalsBtn2').onclick=()=>openMedals('levels');
  document.getElementById('medalsBackBtn').onclick=()=>{
    hideAllScreens();
    if(medalFrom==='levels') showLevels();
    else document.getElementById('startScreen').classList.remove('hidden');
  };

  loadGame();
  ACH.init();
  lang = save.lang || detectLang();   // сохранённый выбор > автоопределение > en
  applyI18n();
  document.getElementById('ver').textContent=VERSION;
  resize();
  requestAnimationFrame(frame);
})();
</script>
