# Сборка игры из src/ и публикация на GitHub Pages.
#
# index.html — СБОРОЧНЫЙ артефакт (в git его нет). На каждый push в main этот
# робот проверяет типы (tsc), собирает свежий index.html из src/ (node
# scripts/build.mjs), прогоняет юнит-тесты как страховку и публикует на Pages.
# Никому не нужно помнить про пересборку — она всегда происходит здесь.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; новый push отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Установка зависимостей (TypeScript для сборки и проверки типов)
        run: npm ci

      - name: Проверка типов (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Сборка index.html из src/
        run: node scripts/build.mjs

      - name: Юнит-тесты (страховка перед публикацией)
        run: node --test tests/*.test.mjs

      # Capgo OTA: на каждый push в main льём свежий веб-бандл в канал production —
      # установленный APK подхватит его сам (см. capacitor.config.ts и docs/capacitor-android.md).
      # Пока секрет CAPGO_TOKEN не добавлен, шаг — no-op, и Pages-деплой ниже не страдает.
      - name: Capgo OTA — выгрузка бандла
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "CAPGO_TOKEN не задан — пропускаю выгрузку в Capgo (норма до подключения облака)."
            exit 0
          fi
          npm run build:www
          VER="$(node -p "require('./package.json').version")-${{ github.run_number }}"
          # --no-code-check: вся игра инлайнится в один index.html, поэтому эвристика CLI
          # не находит notifyAppReady() (он во встроенном <script>, а не в отдельном .js).
          # Вызов реально есть — в src/game/13-init.js (гейт на натив). См. capacitor.config.ts.
          npx @capgo/cli@latest bundle upload com.planeflow.game \
            --apikey "$CAPGO_TOKEN" \
            --channel production \
            --bundle "$VER" \
            --path www \
            --no-code-check

      # Папка сайта = корень репо (index.html + assets + sw.js + manifest +
      # CNAME + ...), но без истории git и dev-зависимостей.
      # Публикуем тот же набор файлов, что и раньше отдавал Pages из ветки.
      - name: Сборка папки сайта
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='_site' --exclude='node_modules' ./ _site/

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          # v4+ по умолчанию выкидывает скрытые файлы (dotfiles) из артефакта,
          # а сайту нужен .nojekyll (отключает Jekyll). Возвращаем прежнее поведение.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
