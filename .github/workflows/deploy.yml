# Сборка игры из src/ и публикация на GitHub Pages.
#
# index.html — СБОРОЧНЫЙ артефакт (в git его нет). На каждый push в main этот
# робот проверяет типы (tsc), собирает свежий index.html из src/ (node
# scripts/build.mjs), прогоняет юнит-тесты как страховку и публикует на Pages.
# Никому не нужно помнить про пересборку — она всегда происходит здесь.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; новый push отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Установка зависимостей (TypeScript для сборки и проверки типов)
        run: npm ci

      - name: Проверка типов (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Сборка index.html из src/
        run: node scripts/build.mjs

      - name: Юнит-тесты (страховка перед публикацией)
        run: node --test tests/*.test.mjs

      # OTA (self-host): на каждый push в main собираем веб-бандл, зипуем www/ и заливаем на свой
      # VPS — Caddy раздаёт /bundles, responder /updates сравнивает версии и отдаёт бандл устройствам
      # (см. capacitor.config.ts и docs/capgo-self-host-migration.md). Пока секрет OTA_SSH_KEY не
      # добавлен — шаг no-op, и Pages-деплой ниже не страдает.
      - name: OTA — публикация бандла на свой VPS
        env:
          OTA_SSH_KEY: ${{ secrets.OTA_SSH_KEY }}   # приватный ключ scoped deploy-юзера
          OTA_HOST:    ${{ secrets.OTA_HOST }}       # SSH-хост VPS (напр. 185.239.209.185)
          OTA_USER:    ${{ secrets.OTA_USER }}       # deploy-юзер (напр. capgo-deploy)
        run: |
          if [ -z "$OTA_SSH_KEY" ]; then
            echo "OTA_SSH_KEY не задан — пропускаю публикацию OTA (норма до настройки деплоя)."
            exit 0
          fi
          mkdir -p ~/.ssh && printf '%s\n' "$OTA_SSH_KEY" > ~/.ssh/ota_key && chmod 600 ~/.ssh/ota_key
          ssh-keyscan -H "$OTA_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Деплоим server.py атомарно и рестартуем сервис.
          # Требует sudoers на VPS: capgo-deploy ALL=(root) NOPASSWD: /bin/systemctl restart capgo-ota
          scp -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new docs/vps/server.py "$OTA_USER@$OTA_HOST:/opt/capgo-ota/server.py.tmp"
          ssh -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new "$OTA_USER@$OTA_HOST" \
            "mv /opt/capgo-ota/server.py.tmp /opt/capgo-ota/server.py && sudo systemctl restart capgo-ota"
          npm run build:www
          # Версия бандла ВЫШЕ нативной (versionName из package.json), иначе плагин сочтёт это
          # «понижением». major.minor из package.json, patch = номер прогона: 0.21.0 → 0.21.43.
          BASE="$(node -p "require('./package.json').version")"
          VER="${BASE%.*}.${{ github.run_number }}"
          ZIP="planeflow-$VER.zip"
          ( cd www && zip -qr "../$ZIP" . )           # index.html в корне zip — как требует плагин
          SUM="$(sha256sum "$ZIP" | cut -d' ' -f1)"
          # Атомарная публикация: сначала загружаем под временным именем, потом mv (атомарно).
          # Порядок: zip сначала, манифест последним — клиент никогда не получит манифест
          # с несуществующим zip.
          scp -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new "$ZIP" "$OTA_USER@$OTA_HOST:/opt/capgo-ota/bundles/$ZIP.tmp"
          ssh -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new "$OTA_USER@$OTA_HOST" \
            "mv /opt/capgo-ota/bundles/$ZIP.tmp /opt/capgo-ota/bundles/$ZIP"
          printf '{"version":"%s","url":"https://capgo.jevgenia.com/bundles/%s","checksum":"%s"}\n' "$VER" "$ZIP" "$SUM" > updates.json
          scp -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new updates.json "$OTA_USER@$OTA_HOST:/opt/capgo-ota/updates.json.tmp"
          ssh -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new "$OTA_USER@$OTA_HOST" \
            "mv /opt/capgo-ota/updates.json.tmp /opt/capgo-ota/updates.json"
          # Retention: оставляем последние 10 бандлов (буфер отката для масштаба Play Store).
          ssh -i ~/.ssh/ota_key -o StrictHostKeyChecking=accept-new "$OTA_USER@$OTA_HOST" \
            "ls -t /opt/capgo-ota/bundles/planeflow-*.zip 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true"
          echo "OTA опубликован: $VER (sha256 $SUM)"

      # Папка сайта = корень репо (index.html + assets + sw.js + manifest +
      # CNAME + ...), но без истории git и dev-зависимостей.
      # Публикуем тот же набор файлов, что и раньше отдавал Pages из ветки.
      - name: Сборка папки сайта
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='_site' --exclude='node_modules' ./ _site/

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          # v4+ по умолчанию выкидывает скрытые файлы (dotfiles) из артефакта,
          # а сайту нужен .nojekyll (отключает Jekyll). Возвращаем прежнее поведение.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
